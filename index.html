<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Protocol: Ghost in the Grid</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; width: 100%; height: 100%; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #0ff; border-radius: 2px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// в”Ђв”Ђв”Ђ Config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const CFG = {
    API: 'https://your-domain.com/api',
    WS: 'wss://your-domain.com/ws',
    WIDTH: 390, HEIGHT: 844,
    COLORS: {
        bg: '#0a0a0f', grid: '#0ff1', neon: '#0ff', pink: '#f0f',
        green: '#0f0', yellow: '#ff0', orange: '#f80', red: '#f00',
        dim: '#2a2a3a', text: '#c0c0e0', dark: '#1a1a2a', accent: '#0ff',
    },
    FONTS: { ui: '12px "Share Tech Mono", monospace', title: 'bold 24px Orbitron, monospace',
             sm: '10px "Share Tech Mono", monospace', md: '14px "Share Tech Mono", monospace' },
};

// в”Ђв”Ђв”Ђ DataBridge в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class DataBridge {
    constructor() { this.cache = {}; this.pending = []; }
    initData() {
        try {
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
                return tg.initData || '';
            }
        } catch(e) {}
        return 'auth_date=1700000000&hash=test&id=1&username=test';
    }
    headers() { return { 'X-Telegram-Auth': this.initData(), 'Content-Type': 'application/json' }; }
    async fetch(method, path, body) {
        const url = CFG.API + path;
        try {
            const opts = { method, headers: this.headers() };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch(e) {
            this.pending.push({ method, path, body });
            throw e;
        }
    }
    async getKey(key, fallback) {
        if (this.cache[key]) return this.cache[key];
        try {
            const d = await this.fetch('GET', key);
            this.cache[key] = d;
            return d;
        } catch(e) { return fallback; }
    }
    async init() {
        try {
            const d = await this.fetch('GET', '/init');
            this.cache['/init'] = d;
            return d;
        } catch(e) { return { character: { nickname: 'Ghost', level: 1, credits: 500, hp: 100, maxhp: 100, en: 100, maxen: 100 } }; }
    }
}

// в”Ђв”Ђв”Ђ SocketManager в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class SocketManager {
    constructor() { this.ws = null; this.reconnectTimer = null; this.listeners = {}; this.connected = false; }
    connect(initData) {
        if (this.ws?.readyState === WebSocket.OPEN) return;
        try {
            this.ws = new WebSocket(`${CFG.WS}?init_data=${encodeURIComponent(initData)}`);
            this.ws.onopen = () => { this.connected = true; this.emit('connect'); };
            this.ws.onclose = () => { this.connected = false; this.emit('disconnect'); this.scheduleReconnect(initData); };
            this.ws.onmessage = (e) => { try { this.emit('msg', JSON.parse(e.data)); } catch(ex) {} };
            this.ws.onerror = () => {};
        } catch(e) { this.scheduleReconnect(initData); }
    }
    scheduleReconnect(initData) {
        if (this.reconnectTimer) return;
        this.reconnectTimer = setTimeout(() => {
            this.reconnectTimer = null;
            this.connect(initData);
        }, 5000);
    }
    on(ev, fn) { (this.listeners[ev] = this.listeners[ev] || []).push(fn); }
    emit(ev, data) { (this.listeners[ev] || []).forEach(fn => fn(data)); }
    send(data) { if (this.ws?.readyState === WebSocket.OPEN) this.ws.send(JSON.stringify(data)); }
}

// в”Ђв”Ђв”Ђ SoundManager в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class SoundManager {
    constructor() { this.ctx = null; this.vol = 0.3; }
    init() { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
    play(type) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        gain.gain.value = this.vol * 0.3;
        switch(type) {
            case 'click': osc.frequency.value = 800; osc.type = 'square'; gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05); osc.start(); osc.stop(this.ctx.currentTime + 0.05); break;
            case 'hack': osc.frequency.value = 400; osc.type = 'sawtooth'; gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.2); osc.start(); osc.stop(this.ctx.currentTime + 0.2); break;
            case 'dmg': osc.frequency.value = 200; osc.type = 'square'; gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15); osc.start(); osc.stop(this.ctx.currentTime + 0.15); break;
            case 'crit': osc.frequency.value = 1200; osc.type = 'sawtooth'; gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3); osc.start(); osc.stop(this.ctx.currentTime + 0.3); break;
            case 'win': this.playMelody([523, 659, 784, 1047]); break;
            default: break;
        }
    }
    playMelody(notes) {
        if (!this.ctx) return;
        notes.forEach((f, i) => {
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.connect(g); g.connect(this.ctx.destination);
            osc.frequency.value = f; osc.type = 'square';
            g.gain.value = this.vol * 0.2;
            g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i * 0.15 + 0.1);
            osc.start(this.ctx.currentTime + i * 0.15);
            osc.stop(this.ctx.currentTime + i * 0.15 + 0.1);
        });
    }
}

// в”Ђв”Ђв”Ђ AnimationEngine в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class AnimationEngine {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.particles = [];
        this.rain = [];
        this.scanLines = 0;
        this.glitchTimer = 0;
        this.matrixChars = [];
        this.time = 0;
        for (let i = 0; i < 60; i++) this.rain.push({ x: Math.random() * CFG.WIDTH, y: Math.random() * CFG.HEIGHT, s: 2 + Math.random() * 4, c: Math.random() > 0.5 ? '#0f02' : '#0ff2' });
        for (let i = 0; i < 30; i++) this.matrixChars.push({ x: Math.random() * CFG.WIDTH, y: Math.random() * CFG.HEIGHT, ch: String.fromCharCode(0x30A0 + Math.random() * 96), s: 8 + Math.random() * 8, sp: 1 + Math.random() * 3 });
    }
    addParticles(x, y, count, color, life) {
        for (let i = 0; i < count; i++) this.particles.push({ x, y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, life: life || 30, max: life || 30, color: color || '#0ff', size: 2+Math.random()*3 });
    }
    update() {
        this.time++;
        this.particles = this.particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
        this.rain.forEach(r => { r.y += r.s; if (r.y > CFG.HEIGHT) { r.y = -10; r.x = Math.random() * CFG.WIDTH; } });
        this.matrixChars.forEach(m => { m.y += m.sp; if (m.y > CFG.HEIGHT) { m.y = -10; m.x = Math.random() * CFG.WIDTH; m.ch = String.fromCharCode(0x30A0 + Math.random() * 96); } });
        if (Math.random() < 0.02) this.glitchTimer = 5;
        if (this.glitchTimer > 0) this.glitchTimer--;
    }
    drawBg(ctx) {
        ctx.fillStyle = CFG.COLORS.bg; ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        ctx.strokeStyle = CFG.COLORS.grid; ctx.lineWidth = 0.5;
        for (let x = 0; x < CFG.WIDTH; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CFG.HEIGHT); ctx.stroke(); }
        for (let y = 0; y < CFG.HEIGHT; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CFG.WIDTH,y); ctx.stroke(); }
        ctx.fillStyle = '#0ff08'; ctx.font = '10px monospace';
        this.matrixChars.forEach(m => { ctx.fillText(m.ch, m.x, m.y); });
    }
    drawParticles(ctx) {
        this.particles.forEach(p => {
            const a = p.life / p.max; ctx.globalAlpha = a; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI*2); ctx.fill();
        }); ctx.globalAlpha = 1;
    }
    drawGlitch(ctx) {
        if (this.glitchTimer <= 0) return;
        for (let i = 0; i < 3; i++) {
            const y = Math.random() * CFG.HEIGHT;
            const h = 2 + Math.random() * 6;
            ctx.fillStyle = `rgba(255,0,255,${Math.random() * 0.3})`;
            ctx.fillRect(0, y, CFG.WIDTH, h);
        }
    }
    drawScan(ctx) {
        this.scanLines = (this.scanLines + 1) % CFG.HEIGHT;
        ctx.fillStyle = `rgba(0,255,255,${0.03 + Math.sin(this.time * 0.02) * 0.02})`;
        ctx.fillRect(0, this.scanLines, CFG.WIDTH, 2);
    }
}

// в”Ђв”Ђв”Ђ CanvasUI в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class CanvasUI {
    constructor(ctx, game) {
        this.ctx = ctx; this.game = game;
        this.elements = []; this.modals = []; this.scrollOffset = 0; this.maxScroll = 0;
        this.dragging = null; this.dragTarget = null;
        this.tooltip = null; this.tooltipTimer = 0;
        this.activeDropdown = null;
        this.clickHandlers = [];
    }
    clear() { this.elements = []; this.clickHandlers = []; }
    _darken(hex, amt) {
        if (!hex || hex.startsWith('rgba')) return hex;
        let c = hex.replace('#','');
        if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
        const r = Math.max(0, parseInt(c.substr(0,2),16) * (1-amt));
        const g = Math.max(0, parseInt(c.substr(2,2),16) * (1-amt));
        const b = Math.max(0, parseInt(c.substr(4,2),16) * (1-amt));
        return `rgb(${r|0},${g|0},${b|0})`;
    }
    _lighten(hex, amt) {
        if (!hex || hex.startsWith('rgba')) return hex;
        let c = hex.replace('#','');
        if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
        const r = Math.min(255, parseInt(c.substr(0,2),16) + Math.floor(255 * amt));
        const g = Math.min(255, parseInt(c.substr(2,2),16) + Math.floor(255 * amt));
        const b = Math.min(255, parseInt(c.substr(4,2),16) + Math.floor(255 * amt));
        return `rgb(${r},${g},${b})`;
    }
    add(el) { this.elements.push(el); return el; }
    text(x, y, txt, opts) {
        const o = Object.assign({ color: '#c0c0e0', font: CFG.FONTS.ui, align: 'left', base: 'top' }, opts);
        return this.add({ type: 'text', x, y, txt, o });
    }
    btn(x, y, w, h, txt, cb, opts) {
        const o = Object.assign({ color: '#0ff', bg: '#1a1a3a', border: '#0ff', radius: 4, font: CFG.FONTS.md, active: false, disabled: false }, opts);
        const el = this.add({ type: 'btn', x, y, w, h, txt, o, cb: cb || (()=>{}), state: 0 });
        return el;
    }
    rect(x, y, w, h, opts) {
        const o = Object.assign({ fill: '#1a1a2a', stroke: '#0ff', radius: 4 }, opts);
        return this.add({ type: 'rect', x, y, w, h, o });
    }
    bar(x, y, w, h, val, max, opts) {
        const o = Object.assign({ fg: '#0ff', bg: '#1a1a2a', border: '#0ff' }, opts);
        return this.add({ type: 'bar', x, y, w, h, val: Math.min(val, max), max, o });
    }
    input(x, y, w, h, opts) {
        const o = Object.assign({ placeholder: '', font: CFG.FONTS.md, color: '#0ff', bg: '#0a0a1a', border: '#0ff' }, opts);
        const el = this.add({ type: 'input', x, y, w, h, o, value: '', focus: false });
        return el;
    }
    list(x, y, w, h, items, renderItem, opts) {
        const o = Object.assign({ bg: '#0d0d1a', border: '#0ff', scrollbar: true }, opts);
        const el = this.add({ type: 'list', x, y, w, h, o, items, renderItem, scrollOffset: 0 });
        return el;
    }
    modal(w, h, title, content) {
        const mx = (CFG.WIDTH - w) / 2, my = (CFG.HEIGHT - h) / 2;
        const bg = this.add({ type: 'modalBg', x: 0, y: 0, w: CFG.WIDTH, h: CFG.HEIGHT, o: { fill: 'rgba(0,0,0,0.7)' } });
        const box = this.add({ type: 'modalBox', x: mx, y: my, w, h, o: { fill: '#0a0a1a', stroke: '#0ff', radius: 8 }, title, content, animY: -50, animDone: false });
        setTimeout(() => { box.animY = 0; box.animDone = true; }, 50);
        return { bg, box, close: () => { this.elements = this.elements.filter(e => e !== bg && e !== box); } };
    }
    draw() {
        const ctx = this.ctx;
        this.elements.forEach(el => {
            try { this['draw_' + el.type](el, ctx); } catch(e) {}
            if (el.o?.active) {
                ctx.shadowColor = el.o.color || '#0ff'; ctx.shadowBlur = 10;
                this['draw_' + el.type](el, ctx);
                ctx.shadowBlur = 0;
            }
        });
        if (this.tooltip && this.tooltipTimer > 30) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.strokeStyle = '#0ff';
            ctx.fillRect(this.tooltip.x - 4, this.tooltip.y - 16, this.tooltip.w + 8, 22);
            ctx.strokeRect(this.tooltip.x - 4, this.tooltip.y - 16, this.tooltip.w + 8, 22);
            ctx.fillStyle = '#0ff'; ctx.font = CFG.FONTS.sm;
            ctx.fillText(this.tooltip.txt, this.tooltip.x, this.tooltip.y);
        }
    }
    draw_text(el, ctx) {
        ctx.save(); ctx.font = el.o.font; ctx.fillStyle = el.o.color; ctx.textAlign = el.o.align; ctx.textBaseline = el.o.base;
        ctx.shadowColor = el.o.color; ctx.shadowBlur = el.o.glow || 0;
        ctx.fillText(el.txt, el.x, el.y); ctx.restore();
    }
    draw_btn(el, ctx) {
        if (el.o.hidden) return;
        ctx.save();
        const alpha = el.o.alpha ?? 1;
        ctx.globalAlpha = alpha;
        const w = el.w, h = el.h, r = el.o.radius || 4;
        const grad = ctx.createLinearGradient(el.x, el.y, el.x, el.y + h);
        if (el.o.disabled) {
            grad.addColorStop(0, '#2a2a3a'); grad.addColorStop(1, '#1a1a2a');
        } else {
            grad.addColorStop(0, el.o.bg || '#1a1a3a');
            grad.addColorStop(1, this._darken(el.o.bg || '#1a1a3a', 0.4));
        }
        ctx.shadowColor = el.o.disabled ? 'transparent' : (el.o.color || '#0ff');
        ctx.shadowBlur = el.o.active ? 18 : 8;
        ctx.fillStyle = grad;
        this.roundRect(ctx, el.x, el.y, w, h, r, true, false);
        ctx.shadowBlur = 0;
        const borderGrad = ctx.createLinearGradient(el.x, el.y, el.x, el.y + h);
        if (el.o.disabled) {
            borderGrad.addColorStop(0, '#555'); borderGrad.addColorStop(1, '#444');
        } else {
            borderGrad.addColorStop(0, el.o.border || '#0ff');
            borderGrad.addColorStop(0.5, this._lighten(el.o.border || '#0ff', 0.3));
            borderGrad.addColorStop(1, (el.o.border || '#0ff') + '66');
        }
        ctx.strokeStyle = borderGrad; ctx.lineWidth = el.o.active ? 2 : 1;
        this.roundRect(ctx, el.x, el.y, w, h, r, false, true);
        if (el.o.active) {
            ctx.strokeStyle = el.o.color || '#0ff'; ctx.lineWidth = 1; ctx.globalAlpha = 0.3 + 0.2 * Math.sin(this.game.time * 0.05);
            this.roundRect(ctx, el.x - 2, el.y - 2, w + 4, h + 4, r + 1, false, true);
            ctx.globalAlpha = 1;
        }
        ctx.fillStyle = el.o.disabled ? '#888' : el.o.color;
        ctx.font = el.o.font; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = el.o.disabled ? 'transparent' : (el.o.color || '#0ff');
        ctx.shadowBlur = 6;
        ctx.fillText(el.txt, el.x + w/2, el.y + h/2);
        ctx.restore();
    }
    draw_rect(el, ctx) {
        ctx.fillStyle = el.o.fill; ctx.strokeStyle = el.o.stroke;
        this.roundRect(ctx, el.x, el.y, el.w, el.h, el.o.radius, true, true);
    }
    draw_bar(el, ctx) {
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
        ctx.fillStyle = el.o.bg || '#1a1a2a';
        this.roundRect(ctx, el.x, el.y, el.w, el.h, 3, true, false);
        ctx.shadowBlur = 0;
        const pct = Math.min(1, Math.max(0, el.val / el.max));
        if (pct > 0) {
            const fg = el.o.fg || '#0ff';
            const grad = ctx.createLinearGradient(el.x, el.y, el.x + el.w * pct, el.y);
            grad.addColorStop(0, fg);
            grad.addColorStop(0.7, this._lighten(fg, 0.2));
            grad.addColorStop(1, fg + '88');
            ctx.shadowColor = fg; ctx.shadowBlur = 6;
            ctx.fillStyle = grad;
            this.roundRect(ctx, el.x, el.y, el.w * pct, el.h, 3, true, false);
            ctx.shadowBlur = 0;
        }
        if (el.o.border) {
            ctx.strokeStyle = el.o.border; ctx.lineWidth = 1;
            this.roundRect(ctx, el.x, el.y, el.w, el.h, 3, false, true);
        }
        ctx.fillStyle = '#fff'; ctx.font = CFG.FONTS.sm; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 3;
        ctx.fillText(`${el.val}/${el.max}`, el.x + el.w/2, el.y + el.h/2);
        ctx.restore();
    }
    draw_input(el, ctx) {
        ctx.fillStyle = el.o.bg; ctx.strokeStyle = el.focus ? '#0ff' : el.o.border;
        this.roundRect(ctx, el.x, el.y, el.w, el.h, 4, true, true);
        ctx.fillStyle = el.o.color; ctx.font = el.o.font; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        const txt = el.value || el.o.placeholder;
        ctx.fillStyle = el.value ? el.o.color : '#555';
        ctx.fillText(txt, el.x + 8, el.y + el.h/2);
        if (el.focus && Math.floor(this.game.time / 30) % 2) {
            const tw = ctx.measureText(el.value || '').width;
            ctx.fillStyle = '#0ff'; ctx.fillRect(el.x + 8 + tw, el.y + el.h/2 - 6, 1, 12);
        }
    }
    draw_list(el, ctx) {
        ctx.save(); ctx.strokeStyle = el.o.border;
        this.roundRect(ctx, el.x, el.y, el.w, el.h, 4, false, true);
        ctx.beginPath(); ctx.rect(el.x+1, el.y+1, el.w-2, el.h-2); ctx.clip();
        const ih = 30; const vis = Math.floor(el.h / ih);
        el.items.slice(0, vis).forEach((item, i) => {
            const iy = el.y + i * ih;
            ctx.fillStyle = i % 2 ? '#0d0d1a' : '#111122'; ctx.fillRect(el.x+1, iy, el.w-2, ih);
            ctx.fillStyle = '#c0c0e0'; ctx.font = CFG.FONTS.sm; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(el.renderItem ? el.renderItem(item) : String(item), el.x + 8, iy + ih/2);
        });
        ctx.restore();
    }
    draw_modalBg(el, ctx) { ctx.fillStyle = el.o.fill; ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT); }
    draw_modalBox(el, ctx) {
        const ay = el.animDone ? 0 : (el.animY || -50);
        ctx.fillStyle = el.o.fill; ctx.strokeStyle = el.o.stroke;
        ctx.save();
        ctx.globalAlpha = el.animDone ? 1 : (1 - Math.abs(ay) / 50);
        this.roundRect(ctx, el.x, el.y + ay, el.w, el.h, el.o.radius, true, true);
        ctx.fillStyle = '#0ff'; ctx.font = CFG.FONTS.title; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(el.title, el.x + el.w/2, el.y + 12 + ay);
        ctx.fillStyle = '#c0c0e0'; ctx.font = CFG.FONTS.ui; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(el.content || '', el.x + el.w/2, el.y + 50 + ay);
        ctx.restore();
    }
    roundRect(ctx, x, y, w, h, r, fill, stroke) {
        ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
        ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
        ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
        ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
        if (fill) ctx.fill(); if (stroke) ctx.stroke();
    }
    handleClick(x, y) {
        const clicked = [];
        this.elements.forEach(el => {
            if (el.type === 'btn' && !el.o.disabled && x >= el.x && x <= el.x + el.w && y >= el.y && y <= el.y + el.h) clicked.push(el);
            if (el.type === 'input' && x >= el.x && x <= el.x + el.w && y >= el.y && y <= el.y + el.h) { el.focus = true; this.game.focusedInput = el; } else if (el.type === 'input') el.focus = false;
        });
        if (clicked.length) { clicked.reverse().forEach(el => { el.cb(el); this.game.sound.play('click'); }); return true; }
        return false;
    }
}

// в”Ђв”Ђв”Ђ Game в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class Game {
    constructor() {
        this.canvas = document.getElementById('game');
        this.ctx = this.canvas.getContext('2d');
        this.canvas.width = CFG.WIDTH; this.canvas.height = CFG.HEIGHT;
        this.width = CFG.WIDTH; this.height = CFG.HEIGHT;
        this.rescale();
        this.bridge = new DataBridge();
        this.socket = new SocketManager();
        this.sound = new SoundManager();
        this.anim = new AnimationEngine(this.canvas);
        this.ui = new CanvasUI(this.ctx, this);
        this.time = 0;
        this.screen = 'loading';
        this.character = {};
        this.focusedInput = null;
        this.screens = {};
        this.scrollY = 0;
        this.keys = {};
        this.pendingApi = [];
        this.combatEnemy = null;
        this.combatLog = [];
        this.chatMessages = [];
        this.chatInput = '';
        this.termInput = '';
        this._currentNpc = null;
        this._npcDialogText = '';
        this._previousScreen = null;
        this._pvpSearching = false;
        this._pvpOpponent = null;
        this.marketLots = [];
        this.leaderboard = [];
        this.currentNode = 'matrix';
        this.tutorialStep = 0;
        this.soundEnabled = true;
        this.musicEnabled = true;
        this.initDone = false;
        this._notification = null;
        this._achPopup = null;
        this.scanner = false;
        this.effects = [];
        this.floatingTexts = [];
        this.mouseX = 0;
        this.mouseY = 0;

        window.addEventListener('resize', () => this.rescale());
        this.canvas.addEventListener('click', (e) => this.onClick(e));
        this.canvas.addEventListener('touchstart', (e) => this.onTouch(e));
        this.canvas.addEventListener('mousemove', (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const s = CFG.WIDTH / rect.width;
            this.mouseX = (e.clientX - rect.left) * s;
            this.mouseY = (e.clientY - rect.top) * s;
        });
        document.addEventListener('keydown', (e) => {
            this.keys[e.key] = true;
            if (e.key === 'Enter') this.handleEnter();
            if (e.key === 'Escape') {
                if (this.screen !== 'main' && this.screen !== 'loading' && this.screen !== 'mainmenu') {
                    this.goBack();
                }
            }
        });
        document.addEventListener('keyup', (e) => this.keys[e.key] = false);

        this.init();
    }
    handleEnter() {
        if (this.screen === 'mainmenu') {
            this.screen = 'main';
            this.sound.play('click');
        } else if (this.screen === 'terminal') {
            this.combatLog.push('> ' + this.termInput);
            this.termInput = '';
        } else if (this.screen === 'chat') {
            if (this.chatInput.trim()) {
                this.chatMessages.push('Р’С‹: ' + this.chatInput);
                this.chatInput = '';
            }
        }
    }
    rescale() {
        const s = Math.min(window.innerWidth / CFG.WIDTH, window.innerHeight / CFG.HEIGHT);
        this.canvas.style.width = (CFG.WIDTH * s) + 'px';
        this.canvas.style.height = (CFG.HEIGHT * s) + 'px';
    }
    async init() {
        this.sound.init();
        try { this.character = await this.bridge.init(); } catch(e) { this.character = { character: { nickname: 'Ghost', level: 1 } }; }
        setTimeout(() => { this.screen = 'main'; }, 1500);
        this.socket.connect(this.bridge.initData());
        this.loop();
    }
    loop() {
        this.time++;
        this.anim.update();
        this.updateFloatingTexts();
        this.ctx.save();
        this.anim.drawBg(this.ctx);
        this.renderScreen();
        this.anim.drawParticles(this.ctx);
        this.anim.drawGlitch(this.ctx);
        this.anim.drawScan(this.ctx);
        this.drawFloatingTexts(this.ctx);
        this.ctx.restore();
        requestAnimationFrame(() => this.loop());
    }
    onClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const s = CFG.WIDTH / rect.width;
        const x = (e.clientX - rect.left) * s;
        const y = (e.clientY - rect.top) * s;
        this.ui.handleClick(x, y);
        this.handleScreenClick(x, y);
    }
    onTouch(e) {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const rect = this.canvas.getBoundingClientRect();
        const s = CFG.WIDTH / rect.width;
        const x = (touch.clientX - rect.left) * s;
        const y = (touch.clientY - rect.top) * s;
        this.ui.handleClick(x, y);
        this.handleScreenClick(x, y);
    }
    handleScreenClick(x, y) {}

    // в”Ђв”Ђв”Ђ Render screens в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    renderScreen() {
        this.ui.clear();
        switch(this.screen) {
            case 'loading': this.renderLoading(); break;
            case 'main': this.renderMain(); break;
            case 'map': this.renderMap(); break;
            case 'terminal': this.renderTerminal(); break;
            case 'combat': this.renderCombat(); break;
            case 'deck': this.renderDeck(); break;
            case 'matrix': this.renderMatrix(); break;
            case 'chat': this.renderChat(); break;
            case 'market': this.renderMarket(); break;
            case 'arena': this.renderArena(); break;
            case 'clan': this.renderClan(); break;
            case 'dailies': this.renderDailies(); break;
            case 'leaderboard': this.renderLeaderboard(); break;
            case 'admin': this.renderAdmin(); break;
            default: this.renderMain(); break;
        }
        this.ui.draw();
    }

    // в”Ђв”Ђв”Ђ Loading в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    renderLoading() {
        const ctx = this.ctx;
        ctx.fillStyle = '#0ff'; ctx.font = CFG.FONTS.title; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('NEON PROTOCOL', CFG.WIDTH/2, CFG.HEIGHT/2 - 60);
        ctx.fillStyle = '#f0f'; ctx.font = '14px Orbitron'; ctx.fillText('Ghost in the Grid', CFG.WIDTH/2, CFG.HEIGHT/2 - 25);
        ctx.fillStyle = '#c0c0e0'; ctx.font = CFG.FONTS.ui;
        const dots = '.'.repeat(Math.floor(this.time / 30) % 4);
        ctx.fillText('Initializing' + dots, CFG.WIDTH/2, CFG.HEIGHT/2 + 30);
        ctx.fillStyle = '#0ff'; ctx.font = CFG.FONTS.sm; ctx.fillText(`v1.0.0 | ${this.character?.character?.nickname || 'Ghost'}`, CFG.WIDTH/2, CFG.HEIGHT - 40);
    }

    // в”Ђв”Ђв”Ђ Main / Hub в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    renderMain() {
        const c = this.character?.character || {};
        const ctx = this.ctx;
        ctx.fillStyle = '#0ff'; ctx.font = CFG.FONTS.title; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('NETSPHERE', 20, 20);
        ctx.fillStyle = '#f0f'; ctx.font = '10px Orbitron'; ctx.textAlign = 'right';
        ctx.fillText(c.nickname || 'Ghost', CFG.WIDTH - 20, 25);

        // Stats
        this.ui.bar(20, 70, CFG.WIDTH - 40, 14, c.hp || 100, c.maxhp || 100, { fg: '#0f0', bg: '#1a0a0a', border: '#0f0' });
        this.ui.bar(20, 88, CFG.WIDTH - 40, 14, c.en || 100, c.maxen || 100, { fg: '#0ff', bg: '#0a0a1a', border: '#0ff' });

        this.ui.text(20, 115, `Lv.${c.level || 1} | ${c.credits || 0}Вў | ATK:${c.atk || c.attack || 10} DEF:${c.def || c.defense || 5}`, { font: CFG.FONTS.sm });

        // Grid of buttons
        const bw = 80, bh = 80, gap = 8, startX = 20, startY = 145;
        const btns = [
            { txt: 'рџ—є Map', sc: 'map' }, { txt: 'рџ’» Term', sc: 'terminal' }, { txt: 'вљ” Fight', sc: 'combat' },
            { txt: 'рџ“¦ Deck', sc: 'deck' }, { txt: 'рџЊЂ Matrix', sc: 'matrix' }, { txt: 'рџ’¬ Chat', sc: 'chat' },
            { txt: 'рџЏЄ Market', sc: 'market' }, { txt: 'вљЎ Arena', sc: 'arena' }, { txt: 'рџЏ° Clan', sc: 'clan' },
            { txt: 'рџ“‹ Daily', sc: 'dailies' }, { txt: 'рџЏ† Top', sc: 'leaderboard' }, { txt: 'рџ”§ Admin', sc: 'admin' },
        ];
        btns.forEach((b, i) => {
            const col = i % 3, row = Math.floor(i / 3);
            const bx = startX + col * (bw + gap), by = startY + row * (bh + gap);
            this.ui.btn(bx, by, bw, bh, b.txt, () => this.screen = b.sc, { bg: '#0d0d2a', border: '#0ff44', font: '11px "Share Tech Mono", monospace', active: false });
        });

        // XP bar
        const xp = c.xp || c.experience || 0;
        const xpMax = 100 * (c.level || 1) * (1 + (c.level || 1) * 0.5);
        this.ui.bar(20, startY + 4 * (bh + gap) + 20, CFG.WIDTH - 40, 10, xp, xpMax, { fg: '#f0f', bg: '#1a0a1a', border: '#f0f' });
        this.ui.text(CFG.WIDTH/2, startY + 4 * (bh + gap) + 35, 'Battle Pass Lv.' + (c.bp || c.battle_pass_level || 0), { font: CFG.FONTS.sm, color: '#ff0', align: 'center' });
    }

    // в”Ђв”Ђв”Ђ Map в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    renderMap() {
        this.ui.text(20, 20, 'рџ—є NetSphere Map', { font: CFG.FONTS.title, color: '#0ff' });
        this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'main', { font: CFG.FONTS.sm });

        // Node data
        const nodes = [
            {id:1,name:'Tutorial',x:190,y:60,lvl:1,type:'safe',icon:'рџ“Ў',conns:[2,3]},
            {id:2,name:'Arasaka',x:80,y:160,lvl:2,type:'corp',icon:'рџЏў',conns:[1,4,5]},
            {id:3,name:'Dark Web',x:300,y:160,lvl:2,type:'market',icon:'рџ’Ђ',conns:[1,5,6]},
            {id:4,name:'Militech',x:60,y:300,lvl:3,type:'corp',icon:'рџ”’',conns:[2,7,8]},
            {id:5,name:'Ghost Net',x:190,y:260,lvl:3,type:'hidden',icon:'рџ‘»',conns:[2,3,7,9]},
            {id:6,name:'Kang Tao',x:320,y:300,lvl:3,type:'corp',icon:'рџ”¬',conns:[3,9,10]},
            {id:7,name:'NetWatch',x:130,y:420,lvl:4,type:'sec',icon:'рџ›Ў',conns:[4,5,11]},
            {id:8,name:'Black Market',x:50,y:480,lvl:4,type:'market',icon:'рџ’°',conns:[4,11,12]},
            {id:9,name:'Cortex',x:250,y:400,lvl:4,type:'relay',icon:'рџ§ ',conns:[5,6,11,13]},
            {id:10,name:'AI Core',x:340,y:460,lvl:5,type:'danger',icon:'рџ¤–',conns:[6,13,14]},
            {id:11,name:'Arena',x:150,y:540,lvl:5,type:'pvp',icon:'вљ”',conns:[7,8,9,12]},
            {id:12,name:'Citadel',x:80,y:620,lvl:5,type:'clan',icon:'рџЏ°',conns:[8,11,14]},
            {id:13,name:'Gateway',x:280,y:520,lvl:5,type:'matrix',icon:'рџЊЂ',conns:[9,10,14]},
            {id:14,name:'The Core',x:190,y:660,lvl:6,type:'boss',icon:'рџ‘ѕ',conns:[10,12,13]},
        ];

        // Draw connections
        const ctx = this.ctx;
        ctx.strokeStyle = '#0ff2'; ctx.lineWidth = 1;
        nodes.forEach(n => {
            n.conns.forEach(cid => {
                const t = nodes.find(x => x.id === cid); if (!t) return;
                ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(t.x, t.y); ctx.stroke();
            });
        });

        // Data packet animation
        const pkt = Math.floor(this.time / 60) % nodes.length;
        if (nodes[pkt] && nodes[pkt].conns.length) {
            const tgt = nodes[pkt].conns[0];
            const t = nodes.find(x => x.id === tgt); if (t) {
                const p = (this.time % 60) / 60;
                const px = nodes[pkt].x + (t.x - nodes[pkt].x) * p;
                const py = nodes[pkt].y + (t.y - nodes[pkt].y) * p;
                ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 15;
                ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Draw nodes
        nodes.forEach(n => {
            const typeColor = {safe:'#0f0',corp:'#f80',market:'#ff0',hidden:'#f0f',sec:'#0ff',danger:'#f00',relay:'#0ff',pvp:'#f80',clan:'#0f0',boss:'#f00',matrix:'#f0f'};
            ctx.fillStyle = '#0d0d2a'; ctx.strokeStyle = typeColor[n.type] || '#0ff';
            ctx.lineWidth = 1; ctx.shadowColor = typeColor[n.type] || '#0ff'; ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.arc(n.x, n.y, 18, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.font = '16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff'; ctx.fillText(n.icon, n.x, n.y);
            if (this.time > 30 || true) {
                ctx.fillStyle = '#c0c0e0'; ctx.font = CFG.FONTS.sm; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                ctx.fillText(n.name, n.x, n.y + 22);
            }
        });
    }

    // в”Ђв”Ђв”Ђ Terminal в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    renderTerminal() {
        this.ui.text(20, 20, 'рџ’» Terminal v2.4', { font: CFG.FONTS.title, color: '#0f0' });
        this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'main', { font: CFG.FONTS.sm });

        const ctx = this.ctx;
        ctx.fillStyle = '#000'; ctx.strokeStyle = '#0f0';
        this.ui.roundRect(ctx, 20, 60, CFG.WIDTH - 40, CFG.HEIGHT - 140, 4, true, true);

        const lines = [
            '> NEON PROTOCOL TERMINAL v2.4',
            '> System initialized. 16 cores online.',
            '> Connected to NetSphere backbone.',
            '> Type "help" for available commands.',
            '',
            '> Available: scan, connect, exploit, download, upload, encrypt, decrypt',
            '',
        ];
        const inputLine = `> ${this.terminalInput || ''}_`;

        ctx.fillStyle = '#0f0'; ctx.font = CFG.FONTS.sm; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        let ly = 68;
        lines.forEach(l => { ctx.fillText(l, 28, ly); ly += 18; });
        ly += 10;
        ctx.fillText(inputLine, 28, ly);

        // Typewriter effect for last response
        if (this.terminalResponse) {
            const chars = Math.min(this.terminalChars || 0, this.terminalResponse.length);
            ctx.fillStyle = '#0f0'; ctx.font = CFG.FONTS.sm;
            ctx.fillText(this.terminalResponse.substring(0, chars), 28, ly + 22);
            if (chars < this.terminalResponse.length && this.time % 2 === 0) this.terminalChars = (this.terminalChars || 0) + 1;
        }

        // Matrix rain on terminal
        ctx.fillStyle = '#0f02'; ctx.font = '10px monospace';
        for (let i = 0; i < 15; i++) {
            const rx = 30 + i * 22, ry = (this.time * (0.5 + i * 0.1)) % (CFG.HEIGHT - 150) + 60;
            ctx.fillText(String.fromCharCode(0x30A0 + Math.random() * 96), rx, ry);
        }
    }

    // в”Ђв”Ђв”Ђ Combat Screen в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    renderCombat() {

        this.ui.bar(35, 215, CFG.WIDTH - 110, 12, c.hp || 100, c.maxhp || 100, { fg: '#0f0', bg: '#0a1a0a', border: '#0f0' });
        this.ui.bar(35, 231, CFG.WIDTH - 110, 12, c.en || 100, c.maxen || 100, { fg: '#0ff', bg: '#0a0a1a', border: '#0ff' });

        // Action buttons
        const ab = ['вљ” Attack', 'рџ›Ў Defend', 'рџ’» Program', 'рџ¦  Virus', 'рџЏѓ Flee'];
        const actions = ['attack', 'defend', 'program', 'virus', 'flee'];
        ab.forEach((a, i) => {
            const bx = 25 + i * (72 + 5), by = 270;
            this.ui.btn(bx, by, 72, 36, a, () => this.doCombatAction(actions[i]), { font: CFG.FONTS.sm, bg: '#1a0a1a', border: '#f0f' });
        });

        // Combat log
        ctx.fillStyle = '#0a0a0a'; ctx.strokeStyle = '#0f02';
        this.ui.roundRect(ctx, 20, 320, CFG.WIDTH - 40, 150, 4, true, true);
        ctx.fillStyle = '#0f0'; ctx.font = CFG.FONTS.sm; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        const log = this.combatLog || ['Battle initialized...'];
        log.slice(-8).forEach((l, i) => ctx.fillText(l, 28, 328 + i * 16));

        // Glitch effects on damage
        if (this.combatGlitch > 0) {
            this.combatGlitch--;
            for (let i = 0; i < 5; i++) {
                ctx.fillStyle = `rgba(255,0,0,${Math.random()*0.3})`;
                ctx.fillRect(Math.random() * CFG.WIDTH, Math.random() * CFG.HEIGHT * 0.5, Math.random() * 100, 2);

    async doCombatAction(type) {
        this.combatLog = this.combatLog || [];
        this.combatLog.push(`> ${type}...`);
        if (type === 'flee') { this.combatLog.push('> Escaped!'); setTimeout(() => this.screen = 'main', 1000); return; }
        try {
            const r = await this.bridge.fetch('POST', '/combat/pve', { action_type: type });
            this.combatLog.push(`> Dealt ${r.result?.idmg || 0} damage | Took ${r.result?.pdmg || 0}`);
            this.combatEnemy = r.ice;
            if (r.player) { this.character.character.hp = r.player.hp; this.character.character.en = r.player.energy; }
            if (r.result?.msg === 'victory') {
                this.combatLog.push('>>> VICTORY! <<<');
                this.combatLog.push(`Rewards: ${r.result.rewards?.cr || 0}cr, ${r.result.rewards?.xp || 0}xp`);
                this.combatGlitch = 15;
                this.sound.play('win');
                this.anim.addParticles(CFG.WIDTH/2, CFG.HEIGHT/2, 30, '#0ff', 40);
                if (r.result.drop) this.combatLog.push(`DROP: ${r.result.drop}`);
            } else if (r.result?.msg === 'defeat') {
                this.combatLog.push('>>> DEFEATED <<<');
                setTimeout(() => this.screen = 'main', 2000);
            }
        } catch(e) { this.combatLog.push('! Connection error'); }
    }

    // в”Ђв”Ђв”Ђ Matrix Mini-game в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    renderMatrix() {
        this.ui.text(20, 20, 'рџЊЂ Matrix Hack', { font: CFG.FONTS.title, color: '#0ff' });
        this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'Г—', () => { this.matrixActive = false; this.screen = 'main'; }, { font: CFG.FONTS.sm });

        const ctx = this.ctx;
        const gridSize = 6, cellSize = 52, gap = 4;
        const gx = (CFG.WIDTH - gridSize * (cellSize + gap)) / 2;
        const gy = 70;

        if (!this.matrixActive) {
            this.matrixGrid = [];
            this.matrixTarget = [];
            this.matrixActive = true;
            this.matrixScore = 0;
            this.matrixTime = 45;
            this.matrixFound = 0;
            this.matrixLevel = 1;

            // Generate target sequence
            const chars = '0123456789ABCDEF';
            for (let i = 0; i < 4 + this.matrixLevel; i++) {
                this.matrixTarget.push(chars[Math.floor(Math.random() * chars.length)]);
            }

            // Generate grid
            for (let r = 0; r < gridSize; r++) {
                this.matrixGrid[r] = [];
                for (let c = 0; c < gridSize; c++) {
                    const idx = Math.floor(Math.random() * this.matrixTarget.length);
                    const useTarget = Math.random() < 0.3 && idx < this.matrixTarget.length;
                    this.matrixGrid[r][c] = useTarget ? this.matrixTarget[idx] : chars[Math.floor(Math.random() * chars.length)];
                }
            }
            // Shuffle: ensure at least some target chars
            for (let i = 0; i < this.matrixTarget.length; i++) {
                const r = Math.floor(Math.random() * gridSize);
                const c = Math.floor(Math.random() * gridSize);
                this.matrixGrid[r][c] = this.matrixTarget[i];
            }
            this.matrixPos = 0;
        }

        // Timer
        if (this.matrixActive && this.time % 60 === 0 && this.matrixTime > 0) this.matrixTime--;
        if (this.matrixTime <= 0 && this.matrixActive) {
            this.matrixActive = false;
        }

        ctx.fillStyle = '#fff'; ctx.font = CFG.FONTS.md; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
        ctx.fillText(`Time: ${this.matrixTime}s | Score: ${this.matrixScore} | ${this.matrixFound}/${this.matrixTarget.length}`, CFG.WIDTH - 20, 25);

        // Target sequence
        ctx.fillStyle = '#ff0'; ctx.font = 'bold 18px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        const seq = this.matrixTarget.map((ch, i) => i < this.matrixPos ? `вњ“${ch}` : ch).join(' ');
        ctx.fillText(seq, CFG.WIDTH/2, 48);

        // Grid
        for (let r = 0; r < gridSize; r++) {
            for (let c = 0; c < gridSize; c++) {
                const cx = gx + c * (cellSize + gap), cy = gy + r * (cellSize + gap);
                const ch = this.matrixGrid[r][c];
                const isTarget = r === this.matrixSelR && c === this.matrixSelC;
                const isFound = this.matrixFoundGrid?.includes(`${r},${c}`);

                ctx.fillStyle = isFound ? '#0f001a' : (isTarget ? '#0a0a3a' : '#0a0a12');
                ctx.strokeStyle = isTarget ? '#0ff' : (isFound ? '#0f0' : '#1a1a3a');
                ctx.lineWidth = isTarget ? 2 : 1;
                this.ui.roundRect(ctx, cx, cy, cellSize, cellSize, 3, true, true);

                ctx.fillStyle = isFound ? '#0f0' : (isTarget ? '#fff' : '#c0c0e0');
                ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(ch, cx + cellSize/2, cy + cellSize/2);
            }
        }

        // Click handler for matrix
        const matrixHandle = (x, y) => {
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cx = gx + c * (cellSize + gap), cy = gy + r * (cellSize + gap);
                    if (x >= cx && x <= cx + cellSize && y >= cy && y <= cy + cellSize && this.matrixActive) {
                        const ch = this.matrixGrid[r][c];
                        if (this.matrixPos < this.matrixTarget.length && ch === this.matrixTarget[this.matrixPos]) {
                            this.matrixPos++;
                            this.matrixFound++;
                            this.matrixScore += 10 * this.matrixLevel;
                            this.sound.play('hack');
                            this.anim.addParticles(cx + cellSize/2, cy + cellSize/2, 10, '#0f0', 20);
                            if (!this.matrixFoundGrid) this.matrixFoundGrid = [];
                            this.matrixFoundGrid.push(`${r},${c}`);
                            if (this.matrixPos >= this.matrixTarget.length) {
                                this.matrixScore += this.matrixTime * 5;
                                this.matrixLevel++;
                                this.ui.modal(200, 100, 'вњ“ SEQUENCE COMPLETE', `Score: ${this.matrixScore} | Level ${this.matrixLevel}`);
                                // Reset for next level
                                this.matrixTarget = [];
                                this.matrixPos = 0;
                                this.matrixFound = 0;
                                this.matrixFoundGrid = [];
                                const chars = '0123456789ABCDEF';
                                for (let i = 0; i < 4 + Math.min(this.matrixLevel, 6); i++) {
                                    this.matrixTarget.push(chars[Math.floor(Math.random() * chars.length)]);
                                }
                                for (let r = 0; r < gridSize; r++) {
                                    for (let c = 0; c < gridSize; c++) {
                                        this.matrixGrid[r][c] = chars[Math.floor(Math.random() * chars.length)];
                                    }
                                }
                                this.matrixTarget.forEach((ch, i) => {
                                    const rr = Math.floor(Math.random() * gridSize);
                                    const cc = Math.floor(Math.random() * gridSize);
                                    this.matrixGrid[rr][cc] = ch;
                                });
                                this.matrixTime = Math.max(15, 45 - this.matrixLevel * 2);
                            }
                        } else {
                            this.matrixScore = Math.max(0, this.matrixScore - 5);
                            this.sound.play('dmg');
                        }
                    }
                }
            }
        };
        // Store for handleScreenClick
        this._matrixHandler = matrixHandle;
        this.handleScreenClick = (x, y) => {
            if (this.screen === 'matrix' && this.matrixActive && this._matrixHandler) this._matrixHandler(x, y);
        };
    }

    drawAchievementPopup(ctx) {
        if (!this._achPopup) return;
        const p = this._achPopup;
        const elapsed = this.time - p.startTime;
        if (elapsed > 180) { this._achPopup = null; return; }
        const alpha = elapsed < 20 ? elapsed / 20 : (elapsed > 150 ? (180 - elapsed) / 30 : 1);
        ctx.save(); ctx.globalAlpha = alpha;
        const px = CFG.WIDTH / 2 - 120, py = 30;
        ctx.fillStyle = '#0d0d1a'; ctx.strokeStyle = '#ff0'; ctx.shadowColor = '#ff0'; ctx.shadowBlur = 15;
        this.ui.roundRect(ctx, px, py, 240, 55, 6, true, true); ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff0'; ctx.font = 'bold 10px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('рџЏ† Р”РћРЎРўРР–Р•РќРР•!', px + 120, py + 6);

    drawBackground(ctx) {

    drawNeonBorder(ctx, x, y, w, h, color, pulse) {
        const p = pulse ? 0.7 + Math.sin(this.time * 0.05) * 0.3 : 1;
        ctx.shadowColor = color; ctx.shadowBlur = 10 * p;
        ctx.strokeStyle = color; ctx.globalAlpha = p;
        ctx.lineWidth = 1;
        this.ui.roundRect(ctx, x, y, w, h, 4, false, true);
        ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }

    drawDataStream(ctx, x, y, w, h, count) {
        for (let i = 0; i < (count || 8); i++) {
            const dx = x + Math.random() * w;
            const dy = y + (this.time * (20 + i * 7) + i * 50) % h;
            ctx.fillStyle = `rgba(0,255,255,${0.1 + Math.random() * 0.2})`;
            ctx.fillRect(dx, dy, 2, 6 + Math.random() * 10);
        }
    }

    drawHologram(ctx, x, y, w, h, text, color) {
        ctx.save();
        ctx.globalAlpha = 0.6 + Math.sin(this.time * 0.03) * 0.2;
        ctx.strokeStyle = color || '#0ff'; ctx.lineWidth = 1;
        this.ui.roundRect(ctx, x, y, w, h, 4, false, true);
        ctx.fillStyle = color || '#0ff'; ctx.font = CFG.FONTS.md; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        for (let i = -2; i <= 2; i += 1) {
            ctx.globalAlpha = 0.1 + Math.sin(this.time * 0.05 + i) * 0.05;
            ctx.fillText(text, x + w/2 + i * 0.5, y + h/2);
        }
        ctx.globalAlpha = 0.7; ctx.fillText(text, x + w/2, y + h/2);
        ctx.restore();
    }

    // в”Ђв”Ђв”Ђ Combat helper methods в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    calcDamage(atk, def, crit) {
        const base = Math.max(1, atk - def * 0.5);
        return crit ? base * 2 : base;
    }

    calcHitChance(acc, eva) {
        return Math.min(0.95, Math.max(0.05, (acc - eva) / 100 + 0.75));
    }

    calcXpForLevel(lvl) {
        return Math.floor(100 * Math.pow(1.5, lvl - 1));
    }

    calcBpXpForLevel(lvl) {
        return 500 + (lvl - 1) * 200;
    }

    getTitleForLevel(lvl) {
        const titles = ['РќРѕРІРёС‡РѕРє', 'РҐР°РєРµСЂ', 'Р’Р·Р»РѕРјС‰РёРє', 'РљРёР±РµСЂ-РІРѕРёРЅ', 'РўРµРЅРµРІРѕР№ Р°РіРµРЅС‚',
                        'РњР°СЃС‚РµСЂ ICE', 'Р›РµРіРµРЅРґР° СЃРµС‚Рё', 'РџСЂРёР·СЂР°Рє', 'РђСЂС…РёС‚РµРєС‚РѕСЂ', 'РџРѕР»СѓР±РѕРі',
                        'Р‘РѕРі РњР°С‚СЂРёС†С‹', 'РђР±СЃРѕР»СЋС‚'];
        return titles[Math.min(11, Math.floor((lvl - 1) / 3))] || 'Р›РµРіРµРЅРґР°';
    }

    getZoneForLevel(lvl) {
        if (lvl < 3) return 'matrix';
        if (lvl < 5) return 'firewall';
        if (lvl < 7) return 'undercity';
        if (lvl < 9) return 'corpnet';
        if (lvl < 11) return 'darknet';
        if (lvl < 14) return 'abyss';
        if (lvl < 18) return 'milnet';
        return 'core';
    }

    getRandomIceForZone(zone) {
        const pool = ZONE_ENCOUNTERS[zone] || ['Sentry ICE-1'];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    generateLoot(zone, rarity) {
        const pool = LOOT_POOLS[rarity] || LOOT_POOLS.common;
        if (Math.random() > pool.chance) return null;
        const type = Math.random() > 0.5 ? 'program' : 'item';
        const arr = type === 'program' ? pool.programs : pool.items;
        return arr[Math.floor(Math.random() * arr.length)];
    }

    async performCombatAction(action) {
        const result = await this.fetchAPI('/combat/pve', 'POST', { action_type: action });
        if (result) {
            this.combatLog.push(`> ${action}: ${result.result?.idmg || 0} СѓСЂРѕРЅР°`);
            if (result.ice) this.combatEnemy = result.ice;
            if (result.player) {
                this.character.character.hp = result.player.hp;
                this.character.character.en = result.player.energy;
            }
            if (result.result?.msg === 'victory') {
                this.combatLog.push('>>> РџРћР‘Р•Р”Рђ! <<<');
                this.sound.play('win');
                this.startAchievementPopup('РџРѕР±РµРґР°! +' + (result.result?.rewards?.cr || 0) + 'cr');
            }
            return result;

        this.drawScanner(ctx, this.time);
        const nodes = Object.entries(ZONES);
        nodes.forEach(([id, z], i) => {
            const nx = z.x * this.width;

            ctx.beginPath();
            ctx.arc(nx, ny, active ? 12 : 8, 0, Math.PI * 2);
            ctx.fillStyle = active ? '#fff' : z.color;

            ctx.lineWidth = active ? 2 : 1;

            ctx.font = '8px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(z.name, nx, ny + 18);

            if (active) { this.drawPulseRing(ctx, nx, ny, 20, z.color, this.time); }

    }

    _wrapText(ctx, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let current = '';
        for (const word of words) {
            const test = current ? current + ' ' + word : word;
            if (ctx.measureText(test).width > maxWidth && current) {
                lines.push(current);
                current = word;
            } else {
                current = test;
            }
        }
        if (current) lines.push(current);
        return lines;
    }

// в”Ђв”Ђв”Ђ Additional Format Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function ordinalSuffix(n) {
    const s = ['th', 'st', 'nd', 'rd'];
    const v = n % 100;
    return s[(v - 20) % 10] || s[v] || s[0];
}

function shortNumber(n) {
    if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toString();
}

function randomColor() {
    const colors = ['#0ff', '#f0f', '#0f0', '#ff0', '#f00', '#00f', '#f60', '#fff'];
    return colors[Math.floor(Math.random() * colors.length)];
}

function weightedRandom(items, weights) {
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < items.length; i++) {
        r -= weights[i];
        if (r <= 0) return items[i];
    }
    return items[items.length - 1];
}

function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function generateId() {
    return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
}

function timeSince(date) {
    const sec = Math.floor((Date.now() - date) / 1000);
    if (sec < 60) return 'С‚РѕР»СЊРєРѕ С‡С‚Рѕ';
    const min = Math.floor(sec / 60);
    if (min < 60) return `${min} РјРёРЅ РЅР°Р·Р°Рґ`;
    const hr = Math.floor(min / 60);
    if (hr < 24) return `${hr} С‡ РЅР°Р·Р°Рґ`;
    const days = Math.floor(hr / 24);
    return `${days} РґРЅ РЅР°Р·Р°Рґ`;
}

function formatCombatEntry(entry, index) {
    const prefix = index === 0 ? '> ' : '  ';
    const color = entry.type === 'damage' ? '#f00'
                : entry.type === 'heal' ? '#0f0'
                : entry.type === 'crit' ? '#ff0'
                : entry.type === 'victory' ? '#0ff'
                : entry.type === 'defeat' ? '#f0f'
                : entry.type === 'info' ? '#aaa' : '#ccc';
    return { text: prefix + entry.text, color };
}

function generateEnemy(zone, level) {
    const pool = ZONE_ENEMY_POOL[zone] || ZONE_ENEMY_POOL.matrix;
    const base = pool[Math.floor(Math.random() * pool.length)];
    const lvlMult = 1 + (level - base.lvl) * 0.1;
    return {
        name: base.name,
        hp: Math.floor(base.hp * lvlMult),
        maxHp: Math.floor(base.hp * lvlMult),
        dmg: Math.floor(base.dmg * lvlMult),
        level: base.lvl,
        zone: zone,
    };
}

function generateLootTable(zone, luck) {
    const zones = ['matrix', 'firewall', 'undercity', 'corpnet', 'darknet', 'abyss', 'milnet', 'core'];
    const idx = zones.indexOf(zone);
    const quality = Math.max(0, Math.min(7, idx + Math.floor(luck / 20)));
    const rarities = ['common', 'common', 'common', 'uncommon', 'uncommon', 'rare', 'epic', 'legendary'];
    return rarities[quality];
}

function calculateScoreForScreen(screen) {
    const scores = {
        combat: 100, map: 50, matrix: 75, terminal: 40,
        shop: 10, arena: 60, clan: 30, market: 20,
    };
    return scores[screen] || 0;
}

function getHeatForAction(action) {
    const heat = {
        hack: 30, attack: 25, overclock: 40, scan: 10,
        cloak: -20, flee: -10,
    };
    return heat[action] || 0;
}

function getZoneHeatThreshold(zone) {
    const thresh = {
        matrix: 100, firewall: 80, corpnet: 60,
        darknet: 50, undercity: 70, abyss: 40,
        milnet: 30, core: 20,
    };
    return thresh[zone] || 100;
}

}

function randomBetween(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function clamp(val, min, max) {

}

function lerp(a, b, t) {
    return a + (b - a) * t;
}

const ANIMS = {
    fadeIn: (ctx, time, duration, x, y, drawFn) => {
        const t = Math.min(1, time / duration);
        ctx.globalAlpha = t;
        drawFn(ctx, x, y);
        ctx.globalAlpha = 1;
        return t < 1;
    },
    slideIn: (ctx, time, duration, startX, startY, endX, endY, drawFn) => {
        const t = Math.min(1, time / duration);
        const ease = 1 - Math.pow(1 - t, 3);
        const x = startX + (endX - startX) * ease;
        const y = startY + (endY - startY) * ease;
        ctx.globalAlpha = t;
        drawFn(ctx, x, y);
        ctx.globalAlpha = 1;
        return t < 1;
    },
    pulse: (time, speed, min, max) => {
        return min + (max - min) * (Math.sin(time * speed) * 0.5 + 0.5);
    },
    glitch: (ctx, x, y, text, intensity) => {
        for (let i = 0; i < intensity; i++) {
            const ox = (Math.random() - 0.5) * 4;
            const oy = (Math.random() - 0.5) * 2;
            ctx.fillStyle = `rgba(255,${Math.random() > 0.5 ? 0 : 255},255,${0.3 + Math.random() * 0.3})`;
            ctx.fillText(text, x + ox, y + oy);
        }
    },
    typewriter: (text, progress) => {
        return text.substring(0, Math.floor(progress));
    },
};

// в”Ђв”Ђв”Ђ Player Stats Helper в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateStats(level, programs, implants) {
    const baseAtk = 10 + level * 2;
    const baseDef = 5 + level;
    const baseHp = 100 + level * 10;
    const baseEn = 100 + level * 5;
    const progBonus = (programs || []).reduce((acc, p) => {
        if (p.dmg) acc.atk += p.dmg;
        if (p.def) acc.def += p.def;
        return acc;
    }, { atk: 0, def: 0 });
    const implantBonus = (implants || []).reduce((acc, im) => {
        if (im.hack) acc.hack += im.hack;
        if (im.speed) acc.spd += im.speed;
        return acc;
    }, { hack: 0, spd: 0 });
    return {
        attack: baseAtk + progBonus.atk,
        defense: baseDef + progBonus.def,
        hp: baseHp, maxHp: baseHp,
        energy: baseEn, maxEnergy: baseEn,
        hacking: 10 + implantBonus.hack,
        speed: 10 + implantBonus.spd,
    };
}

function drawHealthBar(ctx, x, y, w, h, cur, max, color) {
    const pct = Math.max(0, cur / max);
    ctx.fillStyle = '#1a0a0a'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color || '#0f0';
    ctx.fillRect(x, y, w * pct, h);
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(`${Math.floor(cur)}/${max}`, x + w/2, y + h/2);
}

function drawStaggeredText(ctx, text, x, y, color, font, delay) {
    for (let i = 0; i < text.length; i++) {
        const alpha = Math.min(1, (game.time - delay) / (30 + i * 3));
        if (alpha <= 0) continue;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = color || '#0ff';
        ctx.font = font || '12px monospace';
        ctx.fillText(text[i], x + ctx.measureText(text.slice(0, i)).width, y);
    }
    ctx.globalAlpha = 1;
}

// в”Ђв”Ђв”Ђ Combat Formula Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const COMBAT_FORMULAS = {
    calculateDamage: (atk, def, modifiers = {}) => {
        const base = atk - def * 0.5;
        const multiplier = modifiers.crit ? 2 : (modifiers.glance ? 0.5 : 1);
        const bonus = modifiers.bonus || 0;
        return Math.max(1, Math.floor(base * multiplier + bonus));
    },
    calculateDefense: (baseDef, shield, buffs = {}) => {
        let def = baseDef + (shield || 0);
        if (buffs.armorUp) def *= 1.5;
        return Math.floor(def);
    },
    calculateHitChance: (accuracy, evasion) => {
        return Math.min(0.95, Math.max(0.05, (accuracy - evasion) / 100 + 0.75));
    },
    calculateCritChance: (luck, baseCrit = 0.05) => {
        return Math.min(0.5, baseCrit + luck * 0.001);
    },
    calculateXpReward: (enemyLevel, playerLevel, baseXp) => {
        const diff = enemyLevel - playerLevel;
        const mult = diff > 0 ? 1 + diff * 0.2 : Math.max(0.1, 1 + diff * 0.1);
        return Math.floor(baseXp * mult);
    },
    calculateCreditReward: (enemyLevel, baseCredits, bonuses = {}) => {
        let reward = baseCredits + enemyLevel * 5;
        if (bonuses.creditBoost) reward *= bonuses.creditBoost;
        return Math.floor(reward);
    },
};

const COMBAT_FORMULAS_EXT = {
    shieldBypass: (hackLevel, shieldLevel) => {
        return Math.min(0.8, (hackLevel - shieldLevel) * 0.1 + 0.2);
    },
    comboMultiplier: (comboLevel) => {
        return 1 + comboLevel * 0.5;
    },
    overclockDamage: (baseDmg, overclockLevel) => {
        return baseDmg * (1 + overclockLevel * 0.25);
    },
    energyCost: (baseCost, speed) => {
        return Math.max(1, Math.floor(baseCost * (1 - speed * 0.005)));
    },
    backstabChance: (stealth, perception) => {
        return Math.max(0.1, (stealth - perception) / 100 + 0.3);
    },
    dotDamage: (baseDmg, tick, duration) => {
        return Math.floor(baseDmg * (1 + tick / duration));
    },
    healEfficiency: (baseHeal, implantPower) => {
        return Math.floor(baseHeal * (1 + implantPower * 0.02));
    },
    lootQuality: (zoneLevel, luck) => {
        const roll = Math.random() + luck * 0.001;
        if (roll > 0.95) return 'legendary';
        if (roll > 0.80) return 'epic';
        if (roll > 0.55) return 'rare';
        if (roll > 0.30) return 'uncommon';
        return 'common';
    },
    encounterDifficulty: (playerLevel, zoneLevel) => {
        const diff = zoneLevel - playerLevel;
        if (diff > 5) return 'impossible';
        if (diff > 2) return 'hard';
        if (diff > -2) return 'normal';
        if (diff > -5) return 'easy';
        return 'trivial';
    },
};

Game.prototype.drawHologramButton = function(ctx, x, y, w, h, text, color, pulse) {
    const p = pulse || 0;
    ctx.save();
    ctx.shadowColor = color || '#0ff';
    ctx.shadowBlur = 10 + p * 5;
    ctx.strokeStyle = color || '#0ff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3 + p * 0.2;
    ctx.strokeRect(x, y, w, h);
    ctx.fillStyle = color || '#0ff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = 0.8 + p * 0.2;
    ctx.fillText(text, x + w/2, y + h/2);
    ctx.restore();
};

Game.prototype.drawPulseRing = function(ctx, cx, cy, maxR, color, time) {
    const t = (time % 2000) / 2000;
    const r = maxR * t;
    const alpha = 1 - t;
    ctx.strokeStyle = color || '#0ff';
    ctx.globalAlpha = alpha * 0.5;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
};

Game.prototype.drawConnectingLine = function(ctx, x1, y1, x2, y2, color, time) {
    const phase = Math.sin(time * 0.003) * 0.5 + 0.5;
    ctx.strokeStyle = color || '#0ff';
    ctx.globalAlpha = 0.2 + phase * 0.3;
    ctx.setLineDash([4, 6]);
    ctx.lineDashOffset = -time * 0.05;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
};

Game.prototype.drawScanEffect = function(ctx, cx, cy, radius, time) {
    const angle = (time % 3000) / 3000 * Math.PI * 2;
    ctx.save();
    ctx.strokeStyle = '#0ff';
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, angle - 0.3, angle + 0.3);
    ctx.stroke();
    ctx.fillStyle = '#0ff';
    ctx.globalAlpha = 0.1;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, angle - 0.3, angle + 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
};

Game.prototype.drawGridBackground = function(ctx, time) {
    const w = CFG.WIDTH, h = CFG.HEIGHT;
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = 'rgba(0,255,255,0.05)';
    ctx.lineWidth = 0.5;
    const spacing = 40;
    for (let x = 0; x < w; x += spacing) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 0; y < h; y += spacing) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
};

Game.prototype.drawParticleBurst = function(ctx, x, y, color, count, time) {
    for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + time * 0.002;
        const dist = 20 + (time % 500) / 500 * 40;
        const px = x + Math.cos(angle) * dist;
        const py = y + Math.sin(angle) * dist;
        const alpha = 1 - dist / 60;
        ctx.fillStyle = color || '#0ff';
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillRect(px, py, 2, 2);
    }
    ctx.globalAlpha = 1;
};

Game.prototype.drawFloatingText = function(ctx, text, x, y, color, time, duration) {
    const t = Math.min(1, time / duration);
    const fy = y - t * 30;
    const alpha = 1 - t;
    ctx.fillStyle = color || '#0ff';
    ctx.globalAlpha = alpha;
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, fy);
    ctx.globalAlpha = 1;
};

Game.prototype.drawGlitchOverlay = function(ctx, time, intensity) {
    if (Math.random() > intensity * 0.1) return;
    const w = this.width, h = this.height;
    const sliceH = Math.random() * 20 + 2;
    const sliceY = Math.random() * h;
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`;
    ctx.fillRect(0, sliceY, w, sliceH);
    if (Math.random() > 0.5) {
        ctx.fillStyle = `rgba(0,255,255,${Math.random() * 0.05})`;
        ctx.fillRect(0, sliceY + sliceH, w, Math.random() * 5);
    }
};

Game.prototype.drawScanner = function(ctx, time) {
    const w = this.width, h = this.height;
    const y = (time % 2000) / 2000 * h;
    const grad = ctx.createLinearGradient(0, y, 0, y + 20);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, 'rgba(0,255,255,0.1)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, y, w, 20);
};

Game.prototype.drawCornerFrame = function(ctx, x, y, w, h, color) {
    const len = 10;
    ctx.strokeStyle = color || '#0ff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(x, y + len); ctx.lineTo(x, y); ctx.lineTo(x + len, y);
    ctx.moveTo(x + w - len, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + len);
    ctx.moveTo(x + w, y + h - len); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w - len, y + h);
    ctx.moveTo(x + len, y + h); ctx.lineTo(x, y + h); ctx.lineTo(x, y + h - len);
    ctx.stroke();
    ctx.globalAlpha = 1;
};

Game.prototype.drawTooltip = function(ctx, text, x, y) {
    const lines = text.split('\n');
    const fh = 14;
    const pad = 8;
    let maxW = 0;
    ctx.font = '12px monospace';
    for (const line of lines) {
        const m = ctx.measureText(line);
        if (m.width > maxW) maxW = m.width;
    }
    const tw = maxW + pad * 2;
    const th = lines.length * fh + pad * 2;
    let tx = x + 10, ty = y - 10;
    if (tx + tw > this.width) tx = this.width - tw - 5;
    if (ty + th > this.height) ty = this.height - th - 5;
    if (ty < 0) ty = 5;
    ctx.fillStyle = 'rgba(5,5,16,0.9)';
    ctx.fillRect(tx, ty, tw, th);
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx, ty, tw, th);
    ctx.fillStyle = '#0ff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], tx + pad, ty + pad + i * fh);
    }
};

Game.prototype.drawMainMenuButton = function(ctx, x, y, w, h, text, icon, color) {
    const c = color || '#0ff';
    const t = this.time || 0;
    ctx.save();
    const grad = ctx.createLinearGradient(x, y, x, y + h);
    grad.addColorStop(0, c + '15');
    grad.addColorStop(0.5, c + '08');
    grad.addColorStop(1, c + '20');
    ctx.fillStyle = grad;
    ctx.shadowColor = c; ctx.shadowBlur = 6;
    const r = 4;
    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    const borderGrad = ctx.createLinearGradient(x, y, x, y + h);
    borderGrad.addColorStop(0, c); borderGrad.addColorStop(0.5, c); borderGrad.addColorStop(1, c + '66');
    ctx.strokeStyle = borderGrad; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath(); ctx.stroke();
    const glow = 0.05 * Math.sin(t * 0.04);
    ctx.fillStyle = c; ctx.globalAlpha = 0.15 + glow;
    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
    if (icon) {
        ctx.fillStyle = c; ctx.font = '14px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = c; ctx.shadowBlur = 4;
        ctx.fillText(icon, x + 18, y + h/2);
        ctx.shadowBlur = 0;
    }
    ctx.fillStyle = '#e0e0ff'; ctx.font = '9px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 3;
    ctx.fillText(text, x + (icon ? 32 : 8), y + h/2);
    ctx.shadowBlur = 0;
    ctx.restore();
};

// в”Ђв”Ђв”Ђ Extended Combat Animations в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
Game.prototype.drawAttackAnimation = function(ctx, x, y, color, time) {
    const dur = 300;
    const t = Math.min(1, time / dur);
    const size = 5 + t * 25;
    const alpha = 1 - t;
    ctx.save();
    ctx.strokeStyle = color || '#f00';
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = color || '#f00';
    ctx.globalAlpha = alpha * 0.3;
    ctx.beginPath();
    ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
};

Game.prototype.drawShieldEffect = function(ctx, x, y, time) {
    const t = (time % 1000) / 1000;
    ctx.save();
    ctx.strokeStyle = '#00f';
    ctx.globalAlpha = 0.3 + Math.sin(t * Math.PI * 2) * 0.2;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 30, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#0ff';
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(x, y, 35, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
};

Game.prototype.drawHealEffect = function(ctx, x, y, time) {
    const count = 5;
    for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + time * 0.003;
        const dist = Math.min(40, (time % 800) / 800 * 50);
        const px = x + Math.cos(angle) * dist;
        const py = y + Math.sin(angle) * dist;
        ctx.fillStyle = `rgba(0,255,0,${1 - dist / 50})`;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
    }
};

Game.prototype.drawLevelUpEffect = function(ctx, cx, cy, time) {
    const dur = 1500;
    const t = Math.min(1, (time % dur) / dur);
    const radius = 10 + t * 60;
    const alpha = 1 - t;
    ctx.save();
    ctx.strokeStyle = `rgba(255,255,0,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = `rgba(255,255,0,${alpha * 0.1})`;
    ctx.beginPath();
    ctx.arc(cx, cy, radius * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('LEVEL UP!', cx, cy - 10);
    ctx.restore();
};

Game.prototype.drawCritEffect = function(ctx, x, y, time) {
    ctx.save();
    ctx.fillStyle = '#ff0';
    ctx.globalAlpha = Math.max(0, 1 - time / 500);
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('вљЎ РљР РРў! вљЎ', x, y - time * 0.05);
    ctx.restore();
};

Game.prototype.drawDodgeEffect = function(ctx, x, y, time) {
    ctx.save();
    ctx.fillStyle = '#0ff';
    ctx.globalAlpha = Math.max(0, 1 - time / 400);
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('РЈРљР›РћРќ', x, y - time * 0.05);
    ctx.restore();
};

Game.prototype.drawComboReadyEffect = function(ctx, x, y, time, comboName) {
    const pulse = Math.sin(time * 0.008) * 0.5 + 0.5;
    ctx.save();
    ctx.fillStyle = `rgba(255,100,0,${0.5 + pulse * 0.5})`;
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`вљЎ РљРћРњР‘Рћ: ${comboName || '???'}`, x, y);
    ctx.restore();
};

Game.prototype.addFloatingText = function(text, x, y, color) {
    this.floatingTexts.push({ text, x, y, color: color || '#0ff', time: 0 });
};

Game.prototype.updateFloatingTexts = function() {
    this.floatingTexts = this.floatingTexts.filter(ft => {
        ft.time++;
        return ft.time < 60;
    });
};

Game.prototype.drawFloatingTexts = function(ctx) {
    this.floatingTexts.forEach(ft => {
        const alpha = 1 - ft.time / 60;
        const fy = ft.y - ft.time * 0.5;
        ctx.fillStyle = ft.color;
        ctx.globalAlpha = alpha;
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, ft.x, fy);
    });
    ctx.globalAlpha = 1;
};

Game.prototype.handleScreenClick = function(x, y) {
    const screenMap = {
        main: this._handleMainClick, map: this._handleMapClick,
        shop: this._handleShopClick, combat: this._handleCombatClick,
        inventory: this._handleInventoryClick, crafting: this._handleCraftingClick,
        arena: this._handleArenaClick, clan: this._handleClanClick,
        dailies: this._handleDailiesClick, leaderboard: this._handleLeaderClick,
        achievements: this._handleAchClick, chat: this._handleChatClick,
    };
    const handler = screenMap[this.screen];
    if (handler) handler.call(this, x, y);
};

        { label: 'рџ—є РљР°СЂС‚Р°', screen: 'map' }, { label: 'вљ” Р‘РѕР№', screen: 'combat' },
        { label: 'рџ“‹ РљРІРµСЃС‚С‹', screen: 'quests' }, { label: 'рџЏЄ РњР°РіР°Р·РёРЅ', screen: 'shop' },
        { label: 'рџЏ† Р”РѕСЃС‚РёР¶.', screen: 'achievements' }, { label: 'рџ”§ РљСЂР°С„С‚', screen: 'crafting' },
        { label: 'рџЋ« BP', screen: 'battlepass' }, { label: 'вљЎ PvP', screen: 'arena' },

Game.prototype._handleMapClick = function(x, y) {

        if (dist < 15) {
            this.currentNode = id;
            this.sound.play('hack');
            this.showNotification(`РЈР·РµР»: ${z.name}`, z.color);
        }
    });
};

Game.prototype._handleCombatClick = function(x, y) {

    actions.forEach((a, i) => {

};
