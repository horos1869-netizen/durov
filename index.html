};

function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// в”Ђв”Ђв”Ђ Damage Calculation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateDamage(attacker, defender, modifiers) {
    const baseAtk = attacker.atk || 10;
    const baseDef = defender.def || 5;
    const critChance = (attacker.crit || 0.05) + (modifiers?.critBonus || 0);
    const critMult = (attacker.critMult || 1.5) + (modifiers?.critDamageBonus || 0);
    const isCrit = Math.random() < critChance;
    const rawDamage = Math.max(1, baseAtk - baseDef * 0.5 + (Math.random() - 0.5) * 5);
    const damage = isCrit ? Math.floor(rawDamage * critMult) : Math.floor(rawDamage);
    const elemental = computeElementalDamage(attacker, defender, modifiers);
    return {
        physical: damage,
        elemental: elemental,
        total: damage + elemental,
        crit: isCrit,
        blocked: Math.random() < (defender.block || 0),
        dodged: Math.random() < (defender.evasion || 0),
    };
}

function computeElementalDamage(attacker, defender, modifiers) {
    const atkEle = attacker.elemental || 0;
    const defRes = defender.resistance || 0;
    const effectiveness = modifiers?.elementEffect || 1.0;
    return Math.max(0, Math.floor((atkEle - defRes * 0.3 + (Math.random() - 0.5) * 2) * effectiveness));
}

function applyDamageResult(target, result, game) {
    if (result.blocked) return { blocked: true, message: 'Blocked!', damage: 0 };
    if (result.dodged) return { dodged: true, message: 'Dodged!', damage: 0 };
    target.hp = Math.max(0, (target.hp || 0) - result.total);
    if (result.crit && game) game.showNotification('CRIT! ' + result.total + ' dmg', '#f0f');
    return { damage: result.total, crit: result.crit, message: '-' + result.total + ' HP' };
}

function generateLootDrop(enemy, playerLevel, lootMult) {

    const baseCr = (enemy.reward?.cr || 10) * mult;

    if (Math.random() < dropChance) {
        items.push({

            type: 'material',
            rarity: Math.random() < 0.1 ? 'rare' : 'common',
            qty: Math.floor(1 + Math.random() * 3),

// в”Ђв”Ђв”Ђ Matrix Mini-Game в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateMatrixGame(difficulty) {
    const size = Math.min(8, 3 + Math.floor(difficulty || 1));
    const sequence = [];
    for (let i = 0; i < size; i++) {
        sequence.push(Math.floor(Math.random() * 4));
    }
    return {
        sequence,
        size,
        playerIndex: 0,
        playerSequence: [],
        started: false,
        timeLimit: 2000 + (size * 500),
        startTime: 0,
        done: false,
        success: false,
        difficulty: difficulty || 1,
    };
}

function checkMatrixInput(gameState, direction) {
    if (gameState.done || !gameState.started) return null;
    const expected = gameState.sequence[gameState.playerIndex];
    if (direction === expected) {
        gameState.playerIndex++;
        if (gameState.playerIndex >= gameState.sequence.length) {
            gameState.done = true;
            gameState.success = true;
        }
        return true;
    } else {
        gameState.done = true;
        gameState.success = false;
        return false;
    }
}

// в”Ђв”Ђв”Ђ Save / Data Migration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function migrateSaveData(data) {
    if (!data || typeof data !== 'object') return null;
    const version = data.saveVersion || 0;
    if (version < 1) {
        data.character = data.character || data.player || {};
        data.character.inventory = data.character.inventory || [];
        data.character.equipment = data.character.equipment || {};
        data.character.skills = data.character.skills || [];
        data.character.missions = data.character.missions || [];
        data.meta = data.meta || {};
    }
    if (version < 2) {
        data.character.achievements = data.character.achievements || [];
        data.character.reputation = data.character.reputation || {};
        data.character.battle_pass_level = data.character.battle_pass_level || 0;
        data.character.battle_pass_xp = data.character.battle_pass_xp || 0;
    }
    if (version < 3) {
        data.character.collected_titles = data.character.collected_titles || [];
        data.character.active_title = data.character.active_title || '';
        data.character.stats = data.character.stats || {};
    }
    data.saveVersion = Math.max(version, 3);
    return data;
}

function verifySaveIntegrity(data) {
    const checks = [];
    if (!data.character) checks.push('Missing character data');
    if (typeof data.character?.credits !== 'number') checks.push('Invalid credits');
    if (typeof data.character?.level !== 'number') checks.push('Invalid level');
    if (!Array.isArray(data.character?.inventory)) checks.push('Invalid inventory');
    if (data.character?.hp <= 0) checks.push('Character is dead');
    return checks.length === 0 ? { valid: true } : { valid: false, errors: checks };
}

const DAILY_LOGIN_SYSTEM = {
    streak: 0,
    lastLogin: null,
    rewards: [
        { day: 1, reward: { cr: 100, xp: 50 } },
        { day: 2, reward: { cr: 200, xp: 100, item: 'Health Pack' } },
        { day: 3, reward: { cr: 300, xp: 150 } },
        { day: 4, reward: { cr: 500, xp: 250, item: 'Energy Drink' } },
        { day: 5, reward: { cr: 750, xp: 350 } },

        { day: 7, reward: { cr: 2000, xp: 1000, item: 'Premium Crate' } },

    checkLogin(now) {
        const today = new Date(now || Date.now()).toDateString();
        if (!this.lastLogin) {
            this.streak = 1;
        } else {
            const last = new Date(this.lastLogin).toDateString();
            const diff = (new Date(today) - new Date(last)) / 86400000;
            if (diff === 1) this.streak++;
            else if (diff > 1) this.streak = 1;
        }
        this.lastLogin = now || Date.now();
        const dayInCycle = ((this.streak - 1) % 7) + 1;
        return { streak: this.streak, reward: this.rewards.find(r => r.day === dayInCycle), dayInCycle };
    },
    getNextReward() {
        const dayInCycle = ((this.streak) % 7) + 1;
        return this.rewards.find(r => r.day === dayInCycle);
    },
};

const SCALING_TABLE = {
    xpPerLevel: [
        0, 100, 250, 500, 800, 1200, 1700, 2300, 3000, 3800,
        4800, 5900, 7200, 8600, 10200, 12000, 14000, 16200, 18600, 21200,
        24000, 27000, 30200, 33600, 37200, 41000, 45000, 49200, 53600, 58200,
    ],
    hpPerLevel: [100, 110, 125, 140, 160, 180, 205, 230, 260, 290, 325, 360, 400, 440, 485, 530, 580, 630, 685, 740],
    atkPerLevel: [10, 12, 15, 18, 22, 26, 31, 36, 42, 48, 55, 62, 70, 78, 87, 96, 106, 116, 127, 138],
    defPerLevel: [5, 6, 8, 10, 12, 15, 18, 21, 25, 29, 34, 39, 45, 51, 58, 65, 73, 81, 90, 100],
};

function getStatForLevel(stat, level) {
    const table = SCALING_TABLE[stat] || SCALING_TABLE.hpPerLevel;
    return table[Math.min(level, table.length - 1)] || (table[table.length - 1] + (level - table.length) * table[table.length - 1] * 0.1);
}

function scaleStat(base, level, scaleFactor) {
    return Math.floor(base * (1 + (level - 1) * (scaleFactor || 0.1)));
}

function getMonsterForLevelRange(minLvl, maxLvl) {
    const lvl = minLvl + Math.floor(Math.random() * (maxLvl - minLvl + 1));
    return {
        name: 'Unknown Entity',
        level: lvl,
        hp: scaleStat(30, lvl, 0.15),
        dmg: scaleStat(5, lvl, 0.12),
        def: scaleStat(2, lvl, 0.1),
        reward: { cr: scaleStat(10, lvl, 0.2), xp: scaleStat(5, lvl, 0.15) },
    };
}

function calculateRewardForDifficulty(baseReward, difficultyMult, playerLevel) {
    const lvlBonus = 1 + (playerLevel - 1) * 0.05;
    return Math.floor(baseReward * difficultyMult * lvlBonus);
}

function calculateBossReward(playerLevel, bossTier) {
    const tierMults = { basic: 3, elite: 5, legendary: 10, mythic: 20 };
    const mult = tierMults[bossTier] || 3;
    return {
        cr: calculateRewardForDifficulty(100, mult, playerLevel),
        xp: calculateRewardForDifficulty(50, mult, playerLevel),
        bonus: Math.random() < 0.3 + playerLevel * 0.005 ? 'rare_item' : null,

}

// в”Ђв”Ђв”Ђ Idle / Offline Progress в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateOfflineProgress(player, secondsAway) {
    const cappedSeconds = Math.min(secondsAway, 28800);
    const power = computePlayerPowerLevel(player.stats, player.equipment, player.skills);
    const earnRate = Math.max(0.1, power * 0.01);
    const creditsEarned = Math.floor(cappedSeconds * earnRate * 0.5);
    const xpEarned = Math.floor(cappedSeconds * earnRate * 0.25);
    const enemyKills = Math.floor(cappedSeconds / (60 + Math.random() * 60));
    const lootItems = [];
    if (enemyKills > 0 && Math.random() < 0.1) {
        lootItems.push({ name: 'Offline Cache', type: 'material', rarity: 'common', qty: 1 });
    }
    return {
        secondsAway: cappedSeconds,
        creditsEarned,
        xpEarned,
        enemyKills,
        lootItems,
        message: `While you were away (+${formatDuration(cappedSeconds * 1000)}): +${creditsEarned}cr, +${xpEarned}xp, ${enemyKills} auto-kills`,
    };
}

function createClan(name, tag, founder) {

}

function getClanLevelXp(level) {
    return 1000 + (level - 1) * 500;
}

function addClanExperience(clan, amount) {
    clan.experience = (clan.experience || 0) + amount;

}

// в”Ђв”Ђв”Ђ Tournament / Event System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateTournament(tier, playerLevel) {
    const participantsCount = 4 + tier * 2;
    const participants = [];
    for (let i = 0; i < participantsCount; i++) {
        participants.push({
            name: 'Runner_' + Math.random().toString(36).substring(2, 6),
            power: Math.floor(playerLevel * (5 + Math.random() * 5)),
            level: Math.max(1, playerLevel + Math.floor(Math.random() * 5 - 2)),
        });
    }
    return {
        id: generateId(),
        tier,
        participants,
        brackets: [],
        currentRound: 0,
        finished: false,
        rewards: {
            cr: 500 * tier * playerLevel,
            xp: 250 * tier * playerLevel,
            topPrize: 2000 * tier * playerLevel,
        },
    };
}

function simulateTournamentBracket(tournament, playerPower) {
    const participants = tournament.participants;
    const brackets = [];
    const shuffled = [...participants].sort(() => Math.random() - 0.5);
    for (let i = 0; i < shuffled.length; i += 2) {
        if (i + 1 < shuffled.length) {
            brackets.push({ p1: shuffled[i], p2: shuffled[i + 1], winner: null });
        } else {
            brackets.push({ p1: shuffled[i], p2: { name: 'BYE', power: 0, level: 1 }, winner: shuffled[i] });
        }
    }
    tournament.brackets = brackets;
    tournament.currentRound = 1;
    return brackets;
}

function simulateMatch(p1, p2) {
    const p1Score = p1.power + Math.random() * 20;
    const p2Score = p2.power + Math.random() * 20;
    return p1Score >= p2Score ? { winner: p1, loser: p2, score: Math.floor(p1Score) + '-' + Math.floor(p2Score) } : { winner: p2, loser: p1, score: Math.floor(p2Score) + '-' + Math.floor(p1Score) };
}

// в”Ђв”Ђв”Ђ Quest Reward Calculator в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateQuestReward(quest, playerLevel, difficultyMult) {
    const mult = difficultyMult || 1.0;
    const base = quest.rewards || { cr: 100, xp: 50 };
    const scaledCr = Math.floor((base.cr || 100) * (1 + playerLevel * 0.15) * mult);
    const scaledXp = Math.floor((base.xp || 50) * (1 + playerLevel * 0.12) * mult);
    const bonusItems = [];
    if (Math.random() < 0.1 + playerLevel * 0.005) {
        bonusItems.push({ name: 'Quest Cache', type: 'material', rarity: 'uncommon', qty: 1 });
    }
    if (Math.random() < 0.02 + playerLevel * 0.002) {
        bonusItems.push({ name: 'Rare Token', type: 'currency', rarity: 'rare', qty: 1 });
    }
    return { cr: scaledCr, xp: scaledXp, items: bonusItems };
}

// в”Ђв”Ђв”Ђ Faction Reputation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function addReputation(factionId, amount, reputation) {
    const current = reputation[factionId] || 0;
    const newValue = Math.min(1000, Math.max(-1000, current + amount));
    reputation[factionId] = newValue;
    const tier = getReputationTier(newValue);
    return { factionId, oldValue: current, newValue, tier, changed: current !== newValue };
}

function getReputationTier(value) {
    if (value >= 900) return { name: 'Legendary', mult: 3.0, color: '#ff0' };
    if (value >= 700) return { name: 'Honored', mult: 2.0, color: '#f0f' };
    if (value >= 500) return { name: 'Friendly', mult: 1.5, color: '#0f0' };
    if (value >= 200) return { name: 'Neutral', mult: 1.0, color: '#888' };
    if (value >= -200) return { name: 'Unfriendly', mult: 0.8, color: '#f80' };
    if (value >= -500) return { name: 'Hostile', mult: 0.5, color: '#f00' };
    return { name: 'Hated', mult: 0.2, color: '#800' };
}

function getReputationPerks(factionId, reputation) {
    const value = reputation[factionId] || 0;
    const tier = getReputationTier(value);
    const perks = [];
    if (value >= 100) perks.push('Shop discount 10%');
    if (value >= 300) perks.push('Unlock faction quests');
    if (value >= 500) perks.push('Faction equipment 20% off');
    if (value >= 700) perks.push('Unlock faction titles');
    if (value >= 900) perks.push('Legendary faction rewards');
    if (value <= -200) perks.push('Faction hunters after you!');
    return { tier, perks };
}

// в”Ђв”Ђв”Ђ Battle Pass System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const BATTLE_PASS_TIERS = Array.from({ length: 50 }, (_, i) => ({
    tier: i + 1,
    xpRequired: 100 + i * 25,
    reward: i % 5 === 0
        ? { cr: 500 + i * 100, xp: 200 + i * 50, premium: true, item: 'Battle Pass Crate #' + (i + 1) }
        : { cr: 100 + i * 50, xp: 50 + i * 25, premium: false },
}));

function getBattlePassReward(tier, isPremium) {
    const data = BATTLE_PASS_TIERS[tier - 1];
    if (!data) return null;
    if (data.reward.premium && !isPremium) return { cr: Math.floor(data.reward.cr * 0.5), xp: Math.floor(data.reward.xp * 0.5), premium: false };
    return data.reward;
}

function getBattlePassProgress(currentXp, currentTier) {
    const totalXp = currentXp || 0;
    let xp = totalXp;
    let tier = currentTier || 1;
    while (tier < 50) {
        const needed = BATTLE_PASS_TIERS[tier - 1]?.xpRequired || 100;
        if (xp >= needed) { xp -= needed; tier++; }
        else break;
    }
    const currentNeeded = BATTLE_PASS_TIERS[tier - 1]?.xpRequired || 100;
    return { tier: Math.min(tier, 50), xp, needed: currentNeeded, progress: Math.min(1, xp / currentNeeded), maxed: tier >= 50 };
}

// в”Ђв”Ђв”Ђ Inventory Management в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function addItemToInventory(inventory, item, stackable) {
    if (stackable && item.id) {
        const existing = inventory.find(i => i.id === item.id && i.type === item.type);
        if (existing) {
            existing.qty = (existing.qty || 1) + (item.qty || 1);
            return { added: true, stacked: true, qty: existing.qty };
        }
    }
    inventory.push({ ...item, qty: item.qty || 1, uid: generateId() });
    return { added: true, stacked: false };
}

function removeItemFromInventory(inventory, uid, qty) {
    const idx = inventory.findIndex(i => i.uid === uid);
    if (idx === -1) return false;
    const item = inventory[idx];
    if (item.qty && item.qty > 1 && qty && qty < item.qty) {
        item.qty -= qty;
        return true;
    }
    inventory.splice(idx, 1);
    return true;
}

function getInventoryValue(inventory) {
    const rarityValues = { common: 10, uncommon: 25, rare: 100, epic: 500, legendary: 2000 };
    return inventory.reduce((sum, item) => {
        return sum + (rarityValues[item.rarity] || 10) * (item.qty || 1);
    }, 0);
}

function getInventoryCountByType(inventory, type) {
    return inventory.filter(i => i.type === type).reduce((sum, i) => sum + (i.qty || 1), 0);
}

// в”Ђв”Ђв”Ђ Equipment Management в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function getEquipmentStats(equipment) {
    const stats = { atk: 0, def: 0, hack: 0, spd: 0, crit: 0 };
    Object.values(equipment || {}).forEach(item => {
        if (!item) return;
        stats.atk += item.atk || 0;
        stats.def += item.def || 0;
        stats.hack += item.hack || 0;
        stats.spd += item.spd || 0;
        stats.crit += item.crit || 0;
    });
    return stats;
}

function getEmptyEquipmentSlots(equipment) {
    const slots = ['weapon', 'armor', 'head', 'accessory', 'boots', 'implant'];
    return slots.filter(s => !equipment[s]);
}

function canEquipItem(item, playerLevel, equipment) {
    if (item.lvl && playerLevel < item.lvl) return { can: false, reason: 'Level too low' };
    if (equipment[item.slot]) return { can: false, reason: 'Slot occupied' };
    return { can: true };
}

// в”Ђв”Ђв”Ђ Crafting System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function getAvailableRecipes(playerLevel, ownedCatalysts) {
    return RECIPES_DATA.filter(r => {
        if (r.lvl && playerLevel < r.lvl) return false;
        if (r.catalyst && !ownedCatalysts?.includes(r.catalyst)) return false;
        return true;
    });
}

function canCraftRecipe(recipe, inventory) {
    const materials = recipe.materials || [];
    for (const mat of materials) {
        const count = inventory.filter(i => i.id === mat.id || i.name === mat.name)
            .reduce((s, i) => s + (i.qty || 1), 0);
        if (count < (mat.qty || 1)) return { can: false, missing: mat.name };
    }
    return { can: true };
}

function consumeMaterials(recipe, inventory) {
    const materials = recipe.materials || [];
    materials.forEach(mat => {
        const qty = mat.qty || 1;
        let remaining = qty;
        while (remaining > 0) {
            const idx = inventory.findIndex(i => (i.id === mat.id || i.name === mat.name) && (i.qty || 1) > 0);
            if (idx === -1) break;
            const item = inventory[idx];
            if ((item.qty || 1) > remaining) {
                item.qty -= remaining;
                remaining = 0;
            } else {
                remaining -= item.qty || 1;
                inventory.splice(idx, 1);
            }
        }
    });
}

// в”Ђв”Ђв”Ђ Random / Seed Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const RNG = {
    seed: Date.now(),
    setSeed(s) { this.seed = s; },
    next() {
        this.seed = (this.seed * 1664525 + 1013904223) & 0x7fffffff;
        return this.seed / 0x7fffffff;
    },
    nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; },
    nextFloat(min, max) { return this.next() * (max - min) + min; },
    pick(arr) { return arr[Math.floor(this.next() * arr.length)]; },
    shuffle(arr) {
        const result = [...arr];
        for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(this.next() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
        }
        return result;
    },
};

// в”Ђв”Ђв”Ђ Timer / Cooldown Manager в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const TIMER_MANAGER = {
    timers: [],
    add(name, duration, callback, repeat) {
        const timer = { name, remaining: duration, duration, callback, repeat: repeat || false, paused: false, id: generateId() };
        this.timers.push(timer);
        return timer.id;
    },
    update(dt) {
        this.timers.forEach(t => {
            if (t.paused) return;
            t.remaining -= dt;
            if (t.remaining <= 0) {
                try { t.callback(); } catch(e) { console.warn('Timer error:', t.name, e); }
                if (t.repeat) t.remaining = t.duration;
                else t.done = true;
            }
        });
        this.timers = this.timers.filter(t => !t.done);
    },
    pause(name) { const t = this.timers.find(t => t.name === name); if (t) t.paused = true; },
    resume(name) { const t = this.timers.find(t => t.name === name); if (t) t.paused = false; },
    remove(name) { this.timers = this.timers.filter(t => t.name !== name); },
    clear() { this.timers = []; },
    getRemaining(name) { const t = this.timers.find(t => t.name === name); return t ? t.remaining : 0; },
};

// в”Ђв”Ђв”Ђ Status Effect / Buff System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createStatusEffect(id, name, duration, type, magnitude, color, icon) {
    return { id, name, duration, remaining: duration, type, magnitude, color: color || '#0ff', icon: icon || 'вљЎ', active: true };
}

const STATUS_EFFECTS = {
    poison: (magnitude) => createStatusEffect('poison', 'Poison', 5000, 'dot', magnitude || 5, '#0f0', 'в '),
    burn: (magnitude) => createStatusEffect('burn', 'Burn', 3000, 'dot', magnitude || 8, '#f80', 'рџ”Ґ'),
    freeze: (magnitude) => createStatusEffect('freeze', 'Freeze', 2000, 'debuff', magnitude || 0.5, '#0ff', 'вќ„'),
    stun: (magnitude) => createStatusEffect('stun', 'Stun', 1500, 'debuff', magnitude || 1, '#ff0', 'вљЎ'),
    shield: (magnitude) => createStatusEffect('shield', 'Shield', 5000, 'buff', magnitude || 20, '#00f', 'рџ›Ў'),
    berserk: (magnitude) => createStatusEffect('berserk', 'Berserk', 4000, 'buff', magnitude || 0.3, '#f00', 'рџ’ў'),
    regen: (magnitude) => createStatusEffect('regen', 'Regen', 5000, 'buff', magnitude || 5, '#0f0', 'рџ’љ'),
    stealth: (magnitude) => createStatusEffect('stealth', 'Stealth', 8000, 'buff', magnitude || 1, '#808', 'рџ‘»'),
    slow: (magnitude) => createStatusEffect('slow', 'Slow', 3000, 'debuff', magnitude || 0.5, '#888', 'рџђЊ'),
    weaken: (magnitude) => createStatusEffect('weaken', 'Weaken', 3000, 'debuff', magnitude || 0.5, '#f0f', 'рџ’«'),
};

function applyStatusEffect(target, effect) {
    if (!target.statusEffects) target.statusEffects = [];
    const existing = target.statusEffects.find(e => e.id === effect.id);
    if (existing) {
        existing.remaining = Math.max(existing.remaining, effect.duration);
        existing.magnitude = Math.max(existing.magnitude, effect.magnitude);
        return { refreshed: true, effect: existing };
    }
    target.statusEffects.push(effect);
    return { added: true, effect };
}

function updateStatusEffects(target, dt) {
    if (!target.statusEffects) return [];
    const results = [];
    target.statusEffects.forEach(effect => {
        if (!effect.active) return;
        effect.remaining -= dt;
        if (effect.type === 'dot') {
            if (effect.id === 'poison') results.push({ type: 'damage', amount: effect.magnitude, reason: effect.name });
            if (effect.id === 'burn') results.push({ type: 'damage', amount: effect.magnitude * 1.5, reason: effect.name });
        }
        if (effect.type === 'buff') {
            if (effect.id === 'regen') results.push({ type: 'heal', amount: effect.magnitude, reason: effect.name });
        }
    });
    target.statusEffects = target.statusEffects.filter(e => e.active && e.remaining > 0);
    return results;
}

function getStatusEffectModifiers(target, stat) {
    if (!target.statusEffects) return 1.0;
    let mult = 1.0;
    target.statusEffects.forEach(e => {
        if (e.id === 'freeze' && (stat === 'spd' || stat === 'atk')) mult *= (1 - e.magnitude);
        if (e.id === 'slow' && stat === 'spd') mult *= (1 - e.magnitude);
        if (e.id === 'weaken' && stat === 'atk') mult *= (1 - e.magnitude);
        if (e.id === 'berserk' && stat === 'atk') mult *= (1 + e.magnitude);
        if (e.id === 'shield' && stat === 'def') mult *= (1 + e.magnitude * 0.1);
    });
    return mult;
}

// в”Ђв”Ђв”Ђ Store / Shop UI Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateShopInventory(shopId, playerLevel) {
    const shops = {
        general: { items: ['health_pack', 'energy_drink', 'data_fragment'], markup: 1.2 },
        arms: { items: ['code_breaker', 'ice_pick', 'data_sword'], markup: 1.5 },
        tech: { items: ['neural_booster', 'shield_generator', 'speed_chip'], markup: 2.0 },
        black: { items: ['rare_program', 'illegal_software', 'hack_toolkit'], markup: 3.0 },
        cyber: { items: ['neural_accelerator', 'optical_enhancer', 'subdermal_armor'], markup: 2.5 },
    };
    const shop = shops[shopId] || shops.general;
    const items = ITEMS_DATA.filter(i => shop.items.includes(i.id));
    return items.map(item => ({
        ...item,
        basePrice: item.cost || 100,
        price: Math.floor((item.cost || 100) * shop.markup * (1 + playerLevel * 0.05)),
        stock: Math.floor(5 + Math.random() * 10),
    }));
}

function calculateDiscount(price, factionRep, factionId) {
    const rep = factionRep[factionId] || 0;
    if (rep >= 900) return Math.floor(price * 0.5);
    if (rep >= 700) return Math.floor(price * 0.65);
    if (rep >= 500) return Math.floor(price * 0.8);
    if (rep >= 200) return Math.floor(price * 0.9);
    return price;
}

// в”Ђв”Ђв”Ђ Hacking / Breach System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateHackingChallenge(difficulty) {
    const nodeCount = Math.min(8, 2 + Math.floor(difficulty * 1.5));
    const nodes = [];
    for (let i = 0; i < nodeCount; i++) {
        nodes.push({
            id: i,
            type: ['data', 'security', 'gateway', 'core', 'decoy'][Math.floor(Math.random() * 5)],
            defense: 10 + difficulty * 5 + Math.floor(Math.random() * 10),
            connected: [],
            breached: false,
        });
    }
    for (let i = 0; i < nodeCount; i++) {
        const connections = Math.floor(1 + Math.random() * 3);
        for (let j = 0; j < connections; j++) {
            const target = Math.floor(Math.random() * nodeCount);
            if (target !== i && !nodes[i].connected.includes(target)) {
                nodes[i].connected.push(target);
                nodes[target].connected.push(i);
            }
        }
    }
    return { nodes, current: 0, difficulty, breached: 0, total: nodeCount, timeLimit: 30000 + difficulty * 5000, startTime: Date.now() };
}

function attemptBreach(node, hackPower) {
    const roll = Math.random() * 100 + hackPower;
    const threshold = node.defense;
    if (roll >= threshold) {
        node.breached = true;
        return { success: true, message: 'Node ' + node.id + ' breached!', roll: Math.floor(roll), threshold };
    }
    return { success: false, message: 'Breach failed on node ' + node.id, roll: Math.floor(roll), threshold, alertLevel: Math.floor((threshold - roll) / 10) };
}

function getHackingReward(hackResult, difficulty) {
    const base = { cr: 50 * difficulty, xp: 20 * difficulty };
    const bonusNodes = hackResult.breachedNodes || 0;
    const bonusMult = 1 + bonusNodes * 0.1;
    const dataFound = Math.random() < 0.2 + difficulty * 0.05;
    return {
        cr: Math.floor(base.cr * bonusMult),
        xp: Math.floor(base.xp * bonusMult),
        data: dataFound ? { name: 'Encrypted Data #' + Math.floor(Math.random() * 1000), type: 'data', rarity: difficulty >= 5 ? 'rare' : 'common' } : null,
    };
}

// в”Ђв”Ђв”Ђ ADVANCED LOOT GENERATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateLootByRarity(playerLevel, zone, luckBonus) {
    const rarities = [
        { name: 'common', weight: 50, minLvl: 0, color: '#aaa' },
        { name: 'uncommon', weight: 30, minLvl: 2, color: '#0f0' },
        { name: 'rare', weight: 15, minLvl: 5, color: '#0ff' },
        { name: 'epic', weight: 8, minLvl: 12, color: '#f0f' },
        { name: 'legendary', weight: 2, minLvl: 25, color: '#f80' },
    ];
    const filtered = rarities.filter(r => playerLevel >= r.minLvl);
    const totalWeight = filtered.reduce((s, r) => s + r.weight, 0);
    let roll = Math.random() * totalWeight;
    if (luckBonus) roll += luckBonus * 5;
    for (const r of filtered) {
        roll -= r.weight;
        if (roll <= 0) return r;
    }
    return filtered[0];
}

function generateLootItem(playerLevel, zone, luckBonus) {
    const rarity = generateLootByRarity(playerLevel, zone, luckBonus);
    const pools = {
        common: { items: ['Credit Chip', 'Scrap Metal', 'Basic Circuit', 'Data Fragment'], count: [1, 2], value: [10, 50] },
        uncommon: { items: ['Optical Cable', 'Quantum Chip', 'Cooling Gel', 'Copper Wire'], count: [1, 3], value: [50, 200] },
        rare: { items: ['Nano Processor', 'Plasma Core', 'Military Alloy', 'Program Shard'], count: [1, 2], value: [200, 800] },
        epic: { items: ['EMP Generator', 'Neural Interface', 'Reality Crystal', 'Epic Program'], count: [1, 1], value: [800, 3000] },
        legendary: { items: ['Dark Matter', 'Prime Matrix', 'Legendary Program', 'AI Core'], count: [1, 1], value: [3000, 10000] },
    };
    const pool = pools[rarity.name] || pools.common;
    const itemName = pool.items[Math.floor(Math.random() * pool.items.length)];
    const qty = pool.count[0] + Math.floor(Math.random() * (pool.count[1] - pool.count[0] + 1));
    const value = Math.floor((pool.value[0] + Math.random() * (pool.value[1] - pool.value[0])) * (1 + playerLevel * 0.05));
    return { name: itemName, qty, value, rarity: rarity.name, color: rarity.color };
}

function generateLootDrop(playerLevel, zone, luckBonus, isBoss) {
    const drop = [];
    const baseCount = isBoss ? 3 + Math.floor(Math.random() * 3) : 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < baseCount; i++) {
        drop.push(generateLootItem(playerLevel, zone, luckBonus));
    }
    if (isBoss && Math.random() < 0.5) {
        const trophy = TROPHY_DATA.find(t => t.zone === zone);
        if (trophy) drop.push({ name: trophy.name, qty: 1, value: trophy.value, rarity: 'trophy', color: '#ff0' });
    }
    return drop;
}

function generateDailyQuests(playerLevel) {
    const zones = ['matrix', 'corpnet', 'darknet', 'deep_web', 'core'];
    const quests = [];
    const count = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
        const zone = zones[Math.floor(Math.random() * zones.length)];
        quests.push(generateQuest(playerLevel, zone));
    }
    return quests;
}

// в”Ђв”Ђв”Ђ PROCEDURAL ENEMY GENERATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateProceduralEnemy(zone, playerLevel, difficultyMult) {
    const prefix = ['Р”РёРєРёР№', 'РЈСЃРёР»РµРЅРЅС‹Р№', 'РњРѕРґРёС„РёС†РёСЂРѕРІР°РЅРЅС‹Р№', 'Р­Р»РёС‚РЅС‹Р№', 'РџРµСЂРІРѕР±С‹С‚РЅС‹Р№', 'РљРёР±РµСЂ-', 'РўРµРЅРµРІРѕР№', 'РџР»Р°Р·РјРµРЅРЅС‹Р№'];
    const suffix = ['РЎС‚СЂР°Р¶', 'РћС…РѕС‚РЅРёРє', 'Р’РёСЂ', 'Р”РµРјРѕРЅ', 'РЎРїРµРєС‚СЂ', 'Р“РѕР»РµРј', 'Р¤Р°РЅС‚РѕРј', 'РўРµСЂРјРёРЅР°С‚РѕСЂ'];
    const name = prefix[Math.floor(Math.random() * prefix.length)] + ' ' + suffix[Math.floor(Math.random() * suffix.length)];
    const baseHp = 20 + playerLevel * 8;
    const baseDmg = 4 + playerLevel * 3;
    const baseDef = 1 + Math.floor(playerLevel * 1.2);
    const mult = (difficultyMult || 1) * (1 + (playerLevel - 1) * 0.08);
    const abilities = [];
    if (Math.random() < 0.3) abilities.push('charge');
    if (Math.random() < 0.25) abilities.push('shield');
    if (Math.random() < 0.2) abilities.push('heal');
    if (Math.random() < 0.15) abilities.push('berserk');
    if (Math.random() < 0.1) abilities.push('summon');
    if (playerLevel > 15 && Math.random() < 0.1) abilities.push('corrupt');
    if (playerLevel > 25 && Math.random() < 0.05) abilities.push('reality_shift');
    return {
        name: name,
        hp: Math.floor(baseHp * mult),
        maxHp: Math.floor(baseHp * mult),
        dmg: Math.floor(baseDmg * mult),
        def: Math.floor(baseDef * mult),
        level: playerLevel,
        zone: zone,
        abilities: abilities,
        isBoss: false,
        reward: {
            cr: Math.floor((10 + playerLevel * 5) * mult),
            xp: Math.floor((5 + playerLevel * 3) * mult),
        },

// в”Ђв”Ђв”Ђ ECONOMY SIMULATION FUNCTIONS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const ECONOMY_SIM = {
    prices: {},
    volatility: 0.05,
    trends: {},
    lastUpdate: 0,
    updateInterval: 60000,
    commodities: {
        credit_chip: { base: 1, name: 'Credit Chip', supply: 1000000, demand: 800000 },
        data_fragment: { base: 50, name: 'Data Fragment', supply: 50000, demand: 60000 },
        quantum_chip: { base: 250, name: 'Quantum Chip', supply: 10000, demand: 15000 },
        nano_processor: { base: 600, name: 'Nano Processor', supply: 5000, demand: 8000 },
        plasma_core: { base: 1500, name: 'Plasma Core', supply: 2000, demand: 3500 },
        ai_core: { base: 10000, name: 'AI Core', supply: 500, demand: 2000 },
        dark_matter: { base: 25000, name: 'Dark Matter', supply: 100, demand: 500 },
    },
    init() {
        Object.keys(this.commodities).forEach(id => {
            const c = this.commodities[id];
            this.prices[id] = c.base;
            this.trends[id] = (Math.random() - 0.5) * 0.1;
        });
        this.lastUpdate = Date.now();
    },
    update() {
        const now = Date.now();
        if (now - this.lastUpdate < this.updateInterval) return;
        this.lastUpdate = now;
        Object.keys(this.commodities).forEach(id => {
            const c = this.commodities[id];
            const supplyRatio = c.supply / c.demand;
            let priceChange = (1 - supplyRatio) * this.volatility;
            priceChange += (Math.random() - 0.5) * this.volatility * 0.5;
            this.trends[id] = this.trends[id] * 0.9 + priceChange * 0.1;
            this.prices[id] = Math.max(c.base * 0.1, this.prices[id] * (1 + priceChange));
            c.supply += Math.floor((Math.random() - 0.5) * c.supply * 0.01);
            c.demand += Math.floor((Math.random() - 0.5) * c.demand * 0.01);
            c.supply = Math.max(1, c.supply);
            c.demand = Math.max(1, c.demand);
        });
    },
    getPrice(id) { return this.prices[id] || 0; },
    getTrend(id) { return this.trends[id] || 0; },
    buy(id, qty) {
        const c = this.commodities[id];
        if (!c) return 0;
        const price = this.prices[id] || c.base;
        c.supply -= qty;
        c.supply = Math.max(0, c.supply);
        return Math.floor(price * qty);
    },
    sell(id, qty) {
        const c = this.commodities[id];
        if (!c) return 0;
        const price = (this.prices[id] || c.base) * 0.8;
        c.supply += qty;
        return Math.floor(price * qty);
    },
};

// в”Ђв”Ђв”Ђ FACTION WAR SIMULATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const FACTION_WAR = {
    factions: {
        netcorp: { name: 'NetCorp', power: 1000, territory: 6, color: '#00f', allies: [], enemies: ['ghostnet'] },
        ghostnet: { name: 'GhostNet', power: 800, territory: 5, color: '#f0f', allies: [], enemies: ['netcorp'] },
        streetpunks: { name: 'StreetPunks', power: 600, territory: 3, color: '#f60', allies: [], enemies: ['deepones'] },
        deepones: { name: 'DeepOnes', power: 700, territory: 4, color: '#0af', allies: [], enemies: ['streetpunks'] },
    },
    wars: [],
    battleHistory: [],
    lastUpdate: 0,
    updateInterval: 300000,
    declareWar(attackerId, defenderId) {
        if (this.wars.some(w => (w.attacker === attackerId && w.defender === defenderId) || (w.attacker === defenderId && w.defender === attackerId))) return false;
        this.wars.push({ attacker: attackerId, defender: defenderId, startedAt: Date.now(), battles: 0, attackerWins: 0, defenderWins: 0 });
        return true;
    },
    simulateBattle(attackerId, defenderId) {
        const att = this.factions[attackerId];
        const def = this.factions[defenderId];
        if (!att || !def) return null;
        const attPower = att.power + (Math.random() - 0.5) * att.power * 0.3;
        const defPower = def.power + (Math.random() - 0.5) * def.power * 0.3;
        const attWins = attPower > defPower;
        if (attWins) {
            att.power += 10;
            def.power -= 5;
            att.territory = Math.min(10, att.territory + 0.5);
            def.territory = Math.max(0, def.territory - 0.5);
        } else {
            def.power += 10;
            att.power -= 5;
            def.territory = Math.min(10, def.territory + 0.5);
            att.territory = Math.max(0, att.territory - 0.5);
        }
        const result = { attacker: attackerId, defender: defenderId, winner: attWins ? attackerId : defenderId, time: Date.now() };
        this.battleHistory.push(result);
        if (this.battleHistory.length > 100) this.battleHistory.shift();
        const war = this.wars.find(w => (w.attacker === attackerId && w.defender === defenderId));
        if (war) { war.battles++; if (attWins) war.attackerWins++; else war.defenderWins++; }
        return result;
    },
    update() {
        const now = Date.now();
        if (now - this.lastUpdate < this.updateInterval) return;
        this.lastUpdate = now;
        Object.keys(this.factions).forEach(id => {
            const f = this.factions[id];
            f.power += Math.floor((Math.random() - 0.5) * f.power * 0.02);
            f.power = Math.max(100, f.power);
        });
        if (this.wars.length > 0) {
            const war = this.wars[Math.floor(Math.random() * this.wars.length)];
            this.simulateBattle(war.attacker, war.defender);
        }
        if (Math.random() < 0.1 && this.wars.length < 3) {
            const fids = Object.keys(this.factions);
            const a = fids[Math.floor(Math.random() * fids.length)];
            const b = fids[Math.floor(Math.random() * fids.length)];
            if (a !== b && !this.factions[a].enemies.includes(b)) {
                this.factions[a].enemies.push(b);
                this.factions[a].allies = this.factions[a].allies.filter(x => x !== b);
                this.declareWar(a, b);
            }
        }
    },
    getActiveWars() {
        return this.wars.filter(w => Date.now() - w.startedAt < 86400000 * 7);
    },
};

        return this.guilds.find(g => g.members.some(m => m.id === playerId));
    },

        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return false;
        if (guild.members.find(m => m.id === playerId)) return false;
        guild.members.push({ id: playerId, rank: 'member', joinedAt: Date.now(), contributions: 0 });
        return true;
    },
    removeMember(guildId, playerId) {
        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return false;
        guild.members = guild.members.filter(m => m.id !== playerId);
        return true;

        const guild = this.guilds.find(g => g.id === guildId);

        const guild = this.guilds.find(g => g.id === guildId);

        guild.xp += amount;
        while (guild.xp >= guild.xpNext) {
            guild.xp -= guild.xpNext;
            guild.level++;
            guild.xpNext = Math.floor(guild.xpNext * 1.5);
        }
    },
    contribute(guildId, playerId, amount) {
        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return false;
        const member = guild.members.find(m => m.id === playerId);
        if (!member) return false;
        member.contributions += amount;
        guild.treasury += amount;
        this.addXp(guildId, Math.floor(amount * 0.1));
        return true;
    },

        const guild = this.guilds.find(g => g.id === guildId);

        return true;
    },

    getGuildRanking() {
        return [...this.guilds].sort((a, b) => b.level - a.level || b.xp - a.xp);
    },
};

            if (value >= this.levelThresholds[i]) level = i + 1;
            else break;
        }
        return Math.min(level, this.levelThresholds.length);
    },
    getDiscount(factionId) {
        const rep = this.reps[factionId];
        if (!rep) return 0;
        return Math.min(0.5, (rep.level - 1) * 0.05);
    },
    getProgress(factionId) {
        const rep = this.reps[factionId];
        if (!rep) return 0;
        const currentLvl = rep.level;
        const currentThreshold = this.levelThresholds[currentLvl - 1] || 0;
        const nextThreshold = this.levelThresholds[currentLvl] || currentThreshold + 50000;
        return (rep.value - currentThreshold) / (nextThreshold - currentThreshold);
    },
};

const MARKET_TRADER = {
    orders: { buy: [], sell: [] },
    maxOrders: 20,
    createBuyOrder(itemId, price, qty, playerId) {
        if (this.orders.buy.length >= this.maxOrders) return false;
        this.orders.buy.push({ id: 'bo_' + Date.now().toString(36), itemId, price, qty, playerId, createdAt: Date.now(), filled: 0 });
        return true;
    },
    createSellOrder(itemId, price, qty, playerId) {
        if (this.orders.sell.length >= this.maxOrders) return false;
        this.orders.sell.push({ id: 'so_' + Date.now().toString(36), itemId, price, qty, playerId, createdAt: Date.now(), filled: 0 });
        return true;
    },
    matchOrders() {
        const matched = [];
        this.orders.buy.forEach(buy => {
            if (buy.filled >= buy.qty) return;
            this.orders.sell.forEach(sell => {
                if (sell.filled >= sell.qty) return;
                if (buy.itemId !== sell.itemId) return;
                if (buy.price >= sell.price) {
                    const tradeQty = Math.min(buy.qty - buy.filled, sell.qty - sell.filled);
                    buy.filled += tradeQty;
                    sell.filled += tradeQty;
                    matched.push({ buyId: buy.id, sellId: sell.id, itemId: buy.itemId, qty: tradeQty, price: sell.price });
                }
            });
        });
        this.orders.buy = this.orders.buy.filter(o => o.filled < o.qty);
        this.orders.sell = this.orders.sell.filter(o => o.filled < o.qty);
        return matched;
    },
    getBuyOrders(itemId) { return this.orders.buy.filter(o => o.itemId === itemId); },
    getSellOrders(itemId) { return this.orders.sell.filter(o => o.itemId === itemId); },
    getBestPrice(itemId, type) {
        const orders = type === 'buy' ? this.getBuyOrders(itemId) : this.getSellOrders(itemId);
        if (orders.length === 0) return 0;
        return type === 'buy' ? Math.max(...orders.map(o => o.price)) : Math.min(...orders.map(o => o.price));
    },
};

// в”Ђв”Ђв”Ђ ENCRYPTION / CODE-BREAKING MINIGAME в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const CODE_BREAKER = {
    active: false,
    code: [],
    attempts: [],
    maxAttempts: 6,
    codeLength: 4,
    symbols: ['0', '1', '#', '@', '$', '%', '&', '*', 'A', 'B', 'C', 'D', 'E', 'F'],
    difficulty: 1,
    start(difficulty) {
        this.difficulty = difficulty || 1;
        this.codeLength = 3 + difficulty;
        this.maxAttempts = 5 + difficulty;
        this.code = [];
        this.attempts = [];
        this.active = true;
        const pool = this.symbols.slice(0, 6 + difficulty * 2);
        for (let i = 0; i < this.codeLength; i++) {
            this.code.push(pool[Math.floor(Math.random() * pool.length)]);
        }
    },
    submitGuess(guess) {
        if (!this.active || this.attempts.length >= this.maxAttempts) return null;
        const result = { exact: 0, partial: 0 };
        const codeCopy = [...this.code];
        const guessCopy = [...guess];
        for (let i = 0; i < this.codeLength; i++) {
            if (guessCopy[i] === codeCopy[i]) { result.exact++; codeCopy[i] = null; guessCopy[i] = null; }
        }
        for (let i = 0; i < this.codeLength; i++) {
            if (guessCopy[i] === null) continue;
            const idx = codeCopy.indexOf(guessCopy[i]);
            if (idx !== -1) { result.partial++; codeCopy[idx] = null; }
        }
        this.attempts.push({ guess, result });
        if (result.exact === this.codeLength) { this.active = false; return 'win'; }
        if (this.attempts.length >= this.maxAttempts) { this.active = false; return 'lose'; }
        return 'continue';
    },
};

// в”Ђв”Ђв”Ђ GAME INTEGRATION / INITIALIZATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function initGameSystems() {
    try {
        if (typeof ECONOMY_SIM?.init === 'function') ECONOMY_SIM.init();
        if (typeof NEBULA?.init === 'function') NEBULA.init();
        if (typeof STAR_FIELD?.init === 'function') STAR_FIELD.init();
        if (typeof AURORA?.init === 'function') AURORA.init();
        if (typeof WEATHER_FX?.init === 'function') WEATHER_FX.init('rain');
        if (typeof EVENT_CALENDAR?.init === 'function') EVENT_CALENDAR.init();
        if (typeof DAILY_LOGIN_SYSTEM?.load === 'function') DAILY_LOGIN_SYSTEM.load();
        if (typeof DAILY_LOGIN_SYSTEM?.checkIn === 'function') DAILY_LOGIN_SYSTEM.checkIn();
        if (typeof GAME_LOGGER?.info === 'function') GAME_LOGGER.info('Systems', 'All extended systems initialized');
    } catch (e) {
        console.warn('initGameSystems error:', e);
    }
}

function registerNewKeybindings() {
    const origHandler = document.addEventListener;
    document.addEventListener('keydown', (e) => {
        if (!game) return;
        const key = e.key.toLowerCase();
        if (key === 'p') { game.screen = 'pet_view'; e.preventDefault(); }
        if (key === 'v') { game.screen = 'mount_view'; e.preventDefault(); }
        if (key === 'l') { game.screen = 'daily_login'; e.preventDefault(); }
        if (key === 'g') { game.screen = 'guild_hall'; e.preventDefault(); }
        if (key === 'e') { game.screen = 'event_log'; e.preventDefault(); }
        if (key === 'b') { game.screen = 'calendar'; e.preventDefault(); }
    });
}

// в”Ђв”Ђв”Ђ GLITCH EFFECTS ENGINE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const GLITCH = {
    active: false,
    intensity: 0,
    timer: 0,
    nextGlitch: 3000 + Math.random() * 7000,
    offsetX: 0,
    offsetY: 0,
    sliceY: 0,
    sliceH: 0,
    r: 0, g: 0, b: 0,
    update(dt) {
        this.timer += dt;
        if (this.timer > this.nextGlitch) {
            this.active = true;
            this.intensity = 0.03 + Math.random() * 0.06;
            this.offsetX = (Math.random() - 0.5) * 4;
            this.offsetY = (Math.random() - 0.5) * 2;
            this.sliceY = Math.random() * CFG.HEIGHT;
            this.sliceH = 2 + Math.random() * 8;
            this.r = Math.random() > 0.5 ? 1 : 0;
            this.g = Math.random() > 0.7 ? 1 : 0;
            this.b = Math.random() > 0.5 ? 1 : 0;
            this.nextGlitch = 5000 + Math.random() * 15000;
            this.timer = 0;
            setTimeout(() => { this.active = false; }, 150 + Math.random() * 200);
        }
    },
    apply(ctx) {
        if (!this.active) return;
        const w = CFG.WIDTH, h = CFG.HEIGHT;
        const img = ctx.getImageData(0, 0, w, h);
        const d = img.data;
        for (let y = this.sliceY; y < Math.min(h, this.sliceY + this.sliceH); y++) {
            for (let x = 0; x < w; x++) {
                const i = (y * w + x) * 4;
                const offset = Math.floor(this.offsetX * (1 + Math.random()));
                const oi = (y * w + Math.min(w - 1, Math.max(0, x + offset))) * 4;
                if (this.r) d[oi] = d[i];
                if (this.g) d[oi + 1] = d[i + 1];
                if (this.b) d[oi + 2] = d[i + 2];
            }
        }
        ctx.putImageData(img, 0, 0);
        ctx.fillStyle = 'rgba(0,255,255,0.03)';
        ctx.fillRect(0, 0, w, h);
    },
};

// в”Ђв”Ђв”Ђ SCANLINES / CRT OVERLAY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const CRT = {
    opacity: 0.06,
    scanSpacing: 3,
    chromatic: true,
    chromaticOffset: 1.5,
    vignette: true,
    vignetteStrength: 0.3,
    draw(ctx) {
        const w = CFG.WIDTH, h = CFG.HEIGHT;
        if (this.opacity > 0) {
            ctx.fillStyle = 'rgba(0,0,0,' + this.opacity + ')';
            for (let y = 0; y < h; y += this.scanSpacing) {
                ctx.fillRect(0, y, w, 1);
            }
        }
        if (this.vignette) {
            const grad = ctx.createRadialGradient(w / 2, h / 2, h * 0.3, w / 2, h / 2, h * 0.8);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,' + this.vignetteStrength + ')');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }
        if (this.chromatic) {
            const o = this.chromaticOffset;
            ctx.fillStyle = 'rgba(255,0,0,0.015)';
            ctx.fillRect(o, 0, w, h);
            ctx.fillStyle = 'rgba(0,0,255,0.015)';
            ctx.fillRect(-o, 0, w, h);
        }
    },
};

// в”Ђв”Ђв”Ђ SCREEN TRANSITION MANAGER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const TRANSITION = {
    active: false,
    type: 'fade',
    progress: 0,
    duration: 300,
    callback: null,
    direction: 'in',
    start(screen, cb) {
        this.active = true;
        this.progress = 0;
        this.direction = 'in';
        this.callback = () => { game.screen = screen; if (cb) cb(); };
    },
    update(dt) {
        if (!this.active) return;
        this.progress += dt / this.duration;
        if (this.progress >= 0.5 && this.callback) {
            this.callback();
            this.callback = null;
            this.direction = 'out';
        }
        if (this.progress >= 1) { this.active = false; this.progress = 0; }
    },
    draw(ctx) {
        if (!this.active) return;
        const p = this.direction === 'in' ? this.progress * 2 : (this.progress - 0.5) * 2;
        const alpha = this.direction === 'in' ? Math.min(1, p) : Math.max(0, 1 - p);
        ctx.fillStyle = 'rgba(0,0,0,' + alpha * 0.7 + ')';
        ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
    },
};

// в”Ђв”Ђв”Ђ ENHANCED UI TOOLTIP SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const TOOLTIP = {
    text: '',
    x: 0, y: 0,
    visible: false,
    timer: 0,
    show(text, x, y) { this.text = text; this.x = x; this.y = y; this.visible = true; this.timer = 0; },
    hide() { this.visible = false; },
    update(dt) { if (this.visible) this.timer += dt; if (this.timer > 5000) this.hide(); },
    draw(ctx) {
        if (!this.visible || !this.text) return;
        const lines = this.text.split('\n');
        const maxW = lines.reduce((m, l) => Math.max(m, ctx.measureText ? ctx.measureText(l).width + 20 : l.length * 7 + 20), 0);
        const h = lines.length * 16 + 10;
        let tx = Math.min(this.x + 15, CFG.WIDTH - maxW - 10);
        let ty = Math.min(this.y + 20, CFG.HEIGHT - h - 10);
        ctx.save();
        ctx.shadowColor = 'rgba(0,255,255,0.3)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = 'rgba(0,10,20,0.92)';
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const r = 4;
        ctx.moveTo(tx + r, ty); ctx.lineTo(tx + maxW - r, ty);
        ctx.quadraticCurveTo(tx + maxW, ty, tx + maxW, ty + r);
        ctx.lineTo(tx + maxW, ty + h - r);
        ctx.quadraticCurveTo(tx + maxW, ty + h, tx + maxW - r, ty + h);
        ctx.lineTo(tx + r, ty + h);
        ctx.quadraticCurveTo(tx, ty + h, tx, ty + h - r);
        ctx.lineTo(tx, ty + r);
        ctx.quadraticCurveTo(tx, ty, tx + r, ty);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0ff'; ctx.font = '10px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        lines.forEach((l, i) => ctx.fillText(l, tx + 10, ty + 6 + i * 16));
        ctx.restore();
    },
};

// в”Ђв”Ђв”Ђ SCREEN SHAKE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const SHAKE = {
    x: 0, y: 0,
    intensity: 0,
    decay: 0.9,
    trigger(intensity) { this.intensity = Math.max(this.intensity, intensity || 5); },
    update() {
        if (this.intensity < 0.5) { this.x = 0; this.y = 0; return; }
        this.x = (Math.random() - 0.5) * this.intensity * 2;
        this.y = (Math.random() - 0.5) * this.intensity * 2;
        this.intensity *= this.decay;
    },
    apply(ctx) {
        if (this.intensity > 0.5) ctx.translate(this.x, this.y);
    },
};

// в”Ђв”Ђв”Ђ ENHANCED FLOATING TEXT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const FLOATING_TEXTS = {
    items: [],
    add(text, x, y, color, size, duration) {
        this.items.push({
            text, x, y,
            color: color || '#fff',
            size: size || 14,
            life: duration || 1500,
            maxLife: duration || 1500,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -2 - Math.random() * 2,
        });
    },
    update(dt) {
        this.items.forEach(t => {
            t.y += t.vy * (dt / 16);
            t.x += t.vx * (dt / 16);
            t.life -= dt;
        });
        this.items = this.items.filter(t => t.life > 0);
    },
    draw(ctx) {
        this.items.forEach(t => {
            const alpha = Math.max(0, t.life / t.maxLife);
            const scale = 1 + (1 - alpha) * 0.5;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = t.color;
            ctx.font = 'bold ' + Math.floor(t.size * scale) + 'px Orbitron,monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = t.color;
            ctx.shadowBlur = 8;
            ctx.fillText(t.text, t.x, t.y);
            ctx.restore();
        });
    },
};

// в”Ђв”Ђв”Ђ AMBIENT BACKGROUND PARTICLES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const AMBIENT = {
    particles: [],
    count: 60,
    speed: 0.3,
    init() {
        for (let i = 0; i < this.count; i++) {
            this.particles.push({
                x: Math.random() * CFG.WIDTH,
                y: Math.random() * CFG.HEIGHT,
                vx: (Math.random() - 0.5) * this.speed,
                vy: (Math.random() - 0.5) * this.speed - 0.2,
                size: 0.5 + Math.random() * 1.5,
                alpha: 0.1 + Math.random() * 0.3,
                pulse: Math.random() * Math.PI * 2,
                pulseSpeed: 0.5 + Math.random() * 1.5,
            });
        }
    },
    update(dt) {
        const f = dt / 16;
        this.particles.forEach(p => {
            p.x += p.vx * f; p.y += p.vy * f;
            p.pulse += p.pulseSpeed * 0.02 * f;
            if (p.x < 0) p.x = CFG.WIDTH;
            if (p.x > CFG.WIDTH) p.x = 0;
            if (p.y < 0) p.y = CFG.HEIGHT;
            if (p.y > CFG.HEIGHT) p.y = 0;
        });
    },
    draw(ctx) {
        this.particles.forEach(p => {
            const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
            ctx.fillStyle = 'rgba(0,255,255,' + a + ')';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
    },
};

// в”Ђв”Ђв”Ђ NEBULA BACKGROUND EFFECT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const NEBULA = {
    layers: [],
    count: 3,
    init() {
        for (let i = 0; i < this.count; i++) {
            this.layers.push({
                x: Math.random() * CFG.WIDTH,
                y: Math.random() * CFG.HEIGHT,
                radius: 100 + Math.random() * 200,
                color1: [Math.random() * 255, Math.random() * 255, 255],
                color2: [0, Math.random() * 255, Math.random() * 255],
                alpha: 0.02 + Math.random() * 0.04,
                speed: 0.1 + Math.random() * 0.3,
                pulse: Math.random() * Math.PI * 2,
            });
        }
    },
    update(dt) {
        const f = dt / 16;
        this.layers.forEach(l => {
            l.x += Math.sin(l.pulse) * l.speed * f;
            l.y += Math.cos(l.pulse * 1.3) * l.speed * f * 0.5;
            l.pulse += 0.01 * f;
            if (l.x < -l.radius) l.x = CFG.WIDTH + l.radius;
            if (l.x > CFG.WIDTH + l.radius) l.x = -l.radius;
            if (l.y < -l.radius) l.y = CFG.HEIGHT + l.radius;
            if (l.y > CFG.HEIGHT + l.radius) l.y = -l.radius;
            const breathe = 0.8 + 0.2 * Math.sin(l.pulse * 0.5);
            l.radius *= breathe;
            if (l.radius < 50) l.radius = 50;
            if (l.radius > 400) l.radius = 400;
        });
    },
    draw(ctx) {
        this.layers.forEach(l => {
            const grad = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, l.radius);
            const c1 = `rgba(${l.color1[0]},${l.color1[1]},${l.color1[2]},${l.alpha})`;
            const c2 = `rgba(${l.color2[0]},${l.color2[1]},${l.color2[2]},${l.alpha * 0.3})`;
            grad.addColorStop(0, c1);
            grad.addColorStop(0.5, c2);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        });
    },
};

// в”Ђв”Ђв”Ђ STAR FIELD PARALLAX в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const STAR_FIELD = {
    stars: [],
    count: 120,
    speed: 0.5,
    init() {
        for (let i = 0; i < this.count; i++) {
            this.stars.push({
                x: Math.random() * CFG.WIDTH,
                y: Math.random() * CFG.HEIGHT,
                size: 0.3 + Math.random() * 1.5,
                alpha: 0.2 + Math.random() * 0.6,
                speed: 0.1 + Math.random() * 0.8,
                layer: Math.floor(Math.random() * 3),
                twinkleSpeed: 0.02 + Math.random() * 0.05,
                twinkleOffset: Math.random() * Math.PI * 2,
            });
        }
    },
    update(dt) {
        const f = dt / 16;
        this.stars.forEach(s => {
            s.y += s.speed * s.layer * 0.5 * f;
            if (s.y > CFG.HEIGHT) { s.y = -2; s.x = Math.random() * CFG.WIDTH; }
        });
    },
    draw(ctx) {
        this.stars.forEach(s => {
            const twinkle = 0.6 + 0.4 * Math.sin(s.twinkleOffset + performance.now() * s.twinkleSpeed);
            const a = s.alpha * twinkle;
            ctx.fillStyle = `rgba(200,220,255,${a})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fill();
        });
    },
};

// в”Ђв”Ђв”Ђ AURORA BOREALIS EFFECT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const AURORA = {
    strips: [],
    count: 4,
    init() {
        for (let i = 0; i < this.count; i++) {
            this.strips.push({
                y: 50 + Math.random() * 200,
                width: 200 + Math.random() * 400,
                height: 20 + Math.random() * 60,
                hue: 180 + Math.random() * 120,
                alpha: 0.05 + Math.random() * 0.1,
                speed: 0.2 + Math.random() * 0.5,
                wave: Math.random() * Math.PI * 2,
                waveSpeed: 0.01 + Math.random() * 0.03,
            });
        }
    },
    update(dt) {
        const f = dt / 16;
        this.strips.forEach(s => {
            s.y += Math.sin(s.wave) * 0.5 * f;
            s.wave += s.waveSpeed * f;
            s.y = Math.max(10, Math.min(CFG.HEIGHT * 0.6, s.y));
        });
    },
    draw(ctx) {
        this.strips.forEach(s => {
            const grad = ctx.createLinearGradient(0, s.y, CFG.WIDTH, s.y + s.height);
            const alpha = s.alpha * (0.7 + 0.3 * Math.sin(s.wave));
            grad.addColorStop(0, `hsla(${s.hue},100%,60%,0)`);
            grad.addColorStop(0.3, `hsla(${s.hue},100%,60%,${alpha})`);
            grad.addColorStop(0.5, `hsla(${s.hue + 30},100%,70%,${alpha * 0.8})`);
            grad.addColorStop(0.7, `hsla(${s.hue},100%,60%,${alpha})`);
            grad.addColorStop(1, `hsla(${s.hue},100%,60%,0)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, s.y, CFG.WIDTH, s.height);
        });
    },
};

// в”Ђв”Ђв”Ђ RAIN/SNOW WEATHER SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const WEATHER_FX = {
    particles: [],
    type: 'rain',
    intensity: 1,
    maxParticles: 200,
    wind: 0,
    init(type) {
        this.type = type || 'rain';
        this.particles = [];
        for (let i = 0; i < this.maxParticles; i++) {
            this.particles.push(this.createParticle());
        }
    },
    createParticle() {
        return {
            x: Math.random() * CFG.WIDTH,
            y: Math.random() * CFG.HEIGHT,
            speed: this.type === 'rain' ? 4 + Math.random() * 6 : 0.5 + Math.random() * 2,
            size: this.type === 'rain' ? 1 + Math.random() * 2 : 1 + Math.random() * 3,
            alpha: this.type === 'rain' ? 0.2 + Math.random() * 0.3 : 0.3 + Math.random() * 0.5,
            sway: Math.random() * Math.PI * 2,
            swaySpeed: 0.02 + Math.random() * 0.03,
            drift: (Math.random() - 0.5) * 0.5,
        };
    },
    update(dt) {
        const f = dt / 16;
        this.particles.forEach(p => {
            p.y += p.speed * f * this.intensity;
            p.x += (this.wind + p.drift) * f;
            p.sway += p.swaySpeed * f;
            p.x += Math.sin(p.sway) * 0.3 * f;
            if (p.y > CFG.HEIGHT) { p.y = -5; p.x = Math.random() * CFG.WIDTH; }
            if (p.x < -5) p.x = CFG.WIDTH + 5;
            if (p.x > CFG.WIDTH + 5) p.x = -5;
        });
    },
    draw(ctx) {
        this.particles.forEach(p => {
            if (this.type === 'rain') {
                ctx.strokeStyle = `rgba(150,200,255,${p.alpha})`;
                ctx.lineWidth = p.size;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - this.wind * 2, p.y + p.speed * 2);
                ctx.stroke();
            } else {
                ctx.fillStyle = `rgba(220,230,255,${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
        });
    },
    setType(type) {
        this.type = type;
        this.particles = [];
        for (let i = 0; i < this.maxParticles; i++) {
            this.particles.push(this.createParticle());
        }
    },
};

// в”Ђв”Ђв”Ђ ENERGY SHIELD EFFECT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const ENERGY_SHIELD = {
    active: false,
    radius: 60,
    x: 0,
    y: 0,
    health: 100,
    maxHealth: 100,
    color: '#0ff',
    pulse: 0,
    particles: [],
    activate(x, y, color) {
        this.active = true;
        this.x = x;
        this.y = y;
        this.health = this.maxHealth;
        this.color = color || '#0ff';
        this.particles = [];
        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = this.radius * (0.8 + Math.random() * 0.2);
            this.particles.push({
                angle: angle,
                dist: dist,
                speed: 0.5 + Math.random() * 1.5,
                size: 1 + Math.random() * 2,
                alpha: 0.3 + Math.random() * 0.5,
                offset: Math.random() * Math.PI * 2,
            });
        }
    },
    deactivate() { this.active = false; },
    hit(damage) {
        this.health -= damage;
        if (this.health <= 0) { this.health = 0; this.deactivate(); }
        return this.health <= 0;
    },
    update(dt) {
        if (!this.active) return;
        this.pulse += 0.05 * (dt / 16);
        this.particles.forEach(p => {
            p.angle += p.speed * 0.01 * (dt / 16);
            p.dist += Math.sin(this.pulse + p.offset) * 0.2;
            p.dist = Math.max(this.radius * 0.5, Math.min(this.radius * 1.2, p.dist));
        });
    },
    draw(ctx) {
        if (!this.active) return;
        const healthRatio = this.health / this.maxHealth;
        const pulseAlpha = 0.3 + 0.2 * Math.sin(this.pulse * 2);
        ctx.save();
        ctx.globalAlpha = pulseAlpha * healthRatio;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = this.color.replace(')', ',0.05)').replace('rgb', 'rgba');
        ctx.fillStyle = `rgba(0,255,255,${0.03 * healthRatio})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        this.particles.forEach(p => {
            const px = this.x + Math.cos(p.angle) * p.dist;
            const py = this.y + Math.sin(p.angle) * p.dist;
            ctx.fillStyle = this.color;
            ctx.globalAlpha = p.alpha * healthRatio * (0.5 + 0.5 * Math.sin(this.pulse + p.offset));
            ctx.beginPath();
            ctx.arc(px, py, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.restore();
    },
};

// в”Ђв”Ђв”Ђ ORIGINAL LOOP WRAPPER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const _origLoop = Game.prototype.loop;
Game.prototype.loop = function() {
    const now = performance.now();
    const dt = Math.min(33, now - (this._lastTime || now));
    this._lastTime = now;
    this._fps = this._fps || 0;
    this._fpsCount = this._fpsCount || 0;
    this._fpsTime = this._fpsTime || 0;
    this._fpsCount++;
    this._fpsTime += dt;
    if (this._fpsTime >= 1000) { this._fps = this._fpsCount; this._fpsCount = 0; this._fpsTime = 0; }
    GLITCH.update(dt);
    TRANSITION.update(dt);
    SHAKE.update();
    FLOATING_TEXTS.update(dt);
    AMBIENT.update(dt);
    TOOLTIP.update(dt);
    SAVE_INDICATOR.update(dt);
    if (_origLoop) _origLoop.call(this);
    const ctx = this.ctx;
    ctx.save();
    SHAKE.apply(ctx);
    if (this._showFps) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(CFG.WIDTH - 70, 0, 70, 18);
        ctx.fillStyle = '#0f0'; ctx.font = '10px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
        ctx.fillText(this._fps + ' FPS', CFG.WIDTH - 5, 3);
    }
    AMBIENT.draw(ctx);
    FLOATING_TEXTS.draw(ctx);
    CRT.draw(ctx);
    GLITCH.apply(ctx);
    TRANSITION.draw(ctx);
    SAVE_INDICATOR.draw(ctx);
    TOOLTIP.draw(ctx);
    ctx.restore();
};

// в”Ђв”Ђв”Ђ ENHANCED UI METHODS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const _origBtn = Game.prototype.ui?.btn || function(){};
if (Game.prototype.ui) {

    const _origBtn2 = _uiPrototype.btn;
    _uiPrototype.btn = function(x, y, w, h, text, cb, opts) {

// в”Ђв”Ђв”Ђ RESPONSIVE CANVAS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
