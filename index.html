    special: { name: 'Особое', color: '#f00', icon: '⭐' },
};

// ─── Extended Profile Data ───────────────────────────────────────────────
const STAT_CALCULATIONS = {
    hpPerLevel: 10,
    enPerLevel: 5,
    atkPerLevel: 2,
    defPerLevel: 1,
    baseHp: 100,
    baseEn: 100,
    baseAtk: 10,
    baseDef: 5,
    baseHack: 10,
    baseSpeed: 10,
};

function calculateTotalStats(level, programs, implants) {
    const stats = {
        hp: STAT_CALCULATIONS.baseHp + (level - 1) * STAT_CALCULATIONS.hpPerLevel,
        en: STAT_CALCULATIONS.baseEn + (level - 1) * STAT_CALCULATIONS.enPerLevel,
        atk: STAT_CALCULATIONS.baseAtk + (level - 1) * STAT_CALCULATIONS.atkPerLevel,
        def: STAT_CALCULATIONS.baseDef + (level - 1) * STAT_CALCULATIONS.defPerLevel,
        hack: STAT_CALCULATIONS.baseHack,
        speed: STAT_CALCULATIONS.baseSpeed,
    };
    if (programs) {
        programs.forEach(p => {
            if (p.dmg) stats.atk += p.dmg;
            if (p.def) stats.def += p.def;
        });
    }
    if (implants) {
        implants.forEach(im => {
            if (im.hack) stats.hack += im.hack;
            if (im.speed) stats.speed += im.speed;
            if (im.atk) stats.atk += im.atk;
            if (im.def) stats.def += im.def;
        });
    }
    return stats;
}

// ─── Draw Screen Router ──────────────────────────────────────────────────
Game.prototype.drawScreen = function(ctx, screen) {
    const drawMethods = {
        loading: 'drawLoading', mainmenu: 'drawMainMenu', main: 'drawMainHub',
        map: 'drawMap', combat: 'drawCombat', terminal: 'drawTerminal',
        shop: 'drawShop', npc: 'drawNpcChat', arena: 'drawArena',
        clan: 'drawClan', dailies: 'drawDailies', battlepass: 'drawBattlePass',
        leaderboard: 'drawLeaderboard', admin: 'drawAdmin',
        matrix: 'drawMatrix', quests: 'drawQuestsScreen',
        achievements: 'drawAchievements', crafting: 'drawCrafting',
        inventory: 'drawInventory', chat: 'drawChat', friends: 'drawFriends',
        settings: 'drawSettings', tutorial: 'drawTutorial', codex: 'drawCodex',
    };
    const methodName = drawMethods[screen] || 'drawMainHub';
    const method = this[methodName];
    if (method) {
        method.call(this, ctx, this.time);
    } else {
        this.drawGridBackground(ctx, this.time);
        ctx.fillStyle = '#f00'; ctx.font = '16px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(`> ${screen.toUpperCase()} <`, ctx.canvas.width / 2, ctx.canvas.height / 2);
    }
};

// ─── Input Handler ───────────────────────────────────────────────────────
Game.prototype.handleInput = function(key) {
    if (key === 'Escape') {
        if (this.screen !== 'main' && this.screen !== 'loading' && this.screen !== 'mainmenu') {
            this.goBack();
        }
    }
    if (key === 'Enter') {
        if (this.screen === 'mainmenu') {
            this.screen = 'main';
        }
    }
    if (key === 'Backspace') {
        if (this.screen === 'terminal' && this.termInput.length > 0) {
            this.termInput = this.termInput.slice(0, -1);
        }
        if (this.screen === 'chat' && this.chatInput.length > 0) {
            this.chatInput = this.chatInput.slice(0, -1);
        }
    }
    if (key.length === 1) {
        if (this.screen === 'terminal') {
            this.termInput += key;
        }
        if (this.screen === 'chat') {
            this.chatInput += key;
        }
    }
};

// ─── Notification Popup ──────────────────────────────────────────────────
const notificationQueue = [];
let notificationActive = false;

function showNotificationPopup(text, color, duration) {
    notificationQueue.push({ text, color: color || '#0ff', duration: duration || 3000 });
    if (!notificationActive) processNotificationQueue();
}

function processNotificationQueue() {
    if (notificationQueue.length === 0) {
        notificationActive = false;
        return;
    }
    notificationActive = true;
    const notif = notificationQueue.shift();
    if (game) {
        game._notification = { text: notif.text, color: notif.color, startTime: Date.now() };
    }
    setTimeout(() => {
        if (game) game._notification = null;
        processNotificationQueue();
    }, notif.duration);
}

// ─── Achievement Popup System ────────────────────────────────────────────
const achievementQueue = [];
let achPopupActive = false;

function showAchievementPopup(name, desc, icon) {
    achievementQueue.push({ name, desc: desc || '', icon: icon || '🏆' });
    if (!achPopupActive) processAchQueue();
}

function processAchQueue() {
    if (achievementQueue.length === 0) {
        achPopupActive = false;
        return;
    }
    achPopupActive = true;
    const ach = achievementQueue.shift();
    if (game) {
        game._achPopup = { text: `${ach.icon} ${ach.name}: ${ach.desc}`, startTime: Date.now() };
    }
    setTimeout(() => {
        if (game) game._achPopup = null;
        processAchQueue();
    }, 4000);
}

// ─── Game Loop Override ──────────────────────────────────────────────────
const originalLoop = Game.prototype.loop;
Game.prototype.loop = function() {
    this.time++;
    const ctx = this.ctx;
    ctx.save();
    this.drawScreen(ctx, this.screen);
    this.drawFloatingTexts(ctx);
    this.drawGlitchOverlay(ctx, this.time, 0.3);
    this.drawParticleBurst(ctx, this.mouseX, this.mouseY, '#0ff', 3, this.time);
    ctx.restore();
    requestAnimationFrame(() => this.loop());
};

// ─── Keyboard Shortcuts ─────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
    if (!game) return;
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        const isTyping = game.screen === 'terminal' || game.screen === 'chat';
        if (!isTyping && e.key >= '1' && e.key <= '9') {
            const n = parseInt(e.key);
            const screens = ['map', 'combat', 'quests', 'shop', 'achievements', 'crafting', 'arena', 'clan', 'inventory'];
            if (n <= screens.length) {
                game.setPreviousScreen();
                game.screen = screens[n - 1];
                e.preventDefault();
            }
        }
    }
});

// ─── Combat Auto-Resolver ───────────────────────────────────────────────
function autoResolveCombat(playerAtk, playerDef, enemyHp, enemyAtk) {
    const rounds = [];
    const maxRounds = 10;
    let pAtk = playerAtk, pDef = playerDef;
    let eHp = enemyHp, eAtk = enemyAtk;
    let round = 0;
    while (eHp > 0 && round < maxRounds) {
        round++;
        const pDmg = Math.max(1, pAtk - Math.floor(pDef * 0.3) + Math.floor(Math.random() * 5));
        const eDmg = Math.max(1, eAtk - Math.floor(pDef * 0.2) + Math.floor(Math.random() * 3));
        eHp -= pDmg;
        const playerLost = Math.random() < 0.3 ? eDmg : 0;
        rounds.push({ round, playerDmg: pDmg, enemyDmg: playerLost, enemyHp: Math.max(0, eHp) });
    }
    const victory = eHp <= 0;
    return { rounds, victory, totalRounds: round };
}

// ─── Loot Generator ─────────────────────────────────────────────────────
function generateRandomLoot(zone, playerLevel) {
    const baseCredits = 10 + playerLevel * 5 + Math.floor(Math.random() * 50);
    const loot = { credits: baseCredits };
    if (Math.random() < 0.3) {
        const programs = Object.keys(PROGRAMS_CATALOG_FULL || {});
        loot.program = programs[Math.floor(Math.random() * programs.length)];
    }
    if (Math.random() < 0.4) {
        const mats = Object.keys(CRAFT_MATERIALS || {});
        loot.material = mats[Math.floor(Math.random() * mats.length)];
    }
    if (Math.random() < 0.1) {
        const implants = Object.keys(IMPLANTS_CATALOG_FULL || {});
        loot.implant = implants[Math.floor(Math.random() * implants.length)];
    }
    return loot;
}

function generateCombatEncounter(zone, playerLevel) {
    const pools = {
        matrix: [
            { name: 'Sentry ICE-1', hp: 25, dmg: 4, lvl: 1 },
            { name: 'Scout ICE-2', hp: 20, dmg: 6, lvl: 1 },

            { name: 'Elite Hacker', hp: 40, dmg: 14, lvl: 6 },
        ],
        darknet: [
            { name: 'Shadow Agent', hp: 45, dmg: 15, lvl: 7 },
            { name: 'Rogue AI', hp: 65, dmg: 13, lvl: 8 },
        ],
    };
    const pool = pools[zone] || pools.matrix;
    const base = pool[Math.floor(Math.random() * pool.length)];
    const scale = 1 + (playerLevel - base.lvl) * 0.1;
    return {
        name: base.name,
        hp: Math.floor(base.hp * Math.max(0.5, scale)),
        maxHp: Math.floor(base.hp * Math.max(0.5, scale)),
        dmg: Math.floor(base.dmg * Math.max(0.5, scale)),
        level: base.lvl,
        zone,
    };
}

// ─── Experience / Level Calculation ─────────────────────────────────────
function xpForLevel(lvl) {
    return Math.floor(100 * Math.pow(1.5, lvl - 1));
}

function totalXpForLevel(lvl) {
    let total = 0;
    for (let i = 1; i < lvl; i++) total += xpForLevel(i);
    return total;
}

function levelFromXp(xp) {
    let lvl = 1;
    let needed = xpForLevel(lvl);
    while (xp >= needed && lvl < 30) {
        xp -= needed;
        lvl++;
        needed = xpForLevel(lvl);
    }
    return lvl;
}

// ─── Damage Formula ─────────────────────────────────────────────────────
function calcCombatDamage(atk, def, critChance, bonuses) {
    const base = Math.max(1, atk - def * 0.4 + Math.random() * 3);
    const isCrit = Math.random() < (critChance || 0.05);
    const critMult = isCrit ? 2.0 : 1.0;
    const bonusMult = 1.0 + (bonuses || 0);
    return { damage: Math.floor(base * critMult * bonusMult), crit: isCrit };
}

function calcHealAmount(baseHeal, implantPower) {
    return Math.floor(baseHeal * (1 + (implantPower || 0) * 0.02));
}
