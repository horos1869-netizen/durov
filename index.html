Game.prototype.ui.showToast = function(text, color, duration) {
    this._toast = { text, color: color || '#0ff', duration: duration || 2000, startTime: Date.now() };
};

Game.prototype.ui.drawToast = function() {
    if (!this._toast) return;
    const elapsed = Date.now() - this._toast.startTime;
    if (elapsed > this._toast.duration) { this._toast = null; return; }
    const alpha = elapsed < 200 ? elapsed / 200 : Math.min(1, 1 - (elapsed - this._toast.duration + 200) / 200);
    const ctx = this.ctx;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,10,20,0.85)';
    ctx.shadowColor = this._toast.color;
    ctx.shadowBlur = 10;
    const tw = ctx.measureText ? ctx.measureText(this._toast.text).width + 30 : 200;
    ctx.fillRect(CFG.WIDTH / 2 - tw / 2, 100, tw, 30);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = this._toast.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(CFG.WIDTH / 2 - tw / 2, 100, tw, 30);
    ctx.fillStyle = this._toast.color;
    ctx.font = '10px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this._toast.text, CFG.WIDTH / 2, 115);
    ctx.restore();
};

Game.prototype.ui.drawProgressBar = function(x, y, w, h, progress, fgColor, bgColor, borderColor) {
    const ctx = this.ctx;
    ctx.save();
    ctx.fillStyle = bgColor || '#1a1a2a';
    this.ui.roundRect(ctx, x, y, w, h, 3, true, false);
    ctx.fillStyle = fgColor || '#0ff';
    this.ui.roundRect(ctx, x, y, w * Math.min(1, Math.max(0, progress)), h, 3, true, false);
    ctx.strokeStyle = borderColor || fgColor || '#0ff';
    ctx.lineWidth = 1;
    this.ui.roundRect(ctx, x, y, w, h, 3, false, true);
    ctx.restore();
};

// ─── GAME DEBUG CONSOLE ──────────────────────────────────────────────
const DEBUG_CONSOLE = {
    visible: false,
    lines: [],
    input: '',
    history: [],
    historyIdx: 0,
    maxLines: 50,
    toggle() { this.visible = !this.visible; },
    log(text, color) { this.lines.push({ text, color: color || '#aaa', time: Date.now() }); if (this.lines.length > this.maxLines) this.lines.shift(); },
    clear() { this.lines = []; },
    execute(cmd) {
        this.history.push(cmd);
        this.historyIdx = this.history.length;
        this.log('> ' + cmd, '#0ff');
        try {
            const parts = cmd.trim().split(' ');
            const command = parts[0].toLowerCase();
            const args = parts.slice(1);
            switch (command) {
                case 'help': this.log('Commands: help, clear, screen, credits, xp, level, hp, energy, stats, save, load, fps, bgm, cheats, debug', '#ff0'); break;
                case 'clear': this.clear(); break;
                case 'screen': if (args[0] && game) { game.screen = args[0]; this.log('Screen: ' + args[0], '#0f0'); } else { this.log('Usage: screen <name>', '#f00'); } break;
                case 'credits': if (game?.character?.character) { game.character.character.credits = parseInt(args[0]) || 99999; this.log('Credits set', '#0f0'); } break;
                case 'xp': if (game?.character?.character) { game.character.character.experience = (game.character.character.experience || 0) + (parseInt(args[0]) || 1000); this.log('XP added', '#0f0'); } break;
                case 'level': if (game?.character?.character) { game.character.character.level = parseInt(args[0]) || 50; this.log('Level set', '#0f0'); } break;
                case 'hp': if (game?.character?.character) { game.character.character.hp = parseInt(args[0]) || 9999; this.log('HP set', '#0f0'); } break;
                case 'energy': if (game?.character?.character) { game.character.character.energy = parseInt(args[0]) || 9999; this.log('Energy set', '#0f0'); } break;
                case 'stats': if (game?.character?.character) { this.log(JSON.stringify(game.character.character, null, 2).substring(0, 200), '#888'); } break;
                case 'save': SAVE_MANAGER.save(0, game?.character); this.log('Saved!', '#0f0'); break;
                case 'load': const d = SAVE_MANAGER.load(0); if (d) { game.character = d; this.log('Loaded!', '#0f0'); } else { this.log('No save', '#f00'); } break;
                case 'fps': if (game) { game._showFps = !game._showFps; this.log('FPS: ' + game._showFps, '#0f0'); } break;
                case 'bgm': BGM.toggle(); this.log('BGM toggled', '#0f0'); break;
                case 'cheats': CHEATS.toggle(); this.log('Cheats: ' + CHEATS.enabled, '#0f0'); break;
                case 'debug': this.log('Screen: ' + (game?.screen || 'N/A') + ' | Version: 2.0.4 | Lines: ~12K', '#ff0'); break;
                default: this.log('Unknown command. Type "help"', '#f00'); break;
            }
        } catch(e) { this.log('Error: ' + e.message, '#f00'); }
    },
    draw(ctx) {
        if (!this.visible) return;
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('DEBUG CONSOLE (ESC to close, Enter to execute)', 5, 5);
        ctx.font = '7px monospace';
        this.lines.slice(-30).forEach((l, i) => {
            ctx.fillStyle = l.color;
            ctx.fillText(l.text, 5, 22 + i * 12);
        });
        ctx.fillStyle = '#0f0';
        ctx.fillText('> ' + this.input + '█', 5, CFG.HEIGHT - 20);
        ctx.restore();
    },
    handleKey(e) {
        if (e.key === 'Enter') { this.execute(this.input); this.input = ''; e.preventDefault(); }
        else if (e.key === 'Backspace') { this.input = this.input.slice(0, -1); e.preventDefault(); }
        else if (e.key === 'Escape') { this.visible = false; e.preventDefault(); }
        else if (e.key === 'ArrowUp') { if (this.historyIdx > 0) { this.historyIdx--; this.input = this.history[this.historyIdx] || ''; } e.preventDefault(); }
        else if (e.key === 'ArrowDown') { if (this.historyIdx < this.history.length - 1) { this.historyIdx++; this.input = this.history[this.historyIdx] || ''; } else { this.historyIdx = this.history.length; this.input = ''; } e.preventDefault(); }
        else if (e.key.length === 1) { this.input += e.key; e.preventDefault(); }
    },
};

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'D') { DEBUG_CONSOLE.toggle(); e.preventDefault(); }
    if (DEBUG_CONSOLE.visible) { DEBUG_CONSOLE.handleKey(e); }
});

    this.ui.text(20, 20, '📅 Daily Challenges', { font: CFG.FONTS.title, color: '#ff0' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, '← Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    const challenges = this.dailyChallenges || [
        { id: 1, name: 'ICE Breaker', desc: 'Defeat 5 ICE programs', goal: 5, prog: 0, reward: { cr: 200, xp: 100 }, done: false, claimed: false },
        { id: 2, name: 'Data Thief', desc: 'Complete 3 hack sequences', goal: 3, prog: 1, reward: { cr: 350, xp: 150 }, done: false, claimed: false },
        { id: 3, name: 'Merchant', desc: 'Spend 1000 credits', goal: 1000, prog: 450, reward: { cr: 500, xp: 200 }, done: false, claimed: false },
        { id: 4, name: 'PvP Fighter', desc: 'Win 2 PvP matches', goal: 2, prog: 0, reward: { cr: 400, xp: 250, item: 'Loot Box' }, done: false, claimed: false },
        { id: 5, name: 'Net Walker', desc: 'Visit 4 map nodes', goal: 4, prog: 2, reward: { cr: 250, xp: 100 }, done: false, claimed: false },
        { id: 6, name: 'Craftsman', desc: 'Craft 3 items', goal: 3, prog: 0, reward: { cr: 300, xp: 150, item: 'Rare Material' }, done: false, claimed: false },
    ];
    if (!this.dailyChallenges) this.dailyChallenges = challenges;
    components.dailyChallenges.forEach((ch, i) => {
        const cy = 60 + i * 48;
        const isDone = ch.prog >= ch.goal;
        const isClaimed = ch.claimed;
        ctx.fillStyle = isClaimed ? '#0a0a0a' : (isDone ? '#0a1a0a' : '#0d0d1a');
        ctx.strokeStyle = isClaimed ? '#333' : (isDone ? '#0f0' : '#0ff44');
        this.ui.roundRect(ctx, 15, cy, CFG.WIDTH - 30, 42, 4, true, true);
        ctx.fillStyle = isClaimed ? '#555' : '#fff'; ctx.font = '10px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(ch.name, 22, cy + 4);
        ctx.fillStyle = isClaimed ? '#444' : '#aaa'; ctx.font = '7px monospace';
        ctx.fillText(ch.desc, 22, cy + 20);
        const pct = Math.min(1, ch.prog / ch.goal);
        ctx.fillStyle = '#1a1a2a'; ctx.fillRect(CFG.WIDTH - 110, cy + 6, 85, 8);
        ctx.fillStyle = isDone ? '#0f0' : '#0ff'; ctx.fillRect(CFG.WIDTH - 110, cy + 6, 85 * pct, 8);
        ctx.fillStyle = '#fff'; ctx.font = '6px monospace'; ctx.textAlign = 'center';
        ctx.fillText(`${ch.prog}/${ch.goal}`, CFG.WIDTH - 67, cy + 12);
        ctx.fillStyle = isClaimed ? '#333' : (isDone ? '#ff0' : '#888');
        ctx.font = '8px monospace'; ctx.textAlign = 'right';
        ctx.fillText(isClaimed ? '✓' : (isDone ? 'CLAIM' : `${ch.reward.cr}cr`), CFG.WIDTH - 25, cy + 28);
    });
    ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Challenges reset daily', CFG.WIDTH/2, CFG.HEIGHT - 20);
};

Game.prototype.renderBattlePassDetailed = function() {
    this.ui.text(20, 20, '🎫 Battle Pass', { font: CFG.FONTS.title, color: '#f0f' });

// ─── Mini-Game: Network Scan ────────────────────────────────────────────
Game.prototype.renderNetworkScan = function() {
    this.ui.text(20, 20, '📡 Network Scan', { font: CFG.FONTS.title, color: '#0f0' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, '← Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    if (!this._scanNodes) {
        this._scanNodes = [];
        this._scanProgress = 0;
        this._scanTargets = [];
        for (let i = 0; i < 12; i++) {
            this._scanNodes.push({
                x: 30 + Math.random() * (CFG.WIDTH - 60),
                y: 70 + Math.random() * (CFG.HEIGHT - 150),
                radius: 5 + Math.random() * 15,
                found: false,
                freq: 100 + Math.random() * 900,
                type: Math.random() > 0.6 ? 'signal' : 'noise',
            });
        }
        this._scanTargets = this._scanNodes.filter(n => n.type === 'signal');
        this._scanPulse = 0;
    }
    ctx.fillStyle = '#0a0a0a'; ctx.strokeStyle = '#0f0';
    this.ui.roundRect(ctx, 15, 55, CFG.WIDTH - 30, CFG.HEIGHT - 130, 4, true, true);
    ctx.beginPath(); ctx.rect(16, 56, CFG.WIDTH - 32, CFG.HEIGHT - 132); ctx.clip();
    this._scanNodes.forEach(node => {
        ctx.fillStyle = node.found ? '#0f0' : '#0a0a0a';
        ctx.strokeStyle = node.found ? '#0f0' : '#0f04';
        ctx.lineWidth = node.found ? 2 : 1;
        ctx.beginPath(); ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        if (node.found) {
            ctx.fillStyle = '#0f0'; ctx.font = '6px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(Math.floor(node.freq) + 'MHz', node.x, node.y);
        }
    });
    this._scanPulse = (this._scanPulse + 2) % (CFG.WIDTH + 100);
    ctx.strokeStyle = '#0f08'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(this._scanPulse, 55); ctx.lineTo(this._scanPulse, CFG.HEIGHT - 75); ctx.stroke();
    ctx.fillStyle = '#0f0'; ctx.font = '9px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('Found: ' + this._scanNodes.filter(n => n.found).length + '/' + this._scanNodes.length, 22, CFG.HEIGHT - 65);
    ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Click unknown signals to identify', CFG.WIDTH/2, CFG.HEIGHT - 45);
};

Game.prototype.renderDataWorm = function() {
    this.ui.text(20, 20, '🐛 Data Worm', { font: CFG.FONTS.title, color: '#0f0' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, '← Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    if (!this._wormGame) {
        this._wormGame = {
            grid: 15, cell: 18, dir: 'right', nextDir: 'right',
            worm: [{ x: 7, y: 7 }, { x: 6, y: 7 }, { x: 5, y: 7 }],
            food: { x: 10, y: 5 }, score: 0, speed: 300, lastMove: 0,
            obstacles: [], gameOver: false, level: 1,
        };
        const g = this._wormGame;
        for (let i = 0; i < 5; i++) {
            let ox = Math.floor(Math.random() * g.grid), oy = Math.floor(Math.random() * g.grid);
            if (!g.worm.some(s => s.x === ox && s.y === oy) && !(ox === g.food.x && oy === g.food.y)) {
                g.obstacles.push({ x: ox, y: oy });
            }
        }
    }
    const g = this._wormGame;
    const ox = 65, oy = 55;
    ctx.strokeStyle = '#0f04'; ctx.lineWidth = 0.5;
    for (let r = 0; r < g.grid; r++) {
        for (let c = 0; c < g.grid; c++) {
            ctx.strokeRect(ox + c * g.cell, oy + r * g.cell, g.cell, g.cell);
        }
    }
    g.obstacles.forEach(o => {
        ctx.fillStyle = '#f00'; ctx.fillRect(ox + o.x * g.cell, oy + o.y * g.cell, g.cell, g.cell);
    });
    g.worm.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#0f0' : '#0a0';
        ctx.fillRect(ox + s.x * g.cell, oy + s.y * g.cell, g.cell - 1, g.cell - 1);
    });
    ctx.fillStyle = '#ff0';
    ctx.fillRect(ox + g.food.x * g.cell, oy + g.food.y * g.cell, g.cell, g.cell);
    ctx.fillStyle = '#0f0'; ctx.font = '10px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('Score: ' + g.score + ' | Level: ' + g.level + ' | Speed: ' + g.speed + 'ms', 15, CFG.HEIGHT - 50);
    ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Arrow keys to move | Collect data fragments', CFG.WIDTH/2, CFG.HEIGHT - 30);
};

// ─── Utility: Deep Clone ────────────────────────────────────────────────
function deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
}

function mergeObjects(target, source) {
    for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
            target[key] = mergeObjects(target[key] || {}, source[key]);
        } else {
            target[key] = source[key];
        }
    }
    return target;
}

function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function chance(pct) {
    return Math.random() < pct;
}

function debounce(fn, delay) {
    let timer;
    return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
    };
}

// ─── Extended Formatters ──────────────────────────────────────────────────
function formatDuration(seconds) {
    if (seconds < 60) return `${seconds} сек`;
    const m = Math.floor(seconds / 60);
    if (m < 60) return `${m} мин`;
    const h = Math.floor(m / 60);
    const rem = m % 60;
    return `${h} ч ${rem} мин`;
}

function formatNumber(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}

function formatPercent(n) {
    return (n * 100).toFixed(0) + '%';
}

function formatXpBar(current, needed) {
    const pct = Math.min(100, Math.floor((current / needed) * 100));
    const filled = Math.floor(pct / 10);
    return '█'.repeat(filled) + '░'.repeat(10 - filled) + ` ${pct}%`;
}

function formatDate(d) {
    const date = new Date(d);
    return date.toLocaleDateString('ru-RU');
}

function formatTimeFromNow(timestamp) {
    const diff = Date.now() - timestamp;
    if (diff < 60000) return 'только что';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} мин. назад`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч. назад`;
    return `${Math.floor(diff / 86400000)} дн. назад`;
}

function calculateTotalStats(level, programs, implants) {
    const stats = {
        hp: STAT_CALCULATIONS.baseHp + (level - 1) * STAT_CALCULATIONS.hpPerLevel,
        en: STAT_CALCULATIONS.baseEn + (level - 1) * STAT_CALCULATIONS.enPerLevel,
        atk: STAT_CALCULATIONS.baseAtk + (level - 1) * STAT_CALCULATIONS.atkPerLevel,
        def: STAT_CALCULATIONS.baseDef + (level - 1) * STAT_CALCULATIONS.defPerLevel,
        hack: STAT_CALCULATIONS.baseHack,
        speed: STAT_CALCULATIONS.baseSpeed,
    };
    if (programs) {
        programs.forEach(p => {
            if (p.dmg) stats.atk += p.dmg;
            if (p.def) stats.def += p.def;
        });
    }
    if (implants) {
        implants.forEach(im => {
            if (im.hack) stats.hack += im.hack;
            if (im.speed) stats.speed += im.speed;
            if (im.atk) stats.atk += im.atk;
            if (im.def) stats.def += im.def;
        });
    }
    return stats;
}

// ─── Combat Auto-Resolver ───────────────────────────────────────────────
function autoResolveCombat(playerAtk, playerDef, enemyHp, enemyAtk) {
    const rounds = [];
    const maxRounds = 10;
    let pAtk = playerAtk, pDef = playerDef;
    let eHp = enemyHp, eAtk = enemyAtk;
    let round = 0;
    while (eHp > 0 && round < maxRounds) {
        round++;
        const pDmg = Math.max(1, pAtk - Math.floor(pDef * 0.3) + Math.floor(Math.random() * 5));
        const eDmg = Math.max(1, eAtk - Math.floor(pDef * 0.2) + Math.floor(Math.random() * 3));
        eHp -= pDmg;
        const playerLost = Math.random() < 0.3 ? eDmg : 0;
        rounds.push({ round, playerDmg: pDmg, enemyDmg: playerLost, enemyHp: Math.max(0, eHp) });
    }
    const victory = eHp <= 0;
    return { rounds, victory, totalRounds: round };
}

// ─── Experience / Level Calculation ─────────────────────────────────────
function xpForLevel(lvl) {
    return Math.floor(100 * Math.pow(1.5, lvl - 1));
}

function totalXpForLevel(lvl) {
    let total = 0;
    for (let i = 1; i < lvl; i++) total += xpForLevel(i);
    return total;
}

function levelFromXp(xp) {
    let lvl = 1;
    let needed = xpForLevel(lvl);
    while (xp >= needed && lvl < 30) {
        xp -= needed;
        lvl++;
        needed = xpForLevel(lvl);
    }
    return lvl;
}

// ─── Damage Formula ─────────────────────────────────────────────────────
function calcCombatDamage(atk, def, critChance, bonuses) {
    const base = Math.max(1, atk - def * 0.4 + Math.random() * 3);
    const isCrit = Math.random() < (critChance || 0.05);
    const critMult = isCrit ? 2.0 : 1.0;
    const bonusMult = 1.0 + (bonuses || 0);
    return { damage: Math.floor(base * critMult * bonusMult), crit: isCrit };
}

function calcHealAmount(baseHeal, implantPower) {
    return Math.floor(baseHeal * (1 + (implantPower || 0) * 0.02));
}

function rollLootTable(table, luck) {
    const roll = Math.random() * 100;
    let cumulative = 0;
    const rarities = ['legendary', 'epic', 'rare', 'uncommon', 'common'];
    for (const rarity of rarities) {
        if (!table[rarity]) continue;
        cumulative += table[rarity].weight || 0;
        if (roll < cumulative) {
            const items = table[rarity].items || [];
            const item = items.length > 0 ? items[Math.floor(Math.random() * items.length)] : null;
            const crMin = table[rarity].cr ? table[rarity].cr[0] || 0 : 0;
            const crMax = table[rarity].cr ? table[rarity].cr[1] || 0 : 0;
            const cr = crMin + Math.floor(Math.random() * (crMax - crMin));
            return { rarity, item, credits: cr, bonus: Math.floor(cr * (luck || 0) * 0.1) };
        }
    }
    return { rarity: 'common', item: null, credits: 1, bonus: 0 };
}

function generateEnemyFromZone(zone, playerLevel) {
    const zoneData = ZONE_DATA_EXT[zone] || ZONE_DATA_EXT.matrix;
    const types = Object.keys(ENEMY_TYPES_EXT);
    const typeKey = types[Math.floor(Math.random() * types.length)];
    const template = ENEMY_TYPES_EXT[typeKey];
    const level = Math.max(zoneData.minLvl, Math.min(zoneData.maxLvl, playerLevel));
    const scale = 1 + (level - 1) * (template.scaling - 1);
    return {
        id: generateId(),
        name: template.name,
        type: template.type,
        hp: Math.floor(template.base_hp * scale),
        maxHp: Math.floor(template.base_hp * scale),
        dmg: Math.floor(template.base_dmg * scale),
        level: level,
        abilities: template.abilities || [],
        zone: zone,
        loot: template.loot,
        isDead: false,
    };
}

function calculateCombatRound(player, enemy, bonuses) {
    const pAtk = player.atk || 10;
    const pDef = player.def || 5;
    const pCrit = player.crit_chance || 0.05;
    const eAtk = enemy.dmg || 5;
    const eDef = enemy.def || 2;
    const playerDmg = calcCombatDamage(pAtk, eDef, pCrit, bonuses?.atkBonus || 0);
    const enemyDmg = calcCombatDamage(eAtk, pDef, 0.1, bonuses?.enemyAtkBonus || 0);
    const playerDodged = Math.random() < (player.dodge || 0.05);
    const enemyDodged = Math.random() < (enemy.dodge || 0.05);
    return {
        playerDmg: playerDodged ? 0 : playerDmg.damage,
        enemyDmg: enemyDodged ? 0 : enemyDmg.damage,
        playerCrit: playerDmg.crit && !playerDodged,
        enemyCrit: enemyDmg.crit && !enemyDodged,
        playerDodged,
        enemyDodged,
    };
}

function computeEffectiveStats(player, equipment, skills, buffs) {
    const base = {
        atk: player.attack || 10, def: player.defense || 5,
        hp: player.health || 100, maxHp: player.max_health || 100,
        energy: player.energy || 100, maxEnergy: player.max_energy || 100,
        crit: player.crit_chance || 0.05, critDmg: player.crit_damage || 1.5,
        hack: player.hacking_power || 5, hackDef: player.hacking_defense || 5,
        dodge: 0.05, speed: 10,
    };
    if (equipment) {
        Object.values(equipment).forEach(item => {
            if (!item) return;
            if (item.atk) base.atk += item.atk;
            if (item.def) base.def += item.def;
            if (item.hack) base.hack += item.hack;
            if (item.hp) base.maxHp += item.hp;
            if (item.crit) base.crit += item.crit * 0.01;
            if (item.spd) base.speed += item.spd;
        });
    }
    if (skills) {
        skills.forEach(s => {
            if (s.id === 'combat1') base.dodge += s.lvl * 0.01;
            if (s.id === 'combat3') base.critDmg += s.lvl * 0.08;
            if (s.id === 'hack1') base.hack += s.lvl * 2;
            if (s.id === 'hack2') base.hackDef += s.lvl * 3;
        });
    }
    if (buffs) {
        Object.entries(buffs).forEach(([k, v]) => { if (base[k] !== undefined) base[k] += v; });
    }
    return base;
}

function calculateDropRate(enemyType, playerLuck) {
    const base = { sentry: 0.2, hunter: 0.3, phantom: 0.35, overlord: 0.8, guardian: 0.5, viral: 0.4, ai_fragment: 1.0 };
    const rate = base[enemyType] || 0.2;
    return Math.min(1.0, rate + (playerLuck || 0) * 0.01);
}

function generateDrop(enemyType, playerLevel, luck) {
    if (Math.random() > calculateDropRate(enemyType, luck)) return null;
    const rarities = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
    const weights = [50, 30, 15, 4, 1];
    const total = weights.reduce((a, b) => a + b, 0);
    const roll = Math.random() * total;
    let cumulative = 0;
    for (let i = 0; i < rarities.length; i++) {
        cumulative += weights[i];
        if (roll < cumulative) {
            const pool = LOOT_TABLES_EXT[enemyType === 'ai_fragment' ? 'deep_web' : 'corpnet'] || LOOT_TABLES_EXT.matrix;
            const table = pool[rarities[i]];
            if (!table) return { rarity: rarities[i], item: null, credits: playerLevel * 5 };
            const items = table.items || [];
            return {
                rarity: rarities[i],
                item: items.length > 0 ? items[Math.floor(Math.random() * items.length)] : null,
                credits: (table.cr ? table.cr[0] + Math.floor(Math.random() * (table.cr[1] - table.cr[0])) : playerLevel * 10) + Math.floor(playerLevel * luck * 0.5),
                bonusItem: Math.random() < 0.1 ? 'Data Shard' : null,
            };
        }
    }
    return { rarity: 'common', item: null, credits: playerLevel * 3 };
}

function simulateAutoCombat(playerStats, enemyStats, maxRounds) {
    const rounds = [];
    let pHp = playerStats.maxHp || 100, eHp = enemyStats.hp || 30;
    const pAtk = playerStats.atk || 10, pDef = playerStats.def || 5, pCrit = playerStats.crit || 0.05;
    const eAtk = enemyStats.dmg || 5, eDef = enemyStats.def || 2;
    for (let i = 0; i < (maxRounds || 20); i++) {
        const pDmg = Math.max(0, calcCombatDamage(pAtk, eDef, pCrit).damage + Math.floor(Math.random() * 3));
        const eDmg = Math.max(0, calcCombatDamage(eAtk, pDef, 0.1).damage);
        eHp -= pDmg;
        pHp -= eDmg;
        rounds.push({ round: i + 1, pDmg, eDmg, pHp: Math.max(0, pHp), eHp: Math.max(0, eHp) });
        if (eHp <= 0 || pHp <= 0) break;
    }
    return { rounds, victory: eHp <= 0, playerSurvived: pHp > 0, totalRounds: rounds.length };
}

function calculateReputationLevel(rep) {
    if (rep >= 2000) return { level: 6, title: 'Legend', perks: ['30% discount', 'Faction title', 'Unique implant'] };
    if (rep >= 1000) return { level: 5, title: 'Master', perks: ['20% discount', 'Unique implant'] };
    if (rep >= 600) return { level: 4, title: 'Elite', perks: ['15% discount', 'Rep bonus'] };
    if (rep >= 300) return { level: 3, title: 'Respected', perks: ['10% discount', 'Exclusive items'] };
    if (rep >= 100) return { level: 2, title: 'Trusted', perks: ['5% discount'] };
    return { level: 1, title: 'Novice', perks: [] };
}

function calculateMissionReward(difficulty, playerLevel, factionBonus) {
    const base = { easy: { cr: 50, xp: 25 }, normal: { cr: 150, xp: 75 }, hard: { cr: 400, xp: 200 }, epic: { cr: 1000, xp: 500 }, legendary: { cr: 3000, xp: 1500 } };
    const b = base[difficulty] || base.normal;
    const scale = 1 + (playerLevel - 1) * 0.2;
    const factionMult = 1 + (factionBonus || 0) * 0.1;
    return {
        cr: Math.floor(b.cr * scale * factionMult),
        xp: Math.floor(b.xp * scale * factionMult),
        rep: Math.floor(10 * scale * factionMult),
    };
}

function getMissionDifficulty(playerLevel, zone) {
    const zoneDiff = { matrix: 'easy', firewall: 'normal', corpnet: 'normal', darknet: 'hard', deep_web: 'hard', core: 'epic' };
    const base = zoneDiff[zone] || 'normal';
    if (playerLevel >= 20) return base === 'normal' ? 'hard' : base;
    if (playerLevel >= 10) return base;
    return 'easy';
}

function calculateCraftSuccess(recipe, playerLevel, craftingMod) {
    const baseChance = { common: 0.95, uncommon: 0.85, rare: 0.70, epic: 0.50, legendary: 0.30 };
    const chance = baseChance[recipe.rarity] || 0.7;
    const levelBonus = Math.min(0.2, playerLevel * 0.005);
    const modBonus = (craftingMod || 0) * 0.02;
    return Math.min(0.99, chance + levelBonus + modBonus);
}

function calculateBarterPrice(basePrice, repLevel, charisma) {
    const repDiscount = (repLevel || 1) * 0.05;
    const charismaBonus = (charisma || 0) * 0.01;
    const discount = Math.min(0.5, repDiscount + charismaBonus);
    return Math.max(1, Math.floor(basePrice * (1 - discount)));
}

function getHeatMultiplier(currentHeat, zone) {
    const threshold = getZoneHeatThreshold(zone);
    if (currentHeat >= threshold * 2) return 3.0;
    if (currentHeat >= threshold * 1.5) return 2.0;
    if (currentHeat >= threshold) return 1.5;
    return 1.0;
}

function generateBountyHunter(heat, playerLevel) {
    const names = ['Bounty Bot-1', 'Hunter Killer', 'NetWatch Agent', 'Corporate Enforcer', 'AI Terminator'];
    const level = Math.min(30, Math.max(1, playerLevel + Math.floor(heat / 100)));
    return {
        name: names[Math.floor(Math.random() * names.length)],
        hp: 40 + heat * 2 + level * 5,
        dmg: 8 + heat + level * 2,
        level,
        type: 'bounty_hunter',
        bounty: 100 + heat * 5 + level * 20,
        abilities: ['pursuit', 'stun', 'mark'],
    };
}

function checkAchievementUnlocks(achievements, stats) {
    const newlyUnlocked = [];
    achievements.forEach(a => {
        if (a.done || a.claimed) return;
        let done = false;
        if (a.condition === 'level' && (stats.level || 1) >= (a.value || 1)) done = true;
        if (a.condition === 'kill' && (stats.kills || 0) >= (a.value || 1)) done = true;
        if (a.condition === 'credits' && (stats.credits || 0) >= (a.value || 1)) done = true;
        if (a.condition === 'pvp_wins' && (stats.pvp_wins || 0) >= (a.value || 1)) done = true;
        if (a.condition === 'craft' && (stats.items_crafted || 0) >= (a.value || 1)) done = true;
        if (done) { a.done = true; newlyUnlocked.push(a); }
    });
    return newlyUnlocked;
}

// ─── Save/Load System ────────────────────────────────────────────────────
const SAVE_KEY = 'neon_protocol_save';

function saveGameState() {
    try {
        const state = {
            character: game?.character?.character || {},
            inventory: game?.playerInventory || [],
            materials: game?.playerMaterials || {},
            equipment: game?.equippedItems || {},
            skills: game?.skillTree || [],
            achievements: game?.playerAchievements || [],
            quests: game?.activeQuests || [],
            challenges: game?.dailyChallenges || [],
            settings: { sound: game?.soundEnabled, music: game?.musicEnabled, particles: game?.particlesEnabled },
            timestamp: Date.now(),
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(state));
        return true;
    } catch(e) { return false; }
}

function loadGameState() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return null;
        const state = JSON.parse(raw);
        if (state.timestamp && Date.now() - state.timestamp > 86400000) {
            state.dailyChallenges = null;
        }
        return state;
    } catch(e) { return null; }
}

function autoSaveLoop() {
    if (game && game.autoSave !== false) {
        saveGameState();
    }
    setTimeout(autoSaveLoop, 30000);
}

// ─── Network Helpers ─────────────────────────────────────────────────────
async function apiFetch(endpoint, method, body) {
    try {
        const opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(CFG.API + endpoint, opts);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
    } catch(e) {
        console.warn('API error:', endpoint, e.message);
        return null;
    }
}

async function syncWithServer() {
    const data = await apiFetch('/sync', 'POST', { state: loadGameState() });
    if (data && data.character) {
        if (game) game.character = { character: data.character };
        return data;
    }
    return null;
}

function formatDuration(seconds) {
    if (seconds < 60) return seconds + 's';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
    return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
}

function formatLargeNumber(n) {
    if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toString();
}

function formatPercentage(val) {
    return (val * 100).toFixed(1) + '%';
}

function formatStatBlock(stats) {
    return Object.entries(stats).filter(([k, v]) => v && v > 0).map(([k, v]) => {
        const labels = { atk: 'ATK', def: 'DEF', hack: 'HACK', spd: 'SPD', crit: 'CRIT', hp: 'HP', dodge: 'DODGE' };
        return (labels[k] || k) + ' +' + v;
    }).join(' | ');
}

function shortenName(name, maxLen) {
    if (!name) return '';
    return name.length > maxLen ? name.substring(0, maxLen - 1) + '..' : name;
}

// ─── Color and Theme Helpers ────────────────────────────────────────────
function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha || 1) + ')';
}

function colorLerp(c1, c2, t) {
    const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
    const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
    const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function getRarityGlow(rarity) {
    const map = { common: 'rgba(170,170,170,0.3)', uncommon: 'rgba(0,255,0,0.3)', rare: 'rgba(0,255,255,0.3)', epic: 'rgba(255,0,255,0.3)', legendary: 'rgba(255,255,0,0.3)' };
    return map[rarity] || map.common;
}

function getTypeIcon(type) {
    const map = { program: '💻', implant: '🧬', weapon: '⚔', armor: '🛡', consumable: '💊', material: '🔩', cyberware: '🔧', lootbox: '📦', program: '💾' };
    return map[type] || '❓';
}

function getRarityStars(rarity) {
    const map = { common: '★', uncommon: '★★', rare: '★★★', epic: '★★★★', legendary: '★★★★★' };
    return map[rarity] || '★';
}

        materials: {},
        equipment: {},
        skills: [],
        achievements: [],
        quests: [],
        settings: { sound: true, music: true, particles: true },
    };
}

function mergeGameState(saved, defaults) {
    const result = JSON.parse(JSON.stringify(defaults));
    if (!saved) return result;
    if (saved.character) Object.assign(result.character, saved.character);
    if (saved.inventory) result.inventory = saved.inventory;
    if (saved.materials) result.materials = saved.materials;
    if (saved.equipment) result.equipment = saved.equipment;
    if (saved.skills) result.skills = saved.skills;
    if (saved.achievements) result.achievements = saved.achievements;
    if (saved.quests) result.quests = saved.quests;
    if (saved.settings) Object.assign(result.settings, saved.settings);
    return result;
}

function rollLoot(zone, luckMod) {
    const table = LOOT_TABLES[zone] || LOOT_TABLES.matrix;
    const items = [];
    const roll = Math.random();
    const pool = roll < 0.2 + (luckMod || 0) ? table.rare : table.common;
    const totalWeight = pool.reduce((s, i) => s + i.weight, 0);
    let r = Math.random() * totalWeight;
    for (const entry of pool) {
        r -= entry.weight;
        if (r <= 0) {
            const qty = entry.qty[0] + Math.floor(Math.random() * (entry.qty[1] - entry.qty[0] + 1));
            items.push({ ...entry, qty });
            break;
        }
    }
    if (Math.random() < 0.1 + (luckMod || 0) * 0.5) {
        items.push({ id: 'rare_treasure', name: 'Rare Treasure', qty: 1, rarity: 'rare' });
    }
    return items;
}

];

function getItemQuality(itemLevel) {
    let best = ITEM_QUALITIES[0];
    for (const q of ITEM_QUALITIES) {
        if (itemLevel >= q.minLvl) best = q;
    }
    return best;
}

function calculateItemValue(baseValue, quality) {
    return Math.floor(baseValue * quality.mult);
}

function enhanceItem(item, enhancementLevel) {
    const maxEnhance = 15;
    const newLevel = Math.min(maxEnhance, (item.enhance || 0) + enhancementLevel);
    const costMult = 1 + newLevel * 0.5;
    const statMult = 1 + newLevel * 0.1;
    return {
        ...item,
        enhance: newLevel,
        atk: item.atk ? Math.floor(item.atk * statMult) : undefined,
        def: item.def ? Math.floor(item.def * statMult) : undefined,
        hack: item.hack ? Math.floor(item.hack * statMult) : undefined,
        enhanceCost: Math.floor(100 * costMult),
    };
}

// ─── Achievement Reward Calculator ──────────────────────────────────────
function calculateAchievementReward(achievement, playerLevel) {
    const base = { common: 50, uncommon: 150, rare: 400, epic: 1000, legendary: 3000 };
    const r = achievement.rarity || 'common';
    const b = base[r] || 50;
    const levelMult = 1 + (playerLevel || 1) * 0.1;
    return {
        cr: Math.floor(b * levelMult),
        xp: Math.floor(b * 0.5 * levelMult),
        rep: achievement.faction ? Math.floor(10 * levelMult) : 0,
    };
}

function getAchievementRarity(difficulty) {
    if (difficulty >= 100) return 'legendary';
    if (difficulty >= 60) return 'epic';
    if (difficulty >= 30) return 'rare';
    if (difficulty >= 10) return 'uncommon';
    return 'common';
}

function computePlayerPowerLevel(stats, equipment, skills) {
    let power = (stats.atk || 10) * 2 + (stats.def || 5) * 1.5 + (stats.hp || 100) * 0.1;
    power += (stats.hack || 5) * 3 + (stats.crit || 0.05) * 100;
    if (equipment) {
        Object.values(equipment).forEach(item => {
            if (item) power += (item.atk || 0) * 2 + (item.def || 0) * 1.5 + (item.hack || 0) * 3;
        });
    }
    if (skills) {
        skills.forEach(s => { power += s.lvl * 5; });
    }
    return Math.floor(power);
}

function getDifficultyForPower(power) {
    if (power >= 500) return { label: 'Legendary', mult: 3.0, color: '#ff0' };
    if (power >= 300) return { label: 'Epic', mult: 2.0, color: '#f0f' };
    if (power >= 150) return { label: 'Hard', mult: 1.5, color: '#f00' };
    if (power >= 50) return { label: 'Normal', mult: 1.0, color: '#ff0' };
    return { label: 'Easy', mult: 0.5, color: '#0f0' };
}

// ─── Inventory Sorting and Filtering ────────────────────────────────────
function sortInventory(items, sortBy) {
    const sorted = [...items];
    switch (sortBy) {
        case 'name': sorted.sort((a, b) => (a.name || '').localeCompare(b.name || '')); break;
        case 'rarity': sorted.sort((a, b) => { const r = { legendary: 5, epic: 4, rare: 3, uncommon: 2, common: 1 }; return (r[b.rarity] || 0) - (r[a.rarity] || 0); }); break;
        case 'type': sorted.sort((a, b) => (a.type || '').localeCompare(b.type || '')); break;
        case 'level': sorted.sort((a, b) => (b.lvl || 1) - (a.lvl || 1)); break;
        default: break;
    }
    return sorted;
}

function filterInventory(items, filters) {
    return items.filter(item => {
        if (filters.rarity && item.rarity !== filters.rarity) return false;
        if (filters.type && item.type !== filters.type) return false;
        if (filters.search) {
            const q = filters.search.toLowerCase();
            if (!item.name?.toLowerCase().includes(q)) return false;
        }
        if (filters.minLvl && (item.lvl || 1) < filters.minLvl) return false;
        return true;
    });
}

// ─── Market Price Calculator ────────────────────────────────────────────
function calculateMarketPrice(basePrice, supply, demand, volatility) {
    const supplyFactor = Math.max(0.5, Math.min(2.0, 1000 / (supply || 100)));
    const demandFactor = Math.max(0.5, Math.min(2.0, (demand || 100) / 100));
    const vol = 1 + (Math.random() - 0.5) * (volatility || 0.1);
    return Math.max(1, Math.floor(basePrice * supplyFactor * demandFactor * vol));
}

function calculateSellPrice(buyPrice, taxRate) {
    const tax = taxRate || 0.05;
    return Math.max(1, Math.floor(buyPrice * (1 - tax)));
}

function calculateTradeProfit(buyPrice, sellPrice, quantity) {
    return (sellPrice - buyPrice) * Math.max(1, quantity);
}

// ─── Quest Progress Tracker ─────────────────────────────────────────────
function updateQuestProgress(quests, event) {
    const updated = [];
    quests.forEach(q => {
        if (q.completed) return;
        (q.goals || []).forEach(goal => {
            if (goal.type === event.type && (!goal.target || goal.target === event.target)) {
                goal.current = (goal.current || 0) + (event.amount || 1);
            }
        });
        const allDone = (q.goals || []).every(g => (g.current || 0) >= (g.count || 1));
        if (allDone && !q.completed) {
            q.completed = true;
            updated.push(q);
        }
    });
    return updated;
}

// ─── Combat Encounter Difficulty Scaling ────────────────────────────────
function scaleEnemyForPlayer(enemy, playerLevel, difficultyMult) {
    const mult = difficultyMult || 1.0;
    return {
        ...enemy,
        hp: Math.floor(enemy.hp * (1 + (playerLevel - 1) * 0.15 * mult)),
        maxHp: Math.floor(enemy.maxHp * (1 + (playerLevel - 1) * 0.15 * mult)),
        dmg: Math.floor(enemy.dmg * (1 + (playerLevel - 1) * 0.12 * mult)),
        level: Math.max(1, enemy.level + Math.floor((playerLevel - 1) * 0.5)),
        scaled: true,
    };
}

// ─── Crafting Success / Failure Effects ────────────────────────────────
function applyCraftingResult(recipe, success, playerLevel) {
    if (success) {
        const qualityBonus = Math.random() < 0.1 + playerLevel * 0.005 ? 1.2 : 1.0;
        return {
            success: true,
            item: { ...recipe.result, name: recipe.name, rarity: recipe.rarity, lvl: recipe.lvl, quality: qualityBonus },
            bonusXp: Math.floor(recipe.lvl * 10 * qualityBonus),
            message: 'Crafting successful!',
        };
    } else {
        const salvageChance = 0.3 + playerLevel * 0.01;
        const salvaged = Math.random() < salvageChance;
        return {
            success: false,
            salvaged: salvaged ? recipe.materials?.map(m => ({ id: m.id, qty: Math.floor(m.qty / 2) })) : [],
            message: salvaged ? 'Partial salvage' : 'All materials lost!',
        };
    }
}

function getCraftingBonusForStation(stationLevel) {
    return {
        successRate: 0.05 * stationLevel,
        qualityChance: 0.02 * stationLevel,
        xpBonus: 10 * stationLevel,
        timeReduction: 0.1 * stationLevel,
    };
}

const GAME_SCHEDULER = {
    tasks: [],
    add(name, interval, callback) {
        this.tasks.push({ name, interval, callback, lastRun: Date.now(), enabled: true });
    },
    update() {
        const now = Date.now();
        this.tasks.forEach(task => {
            if (!task.enabled) return;
            if (now - task.lastRun >= task.interval) {
                try { task.callback(); } catch(e) { console.warn('Scheduler task error:', task.name, e); }
                task.lastRun = now;
            }
        });
    },
    remove(name) { this.tasks = this.tasks.filter(t => t.name !== name); },
    enable(name) { const t = this.tasks.find(t => t.name === name); if (t) t.enabled = true; },
    disable(name) { const t = this.tasks.find(t => t.name === name); if (t) t.enabled = false; },
};

const AUDIO_MANAGER = {
    ctx: null,
    initialized: false,
    volume: 0.3,
    musicVolume: 0.1,
    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
        } catch(e) { this.initialized = false; }
    },
    play(freq, type, duration, vol) {
        if (!this.initialized || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.value = freq || 440;
        osc.type = type || 'square';
        gain.gain.value = (vol || this.volume) * 0.3;
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + (duration || 0.1));
        osc.start(); osc.stop(this.ctx.currentTime + (duration || 0.1));
    },
    playMelody(notes, baseFreq) {
        notes.forEach((note, i) => {
            setTimeout(() => {
                this.play(baseFreq + note * 50, 'square', 0.15, this.volume * 0.5);
            }, i * 100);
        });
    },
    playClick() { this.play(800, 'square', 0.05); },
    playHack() { this.play(400, 'sawtooth', 0.2); },

// ─── Particle Effects ──────────────────────────────────────────────────
class Particle {
    constructor(x, y, vx, vy, life, color, size, type) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life; this.color = color || '#0ff';
        this.size = size || 3; this.type = type || 'circle';
    }
    update(dt) {
        this.x += this.vx * (dt / 16);
        this.y += this.vy * (dt / 16);
        this.life -= dt;
        this.vy += 0.1;
    }
    draw(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        if (this.type === 'circle') {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2); ctx.fill();
        } else {
            ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
        }
        ctx.globalAlpha = 1;
    }
    get dead() { return this.life <= 0; }
}

class ParticleSystem {
    constructor() { this.particles = []; }
    emit(x, y, count, color, spread, life, size, type) {
        for (let i = 0; i < (count || 10); i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * (spread || 3);
            this.particles.push(new Particle(
                x + (Math.random() - 0.5) * 10,
                y + (Math.random() - 0.5) * 10,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                life || 500 + Math.random() * 500,
                color || '#0ff',
                size || 2 + Math.random() * 2,
                type || 'circle'
            ));
        }
    }
    update(dt) {
        this.particles.forEach(p => p.update(dt));
        this.particles = this.particles.filter(p => !p.dead);
    }
    draw(ctx) {
        this.particles.forEach(p => p.draw(ctx));
    }
    get count() { return this.particles.length; }
}

// ─── Damage Calculation ────────────────────────────────────────────────
function calculateDamage(attacker, defender, modifiers) {
    const baseAtk = attacker.atk || 10;
    const baseDef = defender.def || 5;
    const critChance = (attacker.crit || 0.05) + (modifiers?.critBonus || 0);
    const critMult = (attacker.critMult || 1.5) + (modifiers?.critDamageBonus || 0);
    const isCrit = Math.random() < critChance;
    const rawDamage = Math.max(1, baseAtk - baseDef * 0.5 + (Math.random() - 0.5) * 5);
    const damage = isCrit ? Math.floor(rawDamage * critMult) : Math.floor(rawDamage);
    const elemental = computeElementalDamage(attacker, defender, modifiers);
    return {
        physical: damage,
        elemental: elemental,
        total: damage + elemental,
        crit: isCrit,
        blocked: Math.random() < (defender.block || 0),
        dodged: Math.random() < (defender.evasion || 0),
    };
}

function computeElementalDamage(attacker, defender, modifiers) {
    const atkEle = attacker.elemental || 0;
    const defRes = defender.resistance || 0;
    const effectiveness = modifiers?.elementEffect || 1.0;
    return Math.max(0, Math.floor((atkEle - defRes * 0.3 + (Math.random() - 0.5) * 2) * effectiveness));
}

function applyDamageResult(target, result, game) {
    if (result.blocked) return { blocked: true, message: 'Blocked!', damage: 0 };
    if (result.dodged) return { dodged: true, message: 'Dodged!', damage: 0 };
    target.hp = Math.max(0, (target.hp || 0) - result.total);
    if (result.crit && game) game.showNotification('CRIT! ' + result.total + ' dmg', '#f0f');
    return { damage: result.total, crit: result.crit, message: '-' + result.total + ' HP' };
}

    const size = Math.min(8, 3 + Math.floor(difficulty || 1));

    for (let i = 0; i < size; i++) {
        sequence.push(Math.floor(Math.random() * 4));
    }
    return {
        sequence,
        size,
        playerIndex: 0,
        playerSequence: [],
        started: false,
        timeLimit: 2000 + (size * 500),
        startTime: 0,
        done: false,
        success: false,
        difficulty: difficulty || 1,
    };
}

function checkMatrixInput(gameState, direction) {
    if (gameState.done || !gameState.started) return null;
    const expected = gameState.sequence[gameState.playerIndex];
    if (direction === expected) {
        gameState.playerIndex++;
        if (gameState.playerIndex >= gameState.sequence.length) {
            gameState.done = true;
            gameState.success = true;
        }
        return true;
    } else {
        gameState.done = true;
        gameState.success = false;
        return false;
    }
}

// ─── Save / Data Migration ─────────────────────────────────────────────
function migrateSaveData(data) {
    if (!data || typeof data !== 'object') return null;
    const version = data.saveVersion || 0;
    if (version < 1) {
        data.character = data.character || data.player || {};
        data.character.inventory = data.character.inventory || [];
        data.character.equipment = data.character.equipment || {};
        data.character.skills = data.character.skills || [];
        data.character.missions = data.character.missions || [];
        data.meta = data.meta || {};
    }
    if (version < 2) {
        data.character.achievements = data.character.achievements || [];
        data.character.reputation = data.character.reputation || {};
        data.character.battle_pass_level = data.character.battle_pass_level || 0;
        data.character.battle_pass_xp = data.character.battle_pass_xp || 0;
    }
    if (version < 3) {
        data.character.collected_titles = data.character.collected_titles || [];
        data.character.active_title = data.character.active_title || '';
        data.character.stats = data.character.stats || {};
    }
    data.saveVersion = Math.max(version, 3);
    return data;
}

function verifySaveIntegrity(data) {
    const checks = [];
    if (!data.character) checks.push('Missing character data');
    if (typeof data.character?.credits !== 'number') checks.push('Invalid credits');
    if (typeof data.character?.level !== 'number') checks.push('Invalid level');
    if (!Array.isArray(data.character?.inventory)) checks.push('Invalid inventory');
    if (data.character?.hp <= 0) checks.push('Character is dead');
    return checks.length === 0 ? { valid: true } : { valid: false, errors: checks };
}

function getStatForLevel(stat, level) {
    const table = SCALING_TABLE[stat] || SCALING_TABLE.hpPerLevel;
    return table[Math.min(level, table.length - 1)] || (table[table.length - 1] + (level - table.length) * table[table.length - 1] * 0.1);
}

function scaleStat(base, level, scaleFactor) {
    return Math.floor(base * (1 + (level - 1) * (scaleFactor || 0.1)));

// ─── Idle / Offline Progress ───────────────────────────────────────────
function calculateOfflineProgress(player, secondsAway) {
    const cappedSeconds = Math.min(secondsAway, 28800);
    const power = computePlayerPowerLevel(player.stats, player.equipment, player.skills);
    const earnRate = Math.max(0.1, power * 0.01);
    const creditsEarned = Math.floor(cappedSeconds * earnRate * 0.5);
    const xpEarned = Math.floor(cappedSeconds * earnRate * 0.25);
    const enemyKills = Math.floor(cappedSeconds / (60 + Math.random() * 60));
    const lootItems = [];
    if (enemyKills > 0 && Math.random() < 0.1) {
        lootItems.push({ name: 'Offline Cache', type: 'material', rarity: 'common', qty: 1 });
    }
    return {
        secondsAway: cappedSeconds,
        creditsEarned,
        xpEarned,
        enemyKills,
        lootItems,

// ─── Clan System ───────────────────────────────────────────────────────
function createClan(name, tag, founder) {
    return {
        id: generateId(),
        name,
        tag,
        founder: founder,
        members: [{ id: founder, role: 'leader', joinedAt: Date.now() }],

        created: Date.now(),

        logo: '⚔',
    };
}

function getClanLevelXp(level) {
    return 1000 + (level - 1) * 500;
}

function addClanExperience(clan, amount) {
    clan.experience = (clan.experience || 0) + amount;
    const needed = getClanLevelXp(clan.level);
    if (clan.experience >= needed) {
        clan.experience -= needed;
        clan.level++;
        return { leveled: true, newLevel: clan.level };
    }
    return { leveled: false, newLevel: clan.level };
}

function getClanPerks(level) {
    return {
        maxMembers: 5 + level * 2,
        treasuryBonus: level * 0.05,
        xpBonus: level * 0.02,
        warSlots: 1 + Math.floor(level / 3),
        vaultSlots: 10 + level * 5,
    };
}

// ─── Tournament / Event System ─────────────────────────────────────────
function generateTournament(tier, playerLevel) {
    const participantsCount = 4 + tier * 2;
    const participants = [];
    for (let i = 0; i < participantsCount; i++) {
        participants.push({
            name: 'Runner_' + Math.random().toString(36).substring(2, 6),
            power: Math.floor(playerLevel * (5 + Math.random() * 5)),
            level: Math.max(1, playerLevel + Math.floor(Math.random() * 5 - 2)),
        });
    }
    return {
        id: generateId(),
        tier,
        participants,
        brackets: [],
        currentRound: 0,
        finished: false,
        rewards: {
            cr: 500 * tier * playerLevel,
            xp: 250 * tier * playerLevel,
            topPrize: 2000 * tier * playerLevel,
        },
    };
}

function simulateTournamentBracket(tournament, playerPower) {
    const participants = tournament.participants;
    const brackets = [];
    const shuffled = [...participants].sort(() => Math.random() - 0.5);
    for (let i = 0; i < shuffled.length; i += 2) {
        if (i + 1 < shuffled.length) {
            brackets.push({ p1: shuffled[i], p2: shuffled[i + 1], winner: null });
        } else {
            brackets.push({ p1: shuffled[i], p2: { name: 'BYE', power: 0, level: 1 }, winner: shuffled[i] });
        }
    }
    tournament.brackets = brackets;
    tournament.currentRound = 1;
    return brackets;
}

function simulateMatch(p1, p2) {
    const p1Score = p1.power + Math.random() * 20;
    const p2Score = p2.power + Math.random() * 20;
    return p1Score >= p2Score ? { winner: p1, loser: p2, score: Math.floor(p1Score) + '-' + Math.floor(p2Score) } : { winner: p2, loser: p1, score: Math.floor(p2Score) + '-' + Math.floor(p1Score) };
}

// ─── Quest Reward Calculator ───────────────────────────────────────────
function calculateQuestReward(quest, playerLevel, difficultyMult) {
    const mult = difficultyMult || 1.0;
    const base = quest.rewards || { cr: 100, xp: 50 };
    const scaledCr = Math.floor((base.cr || 100) * (1 + playerLevel * 0.15) * mult);
    const scaledXp = Math.floor((base.xp || 50) * (1 + playerLevel * 0.12) * mult);
    const bonusItems = [];
    if (Math.random() < 0.1 + playerLevel * 0.005) {
        bonusItems.push({ name: 'Quest Cache', type: 'material', rarity: 'uncommon', qty: 1 });
    }
    if (Math.random() < 0.02 + playerLevel * 0.002) {
        bonusItems.push({ name: 'Rare Token', type: 'currency', rarity: 'rare', qty: 1 });
    }
    return { cr: scaledCr, xp: scaledXp, items: bonusItems };
}

// ─── Faction Reputation ────────────────────────────────────────────────
function addReputation(factionId, amount, reputation) {
    const current = reputation[factionId] || 0;
    const newValue = Math.min(1000, Math.max(-1000, current + amount));
    reputation[factionId] = newValue;
    const tier = getReputationTier(newValue);
    return { factionId, oldValue: current, newValue, tier, changed: current !== newValue };
}

function getReputationTier(value) {
    if (value >= 900) return { name: 'Legendary', mult: 3.0, color: '#ff0' };
    if (value >= 700) return { name: 'Honored', mult: 2.0, color: '#f0f' };
    if (value >= 500) return { name: 'Friendly', mult: 1.5, color: '#0f0' };
    if (value >= 200) return { name: 'Neutral', mult: 1.0, color: '#888' };
    if (value >= -200) return { name: 'Unfriendly', mult: 0.8, color: '#f80' };
    if (value >= -500) return { name: 'Hostile', mult: 0.5, color: '#f00' };
    return { name: 'Hated', mult: 0.2, color: '#800' };
}

function getReputationPerks(factionId, reputation) {
    const value = reputation[factionId] || 0;
    const tier = getReputationTier(value);
    const perks = [];
    if (value >= 100) perks.push('Shop discount 10%');
    if (value >= 300) perks.push('Unlock faction quests');
    if (value >= 500) perks.push('Faction equipment 20% off');
    if (value >= 700) perks.push('Unlock faction titles');
    if (value >= 900) perks.push('Legendary faction rewards');
    if (value <= -200) perks.push('Faction hunters after you!');
    return { tier, perks };
}

// ─── Battle Pass System ────────────────────────────────────────────────
const BATTLE_PASS_TIERS = Array.from({ length: 50 }, (_, i) => ({
    tier: i + 1,
    xpRequired: 100 + i * 25,
    reward: i % 5 === 0
        ? { cr: 500 + i * 100, xp: 200 + i * 50, premium: true, item: 'Battle Pass Crate #' + (i + 1) }
        : { cr: 100 + i * 50, xp: 50 + i * 25, premium: false },
}));

function getBattlePassReward(tier, isPremium) {
    const data = BATTLE_PASS_TIERS[tier - 1];
    if (!data) return null;
    if (data.reward.premium && !isPremium) return { cr: Math.floor(data.reward.cr * 0.5), xp: Math.floor(data.reward.xp * 0.5), premium: false };
    return data.reward;
}

function getBattlePassProgress(currentXp, currentTier) {
    const totalXp = currentXp || 0;
    let xp = totalXp;
    let tier = currentTier || 1;
    while (tier < 50) {
        const needed = BATTLE_PASS_TIERS[tier - 1]?.xpRequired || 100;
        if (xp >= needed) { xp -= needed; tier++; }
        else break;
    }
    const currentNeeded = BATTLE_PASS_TIERS[tier - 1]?.xpRequired || 100;
    return { tier: Math.min(tier, 50), xp, needed: currentNeeded, progress: Math.min(1, xp / currentNeeded), maxed: tier >= 50 };
}

// ─── Inventory Management ──────────────────────────────────────────────
function addItemToInventory(inventory, item, stackable) {
    if (stackable && item.id) {
        const existing = inventory.find(i => i.id === item.id && i.type === item.type);
        if (existing) {
            existing.qty = (existing.qty || 1) + (item.qty || 1);
            return { added: true, stacked: true, qty: existing.qty };
        }
    }
    inventory.push({ ...item, qty: item.qty || 1, uid: generateId() });
    return { added: true, stacked: false };
}

function removeItemFromInventory(inventory, uid, qty) {
    const idx = inventory.findIndex(i => i.uid === uid);
    if (idx === -1) return false;
    const item = inventory[idx];
    if (item.qty && item.qty > 1 && qty && qty < item.qty) {
        item.qty -= qty;
        return true;
    }
    inventory.splice(idx, 1);
    return true;
}

function getInventoryValue(inventory) {
    const rarityValues = { common: 10, uncommon: 25, rare: 100, epic: 500, legendary: 2000 };
    return inventory.reduce((sum, item) => {
        return sum + (rarityValues[item.rarity] || 10) * (item.qty || 1);
    }, 0);
}

function getInventoryCountByType(inventory, type) {
    return inventory.filter(i => i.type === type).reduce((sum, i) => sum + (i.qty || 1), 0);
}

// ─── Equipment Management ──────────────────────────────────────────────
function getEquipmentStats(equipment) {
    const stats = { atk: 0, def: 0, hack: 0, spd: 0, crit: 0 };
    Object.values(equipment || {}).forEach(item => {
        if (!item) return;
        stats.atk += item.atk || 0;
        stats.def += item.def || 0;
        stats.hack += item.hack || 0;
        stats.spd += item.spd || 0;
        stats.crit += item.crit || 0;
    });
    return stats;
}

function getEmptyEquipmentSlots(equipment) {
    const slots = ['weapon', 'armor', 'head', 'accessory', 'boots', 'implant'];
    return slots.filter(s => !equipment[s]);
}

function canEquipItem(item, playerLevel, equipment) {
    if (item.lvl && playerLevel < item.lvl) return { can: false, reason: 'Level too low' };
    if (equipment[item.slot]) return { can: false, reason: 'Slot occupied' };
    return { can: true };
}

// ─── Crafting System ───────────────────────────────────────────────────
function getAvailableRecipes(playerLevel, ownedCatalysts) {
    return RECIPES_DATA.filter(r => {
        if (r.lvl && playerLevel < r.lvl) return false;
        if (r.catalyst && !ownedCatalysts?.includes(r.catalyst)) return false;
        return true;
    });
}

function canCraftRecipe(recipe, inventory) {
    const materials = recipe.materials || [];
    for (const mat of materials) {
        const count = inventory.filter(i => i.id === mat.id || i.name === mat.name)
            .reduce((s, i) => s + (i.qty || 1), 0);
        if (count < (mat.qty || 1)) return { can: false, missing: mat.name };
    }
    return { can: true };
}

function consumeMaterials(recipe, inventory) {
    const materials = recipe.materials || [];
    materials.forEach(mat => {
        const qty = mat.qty || 1;
        let remaining = qty;
        while (remaining > 0) {
            const idx = inventory.findIndex(i => (i.id === mat.id || i.name === mat.name) && (i.qty || 1) > 0);
            if (idx === -1) break;
            const item = inventory[idx];
            if ((item.qty || 1) > remaining) {
                item.qty -= remaining;
                remaining = 0;
            } else {
                remaining -= item.qty || 1;
                inventory.splice(idx, 1);
            }
        }
    });
}

// ─── Random / Seed Helpers ─────────────────────────────────────────────
const RNG = {
    seed: Date.now(),
    setSeed(s) { this.seed = s; },
    next() {
        this.seed = (this.seed * 1664525 + 1013904223) & 0x7fffffff;
        return this.seed / 0x7fffffff;
    },
    nextInt(min, max) { return Math.floor(this.next() * (max - min + 1)) + min; },
    nextFloat(min, max) { return this.next() * (max - min) + min; },
    pick(arr) { return arr[Math.floor(this.next() * arr.length)]; },
    shuffle(arr) {
        const result = [...arr];
        for (let i = result.length - 1; i > 0; i--) {
            const j = Math.floor(this.next() * (i + 1));
            [result[i], result[j]] = [result[j], result[i]];
        }
        return result;
    },
};

// ─── Timer / Cooldown Manager ──────────────────────────────────────────
const TIMER_MANAGER = {
    timers: [],
    add(name, duration, callback, repeat) {
        const timer = { name, remaining: duration, duration, callback, repeat: repeat || false, paused: false, id: generateId() };
        this.timers.push(timer);
        return timer.id;
    },
    update(dt) {
        this.timers.forEach(t => {
            if (t.paused) return;
            t.remaining -= dt;
            if (t.remaining <= 0) {
                try { t.callback(); } catch(e) { console.warn('Timer error:', t.name, e); }
                if (t.repeat) t.remaining = t.duration;
                else t.done = true;
            }
        });
        this.timers = this.timers.filter(t => !t.done);
    },
    pause(name) { const t = this.timers.find(t => t.name === name); if (t) t.paused = true; },
    resume(name) { const t = this.timers.find(t => t.name === name); if (t) t.paused = false; },
    remove(name) { this.timers = this.timers.filter(t => t.name !== name); },
    clear() { this.timers = []; },
    getRemaining(name) { const t = this.timers.find(t => t.name === name); return t ? t.remaining : 0; },
};

// ─── Status Effect / Buff System ──────────────────────────────────────
function createStatusEffect(id, name, duration, type, magnitude, color, icon) {
    return { id, name, duration, remaining: duration, type, magnitude, color: color || '#0ff', icon: icon || '⚡', active: true };
}

const STATUS_EFFECTS = {
    poison: (magnitude) => createStatusEffect('poison', 'Poison', 5000, 'dot', magnitude || 5, '#0f0', '☠'),
    burn: (magnitude) => createStatusEffect('burn', 'Burn', 3000, 'dot', magnitude || 8, '#f80', '🔥'),
    freeze: (magnitude) => createStatusEffect('freeze', 'Freeze', 2000, 'debuff', magnitude || 0.5, '#0ff', '❄'),
    stun: (magnitude) => createStatusEffect('stun', 'Stun', 1500, 'debuff', magnitude || 1, '#ff0', '⚡'),
    shield: (magnitude) => createStatusEffect('shield', 'Shield', 5000, 'buff', magnitude || 20, '#00f', '🛡'),
    berserk: (magnitude) => createStatusEffect('berserk', 'Berserk', 4000, 'buff', magnitude || 0.3, '#f00', '💢'),
    regen: (magnitude) => createStatusEffect('regen', 'Regen', 5000, 'buff', magnitude || 5, '#0f0', '💚'),
    stealth: (magnitude) => createStatusEffect('stealth', 'Stealth', 8000, 'buff', magnitude || 1, '#808', '👻'),
    slow: (magnitude) => createStatusEffect('slow', 'Slow', 3000, 'debuff', magnitude || 0.5, '#888', '🐌'),
    weaken: (magnitude) => createStatusEffect('weaken', 'Weaken', 3000, 'debuff', magnitude || 0.5, '#f0f', '💫'),
};

function applyStatusEffect(target, effect) {
    if (!target.statusEffects) target.statusEffects = [];
    const existing = target.statusEffects.find(e => e.id === effect.id);
    if (existing) {
        existing.remaining = Math.max(existing.remaining, effect.duration);
        existing.magnitude = Math.max(existing.magnitude, effect.magnitude);
        return { refreshed: true, effect: existing };
    }
    target.statusEffects.push(effect);
    return { added: true, effect };
}

function updateStatusEffects(target, dt) {
    if (!target.statusEffects) return [];
    const results = [];
    target.statusEffects.forEach(effect => {
        if (!effect.active) return;
        effect.remaining -= dt;
        if (effect.type === 'dot') {
            if (effect.id === 'poison') results.push({ type: 'damage', amount: effect.magnitude, reason: effect.name });
            if (effect.id === 'burn') results.push({ type: 'damage', amount: effect.magnitude * 1.5, reason: effect.name });
        }
        if (effect.type === 'buff') {
            if (effect.id === 'regen') results.push({ type: 'heal', amount: effect.magnitude, reason: effect.name });
        }
    });
    target.statusEffects = target.statusEffects.filter(e => e.active && e.remaining > 0);
    return results;
}

function getStatusEffectModifiers(target, stat) {
    if (!target.statusEffects) return 1.0;
    let mult = 1.0;
    target.statusEffects.forEach(e => {
        if (e.id === 'freeze' && (stat === 'spd' || stat === 'atk')) mult *= (1 - e.magnitude);
        if (e.id === 'slow' && stat === 'spd') mult *= (1 - e.magnitude);
        if (e.id === 'weaken' && stat === 'atk') mult *= (1 - e.magnitude);
        if (e.id === 'berserk' && stat === 'atk') mult *= (1 + e.magnitude);
        if (e.id === 'shield' && stat === 'def') mult *= (1 + e.magnitude * 0.1);
    });
    return mult;
}

function generateShopInventory(shopId, playerLevel) {

function calculateDiscount(price, factionRep, factionId) {
    const rep = factionRep[factionId] || 0;
    if (rep >= 900) return Math.floor(price * 0.5);
    if (rep >= 700) return Math.floor(price * 0.65);
    if (rep >= 500) return Math.floor(price * 0.8);
    if (rep >= 200) return Math.floor(price * 0.9);
    return price;
}

// ─── Hacking / Breach System ──────────────────────────────────────────
function generateHackingChallenge(difficulty) {
    const nodeCount = Math.min(8, 2 + Math.floor(difficulty * 1.5));
    const nodes = [];
    for (let i = 0; i < nodeCount; i++) {
        nodes.push({
            id: i,
            type: ['data', 'security', 'gateway', 'core', 'decoy'][Math.floor(Math.random() * 5)],
            defense: 10 + difficulty * 5 + Math.floor(Math.random() * 10),
            connected: [],
            breached: false,
        });
    }
    for (let i = 0; i < nodeCount; i++) {
        const connections = Math.floor(1 + Math.random() * 3);
        for (let j = 0; j < connections; j++) {
            const target = Math.floor(Math.random() * nodeCount);
            if (target !== i && !nodes[i].connected.includes(target)) {
                nodes[i].connected.push(target);
                nodes[target].connected.push(i);
            }
        }
    }
    return { nodes, current: 0, difficulty, breached: 0, total: nodeCount, timeLimit: 30000 + difficulty * 5000, startTime: Date.now() };
}

function attemptBreach(node, hackPower) {
    const roll = Math.random() * 100 + hackPower;
    const threshold = node.defense;
    if (roll >= threshold) {
        node.breached = true;
        return { success: true, message: 'Node ' + node.id + ' breached!', roll: Math.floor(roll), threshold };
    }
    return { success: false, message: 'Breach failed on node ' + node.id, roll: Math.floor(roll), threshold, alertLevel: Math.floor((threshold - roll) / 10) };
}

function getHackingReward(hackResult, difficulty) {
    const base = { cr: 50 * difficulty, xp: 20 * difficulty };
    const bonusNodes = hackResult.breachedNodes || 0;
    const bonusMult = 1 + bonusNodes * 0.1;
    const dataFound = Math.random() < 0.2 + difficulty * 0.05;
    return {
        cr: Math.floor(base.cr * bonusMult),
        xp: Math.floor(base.xp * bonusMult),
        data: dataFound ? { name: 'Encrypted Data #' + Math.floor(Math.random() * 1000), type: 'data', rarity: difficulty >= 5 ? 'rare' : 'common' } : null,
    };
}

// ─── ADVANCED LOOT GENERATION ──────────────────────────────────────────
function generateLootByRarity(playerLevel, zone, luckBonus) {
    const rarities = [
        { name: 'common', weight: 50, minLvl: 0, color: '#aaa' },
        { name: 'uncommon', weight: 30, minLvl: 2, color: '#0f0' },
        { name: 'rare', weight: 15, minLvl: 5, color: '#0ff' },
        { name: 'epic', weight: 8, minLvl: 12, color: '#f0f' },
        { name: 'legendary', weight: 2, minLvl: 25, color: '#f80' },
    ];
    const filtered = rarities.filter(r => playerLevel >= r.minLvl);
    const totalWeight = filtered.reduce((s, r) => s + r.weight, 0);
    let roll = Math.random() * totalWeight;
    if (luckBonus) roll += luckBonus * 5;
    for (const r of filtered) {
        roll -= r.weight;
        if (roll <= 0) return r;
    }
    return filtered[0];
}

function generateLootItem(playerLevel, zone, luckBonus) {
    const rarity = generateLootByRarity(playerLevel, zone, luckBonus);
    const pools = {
        common: { items: ['Credit Chip', 'Scrap Metal', 'Basic Circuit', 'Data Fragment'], count: [1, 2], value: [10, 50] },
        uncommon: { items: ['Optical Cable', 'Quantum Chip', 'Cooling Gel', 'Copper Wire'], count: [1, 3], value: [50, 200] },
        rare: { items: ['Nano Processor', 'Plasma Core', 'Military Alloy', 'Program Shard'], count: [1, 2], value: [200, 800] },
        epic: { items: ['EMP Generator', 'Neural Interface', 'Reality Crystal', 'Epic Program'], count: [1, 1], value: [800, 3000] },
        legendary: { items: ['Dark Matter', 'Prime Matrix', 'Legendary Program', 'AI Core'], count: [1, 1], value: [3000, 10000] },
    };
    const pool = pools[rarity.name] || pools.common;
    const itemName = pool.items[Math.floor(Math.random() * pool.items.length)];
    const qty = pool.count[0] + Math.floor(Math.random() * (pool.count[1] - pool.count[0] + 1));
    const value = Math.floor((pool.value[0] + Math.random() * (pool.value[1] - pool.value[0])) * (1 + playerLevel * 0.05));
    return { name: itemName, qty, value, rarity: rarity.name, color: rarity.color };
}

function generateLootDrop(playerLevel, zone, luckBonus, isBoss) {
    const drop = [];
    const baseCount = isBoss ? 3 + Math.floor(Math.random() * 3) : 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < baseCount; i++) {
        drop.push(generateLootItem(playerLevel, zone, luckBonus));
    }
    if (isBoss && Math.random() < 0.5) {
        const trophy = TROPHY_DATA.find(t => t.zone === zone);
        if (trophy) drop.push({ name: trophy.name, qty: 1, value: trophy.value, rarity: 'trophy', color: '#ff0' });
    }
    return drop;
}
