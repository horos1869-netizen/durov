// в”Ђв”Ђв”Ђ CANVAS UI COMPONENTS: PROGRESS BAR WITH ANIMATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createAnimatedBar(x, y, w, h, val, max, opts) {
    const o = Object.assign({ fg: '#0ff', bg: '#1a1a2a', border: '#0ff', radius: 3, animSpeed: 0.05, label: '', showLabel: true }, opts);
    let displayVal = 0;
    return {
        x, y, w, h, val, max, o, displayVal,
        setValue(v) { this.val = Math.min(v, this.max); },
        update() {
            const diff = (this.val / this.max) - this.displayVal;
            if (Math.abs(diff) > 0.001) this.displayVal += diff * this.o.animSpeed;
            else this.displayVal = this.val / this.max;
        },
        draw(ctx) {
            const ratio = this.displayVal;
            ctx.save();
            if (this.o.bg) { ctx.fillStyle = this.o.bg; this.roundRect(ctx, this.x, this.y, this.w, this.h, this.o.radius, true, false); }
            if (this.o.fg && ratio > 0) {
                const fillW = Math.max(2, this.w * ratio);
                ctx.fillStyle = this.o.fg;
                ctx.shadowColor = this.o.fg;
                ctx.shadowBlur = 5;
                this.roundRect(ctx, this.x, this.y, fillW, this.h, this.o.radius, true, false);
                ctx.shadowBlur = 0;
            }
            if (this.o.border) { ctx.strokeStyle = this.o.border; ctx.lineWidth = 1; this.roundRect(ctx, this.x, this.y, this.w, this.h, this.o.radius, false, true); }
            if (this.o.showLabel && this.o.label) {
                ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.o.label + ' ' + Math.floor(ratio * 100) + '%', this.x + this.w / 2, this.y + this.h / 2);
            }
            ctx.restore();
        },
        roundRect(ctx, x, y, w, h, r, fill, stroke) {
            ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath(); if (fill) ctx.fill(); if (stroke) ctx.stroke();
        },
    };
}

// в”Ђв”Ђв”Ђ CANVAS UI COMPONENTS: MODAL DIALOG SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const MODAL_SYSTEM = {
    stack: [],
    push(title, body, opts) {
        const o = Object.assign({ width: 300, height: 200, closable: true, buttons: [] }, opts);
        const modal = {
            title: title,
            body: body,
            opts: o,
            x: (CFG.WIDTH - o.width) / 2,
            y: (CFG.HEIGHT - o.height) / 2,
            w: o.width,
            h: o.height,
            animY: -50,
            animDone: false,
            close() {
                MODAL_SYSTEM.stack = MODAL_SYSTEM.stack.filter(m => m !== modal);
            },
        };
        setTimeout(() => { modal.animY = 0; modal.animDone = true; }, 50);
        this.stack.push(modal);
        return modal;
    },
    pop() { this.stack.pop(); },
    clear() { this.stack = []; },
    update() {
        this.stack.forEach(m => {
            if (!m.animDone) m.animY = lerp(m.animY, 0, 0.1);
            if (Math.abs(m.animY) < 0.5) { m.animY = 0; m.animDone = true; }
        });
    },
    draw(ctx) {
        if (this.stack.length === 0) return;
        const modal = this.stack[this.stack.length - 1];
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        const mx = modal.x, my = modal.y + modal.animY;
        ctx.fillStyle = '#0a0a1a'; ctx.strokeStyle = '#0ff';
        ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
        roundRect(ctx, mx, my, modal.w, modal.h, 8, true, true);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0ff'; ctx.font = CFG.FONTS.md; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(modal.title, mx + modal.w / 2, my + 15);
        ctx.fillStyle = '#c0c0e0'; ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if (typeof modal.body === 'string') {
            const lines = modal.body.split('\n');
            lines.forEach((line, i) => ctx.fillText(line, mx + modal.w / 2, my + 50 + i * 18));
        }
        modal.opts.buttons.forEach((btn, i) => {
            const bx = mx + 20 + i * ((modal.w - 40) / modal.opts.buttons.length);
            const by = my + modal.h - 40;
            const bw = (modal.w - 40) / modal.opts.buttons.length - 10;
            ctx.fillStyle = btn.bg || '#0a0a2a'; ctx.strokeStyle = btn.color || '#0ff';
            roundRect(ctx, bx, by, bw, 30, 4, true, true);
            ctx.fillStyle = btn.color || '#0ff'; ctx.font = '8px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(btn.text || '', bx + bw / 2, by + 15);
        });
        if (modal.opts.closable) {
            ctx.fillStyle = '#f00'; ctx.font = '12px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
            ctx.fillText('вњ•', mx + modal.w - 10, my + 10);
        }
        ctx.restore();
    },
    handleClick(mx, my) {
        if (this.stack.length === 0) return false;
        const modal = this.stack[this.stack.length - 1];
        const mdx = mx, mdy = my;
        if (moux < modal.x || mdx > modal.x + modal.w || mdy < modal.y + modal.animY || mdy > modal.y + modal.animY + modal.h) {
            if (modal.opts.closable) { this.pop(); return true; }
            return false;
        }
        if (modal.opts.closable && mdx > modal.x + modal.w - 30 && mdy < modal.y + 30 + modal.animY) {
            this.pop(); return true;
        }
        modal.opts.buttons.forEach((btn, i) => {
            const bx = modal.x + 20 + i * ((modal.w - 40) / modal.opts.buttons.length);
            const by = modal.y + modal.animY + modal.h - 40;
            const bw = (modal.w - 40) / modal.opts.buttons.length - 10;
            if (mdx >= bx && mdx <= bx + bw && mdy >= by && mdy <= by + 30) {
                if (btn.cb) btn.cb();
            }
        });
        return true;
    },
};

// в”Ђв”Ђв”Ђ CANVAS UI COMPONENTS: TAB PANEL SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createTabPanel(x, y, w, h, tabs, opts) {
    const o = Object.assign({ tabHeight: 30, tabColor: '#0a0a2a', activeColor: '#0a0a3a', borderColor: '#0ff', contentBg: '#0a0a1a' }, opts);
    let activeTab = 0;
    return {
        x, y, w, h, tabs, o, activeTab,
        setActive(idx) { if (idx >= 0 && idx < this.tabs.length) this.activeTab = idx; },
        draw(ctx) {
            const tabH = this.o.tabHeight;
            const tabW = Math.floor(this.w / this.tabs.length);
            this.tabs.forEach((tab, i) => {
                const tx = this.x + i * tabW;
                const isActive = i === this.activeTab;
                ctx.fillStyle = isActive ? this.o.activeColor : this.o.tabColor;
                ctx.strokeStyle = isActive ? this.o.borderColor : '#333';
                roundRect(ctx, tx, this.y, tabW, tabH, 4, true, true);
                ctx.fillStyle = isActive ? '#fff' : '#888';
                ctx.font = '9px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(tab.label || 'Tab ' + (i + 1), tx + tabW / 2, this.y + tabH / 2);
            });
            const cx = this.x, cy = this.y + tabH, cw = this.w, ch = this.h - tabH;
            ctx.fillStyle = this.o.contentBg; ctx.strokeStyle = this.o.borderColor;
            roundRect(ctx, cx, cy, cw, ch, 4, true, true);
            ctx.save();
            ctx.beginPath(); ctx.rect(cx, cy, cw, ch); ctx.clip();
            const active = this.tabs[this.activeTab];
            if (active && active.render) active.render(ctx, cx + 5, cy + 5, cw - 10, ch - 10);
            else {
                ctx.fillStyle = '#666'; ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(active ? active.label : 'Empty Tab', cx + cw / 2, cy + ch / 2);
            }
            ctx.restore();
        },
        handleClick(mx, my) {
            const tabH = this.o.tabHeight;
            const tabW = Math.floor(this.w / this.tabs.length);
            if (my >= this.y && my <= this.y + tabH && mx >= this.x && mx <= this.x + this.w) {
                const idx = Math.floor((mx - this.x) / tabW);
                if (idx >= 0 && idx < this.tabs.length) { this.activeTab = idx; return true; }
            }
            return false;
        },
    };
}

// в”Ђв”Ђв”Ђ CANVAS UI COMPONENTS: DROPDOWN/SELECT SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createDropdown(x, y, w, h, items, opts) {
    const o = Object.assign({ color: '#0ff', bg: '#0a0a2a', border: '#0ff', font: '9px monospace', itemHeight: 25, maxVisible: 6 }, opts);
    let open = false;
    let selected = 0;
    return {
        x, y, w, h, items, o, open, selected,
        getValue() { return this.items[this.selected]; },
        setIndex(idx) { if (idx >= 0 && idx < this.items.length) { this.selected = idx; this.open = false; } },
        toggle() { this.open = !this.open; },
        close() { this.open = false; },
        draw(ctx) {
            ctx.fillStyle = this.o.bg; ctx.strokeStyle = this.o.border;
            roundRect(ctx, this.x, this.y, this.w, this.h, 4, true, true);
            ctx.fillStyle = this.o.color; ctx.font = this.o.font; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(this.items[this.selected] || 'Select...', this.x + 8, this.y + this.h / 2);
            ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
            ctx.fillText(this.open ? 'в–І' : 'в–ј', this.x + this.w - 8, this.y + this.h / 2);
            if (this.open) {
                const itemH = this.o.itemHeight;
                const maxVis = Math.min(this.o.maxVisible, this.items.length);
                const listH = maxVis * itemH + 4;
                const listY = this.y + this.h + 2;
                ctx.fillStyle = '#0d0d1a'; ctx.strokeStyle = this.o.border;
                roundRect(ctx, this.x, listY, this.w, listH, 4, true, true);
                const startIdx = Math.max(0, this.selected - Math.floor(maxVis / 2));
                const endIdx = Math.min(this.items.length, startIdx + maxVis);
                for (let i = startIdx; i < endIdx; i++) {
                    const iy = listY + 2 + (i - startIdx) * itemH;
                    if (i === this.selected) {
                        ctx.fillStyle = 'rgba(0,255,255,0.1)';
                        ctx.fillRect(this.x + 2, iy, this.w - 4, itemH);
                    }
                    ctx.fillStyle = i === this.selected ? '#fff' : '#aaa';
                    ctx.font = this.o.font; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.fillText(this.items[i], this.x + 8, iy + itemH / 2);
                }
            }
        },
        handleClick(mx, my) {
            if (mx >= this.x && mx <= this.x + this.w && my >= this.y && my <= this.y + this.h) {
                this.toggle(); return true;
            }
            if (this.open) {
                const itemH = this.o.itemHeight;
                const maxVis = Math.min(this.o.maxVisible, this.items.length);
                const listY = this.y + this.h + 2;
                const listH = maxVis * itemH + 4;
                if (mx >= this.x && mx <= this.x + this.w && my >= listY && my <= listY + listH) {
                    const startIdx = Math.max(0, this.selected - Math.floor(maxVis / 2));
                    const idx = startIdx + Math.floor((my - listY - 2) / itemH);
                    if (idx >= 0 && idx < this.items.length) { this.selected = idx; this.open = false; return true; }
                }
                this.open = false;
            }
            return false;
        },
    };
}

// в”Ђв”Ђв”Ђ CANVAS UI COMPONENTS: SLIDER CONTROL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createSlider(x, y, w, h, min, max, val, opts) {
    const o = Object.assign({ color: '#0ff', bg: '#1a1a2a', trackColor: '#0ff', thumbSize: 12, step: 1, showValue: true }, opts);
    let value = clamp(val, min, max);
    let dragging = false;
    return {
        x, y, w, h, min, max, o, value, dragging,
        getValue() { return this.value; },
        setValue(v) { this.value = clamp(v, this.min, this.max); },
        getPercent() { return (this.value - this.min) / (this.max - this.min); },
        draw(ctx) {
            const cy = this.y + this.h / 2;
            ctx.fillStyle = this.o.bg;
            roundRect(ctx, this.x, cy - 3, this.w, 6, 3, true, false);
            const pct = this.getPercent();
            const fillW = Math.max(2, this.w * pct);
            ctx.fillStyle = this.o.trackColor;
            ctx.shadowColor = this.o.trackColor;
            ctx.shadowBlur = 4;
            roundRect(ctx, this.x, cy - 3, fillW, 6, 3, true, false);
            ctx.shadowBlur = 0;
            const tx = this.x + fillW;
            ctx.fillStyle = this.o.color;
            ctx.shadowColor = this.o.color;
            ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.arc(tx, cy, this.o.thumbSize / 2, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            if (this.o.showValue) {
                ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText(Math.round(this.value) + (this.o.suffix || ''), tx, this.y - 4);
            }
        },
        handleClick(mx, my) {
            const cy = this.y + this.h / 2;
            if (my >= this.y && my <= this.y + this.h && mx >= this.x && mx <= this.x + this.w) {
                const pct = (mx - this.x) / this.w;
                this.value = clamp(this.min + pct * (this.max - this.min), this.min, this.max);
                if (this.o.step) this.value = Math.round(this.value / this.o.step) * this.o.step;
                return true;
            }
            return false;
        },
        handleDrag(mx, my) {
            if (!this.dragging) return false;
            const pct = clamp((mx - this.x) / this.w, 0, 1);
            this.value = this.min + pct * (this.max - this.min);
            if (this.o.step) this.value = Math.round(this.value / this.o.step) * this.o.step;
            this.value = clamp(this.value, this.min, this.max);
            return true;
        },
    };
}

// в”Ђв”Ђв”Ђ CANVAS UI COMPONENTS: TOGGLE SWITCH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createToggle(x, y, w, h, initialState, opts) {
    const o = Object.assign({ onColor: '#0f0', offColor: '#333', thumbColor: '#fff', label: '', font: '9px monospace' }, opts);
    let state = !!initialState;
    return {
        x, y, w, h, o, state,
        isOn() { return this.state; },
        setOn(on) { this.state = on; },
        toggle() { this.state = !this.state; return this.state; },
        draw(ctx) {
            const thumbW = this.h - 4;
            const trackW = this.w - thumbW - 4;
            ctx.fillStyle = this.state ? this.o.onColor : this.o.offColor;
            roundRect(ctx, this.x, this.y, this.w, this.h, this.h / 2, true, false);
            ctx.fillStyle = this.o.thumbColor;
            const thumbX = this.state ? this.x + this.w - thumbW - 2 : this.x + 2;
            ctx.shadowColor = this.state ? this.o.onColor : 'transparent';
            ctx.shadowBlur = 5;
            ctx.beginPath(); ctx.arc(thumbX + thumbW / 2, this.y + this.h / 2, thumbW / 2, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            if (this.o.label) {
                ctx.fillStyle = '#aaa'; ctx.font = this.o.font; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillText(this.o.label, this.x + this.w + 8, this.y + this.h / 2);
            }
        },
        handleClick(mx, my) {
            if (mx >= this.x && mx <= this.x + this.w + (this.o.label ? 100 : 0) && my >= this.y && my <= this.y + this.h) {
                this.toggle(); return true;
            }
            return false;
        },
    };
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath(); if (fill) ctx.fill(); if (stroke) ctx.stroke();
}

// в”Ђв”Ђв”Ђ TOUCH / GESTURE SUPPORT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
(function() {
    const canvas = document.getElementById('gameCanvas');
    if (!canvas) return;
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
        touchStartTime = Date.now();
    }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
        const rect = canvas.getBoundingClientRect();
        const dx = touchStartX - (e.changedTouches[0]?.clientX || touchStartX);
        const dy = touchStartY - (e.changedTouches[0]?.clientY || touchStartY);
        const dist = Math.sqrt(dx * dx + dy * dy);
        const elapsed = Date.now() - touchStartTime;
        if (dist > 50 && elapsed < 500) {
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && game) game.screen = game.screen === 'main' ? 'map' : 'main';
            } else {
                if (dy > 0 && game) game.screen = game.screen === 'combat' ? 'map' : 'combat';
            }
        }
    }, { passive: true });
    canvas.addEventListener('touchcancel', () => {}, { passive: true });
})();

// в”Ђв”Ђв”Ђ BACKGROUND MUSIC GENERATOR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const BGM = {
    ctx: null,
    gain: null,
    osc1: null,
    osc2: null,
    lfo: null,
    started: false,
    volume: 0,
    targetVol: 0.04,
    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.gain = this.ctx.createGain();
            this.gain.gain.value = 0;
            this.gain.connect(this.ctx.destination);
        } catch(e) {}
    },
    start() {
        if (this.started || !this.ctx) return;
        this.started = true;
        this.osc1 = this.ctx.createOscillator();
        this.osc2 = this.ctx.createOscillator();
        this.lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        this.osc1.type = 'sawtooth';
        this.osc1.frequency.value = 55;
        this.osc2.type = 'square';
        this.osc2.frequency.value = 110;
        this.lfo.type = 'sine';
        this.lfo.frequency.value = 0.5;
        lfoGain.gain.value = 20;
        this.lfo.connect(lfoGain);
        lfoGain.connect(this.osc1.frequency);
        lfoGain.connect(this.osc2.frequency);
        this.osc1.connect(this.gain);
        this.osc2.connect(this.gain);
        this.osc1.start();
        this.osc2.start();
        this.lfo.start();
        this.fadeIn();
    },
    fadeIn() {
        if (!this.gain) return;
        const now = this.ctx.currentTime;
        this.gain.gain.linearRampToValueAtTime(this.targetVol, now + 3);
    },
    fadeOut() {
        if (!this.gain) return;
        const now = this.ctx.currentTime;
        this.gain.gain.linearRampToValueAtTime(0, now + 2);
    },
    stop() {
        try {
            if (this.osc1) { this.osc1.stop(); this.osc1 = null; }
            if (this.osc2) { this.osc2.stop(); this.osc2 = null; }
            if (this.lfo) { this.lfo.stop(); this.lfo = null; }
        } catch(e) {}
        this.started = false;
    },
    toggle() {
        if (this.started) { this.fadeOut(); setTimeout(() => this.stop(), 2000); }
        else { this.init(); this.start(); }
    },
};

// в”Ђв”Ђв”Ђ MINIMAP SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const MINIMAP = {
    visible: false,

    nodes: [],

    playerY: 0.5,
    init(nodes) {
        this.nodes = nodes || NETWORK_NODES || [];

    update(zone, progress) {

            const avgX = zoneNodes.reduce((s, n) => s + n.x, 0) / zoneNodes.length;
            const avgY = zoneNodes.reduce((s, n) => s + n.y, 0) / zoneNodes.length;
            this.playerX = avgX / 1600;
            this.playerY = avgY / 500;

    draw(ctx) {

        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);

        ctx.fillStyle = 'rgba(0,255,255,0.5)';
        ctx.font = '6px monospace';

    timeout: 3000,

    active: false,
    timer: 0,
    duration: 2000,
    level: 0,

        this.level = level;
        if (game) game.showNotification('в¬† LEVEL UP! Level ' + level, '#ff0');

    update(dt) {
        if (!this.active) return;

const NOTIFY = {
    queue: [],

    maxStack: 4,
    add(text, color, duration) {
        this.queue.push({ text, color: color || '#0ff', duration: duration || 2500, life: duration || 2500, y: 0 });
    },
    update(dt) {
        while (this.queue.length > 0 && this.active.length < this.maxStack) {
            const n = this.queue.shift();
            n.y = 45 + this.active.length * 28;
            this.active.push(n);
        }
        this.active.forEach(n => { n.life -= dt; n.y += (45 + this.active.indexOf(n) * 28 - n.y) * 0.08; });
        this.active = this.active.filter(n => n.life > 0);
    },
    draw(ctx) {
        this.active.forEach(n => {
            const alpha = Math.min(1, n.life / 300);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = 'rgba(0,10,20,0.85)';

// в”Ђв”Ђв”Ђ PERFORMANCE MONITOR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const PERF_MON = {
    frames: [],
    maxFrames: 120,
    minFps: 60, maxFps: 0, avgFps: 0,
    add(fps) {
        this.frames.push(fps);
        if (this.frames.length > this.maxFrames) this.frames.shift();
        this.avgFps = Math.round(this.frames.reduce((a, b) => a + b, 0) / this.frames.length);
        this.minFps = Math.min(...this.frames);
        this.maxFps = Math.max(...this.frames);
    },
    draw(ctx) {
        if (!game?._showFps) return;
        const w = 120, h = 40, x = CFG.WIDTH - w - 5, y = 22;

        ctx.font = '6px monospace';
        const graphW = w - 6;
        this.frames.forEach((f, i) => {

// в”Ђв”Ђв”Ђ SAVE FILE MANAGEMENT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const SAVE_MANAGER = {
    slots: 3,
    currentSlot: 0,
    getKey(slot) { return 'neon_save_' + (slot ?? this.currentSlot); },
    listSaves() {
        const saves = [];
        for (let i = 0; i < this.slots; i++) {
            const raw = localStorage.getItem(this.getKey(i));
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    saves.push({ slot: i, level: data?.character?.level || 1, credits: data?.character?.credits || 0, name: data?.character?.name || 'NetRunner', time: data?.meta?.savedAt || 0 });
                } catch(e) { saves.push({ slot: i, corrupted: true }); }
            } else { saves.push({ slot: i, empty: true }); }
        }
        return saves;
    },
    save(slot, data) {
        const s = slot ?? this.currentSlot;
        const key = this.getKey(s);
        data = data || game?.character;
        if (!data) return false;
        data.meta = data.meta || {};
        data.meta.savedAt = Date.now();
        data.meta.saveVersion = 3;
        try { localStorage.setItem(key, JSON.stringify(data)); return true; } catch(e) { return false; }
    },
    load(slot) {
        const s = slot ?? this.currentSlot;
        const raw = localStorage.getItem(this.getKey(s));
        if (!raw) return null;
        try {
            const data = JSON.parse(raw);
            return migrateSaveData(data);
        } catch(e) { return null; }
    },
    delete(slot) {
        try { localStorage.removeItem(this.getKey(slot)); return true; } catch(e) { return false; }
    },
    exportSave(slot) {
        const data = this.load(slot);
        if (!data) return null;
        try {
            const str = JSON.stringify(data);
            const blob = new Blob([str], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'neon_save_' + (slot ?? this.currentSlot) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            return true;
        } catch(e) { return false; }
    },
    importSave(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const migrated = migrateSaveData(data);
                    if (migrated) resolve(migrated);
                    else resolve(null);
                } catch(ex) { resolve(null); }
            };
            reader.onerror = () => resolve(null);
            reader.readAsText(file);
        });
    },
};

// в”Ђв”Ђв”Ђ DATA EXPORT / SHARE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const DATA_EXPORT = {
    encode(data) {
        try { return btoa(unescape(encodeURIComponent(JSON.stringify(data)))); } catch(e) { return null; }
    },
    decode(str) {
        try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch(e) { return null; }
    },
    shareBuild(character) {
        if (!character) return;
        const build = {
            name: character.name || 'Build',
            level: character.level || 1,
            skills: character.skills || [],
            equipment: character.equipment || {},
            programs: character.equippedPrograms || [],
        };
        const encoded = this.encode(build);
        const url = window.location.href.split('?')[0] + '?build=' + encoded;
        try {
            if (navigator.clipboard) { navigator.clipboard.writeText(url); return 'Build URL copied!'; }
        } catch(e) {}
        return url;
    },
    loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const buildEncoded = params.get('build');
        if (!buildEncoded) return null;
        return this.decode(buildEncoded);
    },
};

function applyDifficultyToEnemy(enemy, preset) {

    return {
        ...enemy,
        hp: Math.floor(enemy.hp * preset.enemyHp),
        maxHp: Math.floor((enemy.maxHp || enemy.hp) * preset.enemyHp),
        dmg: Math.floor(enemy.dmg * preset.enemyDmg),
    };
}

function applyDifficultyToRewards(rewards, preset) {
    if (!preset) return rewards;
    return {
        cr: Math.floor((rewards.cr || 0) * preset.creditMult),
        xp: Math.floor((rewards.xp || 0) * preset.xpMult),
        items: rewards.items || [],
    };
}

// в”Ђв”Ђв”Ђ GAME SPEED CONTROL в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const GAME_SPEED = {
    multiplier: 1,
    paused: false,
    set(speed) { this.multiplier = Math.max(0.1, Math.min(10, speed)); if (game) game.showNotification('Speed: x' + this.multiplier, '#888'); },
    increase() { this.set(this.multiplier + 0.5); },
    decrease() { this.set(this.multiplier - 0.5); },
    toggle() { this.paused = !this.paused; if (game) game.showNotification(this.paused ? 'PAUSED' : 'RESUMED', '#ff0'); },
    get() { return this.paused ? 0 : this.multiplier; },
};

document.addEventListener('keydown', (e) => {
    if (e.key === '=' || e.key === '+') { GAME_SPEED.increase(); e.preventDefault(); }
    if (e.key === '-') { GAME_SPEED.decrease(); e.preventDefault(); }
    if (e.key === 'p') { GAME_SPEED.toggle(); e.preventDefault(); }
    if (e.key === '0') { GAME_SPEED.set(1); e.preventDefault(); }
});

// в”Ђв”Ђв”Ђ GAME CHEATS (DEBUG) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const CHEATS = {
    enabled: false,
    activate() {
        this.enabled = true;
        if (game) game.showNotification('CHEATS ENABLED', '#f0f');
    },
    deactivate() {
        this.enabled = false;
        if (game) game.showNotification('CHEATS DISABLED', '#888');
    },
    toggle() { if (this.enabled) this.deactivate(); else this.activate(); },
    giveCredits(amount) { if (!this.enabled || !game?.character?.character) return; game.character.character.credits = (game.character.character.credits || 0) + (amount || 10000); game.showNotification('+ ' + (amount || 10000) + ' credits', '#ff0'); },
    giveXp(amount) { if (!this.enabled || !game?.character?.character) return; game.character.character.experience = (game.character.character.experience || 0) + (amount || 5000); game.showNotification('+ ' + (amount || 5000) + ' XP', '#f0f'); },
    maxLevel() { if (!this.enabled || !game?.character?.character) return; game.character.character.level = 99; game.character.character.experience = 0; game.showNotification('MAX LEVEL!', '#ff0'); },
    heal() { if (!this.enabled || !game?.character?.character) return; game.character.character.hp = game.character.character.maxHp || 9999; game.showNotification('HEALED', '#0f0'); },
    killAll() { if (!this.enabled) return; if (game?.enemy) { game.enemy.hp = 0; game.showNotification('ENEMIES KILLED', '#f00'); } },
    giveItem(itemId) { if (!this.enabled || !game?.character?.character) return; const inv = game.character.character.inventory = game.character.character.inventory || []; inv.push({ id: itemId || 'rare_program', name: 'Cheat Item', qty: 1, rarity: 'legendary' }); game.showNotification('Item added', '#0ff'); },
};

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'C') { CHEATS.toggle(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'g') { CHEATS.giveCredits(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'x') { CHEATS.giveXp(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'h') { CHEATS.heal(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'k') { CHEATS.killAll(); e.preventDefault(); }
});

const CRAFTING_SYSTEM = {
    qualityTiers: [
        { name: 'Broken', mult: 0.4, color: '#666', minRoll: 0, maxRoll: 20, xpMult: 0.5 },
        { name: 'Normal', mult: 0.8, color: '#aaa', minRoll: 20, maxRoll: 50, xpMult: 1.0 },
        { name: 'Good', mult: 1.1, color: '#0f0', minRoll: 50, maxRoll: 70, xpMult: 1.5 },
        { name: 'Superior', mult: 1.4, color: '#0ff', minRoll: 70, maxRoll: 85, xpMult: 2.0 },
        { name: 'Excellent', mult: 1.7, color: '#f0f', minRoll: 85, maxRoll: 95, xpMult: 3.0 },
        { name: 'Masterwork', mult: 2.2, color: '#ff0', minRoll: 95, maxRoll: 99.5, xpMult: 5.0 },
        { name: 'Legendary', mult: 3.0, color: '#f80', minRoll: 99.5, maxRoll: 100, xpMult: 10.0 },
    ],
    craftLevel: 0,
    craftXp: 0,
    calculateQuality(craftLevel) {
        const roll = Math.random() * 100;
        const bonus = craftLevel * 0.5;
        const adjusted = roll + bonus;
        for (const tier of this.qualityTiers) {
            if (adjusted >= tier.minRoll && adjusted < tier.maxRoll) return tier;
        }
        return this.qualityTiers[1];
    },
    calculateCraftTime(recipe, craftLevel) {
        const base = recipe.time || 30;
        return Math.max(5, base - craftLevel * 0.5);

        return Math.floor((recipe.xp || 10) * quality.xpMult);
    },
    addCraftXp(game, amount) {
        this.craftXp += amount;
        const needed = 100 + this.craftLevel * 50;
        while (this.craftXp >= needed) {
            this.craftXp -= needed;
            this.craftLevel++;

// в”Ђв”Ђв”Ђ PET SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const PET_SYSTEM = {
    pets: [],
    activePet: null,
    maxPets: 10,
    hatchEgg(eggId) {
        const template = PET_DATA.find(p => p.id === eggId);
        if (!template) return null;
        const base = template.stats || { hp: 50, atk: 5, def: 3, spd: 4 };
        const pet = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            templateId: eggId,
            name: template.name,
            icon: template.icon || 'рџђѕ',
            rarity: template.rarity || 'common',
            level: 1,
            xp: 0,
            xpNext: 100,
            hp: base.hp,
            maxHp: base.hp,
            atk: base.atk,
            def: base.def,
            spd: base.spd,
            fullness: 100,
            mood: 100,
            evolution: 1,
            abilities: template.abilities ? template.abilities.slice(0, 1) : ['scratch'],
        };
        this.pets.push(pet);
        return pet;
    },
    levelUp(pet) {
        pet.level++;
        pet.atk += 2 + Math.floor(Math.random() * 3);
        pet.def += 1 + Math.floor(Math.random() * 2);
        pet.maxHp += 5 + Math.floor(Math.random() * 5);
        pet.hp = pet.maxHp;
        pet.xp = 0;
        pet.xpNext = Math.floor(pet.xpNext * 1.4);
        if (pet.level % 10 === 0 && PET_DATA.find(p => p.id === pet.templateId)?.evolutions?.length > pet.evolution) {
            pet.evolution++;
            pet.atk += 5;
            pet.def += 3;
            pet.maxHp += 20;
            pet.hp = pet.maxHp;
        }
    },
    feed(pet, foodAmount) {
        pet.fullness = Math.min(100, pet.fullness + foodAmount);
        pet.mood = Math.min(100, pet.mood + Math.floor(foodAmount * 0.2));
    },
    play(pet) {
        pet.mood = Math.min(100, pet.mood + 15);
        pet.xp += 2;
        if (pet.xp >= pet.xpNext) this.levelUp(pet);
    },
    tick(pets) {
        const p = pets || this.pets;
        p.forEach(pet => {
            pet.fullness = Math.max(0, pet.fullness - 0.02);
            if (pet.fullness < 20) pet.mood = Math.max(0, pet.mood - 0.05);
            if (pet.fullness > 80) pet.mood = Math.min(100, pet.mood + 0.01);
        });
    },
    getCombatBonuses(pet) {
        const moodMult = 0.5 + (pet.mood / 100) * 0.5;
        const fullnessMult = 0.5 + (pet.fullness / 100) * 0.5;
        return { atkMult: moodMult, defMult: fullnessMult, spdMult: (moodMult + fullnessMult) / 2 };
    },
};

const QUICK_MENU = {
    visible: false,
    items: [
        { id: 'main', icon: 'рџЏ ', label: 'Home', color: '#0ff' },
        { id: 'map', icon: 'рџ—є', label: 'Map', color: '#0f0' },
        { id: 'combat', icon: 'вљ”', label: 'Combat', color: '#f00' },
        { id: 'inventory', icon: 'рџЋ’', label: 'Items', color: '#ff0' },
        { id: 'shop', icon: 'рџЏЄ', label: 'Shop', color: '#f80' },
        { id: 'crafting', icon: 'рџ”§', label: 'Craft', color: '#f0f' },
        { id: 'quests', icon: 'рџ“‹', label: 'Quests', color: '#ff0' },
        { id: 'settings', icon: 'вљ™', label: 'Settings', color: '#888' },
    ],
    toggle() { this.visible = !this.visible; },
    draw(ctx) {
        if (!this.visible) return;
        const cx = CFG.WIDTH / 2, cy = CFG.HEIGHT / 2;
        const radius = 120;
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        this.items.forEach((item, i) => {
            const angle = (i / this.items.length) * Math.PI * 2 - Math.PI / 2;
            const ix = cx + Math.cos(angle) * radius;
            const iy = cy + Math.sin(angle) * radius;
            ctx.fillStyle = 'rgba(0,10,20,0.85)';
            ctx.strokeStyle = item.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ix, iy, 22, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = '14px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.icon, ix, iy - 1);
            ctx.fillStyle = '#aaa';
            ctx.font = '6px monospace';
            ctx.fillText(item.label, ix, iy + 15);
        });
        ctx.fillStyle = 'rgba(0,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(cx, cy, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0ff';
        ctx.font = '7px Orbitron';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('QUICK', cx, cy + 14);
        ctx.restore();
    },
    handleClick(mx, my) {
        if (!this.visible) return false;
        const cx = CFG.WIDTH / 2, cy = CFG.HEIGHT / 2;
        const radius = 120;
        for (let i = 0; i < this.items.length; i++) {
            const angle = (i / this.items.length) * Math.PI * 2 - Math.PI / 2;
            const ix = cx + Math.cos(angle) * radius;
            const iy = cy + Math.sin(angle) * radius;
            const dist = Math.sqrt((mx - ix) ** 2 + (my - iy) ** 2);
            if (dist < 22) {
                if (game) { game.screen = this.items[i].id; }
                this.visible = false;
                return true;
            }
        }
        return false;
    },
};

// в”Ђв”Ђв”Ђ ENEMY FACTORY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createEnemy(template, level, zone) {
    const zoneMult = { matrix: 1, corpnet: 1.3, darknet: 1.6, deep_web: 2.0, core: 2.5 }[zone] || 1;
    const scaledHp = Math.floor((template.base_hp || 30) * (1 + level * 0.15) * zoneMult);
    const scaledDmg = Math.floor((template.base_dmg || 5) * (1 + level * 0.12) * zoneMult);
    const scaledDef = Math.floor((template.base_def || 2) * (1 + level * 0.1) * zoneMult);
    return {
        name: template.name || 'Unknown',
        hp: scaledHp,
        maxHp: scaledHp,
        dmg: scaledDmg,
        def: scaledDef,
        level: level,
        type: template.type || 'normal',
        abilities: template.abilities || [],
        reward: {
            cr: Math.floor((template.loot?.cr ? (template.loot.cr[0] + template.loot.cr[1]) / 2 : 15) * (1 + level * 0.2) * zoneMult),
            xp: Math.floor((template.loot?.xp || 8) * (1 + level * 0.15) * zoneMult),
        },
        loot: template.loot || { drop_rate: 0.3 },
        zone: zone,
        isBoss: template.isBoss || false,
    };
}

// в”Ђв”Ђв”Ђ GAME LOGGING SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const GAME_LOGGER = {
    logs: [],
    maxLogs: 500,
    add(level, category, message) {
        this.logs.push({ level, category, message, time: Date.now() });
        if (this.logs.length > this.maxLogs) this.logs.shift();
        if (level === 'error') console.error('[' + category + '] ' + message);
        else if (level === 'warn') console.warn('[' + category + '] ' + message);
        else console.log('[' + category + '] ' + message);
    },
    info(category, message) { this.add('info', category, message); },
    warn(category, message) { this.add('warn', category, message); },
    error(category, message) { this.add('error', category, message); },
    getRecent(count) { return this.logs.slice(-(count || 20)); },
    clear() { this.logs = []; },
    draw(ctx) {
        if (!game?._showFps) return;
        const recent = this.getRecent(5);
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, CFG.HEIGHT - 100, CFG.WIDTH, 100);
        recent.forEach((l, i) => {
            ctx.fillStyle = l.level === 'error' ? '#f00' : l.level === 'warn' ? '#ff0' : '#888';
            ctx.font = '7px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            const d = new Date(l.time);
            ctx.fillText('[' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ':' + d.getSeconds().toString().padStart(2,'0') + '] [' + l.category + '] ' + l.message, 5, CFG.HEIGHT - 95 + i * 18);
        });
        ctx.restore();
    },
};

function createPet(petId, level) {
    const template = PET_DATA_ALT.find(p => p.id === petId);
    if (!template) return null;
    const lvlMult = 1 + (level - 1) * 0.15;
    return { ...template, level: level || 1, xp: 0, maxXp: 100 + (level || 1) * 50, hp: Math.floor(template.hp * lvlMult), maxHp: Math.floor(template.hp * lvlMult), atk: Math.floor(template.atk * lvlMult), def: Math.floor(template.def * lvlMult), happiness: 100, fed: Date.now() };
}

function feedPet(pet, foodType) {
    const foodValues = { kibble: 10, treat: 25, feast: 50, quantum: 100 };
    const value = foodValues[foodType] || 10;
    pet.happiness = Math.min(100, (pet.happiness || 50) + value);
    pet.fed = Date.now();
    pet.xp = (pet.xp || 0) + value;
    const leveled = pet.xp >= pet.maxXp;
    if (leveled) { pet.xp -= pet.maxXp; pet.level++; pet.maxXp = Math.floor(pet.maxXp * 1.2); pet.maxHp = Math.floor(pet.maxHp * 1.1); pet.hp = pet.maxHp; }
    return { happiness: pet.happiness, leveled, level: pet.level };
}

function getPetBonus(pet) {
    if (!pet) return {};
    const happinessMult = (pet.happiness || 50) / 100;
    return { atk: Math.floor((pet.atk || 0) * 0.3 * happinessMult), def: Math.floor((pet.def || 0) * 0.3 * happinessMult), spd: ((pet.spd || 1) - 1) * 0.2 * happinessMult };
}

Game.prototype.drawGlowText = function(text, x, y, color, size, align) {
    const ctx = this.ctx;
    ctx.save();
    ctx.shadowColor = color || '#0ff';
    ctx.shadowBlur = 15;
    ctx.fillStyle = color || '#0ff';
    ctx.font = 'bold ' + (size || 14) + 'px Orbitron,monospace';
    ctx.textAlign = align || 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x, y);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.fillText(text, x, y);
    ctx.restore();
};

Game.prototype.drawDottedLine = function(x1, y1, x2, y2, color, spacing) {
    const ctx = this.ctx;
    const dx = x2 - x1, dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const sp = spacing || 5;
    const steps = Math.floor(dist / sp);
    ctx.save();
    ctx.strokeStyle = color || '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < steps; i += 2) {
        const t1 = i / steps, t2 = Math.min(1, (i + 1) / steps);
        ctx.moveTo(x1 + dx * t1, y1 + dy * t1);
        ctx.lineTo(x1 + dx * t2, y1 + dy * t2);
    }
    ctx.stroke();
    ctx.restore();
};

Game.prototype.drawHexGrid = function(cx, cy, radius, rows, cols, color) {
    const ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = color || 'rgba(0,255,255,0.15)';
    ctx.lineWidth = 1;
    const h = radius * Math.sqrt(3);
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = cx + c * radius * 1.5;
            const y = cy + r * h + (c % 2) * h / 2;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = Math.PI / 3 * i - Math.PI / 6;
                const px = x + radius * Math.cos(angle);
                const py = y + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.stroke();
        }
    }
    ctx.restore();
};

Game.prototype.drawRadar = function(cx, cy, radius, contacts, color) {
    const ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = color || 'rgba(0,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, radius * 0.66, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, radius * 0.33, 0, Math.PI * 2); ctx.stroke();
    ctx.moveTo(cx - radius, cy); ctx.lineTo(cx + radius, cy); ctx.stroke();
    ctx.moveTo(cx, cy - radius); ctx.lineTo(cx, cy + radius); ctx.stroke();
    const angle = (Date.now() / 2000) % (Math.PI * 2);
    ctx.fillStyle = 'rgba(0,255,255,0.1)';
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, angle - 0.3, angle + 0.3); ctx.closePath(); ctx.fill();
    (contacts || []).forEach(c => {
        const a = c.angle || 0;
        const d = c.dist || 0.5;
        ctx.fillStyle = c.color || '#f00';
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * radius * d, cy + Math.sin(a) * radius * d, 3, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
};

// в”Ђв”Ђв”Ђ GAME MATH EXTENSIONS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const GAME_MATH = {
    clamp(v, min, max) { return Math.max(min, Math.min(max, v)); },
    lerp(a, b, t) { return a + (b - a) * t; },
    lerpColor(c1, c2, t) {
        const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
        const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
        const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
        return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
    },
    randomInRange(min, max) { return min + Math.random() * (max - min); },
    randomInt(min, max) { return Math.floor(min + Math.random() * (max - min + 1)); },
    weightedRandom(items, weightKey) {
        const total = items.reduce((s, item) => s + (item[weightKey] || 1), 0);
        let r = Math.random() * total;
        for (const item of items) { r -= item[weightKey] || 1; if (r <= 0) return item; }
        return items[items.length - 1];
    },
    shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
        return a;
    },
    distance(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); },
    angleBetween(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); },
    formatTime(ms) {
        const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
        return (h > 0 ? h + 'h ' : '') + (m % 60) + 'm ' + (s % 60) + 's';
    },
    formatNumber(n) {
        if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
        return n.toString();
    },
    easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; },
    easeOut(t) { return 1 - Math.pow(1 - t, 3); },
    easeIn(t) { return t * t * t; },
    lerpAngle(a, b, t) {
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return a + diff * t;
    },
};

// в”Ђв”Ђв”Ђ EXPORT / IMPORT SAVE DATA в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const SAVE_IO = {
    exportToClipboard() {
        const data = SAVE_MANAGER.load(0);
        if (!data) return 'No save data';
        try {
            const json = JSON.stringify(data);
            const compressed = btoa(unescape(encodeURIComponent(json)));
            if (navigator.clipboard) { navigator.clipboard.writeText(compressed); return 'Copied to clipboard!'; }
            return compressed;
        } catch(e) { return 'Export failed'; }
    },
    importFromClipboard(text) {
        try {
            const json = decodeURIComponent(escape(atob(text)));
            const data = JSON.parse(json);
            const migrated = migrateSaveData(data);
            if (migrated) { SAVE_MANAGER.save(0, migrated); game.character = migrated; return 'Import successful!'; }
            return 'Invalid data';
        } catch(e) { return 'Import failed'; }
    },
    exportToFile() {
        const data = SAVE_MANAGER.load(0);
        if (!data) return;
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'neon_protocol_save.json'; a.click();
        URL.revokeObjectURL(url);
    },
    importFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                const migrated = migrateSaveData(data);
                if (migrated) { SAVE_MANAGER.save(0, migrated); game.character = migrated; alert('Save imported!'); }
                else { alert('Invalid save file'); }
            } catch(ex) { alert('Error parsing save file'); }
        };
        reader.readAsText(file);
    },
};

function generateSound(type) {
    try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.connect(gain); gain.connect(actx.destination);
        switch (type) {
            case 'boss_warning': osc.frequency.setValueAtTime(200, actx.currentTime); osc.frequency.linearRampToValueAtTime(800, actx.currentTime + 0.5); osc.type = 'sawtooth'; gain.gain.setValueAtTime(0.3, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.6); osc.start(); osc.stop(actx.currentTime + 0.6); break;
            case 'level_up': osc.frequency.setValueAtTime(400, actx.currentTime); osc.frequency.setValueAtTime(600, actx.currentTime + 0.1); osc.frequency.setValueAtTime(800, actx.currentTime + 0.2); osc.frequency.setValueAtTime(1000, actx.currentTime + 0.3); osc.type = 'square'; gain.gain.setValueAtTime(0.2, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.4); osc.start(); osc.stop(actx.currentTime + 0.4); break;
            case 'coin': osc.frequency.setValueAtTime(1000, actx.currentTime); osc.frequency.setValueAtTime(1500, actx.currentTime + 0.05); osc.type = 'sine'; gain.gain.setValueAtTime(0.2, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.15); osc.start(); osc.stop(actx.currentTime + 0.15); break;
            case 'error': osc.frequency.setValueAtTime(300, actx.currentTime); osc.frequency.setValueAtTime(200, actx.currentTime + 0.1); osc.type = 'square'; gain.gain.setValueAtTime(0.3, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.2); osc.start(); osc.stop(actx.currentTime + 0.2); break;
            case 'success': osc.frequency.setValueAtTime(600, actx.currentTime); osc.frequency.setValueAtTime(900, actx.currentTime + 0.1); osc.frequency.setValueAtTime(1200, actx.currentTime + 0.2); osc.type = 'sine'; gain.gain.setValueAtTime(0.2, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.3); osc.start(); osc.stop(actx.currentTime + 0.3); break;
            case 'click': osc.frequency.setValueAtTime(800, actx.currentTime); osc.type = 'square'; gain.gain.setValueAtTime(0.1, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.05); osc.start(); osc.stop(actx.currentTime + 0.05); break;
            case 'explosion': osc.frequency.setValueAtTime(150, actx.currentTime); osc.frequency.linearRampToValueAtTime(50, actx.currentTime + 0.3); osc.type = 'sawtooth'; gain.gain.setValueAtTime(0.4, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.4); osc.start(); osc.stop(actx.currentTime + 0.4); break;
            case 'power_up': osc.frequency.setValueAtTime(400, actx.currentTime); osc.frequency.linearRampToValueAtTime(1200, actx.currentTime + 0.3); osc.type = 'sine'; gain.gain.setValueAtTime(0.2, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.4); osc.start(); osc.stop(actx.currentTime + 0.4); break;
        }
    } catch(e) {}
}

function persistGameState() {
    try {
        const state = {
            screen: game?.screen || 'main',
            timestamp: Date.now(),
            version: '2.0.4',
        };
        localStorage.setItem('neon_game_state', JSON.stringify(state));
    } catch(e) {}
}

function restoreGameState() {
    try {
        const raw = localStorage.getItem('neon_game_state');
        if (!raw) return null;
        const state = JSON.parse(raw);
        if (Date.now() - state.timestamp < 3600000 && state.screen) {
            return state.screen;
        }
    } catch(e) {}
    return null;
}

setInterval(persistGameState, 10000);

// в”Ђв”Ђв”Ђ SKILL EFFECTS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const SKILL_EFFECTS = {
    hacking: { base: 2, perLevel: 0.5, desc: 'Improves hacking power' },
    combat: { base: 3, perLevel: 1.0, desc: 'Increases attack damage' },
    defense: { base: 2, perLevel: 0.8, desc: 'Boosts defense rating' },
    crafting: { base: 0.05, perLevel: 0.02, desc: 'Better craft success rate' },
    luck: { base: 0.01, perLevel: 0.01, desc: 'Improves loot and crit chance' },
    speed: { base: 0.02, perLevel: 0.02, desc: 'Increases combat speed' },
    energy: { base: 5, perLevel: 3, desc: 'Increases max energy' },
    hp: { base: 10, perLevel: 5, desc: 'Increases max HP' },
    stealth: { base: 0.02, perLevel: 0.015, desc: 'Improves evasion' },
    leadership: { base: 0.01, perLevel: 0.01, desc: 'Better clan bonuses' },
};

function getSkillEffect(skillId, level) {
    const eff = SKILL_EFFECTS[skillId];
    if (!eff) return 0;
    return eff.base + eff.perLevel * (level || 0);
}

function calculateSkillBonus(skills) {
    const bonus = {};
    (skills || []).forEach(s => {
        const eff = SKILL_EFFECTS[s.id];
        if (eff) {
            const key = s.id;
            bonus[key] = (bonus[key] || 0) + eff.base + eff.perLevel * (s.lvl || 0);
        }
    });
    return bonus;
}

// в”Ђв”Ђв”Ђ ACHIEVEMENT CHECK SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function checkAchievements(character) {
    const unlocked = character?.achievements || [];
    const newAchievements = [];
    const stats = character?.stats || {};
    ACHIEVEMENTS_DATA.forEach(a => {
        if (unlocked.includes(a.id)) return;
        if (a.condition(stats)) {
            newAchievements.push(a);
            unlocked.push(a.id);
        }
    });
    if (newAchievements.length > 0) {
        character.achievements = unlocked;
        newAchievements.forEach(a => {
            character.credits = (character.credits || 0) + (a.rewards?.cr || 0);
            character.experience = (character.experience || 0) + (a.rewards?.xp || 0);
            ACHIEVEMENT_HISTORY.add(a);
            ACHIEVEMENT_UNLOCK.show(a);
        });
    }
    return newAchievements;
}

function generateQuest(playerLevel, zone) {
    const questTypes = [
        { type: 'kill', target: 'enemies', count: 3 + Math.floor(playerLevel / 5), desc: 'Defeat enemies in ' + (zone || 'the zone'), rewards: { cr: 50 + playerLevel * 30, xp: 25 + playerLevel * 15 } },
        { type: 'collect', target: 'credits', count: 200 + playerLevel * 100, desc: 'Earn credits in ' + (zone || 'any zone'), rewards: { cr: 100 + playerLevel * 50, xp: 50 + playerLevel * 25 } },
        { type: 'explore', target: 'nodes', count: 3 + Math.floor(playerLevel / 10), desc: 'Explore network nodes', rewards: { cr: 80 + playerLevel * 40, xp: 40 + playerLevel * 20 } },
        { type: 'craft', target: 'items', count: 1 + Math.floor(playerLevel / 15), desc: 'Craft programs', rewards: { cr: 150 + playerLevel * 60, xp: 75 + playerLevel * 30 } },
    ];
    const q = questTypes[Math.floor(Math.random() * questTypes.length)];
    return {
        id: 'quest_' + Date.now() + '_' + Math.random().toString(36).substring(2, 6),
        name: q.desc.substring(0, 30),
        desc: q.desc,
        type: q.type,
        target: q.target,
        count: q.count,
        progress: 0,
        completed: false,
        rewards: q.rewards,
        expiresAt: Date.now() + 86400000,
        zone: zone || 'any',
    };
}

function generateDailyQuestsEx(playerLevel, count) {
    const quests = [];
    for (let i = 0; i < (count || 3); i++) {
        quests.push(generateQuest(playerLevel, null));
    }
    return quests;
}

function updateQuestProgressEx(quest, event) {
    if (quest.completed) return false;
    if (quest.type === event.type && (!quest.target || quest.target === event.target)) {
        quest.progress = Math.min(quest.count, (quest.progress || 0) + (event.amount || 1));
        if (quest.progress >= quest.count) {
            quest.completed = true;
            return true;
        }
    }
    return false;
}

// в”Ђв”Ђв”Ђ INVENTORY EQUIPMENT COMPARISON в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function compareItems(itemA, itemB) {
    const diff = {};
    const stats = ['atk', 'def', 'hack', 'spd', 'crit', 'energy', 'stealth', 'hp'];
    stats.forEach(s => {
        const valA = itemA?.[s] || 0;
        const valB = itemB?.[s] || 0;
        if (valA !== valB) diff[s] = valA - valB;
    });
    const totalA = stats.reduce((sum, s) => sum + (itemA?.[s] || 0), 0);
    const totalB = stats.reduce((sum, s) => sum + (itemB?.[s] || 0), 0);
    return { diff, totalDiff: totalA - totalB, better: totalA > totalB };
}

function getItemPower(item) {
    if (!item) return 0;
    return ((item.atk || 0) * 2) + ((item.def || 0) * 1.5) + ((item.hack || 0) * 3) + ((item.spd || 0) * 1) + ((item.crit || 0) * 10) + ((item.hp || 0) * 0.1);
}

function initChatSystem(game) {
    if (!game._chatMessages) game._chatMessages = [];
    const addMessage = () => {
        const msg = generateChatMessage();
        const now = new Date();
        const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        game._chatMessages.push({ ...msg, time });
        if (game._chatMessages.length > 100) game._chatMessages.shift();
    };
    setInterval(addMessage, 8000 + Math.random() * 12000);
    for (let i = 0; i < 5; i++) {
        const msg = generateChatMessage();
        const now = new Date();
        const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        game._chatMessages.push({ ...msg, time });
    }
}

    const leaderboard = [];
    const count = players || names.length;
    for (let i = 0; i < Math.min(count, names.length); i++) {
        leaderboard.push({
            rank: i + 1,
            name: names[i],
            level: Math.floor(50 + Math.random() * 50),
            rating: Math.floor(1000 + Math.random() * 1500),
            wins: Math.floor(Math.random() * 500),

// в”Ђв”Ђв”Ђ LOOT BOX SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const LOOT_BOX_TYPES = {
    common: { cost: 100, items: [{ id: 'data_fragment', weight: 50 }, { id: 'credit_chip', weight: 40 }, { id: 'program_shard', weight: 10 }], color: '#aaa' },
    rare: { cost: 500, items: [{ id: 'matrix_key', weight: 30 }, { id: 'rare_program', weight: 25 }, { id: 'encrypted_data', weight: 25 }, { id: 'upgrade_module', weight: 20 }], color: '#0ff' },
    epic: { cost: 2000, items: [{ id: 'legendary_shard', weight: 20 }, { id: 'epic_program', weight: 25 }, { id: 'ai_core', weight: 20 }, { id: 'premium_crate', weight: 20 }, { id: 'void_essence', weight: 15 }], color: '#f0f' },
    legendary: { cost: 10000, items: [{ id: 'legendary_program', weight: 15 }, { id: 'prime_matrix', weight: 15 }, { id: 'ancient_code', weight: 20 }, { id: 'quantum_core', weight: 20 }, { id: 'ai_prime_fragment', weight: 15 }, { id: 'neon_token', weight: 15 }], color: '#ff0' },
};

function openLootBox(boxType, inventory) {
    const box = LOOT_BOX_TYPES[boxType];
    if (!box) return { items: [], message: 'Invalid box type' };
    const totalWeight = box.items.reduce((s, i) => s + i.weight, 0);
    let r = Math.random() * totalWeight;
    const won = [];
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
        r = Math.random() * totalWeight;
        for (const item of box.items) {
            r -= item.weight;
            if (r <= 0) { won.push({ ...item, qty: 1 }); break; }
        }
    }
    return { items: won, message: 'Opened ' + boxType + ' box! Got ' + won.length + ' items' };
}

// в”Ђв”Ђв”Ђ DUNGEON GENERATOR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateDungeonFloor(floor, playerLevel) {
    const rooms = 3 + Math.floor(floor / 2);
    const enemiesPerRoom = 1 + Math.floor(floor / 3);
    const difficulty = 1 + floor * 0.1;
    const floorData = {
        floor,
        rooms: [],
        difficulty,
        reward: { cr: 100 * floor * (1 + playerLevel * 0.05), xp: 50 * floor * (1 + playerLevel * 0.05) },
    };
    for (let i = 0; i < rooms; i++) {
        const roomEnemies = [];
        for (let j = 0; j < enemiesPerRoom; j++) {
            roomEnemies.push({ name: 'Dungeon Enemy', level: playerLevel + floor, hp: 30 + floor * 10, dmg: 5 + floor * 2 });
        }
        floorData.rooms.push({
            id: i,
            cleared: false,
            enemies: roomEnemies,
            loot: { cr: 10 * floor, xp: 5 * floor },
        });
    }
    floorData.boss = {
        name: 'Floor ' + floor + ' Boss',
        level: playerLevel + floor + 2,
        hp: 100 + floor * 30,
        maxHp: 100 + floor * 30,
        dmg: 10 + floor * 3,
        def: 2 + Math.floor(floor / 2),
    };
    return floorData;
}

// в”Ђв”Ђв”Ђ ECONOMY SIMULATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function simulateEconomyTick(market) {
    const marketData = market || { prices: {}, volumes: {}, trends: {} };
    Object.keys(marketData.prices || {}).forEach(item => {
        const volatility = 0.05 + Math.random() * 0.1;
        const change = (Math.random() - 0.48) * volatility;
        marketData.prices[item] = Math.max(1, (marketData.prices[item] || 100) * (1 + change));
        marketData.trends[item] = change;
        marketData.volumes[item] = Math.floor((marketData.volumes[item] || 100) * (0.8 + Math.random() * 0.4));
    });
    return marketData;
}

function getMarketPrice(itemId, basePrice, marketData) {
    const md = marketData?.prices?.[itemId];
    if (!md) return basePrice;
    return Math.floor(md);
}

function getMarketTrend(itemId, marketData) {
    return marketData?.trends?.[itemId] || 0;
}

// в”Ђв”Ђв”Ђ ADVANCED COMBAT SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function executeCombatRound(attacker, defender, modifiers) {
    const spdRatio = (attacker.spd || 1) / Math.max(1, (defender.spd || 1));
    const atkMult = (attacker.atkMult || 1) * (modifiers?.atkMult || 1);
    const defMult = (defender.defMult || 1) * (modifiers?.defMult || 1);
    const baseAtk = (attacker.dmg || attacker.atk || 10) * atkMult;
    const baseDef = (defender.def || 5) * defMult;
    const rawDmg = Math.max(1, baseAtk - baseDef * 0.3 + (Math.random() - 0.5) * 5);
    const critChance = (attacker.crit || 0.05) + (modifiers?.critBonus || 0);
    const isCrit = Math.random() < Math.min(0.9, critChance);
    const critMult = (attacker.critMult || 1.5) + (modifiers?.critDamageBonus || 0);
    const damage = isCrit ? Math.floor(rawDmg * critMult) : Math.floor(rawDmg);
    const blocked = Math.random() < (defender.block || 0);
    const dodged = Math.random() < (defender.evasion || 0) * spdRatio;
    if (blocked) return { damage: 0, type: 'block', message: 'Blocked!' };
    if (dodged) return { damage: 0, type: 'dodge', message: 'Dodged!' };
    defender.hp = Math.max(0, (defender.hp || 0) - damage);
    return { damage, type: isCrit ? 'crit' : 'hit', message: isCrit ? 'CRIT! ' + damage : '-' + damage, crit: isCrit };
}

function checkCombatEnd(player, enemy) {
    if (player.hp <= 0) return { ended: true, winner: 'enemy', reason: 'Player defeated' };
    if (enemy.hp <= 0) return { ended: true, winner: 'player', reason: 'Enemy defeated' };
    return { ended: false };
}

function calculateCombatRewards(enemy, playerLevel, zoneMult) {
    const baseCr = enemy.reward?.cr || 10;
    const baseXp = enemy.reward?.xp || 5;
    const levelDiff = Math.max(1, (enemy.level || 1) - playerLevel + 5);
    const crMult = levelDiff / 5 * (zoneMult || 1) * (1 + Math.random() * 0.3);
    const xpMult = levelDiff / 5 * (zoneMult || 1) * (1 + Math.random() * 0.2);
    return {
        cr: Math.floor(baseCr * crMult),
        xp: Math.floor(baseXp * xpMult),
        items: rollLoot(enemy.zone || 'matrix', 0),
    };
}

function applyCombatRewards(character, rewards, game) {
    character.credits = (character.credits || 0) + rewards.cr;
    character.experience = (character.experience || 0) + rewards.xp;
    if (rewards.items && rewards.items.length > 0) {
        character.inventory = character.inventory || [];
        rewards.items.forEach(item => addItemToInventory(character.inventory, item, true));
    }
    const xpNeeded = calcXpForLevel((character.level || 1) + 1);
    while ((character.experience || 0) >= xpNeeded && (character.level || 1) < 100) {
        character.experience -= xpNeeded;
        character.level = (character.level || 1) + 1;
        character.maxHp = (character.maxHp || 100) + 10;
        character.hp = character.maxHp;
        if (game) { game.showNotification('Level Up! Level ' + character.level, '#ff0'); LEVEL_UP_EFFECT.trigger(character.level); }
    }
    return rewards;
}

// в”Ђв”Ђв”Ђ PLAYER STAT CALCULATOR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculatePlayerStats(character) {
    const base = {
        atk: 10 + (character.level || 1) * 2,
        def: 5 + (character.level || 1) * 1,
        hack: 5 + (character.level || 1) * 1,
        spd: 1 + (character.level || 1) * 0.01,
        crit: 0.05 + (character.level || 1) * 0.001,
        hp: 100 + (character.level || 1) * 10,
        energy: 100 + (character.level || 1) * 5,
    };
    const equipStats = getEquipmentStats(character.equipment);
    const skillBonuses = calculateSkillBonus(character.skills);
    const petBonus = getPetBonus(character.pet);
    const prestigeMult = 1 + ((character.prestige || 0) * 0.1);
    return {
        atk: Math.floor((base.atk + equipStats.atk + skillBonuses.combat + petBonus.atk) * prestigeMult),
        def: Math.floor((base.def + equipStats.def + skillBonuses.defense + petBonus.def) * prestigeMult),
        hack: Math.floor((base.hack + equipStats.hack + skillBonuses.hacking) * prestigeMult),
        spd: base.spd + equipStats.spd + skillBonuses.speed + petBonus.spd,
        crit: Math.min(0.8, base.crit + equipStats.crit * 0.01 + skillBonuses.luck + skillBonuses.crit * 0.01),
        hp: base.hp + equipStats.hp + skillBonuses.hp * 10,
        energy: base.energy + equipStats.energy + skillBonuses.energy * 5,
        maxHp: base.hp + equipStats.hp + skillBonuses.hp * 10,
        maxEnergy: base.energy + equipStats.energy + skillBonuses.energy * 5,
    };
}

// в”Ђв”Ђв”Ђ REPUTATION SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function getReputationTitle(rep) {
    if (rep >= 1000) return { title: 'Legendary', mult: 3.0, color: '#ff0' };
    if (rep >= 750) return { title: 'Honored', mult: 2.0, color: '#f0f' };
    if (rep >= 500) return { title: 'Friendly', mult: 1.5, color: '#0f0' };
    if (rep >= 200) return { title: 'Neutral', mult: 1.0, color: '#888' };
    if (rep >= -200) return { title: 'Unfriendly', mult: 0.75, color: '#f80' };
    if (rep >= -500) return { title: 'Hostile', mult: 0.5, color: '#f00' };
    return { title: 'Hated', mult: 0.25, color: '#800' };
}

function getReputationDiscount(rep, basePrice) {
    const title = getReputationTitle(rep);
    if (title.mult >= 1.0) return Math.floor(basePrice * (1 - (title.mult - 1) * 0.1));
    return Math.floor(basePrice * title.mult);
}

// в”Ђв”Ђв”Ђ ITEM GENERATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateRandomItem(playerLevel, rarity) {
    const rarities = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
    const r = rarity || rarities[Math.floor(Math.random() * (rarities.length))];
    const rarityMult = { common: 1, uncommon: 1.3, rare: 1.8, epic: 2.5, legendary: 4.0 };
    const mult = rarityMult[r] || 1;
    const slots = ['weapon', 'armor', 'head', 'accessory', 'boots'];
    const slot = slots[Math.floor(Math.random() * slots.length)];
    const names = {
        weapon: ['Blade', 'Sword', 'Striker', 'Breaker', 'Edge'],
        armor: ['Shield', 'Plate', 'Guard', 'Shell', 'Skin'],
        head: ['Crown', 'Visor', 'Helm', 'Mask', 'Diadem'],
        accessory: ['Ring', 'Amulet', 'Core', 'Token', 'Orb'],
        boots: ['Boots', 'Treads', 'Walkers', 'Greaves', 'Steppers'],
    };
    const nameList = names[slot] || ['Item'];
    const name = nameList[Math.floor(Math.random() * nameList.length)];
    const stats = {};
    if (slot === 'weapon') stats.atk = Math.floor((5 + Math.random() * 10 + playerLevel * 2) * mult);
    if (slot === 'armor') stats.def = Math.floor((4 + Math.random() * 8 + playerLevel * 1.5) * mult);
    if (slot === 'accessory') stats.crit = Math.floor((1 + Math.random() * 4) * mult);
    if (slot === 'head') stats.hack = Math.floor((2 + Math.random() * 5 + playerLevel * 1) * mult);
    if (slot === 'boots') stats.spd = Math.floor((1 + Math.random() * 3 + playerLevel * 0.5) * mult);
    stats.hp = Math.floor((10 + Math.random() * 20) * mult);
    return { id: 'gen_' + Date.now() + '_' + Math.random().toString(36).substring(2, 4), name: r + ' ' + name, type: slot, slot, rarity: r, lvl: playerLevel, ...stats, cost: Math.floor(100 * mult * (1 + playerLevel * 0.1)), desc: 'Generated ' + r + ' ' + slot };
}

// в”Ђв”Ђв”Ђ ENEMY SPAWNER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function spawnEnemyForPlayer(playerLevel, zone) {
    const zoneData = getZoneData(zone) || ZONES_DATA[0];
    const difficulty = zoneData.minLvl + Math.floor(Math.random() * (zoneData.maxLvl - zoneData.minLvl + 1));
    const isElite = Math.random() < 0.1;
    const isBoss = Math.random() < 0.02;
    const template = getEnemyForZone(zone, difficulty);
    if (isBoss) {
        const boss = createBoss(zone, playerLevel);
        return { ...boss, isBoss: true, hp: boss.hp, maxHp: boss.maxHp };
    }
    if (isElite) {
        return { ...template, name: 'Elite ' + template.name, hp: template.hp * 1.5, maxHp: (template.maxHp || template.hp) * 1.5, dmg: template.dmg * 1.3, def: (template.def || 0) * 1.3, isElite: true, reward: { cr: (template.reward?.cr || 10) * 2, xp: (template.reward?.xp || 5) * 2 } };
    }
    return template;
}

// в”Ђв”Ђв”Ђ SAVE DATA VALIDATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function validateCharacterData(data) {
    if (!data || typeof data !== 'object') return { valid: false, errors: ['No data'] };
    const errors = [];
    if (typeof data.credits !== 'number' || data.credits < 0) errors.push('Invalid credits');
    if (typeof data.level !== 'number' || data.level < 1 || data.level > 100) errors.push('Invalid level');
    if (typeof data.hp !== 'number' || data.hp < 0) errors.push('Invalid HP');
    if (typeof data.maxHp !== 'number' || data.maxHp < 1) errors.push('Invalid maxHp');
    if (data.inventory && !Array.isArray(data.inventory)) errors.push('Invalid inventory');
    if (data.skills && !Array.isArray(data.skills)) errors.push('Invalid skills');
    if (data.equipment && typeof data.equipment !== 'object') errors.push('Invalid equipment');
    if (data.missions && !Array.isArray(data.missions)) errors.push('Invalid missions');
    if (data.achievements && !Array.isArray(data.achievements)) errors.push('Invalid achievements');
    return { valid: errors.length === 0, errors };
}

function sanitizeCharacterData(data) {
    const safe = {
        name: data.name || 'NetRunner',
        level: Math.max(1, Math.min(100, Math.floor(data.level || 1))),
        experience: Math.max(0, Math.floor(data.experience || 0)),
        credits: Math.max(0, Math.floor(data.credits || 0)),
        hp: Math.max(1, Math.floor(data.hp || 100)),
        maxHp: Math.max(1, Math.floor(data.maxHp || 100)),
        energy: Math.max(0, Math.floor(data.energy || 100)),
        maxEnergy: Math.max(1, Math.floor(data.maxEnergy || 100)),
        inventory: Array.isArray(data.inventory) ? data.inventory : [],
        equipment: typeof data.equipment === 'object' ? data.equipment : {},
        skills: Array.isArray(data.skills) ? data.skills : [],
        missions: Array.isArray(data.missions) ? data.missions : [],
        achievements: Array.isArray(data.achievements) ? data.achievements : [],
        stats: typeof data.stats === 'object' ? data.stats : {},
        reputation: typeof data.reputation === 'object' ? data.reputation : {},
        prestige: Math.max(0, Math.floor(data.prestige || 0)),
        collectibles: Array.isArray(data.collectibles) ? data.collectibles : [],
        pet: typeof data.pet === 'object' ? data.pet : null,
        season: typeof data.season === 'object' ? data.season : { level: 1, xp: 0, season: 1 },
    };
    return safe;
}
