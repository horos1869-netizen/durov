// в”Ђв”Ђв”Ђ Grid Lines Effect в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
Game.prototype.drawGridLines = function(ctx, time, color) {
    const w = this.width, h = this.height;
    ctx.strokeStyle = color || 'rgba(0,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < w; x += 30) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 0; y < h; y += 30) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
};

Game.prototype.drawDataParticles = function(ctx, time) {
    const count = 20;
    for (let i = 0; i < count; i++) {
        const seed = i * 137.5;
        const x = ((time * 0.3 + seed) % this.width);
        const y = ((time * 0.5 + seed * 1.5) % this.height);
        ctx.fillStyle = `rgba(0,255,255,${0.1 + Math.sin(time * 0.01 + i) * 0.05})`;
        ctx.fillRect(x, y, 2, 2);
    }
};

Game.prototype.renderLoading = function() {
    const ctx = this.ctx;
    this.drawGridBackground(ctx, this.time);
    ctx.fillStyle = '#0ff';
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('> Р—РђР“Р РЈР—РљРђ...', this.width / 2, this.height / 2 - 30);
    const prog = Math.min(1, this.time / 2000);
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(this.width / 2 - 100, this.height / 2 + 10, 200, 12);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(this.width / 2 - 100, this.height / 2 + 10, 200 * prog, 12);
    ctx.strokeStyle = '#0ff44';
    ctx.lineWidth = 1;
    ctx.strokeRect(this.width / 2 - 100, this.height / 2 + 10, 200, 12);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText(Math.floor(prog * 100) + '%', this.width / 2, this.height / 2 + 35);
    if (prog >= 1 && !this._loaded) {
        this._loaded = true;
        setTimeout(() => { this.screen = 'main'; this.sound.play('levelup'); }, 300);
    }
};

Game.prototype.renderMain = function() {
    const ctx = this.ctx;
    const t = this.time;
    this.drawGridBackground(ctx, t);
    this.drawDataParticles(ctx, t);
    this.drawScanner(ctx, t);
    const cx = this.width / 2;
    const ch = this.character;
    ctx.save();
    ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#0ff'; ctx.font = 'bold 18px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('> NEON PROTOCOL <', cx, 20);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0ff'; ctx.globalAlpha = 0.3 + 0.15 * Math.sin(t * 0.03);
    ctx.font = '8px Orbitron';
    ctx.fillText('Ghost in the Grid', cx, 38);
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(0,10,20,0.7)'; ctx.strokeStyle = '#0ff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(8, 48); ctx.lineTo(cx - 80, 48);
    ctx.quadraticCurveTo(cx, 44, cx + 80, 48); ctx.lineTo(this.width - 8, 48);
    ctx.stroke();
    ctx.fillStyle = 'rgba(0,10,20,0.8)';
    ctx.beginPath(); ctx.moveTo(10, 55); ctx.lineTo(this.width - 10, 55);
    ctx.lineTo(this.width - 10, 108); ctx.lineTo(10, 108); ctx.closePath();
    ctx.fill(); ctx.strokeStyle = '#0ff'; ctx.lineWidth = 0.5; ctx.stroke();
    ctx.shadowColor = '#0f0'; ctx.shadowBlur = 6;
    ctx.fillStyle = '#0f0'; ctx.font = 'bold 10px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(`в—Џ ${ch?.nickname || ch?.name || 'РҐР°РєРµСЂ'}`, 16, 58);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa'; ctx.font = '8px monospace';
    ctx.fillText(`Lv.${ch?.level || 1}  |  HP ${ch?.hp || 100}/${ch?.maxHp || 100}`, 16, 74);
    ctx.fillStyle = 'rgba(0,20,0,0.5)'; ctx.strokeStyle = '#0f0';
    ctx.beginPath(); ctx.moveTo(16, 90); ctx.lineTo(166, 90);
    ctx.lineTo(166, 98); ctx.lineTo(16, 98); ctx.closePath(); ctx.fill(); ctx.stroke();
    const hpPct = Math.max(0, (ch?.hp || 100) / (ch?.maxHp || 100));
    const hGrad = ctx.createLinearGradient(16, 90, 16 + 150 * hpPct, 90);
    hGrad.addColorStop(0, '#0f0'); hGrad.addColorStop(1, '#0f0' + '88');
    ctx.fillStyle = hGrad;
    ctx.shadowColor = '#0f0'; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.moveTo(16, 90); ctx.lineTo(16 + 150 * hpPct, 90);
    ctx.lineTo(16 + 150 * hpPct, 98); ctx.lineTo(16, 98); ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff0'; ctx.font = '9px monospace'; ctx.textAlign = 'right';
    ctx.shadowColor = '#ff0'; ctx.shadowBlur = 3;
    ctx.fillText(`рџ’° ${this.formatCredits(ch?.credits || 0)}`, this.width - 16, 60);
    ctx.shadowBlur = 0;
    const enPct = Math.max(0, (ch?.energy || 100) / (ch?.maxEnergy || 100));
    ctx.fillStyle = 'rgba(0,0,20,0.5)'; ctx.strokeStyle = '#00f';
    ctx.beginPath(); ctx.moveTo(this.width - 166, 90); ctx.lineTo(this.width - 16, 90);

Game.prototype.drawEnemySprite = function(ctx, cx, cy, radius, enemy, time) {
    const t = time || 0;
    const sides = enemy.isBoss ? 6 : enemy.isElite ? 5 : 4;
    const pulse = 0.9 + 0.1 * Math.sin(t * 0.04);
    const rot = t * 0.005;
    const color = enemy.isBoss ? '#f00' : enemy.isElite ? '#f80' : '#0ff';
    ctx.save();
    ctx.shadowColor = color; ctx.shadowBlur = 15;
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
        const angle = (i / sides) * Math.PI * 2 - Math.PI / 2 + rot;
        const r = radius * pulse;
        const px = cx + Math.cos(angle) * r;
        const py = cy + Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.stroke();
    ctx.shadowBlur = 8;
    ctx.fillStyle = color + '18'; ctx.fill();
    ctx.shadowBlur = 0;
    if (enemy.isBoss) {
        ctx.strokeStyle = '#ff0'; ctx.lineWidth = 1;
        ctx.shadowColor = '#ff0'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(cx, cy, radius * 0.4, 0, Math.PI * 2); ctx.stroke();
    }
    if (enemy.isElite) {
        ctx.strokeStyle = '#f80'; ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
            const a = t * 0.03 + i * Math.PI * 2 / 3;
            ctx.beginPath();
            ctx.arc(cx + Math.cos(a) * radius * 0.6, cy + Math.sin(a) * radius * 0.6, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.fillStyle = color; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(enemy.name || '???', cx, cy + radius + 14);
    ctx.restore();
};

    ];

    const branchNames = { hacking: 'рџ’» Hacking', combat: 'вљ” Combat', stealth: 'рџ‘» Stealth', tech: 'рџ”§ Tech' };
    const branchColors = { hacking: '#0ff', combat: '#f00', stealth: '#f0f', tech: '#ff0' };
    const sp = 60;
    branches.forEach((br, bi) => {
        const bx = 15 + bi * 93;
        ctx.fillStyle = branchColors[br]; ctx.font = '9px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';

        ctx.strokeStyle = branchColors[br] + '44'; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(bx, 68); ctx.lineTo(bx + 85, 68); ctx.stroke();
        const branchSkills = this.skillTree.filter(s => s.branch === br);
        branchSkills.forEach((sk, si) => {
            const sy = 75 + si * (sp + 5);
            const canAfford = (this.character?.character?.credits || 0) >= (sk.cost[sk.lvl] || 99999);

            const isLocked = sk.prereq && (this.skillTree.find(s => s.id === sk.prereq)?.lvl || 0) < 1;

            ctx.fillText(sk.icon, bx + 42, sy + 14);
            ctx.fillStyle = isMaxed ? '#0f0' : (isLocked ? '#555' : branchColors[br]);
            ctx.font = '8px Orbitron';
            ctx.fillText(sk.name.substring(0, 10), bx + 42, sy + 32);
            ctx.fillStyle = isMaxed ? '#0f0' : (isLocked ? '#444' : '#aaa');
            ctx.font = '7px monospace';
            ctx.fillText(isMaxed ? 'MAX' : `${sk.lvl}/${sk.max}`, bx + 42, sy + 46);
            if (!isMaxed && !isLocked) {
                ctx.fillStyle = canAfford ? '#0f0' : '#f00'; ctx.font = '6px monospace'; ctx.textAlign = 'right';
                ctx.fillText(`${sk.cost[sk.lvl]}Вў`, bx + 80, sy + 48);
            }
        });
    });
    ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('рџ’° ' + (this.character?.character?.credits || 0) + 'Вў available', 15, CFG.HEIGHT - 25);
    ctx.fillStyle = '#fff'; ctx.font = '9px Orbitron'; ctx.textAlign = 'center';
    ctx.fillText('Click a skill to upgrade', CFG.WIDTH/2, CFG.HEIGHT - 45);
    this._skillTreeHandler = (x, y) => {
        branches.forEach((br, bi) => {
            const bx = 15 + bi * 93;
            const branchSkills = this.skillTree.filter(s => s.branch === br);
            branchSkills.forEach((sk, si) => {
                const sy = 75 + si * (sp + 5);
                if (x >= bx && x <= bx + 85 && y >= sy && y <= sy + 55) {
                    if (sk.lvl >= sk.max) return;
                    if (sk.prereq && (this.skillTree.find(s => s.id === sk.prereq)?.lvl || 0) < 1) return;
                    const cost = sk.cost[sk.lvl] || 99999;
                    if ((this.character?.character?.credits || 0) < cost) return;
                    this.character.character.credits -= cost;
                    sk.lvl++;
                    this.sound.play('click');
                    this.anim.addParticles(bx + 42, sy + 27, 15, branchColors[br], 25);
                }
            });
    });
};

// в”Ђв”Ђв”Ђ EXTENDED ECONOMY DATA в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const ECONOMY_TIERS = [
    { name: 'Starter', minCr: 0, maxCr: 1000, taxRate: 0.05, label: 'Peasant' },
    { name: 'Bronze', minCr: 1000, maxCr: 10000, taxRate: 0.04, label: 'Trader' },
    { name: 'Silver', minCr: 10000, maxCr: 100000, taxRate: 0.03, label: 'Merchant' },
    { name: 'Gold', minCr: 100000, maxCr: 1000000, taxRate: 0.02, label: 'Tycoon' },
    { name: 'Platinum', minCr: 1000000, maxCr: 10000000, taxRate: 0.015, label: 'Millionaire' },
    { name: 'Diamond', minCr: 10000000, maxCr: 100000000, taxRate: 0.01, label: 'Billionaire' },
    { name: 'Neon', minCr: 100000000, maxCr: Infinity, taxRate: 0.005, label: 'Neon Lord' },
];

function getEconomyTier(credits) {
    return ECONOMY_TIERS.find(t => credits >= t.minCr && credits < t.maxCr) || ECONOMY_TIERS[0];
}

function getTaxRate(credits) { return getEconomyTier(credits).taxRate; }

// в”Ђв”Ђв”Ђ DAILY REWARD SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function getDailyReward(streak) {
    const idx = ((streak - 1) % 7);
    return DAILY_REWARDS[idx] || DAILY_REWARDS[0];
}

// в”Ђв”Ђв”Ђ REFERRAL SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const REFERRAL_REWARDS = [
    { count: 1, cr: 200, xp: 100, title: 'Recruiter' },
    { count: 5, cr: 1500, xp: 750, title: 'Influencer' },
    { count: 10, cr: 5000, xp: 2500, title: 'Networker' },
    { count: 25, cr: 20000, xp: 10000, title: 'Legendary Recruiter' },
    { count: 50, cr: 100000, xp: 50000, title: 'Viral Sensation' },
];

function getReferralReward(count) {
    let best = null;
    REFERRAL_REWARDS.forEach(r => { if (count >= r.count) best = r; });
    return best;
}

// в”Ђв”Ђв”Ђ EXTENDED DAMAGE FORMULAS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateElementalEffectiveness(atkType, defType) {
    const chart = {
        fire: { ice: 1.5, poison: 1.0, electric: 0.5, physical: 1.0 },
        ice: { fire: 0.5, poison: 1.5, electric: 1.0, physical: 1.0 },
        poison: { fire: 1.0, ice: 1.0, electric: 1.5, physical: 0.5 },
        electric: { fire: 0.5, ice: 1.0, poison: 1.0, physical: 1.5 },
        physical: { fire: 1.0, ice: 1.0, poison: 1.0, electric: 1.0 },
    };
    return chart[atkType]?.[defType] || 1.0;
}

function calculateCritDamage(baseDmg, critChance, critMult, luck) {
    const finalChance = Math.min(0.95, critChance + (luck || 0) * 0.01);
    if (Math.random() < finalChance) return { damage: Math.floor(baseDmg * critMult), crit: true };
    return { damage: baseDmg, crit: false };
}

function calculateDamageReduction(defense, attackerLevel) {
    return Math.min(0.8, defense / (defense + 50 + attackerLevel * 5));
}

function calculateAccuracy(attackerSpd, defenderSpd, baseAccuracy) {
    const spdRatio = attackerSpd / Math.max(1, defenderSpd);
    return Math.min(0.98, Math.max(0.5, baseAccuracy * (0.8 + spdRatio * 0.2)));
}

function calculateXpReward(enemyLevel, playerLevel, zoneMult, eventMult) {
    const base = 10 + enemyLevel * 5;
    const levelDiff = Math.max(1, enemyLevel - playerLevel + 5);
    return Math.floor(base * (levelDiff / 5) * (zoneMult || 1) * (eventMult || 1));
}

function calculateCreditReward(enemyLevel, zoneMult, luck) {
    const base = 5 + enemyLevel * 3;
    const luckMult = 1 + (luck || 0) * 0.1;
    return Math.floor(base * (zoneMult || 1) * luckMult * (0.8 + Math.random() * 0.4));
}

function calculateDropChance(baseRate, luck, eventMult) {
    return Math.min(0.95, baseRate * (1 + luck * 0.05) * (eventMult || 1));
}

// в”Ђв”Ђв”Ђ ENEMY ABILITY SYSTEM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const ENEMY_ABILITIES = {
    poison: { damage: 5, duration: 3000, tickInterval: 1000, color: '#0f0', desc: 'Poisons the target' },
    shield: { defense: 0.5, duration: 5000, color: '#00f', desc: 'Raises shield' },
    summon: { count: 2, minionType: 'spam_bot', color: '#f80', desc: 'Summons minions' },
    overclock: { atkMult: 1.5, duration: 4000, color: '#f00', desc: 'Increases attack speed' },
    stun: { duration: 2000, color: '#ff0', desc: 'Stuns the target' },
    cloak: { evasion: 0.8, duration: 3000, color: '#808', desc: 'Becomes invisible' },
    backstab: { dmgMult: 2.0, color: '#f0f', desc: 'Deals double damage from behind' },
    corrupt: { hackReduction: 0.5, duration: 5000, color: '#f00', desc: 'Reduces hacking power' },
    spread: { targets: 3, color: '#0f0', desc: 'Attacks multiple targets' },
    mind_control: { duration: 3000, color: '#f0f', desc: 'Takes control of target' },
    reality_shift: { statReduction: 0.3, duration: 5000, color: '#f0f', desc: 'Alters reality' },
    annihilate: { dmgMult: 3.0, color: '#fff', desc: 'Devastating attack' },
};

function getEnemyAbility(abilityId) { return ENEMY_ABILITIES[abilityId] || { damage: 0, duration: 0, color: '#888', desc: 'Unknown' }; }

function applyEnemyAbility(enemy, ability, target) {
    const ab = getEnemyAbility(ability);
    switch (ability) {
        case 'poison': target.statusEffects = target.statusEffects || []; target.statusEffects.push({ id: 'poison', name: 'Poison', remaining: ab.duration, type: 'dot', magnitude: ab.damage }); break;
        case 'shield': enemy.def = (enemy.def || 0) * (1 + ab.defense); setTimeout(() => { enemy.def = (enemy.def || 0) / (1 + ab.defense); }, ab.duration); break;
        case 'stun': target.stunned = true; setTimeout(() => { target.stunned = false; }, ab.duration); break;
        case 'summon': for (let i = 0; i < ab.count; i++) { /* create minion logic */ } break;
        case 'overclock': enemy.atkMult = enemy.atkMult || 1; enemy.atkMult *= ab.atkMult; setTimeout(() => { enemy.atkMult /= ab.atkMult; }, ab.duration); break;
        case 'cloak': enemy.evasion = ab.evasion; setTimeout(() => { enemy.evasion = 0; }, ab.duration); break;
        case 'annihilate': target.hp = Math.max(0, target.hp - (enemy.dmg || 10) * ab.dmgMult); break;
    }
    return { message: enemy.name + ' uses ' + (ab.desc || ability) + '!' };
}

        });

Game.prototype.ui.showToast = function(text, color, duration) {
    this._toast = { text, color: color || '#0ff', duration: duration || 2000, startTime: Date.now() };
};

Game.prototype.ui.drawToast = function() {
    if (!this._toast) return;
    const elapsed = Date.now() - this._toast.startTime;
    if (elapsed > this._toast.duration) { this._toast = null; return; }
    const alpha = elapsed < 200 ? elapsed / 200 : Math.min(1, 1 - (elapsed - this._toast.duration + 200) / 200);
    const ctx = this.ctx;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,10,20,0.85)';
    ctx.shadowColor = this._toast.color;
    ctx.shadowBlur = 10;
    const tw = ctx.measureText ? ctx.measureText(this._toast.text).width + 30 : 200;
    ctx.fillRect(CFG.WIDTH / 2 - tw / 2, 100, tw, 30);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = this._toast.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(CFG.WIDTH / 2 - tw / 2, 100, tw, 30);
    ctx.fillStyle = this._toast.color;
    ctx.font = '10px Orbitron';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this._toast.text, CFG.WIDTH / 2, 115);
    ctx.restore();
};

Game.prototype.ui.drawProgressBar = function(x, y, w, h, progress, fgColor, bgColor, borderColor) {
    const ctx = this.ctx;
    ctx.save();
    ctx.fillStyle = bgColor || '#1a1a2a';
    this.ui.roundRect(ctx, x, y, w, h, 3, true, false);
    ctx.fillStyle = fgColor || '#0ff';
    this.ui.roundRect(ctx, x, y, w * Math.min(1, Math.max(0, progress)), h, 3, true, false);
    ctx.strokeStyle = borderColor || fgColor || '#0ff';
    ctx.lineWidth = 1;
    this.ui.roundRect(ctx, x, y, w, h, 3, false, true);
    ctx.restore();
};

// в”Ђв”Ђв”Ђ GAME DEBUG CONSOLE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const DEBUG_CONSOLE = {
    visible: false,
    lines: [],
    input: '',
    history: [],
    historyIdx: 0,
    maxLines: 50,
    toggle() { this.visible = !this.visible; },
    log(text, color) { this.lines.push({ text, color: color || '#aaa', time: Date.now() }); if (this.lines.length > this.maxLines) this.lines.shift(); },
    clear() { this.lines = []; },
    execute(cmd) {
        this.history.push(cmd);
        this.historyIdx = this.history.length;
        this.log('> ' + cmd, '#0ff');
        try {
            const parts = cmd.trim().split(' ');
            const command = parts[0].toLowerCase();
            const args = parts.slice(1);
            switch (command) {
                case 'help': this.log('Commands: help, clear, screen, credits, xp, level, hp, energy, stats, save, load, fps, bgm, cheats, debug', '#ff0'); break;
                case 'clear': this.clear(); break;
                case 'screen': if (args[0] && game) { game.screen = args[0]; this.log('Screen: ' + args[0], '#0f0'); } else { this.log('Usage: screen <name>', '#f00'); } break;
                case 'credits': if (game?.character?.character) { game.character.character.credits = parseInt(args[0]) || 99999; this.log('Credits set', '#0f0'); } break;
                case 'xp': if (game?.character?.character) { game.character.character.experience = (game.character.character.experience || 0) + (parseInt(args[0]) || 1000); this.log('XP added', '#0f0'); } break;
                case 'level': if (game?.character?.character) { game.character.character.level = parseInt(args[0]) || 50; this.log('Level set', '#0f0'); } break;
                case 'hp': if (game?.character?.character) { game.character.character.hp = parseInt(args[0]) || 9999; this.log('HP set', '#0f0'); } break;
                case 'energy': if (game?.character?.character) { game.character.character.energy = parseInt(args[0]) || 9999; this.log('Energy set', '#0f0'); } break;
                case 'stats': if (game?.character?.character) { this.log(JSON.stringify(game.character.character, null, 2).substring(0, 200), '#888'); } break;
                case 'save': SAVE_MANAGER.save(0, game?.character); this.log('Saved!', '#0f0'); break;
                case 'load': const d = SAVE_MANAGER.load(0); if (d) { game.character = d; this.log('Loaded!', '#0f0'); } else { this.log('No save', '#f00'); } break;
                case 'fps': if (game) { game._showFps = !game._showFps; this.log('FPS: ' + game._showFps, '#0f0'); } break;
                case 'bgm': BGM.toggle(); this.log('BGM toggled', '#0f0'); break;
                case 'cheats': CHEATS.toggle(); this.log('Cheats: ' + CHEATS.enabled, '#0f0'); break;
                case 'debug': this.log('Screen: ' + (game?.screen || 'N/A') + ' | Version: 2.0.4 | Lines: ~12K', '#ff0'); break;
                default: this.log('Unknown command. Type "help"', '#f00'); break;
            }
        } catch(e) { this.log('Error: ' + e.message, '#f00'); }
    },
    draw(ctx) {
        if (!this.visible) return;
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.85)';
        ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('DEBUG CONSOLE (ESC to close, Enter to execute)', 5, 5);
        ctx.font = '7px monospace';
        this.lines.slice(-30).forEach((l, i) => {
            ctx.fillStyle = l.color;
            ctx.fillText(l.text, 5, 22 + i * 12);
        });
        ctx.fillStyle = '#0f0';
        ctx.fillText('> ' + this.input + 'в–€', 5, CFG.HEIGHT - 20);
        ctx.restore();
    },
    handleKey(e) {
        if (e.key === 'Enter') { this.execute(this.input); this.input = ''; e.preventDefault(); }
        else if (e.key === 'Backspace') { this.input = this.input.slice(0, -1); e.preventDefault(); }
        else if (e.key === 'Escape') { this.visible = false; e.preventDefault(); }
        else if (e.key === 'ArrowUp') { if (this.historyIdx > 0) { this.historyIdx--; this.input = this.history[this.historyIdx] || ''; } e.preventDefault(); }
        else if (e.key === 'ArrowDown') { if (this.historyIdx < this.history.length - 1) { this.historyIdx++; this.input = this.history[this.historyIdx] || ''; } else { this.historyIdx = this.history.length; this.input = ''; } e.preventDefault(); }
        else if (e.key.length === 1) { this.input += e.key; e.preventDefault(); }
    },
};

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'D') { DEBUG_CONSOLE.toggle(); e.preventDefault(); }
    if (DEBUG_CONSOLE.visible) { DEBUG_CONSOLE.handleKey(e); }
});

Game.prototype.renderEquipment = function() {
    this.ui.text(20, 20, 'рџ§¬ Equipment', { font: CFG.FONTS.title, color: '#f0f' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    const slots = ['weapon','armor','implant1','implant2','tool','cyberdeck'];
    const slotNames = { weapon: 'вљ” Weapon', armor: 'рџ›Ў Armor', implant1: 'рџ§¬ Implant I', implant2: 'рџ§¬ Implant II', tool: 'рџ”§ Tool', cyberdeck: 'рџ’» Cyberdeck' };
    const slotColors = { weapon: '#f00', armor: '#0ff', implant1: '#f0f', implant2: '#f0f', tool: '#ff0', cyberdeck: '#0f0' };
    const equipped = this.equippedItems || {};
    const inventory = this.playerInventory || [];
    const selectedSlot = this._selectedEquipSlot || null;
    const showInventory = this._showEquipInventory || false;
    if (!showInventory) {
        ctx.fillStyle = '#0ff'; ctx.font = '10px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText('Equipped Items', 15, 55);
        slots.forEach((slot, i) => {
            const col = i % 3, row = Math.floor(i / 3);
            const sx = 15 + col * 125, sy = 70 + row * 85;
            ctx.fillStyle = '#0d0d2a'; ctx.strokeStyle = slotColors[slot];
            this.ui.roundRect(ctx, sx, sy, 115, 75, 5, true, true);
            ctx.fillStyle = slotColors[slot]; ctx.font = '9px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
            ctx.fillText(slotNames[slot], sx + 8, sy + 6);
            if (equipped[slot]) {
                const item = equipped[slot];
                ctx.fillStyle = this.getRarityColor(item.rarity || 'common'); ctx.font = '8px monospace';
                ctx.fillText(item.name, sx + 8, sy + 24);
                ctx.fillStyle = '#aaa'; ctx.font = '7px monospace';
                if (item.atk) ctx.fillText(`ATK +${item.atk}`, sx + 8, sy + 40);
                if (item.def) ctx.fillText(`DEF +${item.def}`, sx + 8, sy + 40);
                ctx.fillStyle = '#0f0'; ctx.font = '7px monospace'; ctx.textAlign = 'right';
                ctx.fillText(`Lv.${item.lvl || 1}`, sx + 105, sy + 6);
            } else {
                ctx.fillStyle = '#555'; ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('EMPTY', sx + 57, sy + 45);
            }
        });
        ctx.fillStyle = '#888'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
        ctx.fillText('Click a slot to equip items', CFG.WIDTH/2, CFG.HEIGHT - 20);
    } else {
        ctx.fillStyle = '#0ff'; ctx.font = '10px Orbitron'; ctx.textAlign = 'left';
        ctx.fillText('Select Item for ' + (slotNames[selectedSlot] || selectedSlot), 15, 55);
        this.ui.btn(CFG.WIDTH - 80, 55, 60, 22, 'в†ђ Back', () => { this._showEquipInventory = false; this._selectedEquipSlot = null; }, { font: '8px monospace' });
        const itemsForSlot = inventory.filter(it => it.slot === selectedSlot || it.type === selectedSlot);
        if (itemsForSlot.length === 0) {
            ctx.fillStyle = '#555'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('No items available for this slot', CFG.WIDTH/2, CFG.HEIGHT/2);
        } else {
            itemsForSlot.slice(0, 8).forEach((item, i) => {
                const iy = 85 + i * 48;
                ctx.fillStyle = '#0d0d2a'; ctx.strokeStyle = this.getRarityColor(item.rarity || 'common');
                this.ui.roundRect(ctx, 15, iy, CFG.WIDTH - 30, 42, 4, true, true);
                ctx.fillStyle = this.getRarityColor(item.rarity || 'common'); ctx.font = '10px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
                ctx.fillText(item.name, 22, iy + 4);
                ctx.fillStyle = '#aaa'; ctx.font = '7px monospace';
                ctx.fillText('Lv.' + (item.lvl || 1) + ' | ' + (item.rarity || 'common'), 22, iy + 20);
                ctx.fillStyle = '#ff0'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
                ctx.fillText('EQUIP', CFG.WIDTH - 30, iy + 14);
            });
        }
    }
};

// в”Ђв”Ђв”Ђ Enhanced Crafting Screen в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
Game.prototype.renderEnhancedCrafting = function() {
    this.ui.text(20, 20, 'рџ”§ Advanced Crafting', { font: CFG.FONTS.title, color: '#f80' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    const recipes = this._craftRecipes || RECIPES_DATA || [];
    const mats = this.playerMaterials || {};
    const selectedRecipe = this._selectedCraftRecipe || null;
    const tabs = ['All','Programs','Implants','Consumables','Cyberware'];
    const activeTab = this._craftTab || 0;
    tabs.forEach((t, i) => {
        const tx = 20 + i * 73;
        ctx.fillStyle = i === activeTab ? '#0ff' : '#333'; ctx.font = i === activeTab ? '10px Orbitron' : '9px monospace';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.fillText(t, tx, 58);
        if (i === activeTab) { ctx.fillStyle = '#0ff'; ctx.fillRect(tx, 72, 65, 2); }
    });
    const filtered = recipes.filter(r => {
        if (activeTab === 0) return true;
        const map = ['program','implant','consumable','cyberware'];
        return r.type === map[activeTab - 1];
    });
    filtered.slice(0, 8).forEach((r, i) => {
        const ry = 80 + i * 50;
        const canCraft = r.materials ? r.materials.every(m => (mats[m.id] || 0) >= (m.qty || 1)) : false;
        ctx.fillStyle = '#0d0d1a'; ctx.strokeStyle = canCraft ? '#0f0' : '#333';
        this.ui.roundRect(ctx, 15, ry, CFG.WIDTH - 30, 44, 4, true, true);
        ctx.fillStyle = this.getRarityColor(r.rarity || 'common'); ctx.font = '10px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(r.name, 22, ry + 4);
        ctx.fillStyle = '#aaa'; ctx.font = '7px monospace';
        ctx.fillText((r.type || 'item') + ' | Lv.' + (r.lvl || 1) + ' | ' + (r.rarity || 'common'), 22, ry + 20);
        ctx.fillStyle = '#ff0'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
        ctx.fillText(canCraft ? 'вњ“ CRAFT' : 'рџ”’', CFG.WIDTH - 30, ry + 8);
        if (r.materials) {
            ctx.fillStyle = '#888'; ctx.font = '6px monospace'; ctx.textAlign = 'right';
            ctx.fillText(r.materials.map(m => (mats[m.id] || 0) + '/' + (m.qty || 1)).join(' '), CFG.WIDTH - 30, ry + 24);
        }
    });
    if (selectedRecipe) {
        ctx.fillStyle = '#0ff'; ctx.font = '9px Orbitron'; ctx.textAlign = 'center';
        ctx.fillText('Selected: ' + selectedRecipe.name + ' | Click CRAFT to begin', CFG.WIDTH/2, CFG.HEIGHT - 20);

    const challenges = this.dailyChallenges || [

        ctx.fillStyle = isClaimed ? '#444' : '#aaa'; ctx.font = '7px monospace';

        const pct = Math.min(1, ch.prog / ch.goal);

        ctx.fillText(`${ch.prog}/${ch.goal}`, CFG.WIDTH - 67, cy + 12);
        ctx.fillStyle = isClaimed ? '#333' : (isDone ? '#ff0' : '#888');
        ctx.font = '8px monospace'; ctx.textAlign = 'right';
        ctx.fillText(isClaimed ? 'вњ“' : (isDone ? 'CLAIM' : `${ch.reward.cr}cr`), CFG.WIDTH - 25, cy + 28);
    });
    ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'center';

// в”Ђв”Ђв”Ђ Battle Pass Detailed Screen в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
Game.prototype.renderBattlePassDetailed = function() {
    this.ui.text(20, 20, 'рџЋ« Battle Pass', { font: CFG.FONTS.title, color: '#f0f' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    const bp = this.character?.character?.battle_pass_level || 0;
    const bpXp = this.character?.character?.battle_pass_xp || 0;
    const bpPremium = this.character?.character?.battle_pass_premium || false;
    const tiers = 30;
    const xpPerTier = 100;
    ctx.fillStyle = '#0ff'; ctx.font = '12px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('Level ' + bp + ' | XP: ' + bpXp + '/' + xpPerTier, 15, 55);
    ctx.fillStyle = '#1a1a2a'; ctx.fillRect(15, 72, CFG.WIDTH - 30, 10);
    ctx.fillStyle = '#f0f'; ctx.fillRect(15, 72, (CFG.WIDTH - 30) * Math.min(1, bpXp / xpPerTier), 10);
    ctx.fillStyle = '#fff'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
    ctx.fillText('BP XP', CFG.WIDTH/2, 79);
    for (let i = 1; i <= Math.min(tiers, 20); i++) {
        const col = (i - 1) % 5, row = Math.floor((i - 1) / 5);
        const tx = 15 + col * 73, ty = 90 + row * 58;
        const unlocked = i <= bp;
        ctx.fillStyle = unlocked ? '#1a0a1a' : '#0a0a0a'; ctx.strokeStyle = unlocked ? '#f0f' : '#333';
        this.ui.roundRect(ctx, tx, ty, 68, 52, 4, true, true);
        ctx.fillStyle = unlocked ? '#f0f' : '#555'; ctx.font = '10px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('T' + i, tx + 34, ty + 14);
        ctx.fillStyle = unlocked ? '#fff' : '#444'; ctx.font = '7px monospace';
        const reward = BP_REWARDS?.[i] || { cr: i * 50, xp: i * 25 };
        ctx.fillText(reward.cr + 'cr', tx + 34, ty + 30);
        ctx.fillStyle = bpPremium && unlocked ? '#ff0' : '#666'; ctx.font = '6px monospace';
        ctx.fillText(bpPremium ? (reward.premium || '') : 'рџ”’', tx + 34, ty + 42);
    }
    if (!bpPremium) {
        ctx.fillStyle = '#ff0'; ctx.font = '10px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('рџ”“ Get Premium Pass - 2000Вў', CFG.WIDTH/2, CFG.HEIGHT - 45);
        this.ui.btn(CFG.WIDTH/2 - 60, CFG.HEIGHT - 30, 120, 22, 'Unlock', () => {
            if ((this.character?.character?.credits || 0) >= 2000) {
                this.character.character.credits -= 2000;
                this.character.character.battle_pass_premium = true;
                this.sound.play('win');
            }
        }, { font: '9px Orbitron', bg: '#1a0a1a', border: '#ff0', color: '#ff0' });
    }
};

// в”Ђв”Ђв”Ђ Mini-Game: Network Scan в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
Game.prototype.renderNetworkScan = function() {
    this.ui.text(20, 20, 'рџ“Ў Network Scan', { font: CFG.FONTS.title, color: '#0f0' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    if (!this._scanNodes) {
        this._scanNodes = [];
        this._scanProgress = 0;
        this._scanTargets = [];
        for (let i = 0; i < 12; i++) {
            this._scanNodes.push({
                x: 30 + Math.random() * (CFG.WIDTH - 60),
                y: 70 + Math.random() * (CFG.HEIGHT - 150),
                radius: 5 + Math.random() * 15,
                found: false,
                freq: 100 + Math.random() * 900,
                type: Math.random() > 0.6 ? 'signal' : 'noise',
            });
        }
        this._scanTargets = this._scanNodes.filter(n => n.type === 'signal');
        this._scanPulse = 0;
    }
    ctx.fillStyle = '#0a0a0a'; ctx.strokeStyle = '#0f0';
    this.ui.roundRect(ctx, 15, 55, CFG.WIDTH - 30, CFG.HEIGHT - 130, 4, true, true);
    ctx.beginPath(); ctx.rect(16, 56, CFG.WIDTH - 32, CFG.HEIGHT - 132); ctx.clip();
    this._scanNodes.forEach(node => {
        ctx.fillStyle = node.found ? '#0f0' : '#0a0a0a';
        ctx.strokeStyle = node.found ? '#0f0' : '#0f04';
        ctx.lineWidth = node.found ? 2 : 1;
        ctx.beginPath(); ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        if (node.found) {
            ctx.fillStyle = '#0f0'; ctx.font = '6px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(Math.floor(node.freq) + 'MHz', node.x, node.y);
        }
    });
    this._scanPulse = (this._scanPulse + 2) % (CFG.WIDTH + 100);
    ctx.strokeStyle = '#0f08'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(this._scanPulse, 55); ctx.lineTo(this._scanPulse, CFG.HEIGHT - 75); ctx.stroke();
    ctx.fillStyle = '#0f0'; ctx.font = '9px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('Found: ' + this._scanNodes.filter(n => n.found).length + '/' + this._scanNodes.length, 22, CFG.HEIGHT - 65);
    ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Click unknown signals to identify', CFG.WIDTH/2, CFG.HEIGHT - 45);
};

    this.ui.text(20, 20, 'рџђ› Data Worm', { font: CFG.FONTS.title, color: '#0f0' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'main', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    if (!this._wormGame) {
        this._wormGame = {
            grid: 15, cell: 18, dir: 'right', nextDir: 'right',
            worm: [{ x: 7, y: 7 }, { x: 6, y: 7 }, { x: 5, y: 7 }],
            food: { x: 10, y: 5 }, score: 0, speed: 300, lastMove: 0,
            obstacles: [], gameOver: false, level: 1,
        };
        const g = this._wormGame;
        for (let i = 0; i < 5; i++) {
            let ox = Math.floor(Math.random() * g.grid), oy = Math.floor(Math.random() * g.grid);
            if (!g.worm.some(s => s.x === ox && s.y === oy) && !(ox === g.food.x && oy === g.food.y)) {
                g.obstacles.push({ x: ox, y: oy });
            }
        }
    }
    const g = this._wormGame;
    const ox = 65, oy = 55;
    ctx.strokeStyle = '#0f04'; ctx.lineWidth = 0.5;
    for (let r = 0; r < g.grid; r++) {
        for (let c = 0; c < g.grid; c++) {
            ctx.strokeRect(ox + c * g.cell, oy + r * g.cell, g.cell, g.cell);
        }
    }
    g.obstacles.forEach(o => {
        ctx.fillStyle = '#f00'; ctx.fillRect(ox + o.x * g.cell, oy + o.y * g.cell, g.cell, g.cell);
    });
    g.worm.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#0f0' : '#0a0';
        ctx.fillRect(ox + s.x * g.cell, oy + s.y * g.cell, g.cell - 1, g.cell - 1);
    });
    ctx.fillStyle = '#ff0';
    ctx.fillRect(ox + g.food.x * g.cell, oy + g.food.y * g.cell, g.cell, g.cell);
    ctx.fillStyle = '#0f0'; ctx.font = '10px Orbitron'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('Score: ' + g.score + ' | Level: ' + g.level + ' | Speed: ' + g.speed + 'ms', 15, CFG.HEIGHT - 50);
    ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Arrow keys to move | Collect data fragments', CFG.WIDTH/2, CFG.HEIGHT - 30);
};

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && game) {
        if (game.screen !== 'main' && game.screen !== 'loading' && game.screen !== 'mainmenu') {
            game.goBack();
        }
    }
    if (e.key === 'Enter' && game) {
        if (game.screen === 'mainmenu') {
            game.screen = 'main';
            game.sound.play('click');
        }
    }
    if (e.key === ' ' && game) {
        if (game.screen === 'mainmenu') {
            game.screen = 'main';
            game.sound.play('click');
        }

// в”Ђв”Ђв”Ђ Utility: Deep Clone в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function deepClone(obj) {
    return JSON.parse(JSON.stringify(obj));
}

function mergeObjects(target, source) {
    for (const key in source) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
            target[key] = mergeObjects(target[key] || {}, source[key]);
        } else {
            target[key] = source[key];
        }
    }
    return target;
}

function randomItem(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function chance(pct) {
    return Math.random() < pct;
}

function debounce(fn, delay) {
    let timer;
    return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
    };
}

// в”Ђв”Ђв”Ђ Extended Formatters в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function formatDuration(seconds) {
    if (seconds < 60) return `${seconds} СЃРµРє`;
    const m = Math.floor(seconds / 60);
    if (m < 60) return `${m} РјРёРЅ`;
    const h = Math.floor(m / 60);
    const rem = m % 60;
    return `${h} С‡ ${rem} РјРёРЅ`;
}

function formatNumber(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
}

function formatPercent(n) {
    return (n * 100).toFixed(0) + '%';
}

function formatXpBar(current, needed) {
    const pct = Math.min(100, Math.floor((current / needed) * 100));
    const filled = Math.floor(pct / 10);
    return 'в–€'.repeat(filled) + 'в–‘'.repeat(10 - filled) + ` ${pct}%`;
}

function formatDate(d) {
    const date = new Date(d);
    return date.toLocaleDateString('ru-RU');
}

function formatTimeFromNow(timestamp) {
    const diff = Date.now() - timestamp;
    if (diff < 60000) return 'С‚РѕР»СЊРєРѕ С‡С‚Рѕ';
    if (diff < 3600000) return `${Math.floor(diff / 60000)} РјРёРЅ. РЅР°Р·Р°Рґ`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)} С‡. РЅР°Р·Р°Рґ`;
    return `${Math.floor(diff / 86400000)} РґРЅ. РЅР°Р·Р°Рґ`;
}

const STAT_CALCULATIONS = {
    hpPerLevel: 10,
    enPerLevel: 5,
    atkPerLevel: 2,
    defPerLevel: 1,
    baseHp: 100,
    baseEn: 100,
    baseAtk: 10,
    baseDef: 5,
    baseHack: 10,
    baseSpeed: 10,
};

function calculateTotalStats(level, programs, implants) {
    const stats = {
        hp: STAT_CALCULATIONS.baseHp + (level - 1) * STAT_CALCULATIONS.hpPerLevel,
        en: STAT_CALCULATIONS.baseEn + (level - 1) * STAT_CALCULATIONS.enPerLevel,
        atk: STAT_CALCULATIONS.baseAtk + (level - 1) * STAT_CALCULATIONS.atkPerLevel,
        def: STAT_CALCULATIONS.baseDef + (level - 1) * STAT_CALCULATIONS.defPerLevel,
        hack: STAT_CALCULATIONS.baseHack,
        speed: STAT_CALCULATIONS.baseSpeed,
    };
    if (programs) {
        programs.forEach(p => {
            if (p.dmg) stats.atk += p.dmg;
            if (p.def) stats.def += p.def;
        });
    }
    if (implants) {
        implants.forEach(im => {
            if (im.hack) stats.hack += im.hack;
            if (im.speed) stats.speed += im.speed;
            if (im.atk) stats.atk += im.atk;
            if (im.def) stats.def += im.def;
        });
    }
    return stats;
}

// в”Ђв”Ђв”Ђ Draw Screen Router в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
Game.prototype.drawScreen = function(ctx, screen) {
    const drawMethods = {
        loading: 'drawLoading', mainmenu: 'drawMainMenu', main: 'drawMainHub',
        map: 'drawMap', combat: 'drawCombat', terminal: 'drawTerminal',
        shop: 'drawShop', npc: 'drawNpcChat', arena: 'drawArena',
        clan: 'drawClan', dailies: 'drawDailies', battlepass: 'drawBattlePass',
        leaderboard: 'drawLeaderboard', admin: 'drawAdmin',
        matrix: 'drawMatrix', quests: 'drawQuestsScreen',
        achievements: 'drawAchievements', crafting: 'drawCrafting',
        inventory: 'drawInventory', chat: 'drawChat', friends: 'drawFriends',
        settings: 'drawSettings', tutorial: 'drawTutorial', codex: 'drawCodex',
    };
    const methodName = drawMethods[screen] || 'drawMainHub';
    const method = this[methodName];
    if (method) {
        method.call(this, ctx, this.time);
    } else {
        this.drawGridBackground(ctx, this.time);
        ctx.fillStyle = '#f00'; ctx.font = '16px monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(`> ${screen.toUpperCase()} <`, ctx.canvas.width / 2, ctx.canvas.height / 2);
    }
};

// в”Ђв”Ђв”Ђ Input Handler в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
Game.prototype.handleInput = function(key) {
    if (key === 'Escape') {
        if (this.screen !== 'main' && this.screen !== 'loading' && this.screen !== 'mainmenu') {
            this.goBack();
        }
    }
    if (key === 'Enter') {
        if (this.screen === 'mainmenu') {
            this.screen = 'main';
        }
    }
    if (key === 'Backspace') {
        if (this.screen === 'terminal' && this.termInput.length > 0) {
            this.termInput = this.termInput.slice(0, -1);
        }
        if (this.screen === 'chat' && this.chatInput.length > 0) {
            this.chatInput = this.chatInput.slice(0, -1);
        }
    }
    if (key.length === 1) {
        if (this.screen === 'terminal') {
            this.termInput += key;
        }
        if (this.screen === 'chat') {
            this.chatInput += key;
        }
    }
};

document.addEventListener('keydown', function(e) {
    if (!game) return;
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        const isTyping = game.screen === 'terminal' || game.screen === 'chat';
        if (!isTyping && e.key >= '1' && e.key <= '9') {
            const n = parseInt(e.key);
            const screens = ['map', 'combat', 'quests', 'shop', 'achievements', 'crafting', 'arena', 'clan', 'inventory'];
            if (n <= screens.length) {
                game.setPreviousScreen();
                game.screen = screens[n - 1];
                e.preventDefault();
            }
        }
    }
});

// в”Ђв”Ђв”Ђ Combat Auto-Resolver в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function autoResolveCombat(playerAtk, playerDef, enemyHp, enemyAtk) {
    const rounds = [];
    const maxRounds = 10;
    let pAtk = playerAtk, pDef = playerDef;
    let eHp = enemyHp, eAtk = enemyAtk;
    let round = 0;
    while (eHp > 0 && round < maxRounds) {
        round++;
        const pDmg = Math.max(1, pAtk - Math.floor(pDef * 0.3) + Math.floor(Math.random() * 5));
        const eDmg = Math.max(1, eAtk - Math.floor(pDef * 0.2) + Math.floor(Math.random() * 3));
        eHp -= pDmg;
        const playerLost = Math.random() < 0.3 ? eDmg : 0;
        rounds.push({ round, playerDmg: pDmg, enemyDmg: playerLost, enemyHp: Math.max(0, eHp) });
    }
    const victory = eHp <= 0;
    return { rounds, victory, totalRounds: round };
}

function generateCombatEncounter(zone, playerLevel) {

// в”Ђв”Ђв”Ђ Experience / Level Calculation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function xpForLevel(lvl) {
    return Math.floor(100 * Math.pow(1.5, lvl - 1));
}

function totalXpForLevel(lvl) {
    let total = 0;
    for (let i = 1; i < lvl; i++) total += xpForLevel(i);
    return total;
}

function levelFromXp(xp) {
    let lvl = 1;
    let needed = xpForLevel(lvl);
    while (xp >= needed && lvl < 30) {
        xp -= needed;
        lvl++;
        needed = xpForLevel(lvl);
    }
    return lvl;
}

// в”Ђв”Ђв”Ђ Damage Formula в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calcCombatDamage(atk, def, critChance, bonuses) {
    const base = Math.max(1, atk - def * 0.4 + Math.random() * 3);
    const isCrit = Math.random() < (critChance || 0.05);
    const critMult = isCrit ? 2.0 : 1.0;
    const bonusMult = 1.0 + (bonuses || 0);
    return { damage: Math.floor(base * critMult * bonusMult), crit: isCrit };
}

function calcHealAmount(baseHeal, implantPower) {
    return Math.floor(baseHeal * (1 + (implantPower || 0) * 0.02));
}

// в”Ђв”Ђв”Ђ Enhanced Utility Functions в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function rollLootTable(table, luck) {
    const roll = Math.random() * 100;
    let cumulative = 0;
    const rarities = ['legendary', 'epic', 'rare', 'uncommon', 'common'];
    for (const rarity of rarities) {
        if (!table[rarity]) continue;
        cumulative += table[rarity].weight || 0;
        if (roll < cumulative) {
            const items = table[rarity].items || [];
            const item = items.length > 0 ? items[Math.floor(Math.random() * items.length)] : null;
            const crMin = table[rarity].cr ? table[rarity].cr[0] || 0 : 0;
            const crMax = table[rarity].cr ? table[rarity].cr[1] || 0 : 0;
            const cr = crMin + Math.floor(Math.random() * (crMax - crMin));
            return { rarity, item, credits: cr, bonus: Math.floor(cr * (luck || 0) * 0.1) };
        }
    }
    return { rarity: 'common', item: null, credits: 1, bonus: 0 };
}

function generateEnemyFromZone(zone, playerLevel) {
    const zoneData = ZONE_DATA_EXT[zone] || ZONE_DATA_EXT.matrix;
    const types = Object.keys(ENEMY_TYPES_EXT);
    const typeKey = types[Math.floor(Math.random() * types.length)];
    const template = ENEMY_TYPES_EXT[typeKey];
    const level = Math.max(zoneData.minLvl, Math.min(zoneData.maxLvl, playerLevel));
    const scale = 1 + (level - 1) * (template.scaling - 1);
    return {
        id: generateId(),
        name: template.name,
        type: template.type,
        hp: Math.floor(template.base_hp * scale),
        maxHp: Math.floor(template.base_hp * scale),
        dmg: Math.floor(template.base_dmg * scale),
        level: level,
        abilities: template.abilities || [],
        zone: zone,
        loot: template.loot,
        isDead: false,
    };
}

function calculateCombatRound(player, enemy, bonuses) {
    const pAtk = player.atk || 10;
    const pDef = player.def || 5;
    const pCrit = player.crit_chance || 0.05;
    const eAtk = enemy.dmg || 5;
    const eDef = enemy.def || 2;
    const playerDmg = calcCombatDamage(pAtk, eDef, pCrit, bonuses?.atkBonus || 0);
    const enemyDmg = calcCombatDamage(eAtk, pDef, 0.1, bonuses?.enemyAtkBonus || 0);
    const playerDodged = Math.random() < (player.dodge || 0.05);
    const enemyDodged = Math.random() < (enemy.dodge || 0.05);
    return {
        playerDmg: playerDodged ? 0 : playerDmg.damage,
        enemyDmg: enemyDodged ? 0 : enemyDmg.damage,
        playerCrit: playerDmg.crit && !playerDodged,
        enemyCrit: enemyDmg.crit && !enemyDodged,
        playerDodged,
        enemyDodged,
    };
}

function computeEffectiveStats(player, equipment, skills, buffs) {
    const base = {
        atk: player.attack || 10, def: player.defense || 5,
        hp: player.health || 100, maxHp: player.max_health || 100,
        energy: player.energy || 100, maxEnergy: player.max_energy || 100,
        crit: player.crit_chance || 0.05, critDmg: player.crit_damage || 1.5,
        hack: player.hacking_power || 5, hackDef: player.hacking_defense || 5,
        dodge: 0.05, speed: 10,
    };
    if (equipment) {
        Object.values(equipment).forEach(item => {
            if (!item) return;
            if (item.atk) base.atk += item.atk;
            if (item.def) base.def += item.def;
            if (item.hack) base.hack += item.hack;
            if (item.hp) base.maxHp += item.hp;
            if (item.crit) base.crit += item.crit * 0.01;
            if (item.spd) base.speed += item.spd;
        });
    }
    if (skills) {
        skills.forEach(s => {
            if (s.id === 'combat1') base.dodge += s.lvl * 0.01;
            if (s.id === 'combat3') base.critDmg += s.lvl * 0.08;
            if (s.id === 'hack1') base.hack += s.lvl * 2;
            if (s.id === 'hack2') base.hackDef += s.lvl * 3;
        });
    }
    if (buffs) {
        Object.entries(buffs).forEach(([k, v]) => { if (base[k] !== undefined) base[k] += v; });
    }
    return base;
}

function calculateDropRate(enemyType, playerLuck) {
    const base = { sentry: 0.2, hunter: 0.3, phantom: 0.35, overlord: 0.8, guardian: 0.5, viral: 0.4, ai_fragment: 1.0 };
    const rate = base[enemyType] || 0.2;
    return Math.min(1.0, rate + (playerLuck || 0) * 0.01);
}

function generateDrop(enemyType, playerLevel, luck) {
    if (Math.random() > calculateDropRate(enemyType, luck)) return null;
    const rarities = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
    const weights = [50, 30, 15, 4, 1];
    const total = weights.reduce((a, b) => a + b, 0);
    const roll = Math.random() * total;
    let cumulative = 0;
    for (let i = 0; i < rarities.length; i++) {
        cumulative += weights[i];
        if (roll < cumulative) {
            const pool = LOOT_TABLES_EXT[enemyType === 'ai_fragment' ? 'deep_web' : 'corpnet'] || LOOT_TABLES_EXT.matrix;
            const table = pool[rarities[i]];
            if (!table) return { rarity: rarities[i], item: null, credits: playerLevel * 5 };
            const items = table.items || [];
            return {
                rarity: rarities[i],
                item: items.length > 0 ? items[Math.floor(Math.random() * items.length)] : null,
                credits: (table.cr ? table.cr[0] + Math.floor(Math.random() * (table.cr[1] - table.cr[0])) : playerLevel * 10) + Math.floor(playerLevel * luck * 0.5),
                bonusItem: Math.random() < 0.1 ? 'Data Shard' : null,
            };
        }
    }
    return { rarity: 'common', item: null, credits: playerLevel * 3 };
}

function simulateAutoCombat(playerStats, enemyStats, maxRounds) {
    const rounds = [];
    let pHp = playerStats.maxHp || 100, eHp = enemyStats.hp || 30;
    const pAtk = playerStats.atk || 10, pDef = playerStats.def || 5, pCrit = playerStats.crit || 0.05;
    const eAtk = enemyStats.dmg || 5, eDef = enemyStats.def || 2;
    for (let i = 0; i < (maxRounds || 20); i++) {
        const pDmg = Math.max(0, calcCombatDamage(pAtk, eDef, pCrit).damage + Math.floor(Math.random() * 3));
        const eDmg = Math.max(0, calcCombatDamage(eAtk, pDef, 0.1).damage);
        eHp -= pDmg;
        pHp -= eDmg;
        rounds.push({ round: i + 1, pDmg, eDmg, pHp: Math.max(0, pHp), eHp: Math.max(0, eHp) });
        if (eHp <= 0 || pHp <= 0) break;
    }
    return { rounds, victory: eHp <= 0, playerSurvived: pHp > 0, totalRounds: rounds.length };
}

function calculateReputationLevel(rep) {
    if (rep >= 2000) return { level: 6, title: 'Legend', perks: ['30% discount', 'Faction title', 'Unique implant'] };
    if (rep >= 1000) return { level: 5, title: 'Master', perks: ['20% discount', 'Unique implant'] };
    if (rep >= 600) return { level: 4, title: 'Elite', perks: ['15% discount', 'Rep bonus'] };
    if (rep >= 300) return { level: 3, title: 'Respected', perks: ['10% discount', 'Exclusive items'] };
    if (rep >= 100) return { level: 2, title: 'Trusted', perks: ['5% discount'] };
    return { level: 1, title: 'Novice', perks: [] };
}

function calculateMissionReward(difficulty, playerLevel, factionBonus) {
    const base = { easy: { cr: 50, xp: 25 }, normal: { cr: 150, xp: 75 }, hard: { cr: 400, xp: 200 }, epic: { cr: 1000, xp: 500 }, legendary: { cr: 3000, xp: 1500 } };
    const b = base[difficulty] || base.normal;
    const scale = 1 + (playerLevel - 1) * 0.2;
    const factionMult = 1 + (factionBonus || 0) * 0.1;
    return {
        cr: Math.floor(b.cr * scale * factionMult),
        xp: Math.floor(b.xp * scale * factionMult),
        rep: Math.floor(10 * scale * factionMult),
    };
}

function getMissionDifficulty(playerLevel, zone) {
    const zoneDiff = { matrix: 'easy', firewall: 'normal', corpnet: 'normal', darknet: 'hard', deep_web: 'hard', core: 'epic' };
    const base = zoneDiff[zone] || 'normal';
    if (playerLevel >= 20) return base === 'normal' ? 'hard' : base;
    if (playerLevel >= 10) return base;
    return 'easy';
}

function calculateCraftSuccess(recipe, playerLevel, craftingMod) {
    const baseChance = { common: 0.95, uncommon: 0.85, rare: 0.70, epic: 0.50, legendary: 0.30 };
    const chance = baseChance[recipe.rarity] || 0.7;
    const levelBonus = Math.min(0.2, playerLevel * 0.005);
    const modBonus = (craftingMod || 0) * 0.02;
    return Math.min(0.99, chance + levelBonus + modBonus);
}

function calculateBarterPrice(basePrice, repLevel, charisma) {
    const repDiscount = (repLevel || 1) * 0.05;
    const charismaBonus = (charisma || 0) * 0.01;
    const discount = Math.min(0.5, repDiscount + charismaBonus);
    return Math.max(1, Math.floor(basePrice * (1 - discount)));
}

function getHeatMultiplier(currentHeat, zone) {
    const threshold = getZoneHeatThreshold(zone);
    if (currentHeat >= threshold * 2) return 3.0;
    if (currentHeat >= threshold * 1.5) return 2.0;
    if (currentHeat >= threshold) return 1.5;
    return 1.0;
}

function generateBountyHunter(heat, playerLevel) {
    const names = ['Bounty Bot-1', 'Hunter Killer', 'NetWatch Agent', 'Corporate Enforcer', 'AI Terminator'];
    const level = Math.min(30, Math.max(1, playerLevel + Math.floor(heat / 100)));
    return {
        name: names[Math.floor(Math.random() * names.length)],
        hp: 40 + heat * 2 + level * 5,
        dmg: 8 + heat + level * 2,
        level,
        type: 'bounty_hunter',
        bounty: 100 + heat * 5 + level * 20,
        abilities: ['pursuit', 'stun', 'mark'],
    };
}

function checkAchievementUnlocks(achievements, stats) {
    const newlyUnlocked = [];
    achievements.forEach(a => {
        if (a.done || a.claimed) return;
        let done = false;
        if (a.condition === 'level' && (stats.level || 1) >= (a.value || 1)) done = true;
        if (a.condition === 'kill' && (stats.kills || 0) >= (a.value || 1)) done = true;
        if (a.condition === 'credits' && (stats.credits || 0) >= (a.value || 1)) done = true;
        if (a.condition === 'pvp_wins' && (stats.pvp_wins || 0) >= (a.value || 1)) done = true;
        if (a.condition === 'craft' && (stats.items_crafted || 0) >= (a.value || 1)) done = true;
        if (done) { a.done = true; newlyUnlocked.push(a); }
    });
    return newlyUnlocked;
}

// в”Ђв”Ђв”Ђ Save/Load System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const SAVE_KEY = 'neon_protocol_save';

function saveGameState() {
    try {
        const state = {
            character: game?.character?.character || {},
            inventory: game?.playerInventory || [],
            materials: game?.playerMaterials || {},
            equipment: game?.equippedItems || {},
            skills: game?.skillTree || [],
            achievements: game?.playerAchievements || [],
            quests: game?.activeQuests || [],
            challenges: game?.dailyChallenges || [],
            settings: { sound: game?.soundEnabled, music: game?.musicEnabled, particles: game?.particlesEnabled },
            timestamp: Date.now(),
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(state));
        return true;
    } catch(e) { return false; }
}

function loadGameState() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return null;
        const state = JSON.parse(raw);
        if (state.timestamp && Date.now() - state.timestamp > 86400000) {
            state.dailyChallenges = null;
        }
        return state;
    } catch(e) { return null; }
}

function autoSaveLoop() {
    if (game && game.autoSave !== false) {
        saveGameState();
    }
    setTimeout(autoSaveLoop, 30000);
}

// в”Ђв”Ђв”Ђ Network Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function apiFetch(endpoint, method, body) {
    try {
        const opts = { method: method || 'GET', headers: { 'Content-Type': 'application/json' } };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(CFG.API + endpoint, opts);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
    } catch(e) {
        console.warn('API error:', endpoint, e.message);
        return null;
    }
}

async function syncWithServer() {
    const data = await apiFetch('/sync', 'POST', { state: loadGameState() });
    if (data && data.character) {
        if (game) game.character = { character: data.character };
        return data;
    }
    return null;
}

// в”Ђв”Ђв”Ђ Formatters в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function formatDuration(seconds) {
    if (seconds < 60) return seconds + 's';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
    return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
}

function formatLargeNumber(n) {
    if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toString();
}

function formatPercentage(val) {
    return (val * 100).toFixed(1) + '%';
}

function formatStatBlock(stats) {
    return Object.entries(stats).filter(([k, v]) => v && v > 0).map(([k, v]) => {
        const labels = { atk: 'ATK', def: 'DEF', hack: 'HACK', spd: 'SPD', crit: 'CRIT', hp: 'HP', dodge: 'DODGE' };
        return (labels[k] || k) + ' +' + v;
    }).join(' | ');
}

function shortenName(name, maxLen) {
    if (!name) return '';
    return name.length > maxLen ? name.substring(0, maxLen - 1) + '..' : name;
}

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha || 1) + ')';
}

function colorLerp(c1, c2, t) {
    const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
    const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
    const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

    },
};

function rollLoot(zone, luckMod) {
    const table = LOOT_TABLES[zone] || LOOT_TABLES.matrix;
    const items = [];
    const roll = Math.random();
    const pool = roll < 0.2 + (luckMod || 0) ? table.rare : table.common;
    const totalWeight = pool.reduce((s, i) => s + i.weight, 0);
    let r = Math.random() * totalWeight;
    for (const entry of pool) {
        r -= entry.weight;
        if (r <= 0) {
            const qty = entry.qty[0] + Math.floor(Math.random() * (entry.qty[1] - entry.qty[0] + 1));
            items.push({ ...entry, qty });
            break;
        }
    }
    if (Math.random() < 0.1 + (luckMod || 0) * 0.5) {
        items.push({ id: 'rare_treasure', name: 'Rare Treasure', qty: 1, rarity: 'rare' });
    }
    return items;
}

    let best = ITEM_QUALITIES[0];
    for (const q of ITEM_QUALITIES) {
        if (itemLevel >= q.minLvl) best = q;
    }
    return best;
}

function calculateItemValue(baseValue, quality) {
    return Math.floor(baseValue * quality.mult);
}

function enhanceItem(item, enhancementLevel) {
    const maxEnhance = 15;
    const newLevel = Math.min(maxEnhance, (item.enhance || 0) + enhancementLevel);
    const costMult = 1 + newLevel * 0.5;
    const statMult = 1 + newLevel * 0.1;
    return {
        ...item,
        enhance: newLevel,
        atk: item.atk ? Math.floor(item.atk * statMult) : undefined,
        def: item.def ? Math.floor(item.def * statMult) : undefined,
        hack: item.hack ? Math.floor(item.hack * statMult) : undefined,
        enhanceCost: Math.floor(100 * costMult),
    };
}

Game.prototype.renderSlots = function() {
    this.ui.text(20, 20, 'рџЋ° Slots', { font: CFG.FONTS.title, color: '#ff0' });
    this.ui.btn(CFG.WIDTH - 80, 20, 60, 30, 'в†ђ Back', () => this.screen = 'casino', { font: CFG.FONTS.sm });
    const ctx = this.ctx;
    const symbols = ['рџЌ’', 'рџЌ‹', 'рџЌЉ', 'рџЌ‡', 'рџ’Ћ', '7пёЏвѓЈ', 'в­ђ', 'рџ””'];
    if (!this._slotState) {
        this._slotState = { reels: [0, 0, 0], spinning: false, bet: 50, result: null, wins: 0, losses: 0 };
    }
    const s = this._slotState;
    const cx = CFG.WIDTH / 2, cy = CFG.HEIGHT / 2;
    ctx.fillStyle = '#0a0a1a'; ctx.strokeStyle = '#ff0';
    this.ui.roundRect(ctx, 30, 70, CFG.WIDTH - 60, 120, 8, true, true);
    ctx.font = '36px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    s.reels.forEach((r, i) => {
        const rx = cx - 60 + i * 60;
        ctx.fillStyle = s.spinning ? '#fff' : '#0ff';
        ctx.fillText(s.symbols?.[r] || symbols[r], rx, cy - 10);
    });
    if (s.result) {
        ctx.fillStyle = s.result === 'win' ? '#0f0' : '#f00';
        ctx.font = '14px Orbitron'; ctx.textAlign = 'center';
        ctx.fillText(s.result === 'win' ? 'рџЋ‰ YOU WIN!' : 'рџ’” Try Again', cx, cy + 60);
        ctx.fillStyle = '#ff0'; ctx.font = '10px monospace';
        if (s.result === 'win') ctx.fillText('+' + (s.bet * 2) + ' credits!', cx, cy + 80);
    }
    ctx.fillStyle = '#888'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Bet: ' + s.bet + 'cr | Wins: ' + s.wins + ' | Losses: ' + s.losses, cx, CFG.HEIGHT - 70);
    this.ui.btn(cx - 80, CFG.HEIGHT - 55, 160, 30, 'рџЋ° SPIN (' + s.bet + 'cr)', () => {
        if (s.spinning) return;
        if ((this.character?.character?.credits || 0) < s.bet) return;
        this.character.character.credits -= s.bet;
        s.spinning = true; s.result = null;
        const outcomes = s.reels.map(() => Math.floor(Math.random() * symbols.length));
        setTimeout(() => {
            s.reels = outcomes;
            s.spinning = false;
            const match = outcomes.every(v => v === outcomes[0]);
            if (match || (outcomes[0] === outcomes[1] || outcomes[1] === outcomes[2] || outcomes[0] === outcomes[2])) {
                s.result = 'win';
                s.wins++;
                this.character.character.credits += s.bet * 2;
                this.sound.play('win');
                this.anim.addParticles(cx, cy, 20, '#ff0', 30);
            } else {
                s.result = 'lose';
                s.losses++;
                this.sound.play('dmg');
            }
        }, 1000);
    }, { font: '10px Orbitron', bg: '#1a0a1a', border: '#ff0', color: '#ff0' });
};

// в”Ђв”Ђв”Ђ Achievement Reward Calculator в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateAchievementReward(achievement, playerLevel) {
    const base = { common: 50, uncommon: 150, rare: 400, epic: 1000, legendary: 3000 };
    const r = achievement.rarity || 'common';
    const b = base[r] || 50;
    const levelMult = 1 + (playerLevel || 1) * 0.1;
    return {
        cr: Math.floor(b * levelMult),
        xp: Math.floor(b * 0.5 * levelMult),
        rep: achievement.faction ? Math.floor(10 * levelMult) : 0,
    };
}

function getAchievementRarity(difficulty) {
    if (difficulty >= 100) return 'legendary';
    if (difficulty >= 60) return 'epic';
    if (difficulty >= 30) return 'rare';
    if (difficulty >= 10) return 'uncommon';
    return 'common';
}

function computePlayerPowerLevel(stats, equipment, skills) {
    let power = (stats.atk || 10) * 2 + (stats.def || 5) * 1.5 + (stats.hp || 100) * 0.1;
    power += (stats.hack || 5) * 3 + (stats.crit || 0.05) * 100;
    if (equipment) {
        Object.values(equipment).forEach(item => {
            if (item) power += (item.atk || 0) * 2 + (item.def || 0) * 1.5 + (item.hack || 0) * 3;
        });
    }
    if (skills) {
        skills.forEach(s => { power += s.lvl * 5; });
    }
    return Math.floor(power);
}

function getDifficultyForPower(power) {
    if (power >= 500) return { label: 'Legendary', mult: 3.0, color: '#ff0' };
    if (power >= 300) return { label: 'Epic', mult: 2.0, color: '#f0f' };
    if (power >= 150) return { label: 'Hard', mult: 1.5, color: '#f00' };
    if (power >= 50) return { label: 'Normal', mult: 1.0, color: '#ff0' };
    return { label: 'Easy', mult: 0.5, color: '#0f0' };
}

// в”Ђв”Ђв”Ђ Inventory Sorting and Filtering в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function sortInventory(items, sortBy) {
    const sorted = [...items];
    switch (sortBy) {
        case 'name': sorted.sort((a, b) => (a.name || '').localeCompare(b.name || '')); break;
        case 'rarity': sorted.sort((a, b) => { const r = { legendary: 5, epic: 4, rare: 3, uncommon: 2, common: 1 }; return (r[b.rarity] || 0) - (r[a.rarity] || 0); }); break;
        case 'type': sorted.sort((a, b) => (a.type || '').localeCompare(b.type || '')); break;
        case 'level': sorted.sort((a, b) => (b.lvl || 1) - (a.lvl || 1)); break;
        default: break;
    }
    return sorted;
}

function filterInventory(items, filters) {
    return items.filter(item => {
        if (filters.rarity && item.rarity !== filters.rarity) return false;
        if (filters.type && item.type !== filters.type) return false;
        if (filters.search) {
            const q = filters.search.toLowerCase();
            if (!item.name?.toLowerCase().includes(q)) return false;
        }
        if (filters.minLvl && (item.lvl || 1) < filters.minLvl) return false;
        return true;
    });
}

// в”Ђв”Ђв”Ђ Market Price Calculator в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateMarketPrice(basePrice, supply, demand, volatility) {
    const supplyFactor = Math.max(0.5, Math.min(2.0, 1000 / (supply || 100)));
    const demandFactor = Math.max(0.5, Math.min(2.0, (demand || 100) / 100));
    const vol = 1 + (Math.random() - 0.5) * (volatility || 0.1);
    return Math.max(1, Math.floor(basePrice * supplyFactor * demandFactor * vol));
}

function calculateSellPrice(buyPrice, taxRate) {
    const tax = taxRate || 0.05;
    return Math.max(1, Math.floor(buyPrice * (1 - tax)));
}

function calculateTradeProfit(buyPrice, sellPrice, quantity) {
    return (sellPrice - buyPrice) * Math.max(1, quantity);
}

// в”Ђв”Ђв”Ђ Quest Progress Tracker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function updateQuestProgress(quests, event) {
    const updated = [];
    quests.forEach(q => {
        if (q.completed) return;
        (q.goals || []).forEach(goal => {
            if (goal.type === event.type && (!goal.target || goal.target === event.target)) {
                goal.current = (goal.current || 0) + (event.amount || 1);
            }
        });
        const allDone = (q.goals || []).every(g => (g.current || 0) >= (g.count || 1));
        if (allDone && !q.completed) {
            q.completed = true;
            updated.push(q);
        }
    });
    return updated;
}

// в”Ђв”Ђв”Ђ Combat Encounter Difficulty Scaling в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function scaleEnemyForPlayer(enemy, playerLevel, difficultyMult) {
    const mult = difficultyMult || 1.0;
    return {
        ...enemy,
        hp: Math.floor(enemy.hp * (1 + (playerLevel - 1) * 0.15 * mult)),
        maxHp: Math.floor(enemy.maxHp * (1 + (playerLevel - 1) * 0.15 * mult)),
        dmg: Math.floor(enemy.dmg * (1 + (playerLevel - 1) * 0.12 * mult)),
        level: Math.max(1, enemy.level + Math.floor((playerLevel - 1) * 0.5)),
        scaled: true,
    };
}

function applyCraftingResult(recipe, success, playerLevel) {
    if (success) {
        const qualityBonus = Math.random() < 0.1 + playerLevel * 0.005 ? 1.2 : 1.0;
        return {
            success: true,
            item: { ...recipe.result, name: recipe.name, rarity: recipe.rarity, lvl: recipe.lvl, quality: qualityBonus },
            bonusXp: Math.floor(recipe.lvl * 10 * qualityBonus),
            message: 'Crafting successful!',
        };
    } else {
        const salvageChance = 0.3 + playerLevel * 0.01;
        const salvaged = Math.random() < salvageChance;
        return {
            success: false,
            salvaged: salvaged ? recipe.materials?.map(m => ({ id: m.id, qty: Math.floor(m.qty / 2) })) : [],
            message: salvaged ? 'Partial salvage' : 'All materials lost!',
        };
    }
}

function getCraftingBonusForStation(stationLevel) {
    return {
        successRate: 0.05 * stationLevel,
        qualityChance: 0.02 * stationLevel,
        xpBonus: 10 * stationLevel,
        timeReduction: 0.1 * stationLevel,
    };
}

// в”Ђв”Ђв”Ђ Time / Scheduler System в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const GAME_SCHEDULER = {
    tasks: [],
    add(name, interval, callback) {
        this.tasks.push({ name, interval, callback, lastRun: Date.now(), enabled: true });
    },
    update() {
        const now = Date.now();
        this.tasks.forEach(task => {
            if (!task.enabled) return;
            if (now - task.lastRun >= task.interval) {
                try { task.callback(); } catch(e) { console.warn('Scheduler task error:', task.name, e); }
                task.lastRun = now;
            }
        });
    },
    remove(name) { this.tasks = this.tasks.filter(t => t.name !== name); },
    enable(name) { const t = this.tasks.find(t => t.name === name); if (t) t.enabled = true; },
    disable(name) { const t = this.tasks.find(t => t.name === name); if (t) t.enabled = false; },
};

// в”Ђв”Ђв”Ђ Notification Manager в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const NOTIFICATION_MANAGER = {
    queue: [],
    active: null,
    history: [],
    maxHistory: 50,
    add(text, type, duration) {
        this.queue.push({ text, type: type || 'info', duration: duration || 3000, timestamp: Date.now() });
        if (!this.active) this.showNext();
    },
    showNext() {
        if (this.queue.length === 0) { this.active = null; return; }
        this.active = this.queue.shift();
        this.history.push(this.active);
        if (this.history.length > this.maxHistory) this.history.shift();
        if (game) {
            const colors = { info: '#0ff', success: '#0f0', warning: '#ff0', error: '#f00', achievement: '#f0f' };
            game._notification = { text: this.active.text, color: colors[this.active.type] || '#0ff', startTime: Date.now() };
        }
        setTimeout(() => {
            if (game) game._notification = null;
            this.showNext();
        }, this.active.duration);
    },
    clear() { this.queue = []; this.active = null; if (game) game._notification = null; },
};

// в”Ђв”Ђв”Ђ Audio Manager в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const AUDIO_MANAGER = {
    ctx: null,
    initialized: false,
    volume: 0.3,
    musicVolume: 0.1,
    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.initialized = true;
        } catch(e) { this.initialized = false; }
    },
    play(freq, type, duration, vol) {
        if (!this.initialized || !this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.frequency.value = freq || 440;
        osc.type = type || 'square';
        gain.gain.value = (vol || this.volume) * 0.3;
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + (duration || 0.1));
        osc.start(); osc.stop(this.ctx.currentTime + (duration || 0.1));
    },
    playMelody(notes, baseFreq) {
        notes.forEach((note, i) => {
            setTimeout(() => {
                this.play(baseFreq + note * 50, 'square', 0.15, this.volume * 0.5);
            }, i * 100);
        });
    },
    playClick() { this.play(800, 'square', 0.05); },
    playHack() { this.play(400, 'sawtooth', 0.2); },
    playDamage() { this.play(200, 'square', 0.15); },
    playCrit() { this.play(1200, 'sawtooth', 0.3); },
    playWin() { this.playMelody([0, 2, 4, 8], 523); },
    playLose() { this.playMelody([4, 2, 0, -2], 400); },
    playLevelUp() { this.playMelody([0, 4, 8, 12], 400); },
};

// в”Ђв”Ђв”Ђ Particle Effects в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class Particle {
    constructor(x, y, vx, vy, life, color, size, type) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life; this.color = color || '#0ff';
        this.size = size || 3; this.type = type || 'circle';
    }
    update(dt) {
        this.x += this.vx * (dt / 16);
        this.y += this.vy * (dt / 16);
        this.life -= dt;
        this.vy += 0.1;
    }
    draw(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        if (this.type === 'circle') {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2); ctx.fill();
        } else {
            ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
        }
        ctx.globalAlpha = 1;
    }
    get dead() { return this.life <= 0; }
}

class ParticleSystem {
    constructor() { this.particles = []; }
    emit(x, y, count, color, spread, life, size, type) {
        for (let i = 0; i < (count || 10); i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * (spread || 3);
            this.particles.push(new Particle(
                x + (Math.random() - 0.5) * 10,
                y + (Math.random() - 0.5) * 10,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                life || 500 + Math.random() * 500,
                color || '#0ff',
                size || 2 + Math.random() * 2,
                type || 'circle'
            ));
        }
    }
    update(dt) {
        this.particles.forEach(p => p.update(dt));
        this.particles = this.particles.filter(p => !p.dead);
    }
    draw(ctx) {
        this.particles.forEach(p => p.draw(ctx));
    }
    get count() { return this.particles.length; }
}

const ANIMATION_MANAGER = {

    add(type, data, duration) {

    },
    getActive(type) { return this.animations.filter(a => a.type === type && a.progress < 1); },
