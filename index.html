// ─── PROCEDURAL ENEMY GENERATION ─────────────────────────────────────
function generateProceduralEnemy(zone, playerLevel, difficultyMult) {
    const prefix = ['Дикий', 'Усиленный', 'Модифицированный', 'Элитный', 'Первобытный', 'Кибер-', 'Теневой', 'Плазменный'];
    const suffix = ['Страж', 'Охотник', 'Вир', 'Демон', 'Спектр', 'Голем', 'Фантом', 'Терминатор'];
    const name = prefix[Math.floor(Math.random() * prefix.length)] + ' ' + suffix[Math.floor(Math.random() * suffix.length)];
    const baseHp = 20 + playerLevel * 8;
    const baseDmg = 4 + playerLevel * 3;
    const baseDef = 1 + Math.floor(playerLevel * 1.2);
    const mult = (difficultyMult || 1) * (1 + (playerLevel - 1) * 0.08);
    const abilities = [];
    if (Math.random() < 0.3) abilities.push('charge');
    if (Math.random() < 0.25) abilities.push('shield');
    if (Math.random() < 0.2) abilities.push('heal');
    if (Math.random() < 0.15) abilities.push('berserk');
    if (Math.random() < 0.1) abilities.push('summon');
    if (playerLevel > 15 && Math.random() < 0.1) abilities.push('corrupt');
    if (playerLevel > 25 && Math.random() < 0.05) abilities.push('reality_shift');
    return {
        name: name,
        hp: Math.floor(baseHp * mult),
        maxHp: Math.floor(baseHp * mult),
        dmg: Math.floor(baseDmg * mult),
        def: Math.floor(baseDef * mult),
        level: playerLevel,
        zone: zone,
        abilities: abilities,
        isBoss: false,
        reward: {
            cr: Math.floor((10 + playerLevel * 5) * mult),
            xp: Math.floor((5 + playerLevel * 3) * mult),
        },
        dropRate: Math.min(0.6, 0.1 + playerLevel * 0.01),
    };
}

function generateBossProcedural(zone, playerLevel) {
    const bossPrefix = ['Властелин', 'Король', 'Император', 'Архитектор', 'Повелитель', 'Нексус'];
    const bossSuffix = ['Бездны', 'Матрицы', 'Кода', 'Реальности', 'Сети', 'Тьмы'];
    const name = bossPrefix[Math.floor(Math.random() * bossPrefix.length)] + ' ' + bossSuffix[Math.floor(Math.random() * bossSuffix.length)];
    const boss = generateProceduralEnemy(zone, playerLevel + 5, 2.5);
    boss.name = name;
    boss.isBoss = true;
    boss.hp = Math.floor(boss.hp * 3);
    boss.maxHp = boss.hp;
    boss.dmg = Math.floor(boss.dmg * 1.8);
    boss.def = Math.floor(boss.def * 2);
    boss.abilities.push('boss_aura');
    boss.reward.cr = Math.floor(boss.reward.cr * 5);
    boss.reward.xp = Math.floor(boss.reward.xp * 4);
    boss.dropRate = 1.0;
    return boss;
}

// ─── ECONOMY SIMULATION FUNCTIONS ─────────────────────────────────────
const ECONOMY_SIM = {
    prices: {},
    volatility: 0.05,
    trends: {},
    lastUpdate: 0,
    updateInterval: 60000,
    commodities: {
        credit_chip: { base: 1, name: 'Credit Chip', supply: 1000000, demand: 800000 },
        data_fragment: { base: 50, name: 'Data Fragment', supply: 50000, demand: 60000 },
        quantum_chip: { base: 250, name: 'Quantum Chip', supply: 10000, demand: 15000 },
        nano_processor: { base: 600, name: 'Nano Processor', supply: 5000, demand: 8000 },
        plasma_core: { base: 1500, name: 'Plasma Core', supply: 2000, demand: 3500 },
        ai_core: { base: 10000, name: 'AI Core', supply: 500, demand: 2000 },
        dark_matter: { base: 25000, name: 'Dark Matter', supply: 100, demand: 500 },
    },
    init() {
        Object.keys(this.commodities).forEach(id => {
            const c = this.commodities[id];
            this.prices[id] = c.base;
            this.trends[id] = (Math.random() - 0.5) * 0.1;
        });
        this.lastUpdate = Date.now();
    },
    update() {
        const now = Date.now();
        if (now - this.lastUpdate < this.updateInterval) return;
        this.lastUpdate = now;
        Object.keys(this.commodities).forEach(id => {
            const c = this.commodities[id];
            const supplyRatio = c.supply / c.demand;
            let priceChange = (1 - supplyRatio) * this.volatility;
            priceChange += (Math.random() - 0.5) * this.volatility * 0.5;
            this.trends[id] = this.trends[id] * 0.9 + priceChange * 0.1;
            this.prices[id] = Math.max(c.base * 0.1, this.prices[id] * (1 + priceChange));
            c.supply += Math.floor((Math.random() - 0.5) * c.supply * 0.01);
            c.demand += Math.floor((Math.random() - 0.5) * c.demand * 0.01);
            c.supply = Math.max(1, c.supply);
            c.demand = Math.max(1, c.demand);
        });
    },
    getPrice(id) { return this.prices[id] || 0; },
    getTrend(id) { return this.trends[id] || 0; },
    buy(id, qty) {
        const c = this.commodities[id];
        if (!c) return 0;
        const price = this.prices[id] || c.base;
        c.supply -= qty;
        c.supply = Math.max(0, c.supply);
        return Math.floor(price * qty);
    },
    sell(id, qty) {
        const c = this.commodities[id];
        if (!c) return 0;
        const price = (this.prices[id] || c.base) * 0.8;
        c.supply += qty;
        return Math.floor(price * qty);
    },
};

// ─── FACTION WAR SIMULATION ───────────────────────────────────────────
const FACTION_WAR = {
    factions: {
        netcorp: { name: 'NetCorp', power: 1000, territory: 6, color: '#00f', allies: [], enemies: ['ghostnet'] },
        ghostnet: { name: 'GhostNet', power: 800, territory: 5, color: '#f0f', allies: [], enemies: ['netcorp'] },
        streetpunks: { name: 'StreetPunks', power: 600, territory: 3, color: '#f60', allies: [], enemies: ['deepones'] },
        deepones: { name: 'DeepOnes', power: 700, territory: 4, color: '#0af', allies: [], enemies: ['streetpunks'] },
    },
    wars: [],
    battleHistory: [],
    lastUpdate: 0,
    updateInterval: 300000,
    declareWar(attackerId, defenderId) {
        if (this.wars.some(w => (w.attacker === attackerId && w.defender === defenderId) || (w.attacker === defenderId && w.defender === attackerId))) return false;
        this.wars.push({ attacker: attackerId, defender: defenderId, startedAt: Date.now(), battles: 0, attackerWins: 0, defenderWins: 0 });
        return true;
    },
    simulateBattle(attackerId, defenderId) {
        const att = this.factions[attackerId];
        const def = this.factions[defenderId];
        if (!att || !def) return null;
        const attPower = att.power + (Math.random() - 0.5) * att.power * 0.3;
        const defPower = def.power + (Math.random() - 0.5) * def.power * 0.3;
        const attWins = attPower > defPower;
        if (attWins) {
            att.power += 10;
            def.power -= 5;
            att.territory = Math.min(10, att.territory + 0.5);
            def.territory = Math.max(0, def.territory - 0.5);
        } else {
            def.power += 10;
            att.power -= 5;
            def.territory = Math.min(10, def.territory + 0.5);
            att.territory = Math.max(0, att.territory - 0.5);
        }
        const result = { attacker: attackerId, defender: defenderId, winner: attWins ? attackerId : defenderId, time: Date.now() };
        this.battleHistory.push(result);
        if (this.battleHistory.length > 100) this.battleHistory.shift();
        const war = this.wars.find(w => (w.attacker === attackerId && w.defender === defenderId));
        if (war) { war.battles++; if (attWins) war.attackerWins++; else war.defenderWins++; }
        return result;
    },
    update() {
        const now = Date.now();
        if (now - this.lastUpdate < this.updateInterval) return;
        this.lastUpdate = now;
        Object.keys(this.factions).forEach(id => {
            const f = this.factions[id];
            f.power += Math.floor((Math.random() - 0.5) * f.power * 0.02);
            f.power = Math.max(100, f.power);
        });
        if (this.wars.length > 0) {
            const war = this.wars[Math.floor(Math.random() * this.wars.length)];
            this.simulateBattle(war.attacker, war.defender);
        }
        if (Math.random() < 0.1 && this.wars.length < 3) {
            const fids = Object.keys(this.factions);
            const a = fids[Math.floor(Math.random() * fids.length)];
            const b = fids[Math.floor(Math.random() * fids.length)];
            if (a !== b && !this.factions[a].enemies.includes(b)) {
                this.factions[a].enemies.push(b);
                this.factions[a].allies = this.factions[a].allies.filter(x => x !== b);
                this.declareWar(a, b);
            }
        }
    },
    getActiveWars() {
        return this.wars.filter(w => Date.now() - w.startedAt < 86400000 * 7);
    },
};

// ─── GUILD/CLAN MANAGEMENT FUNCTIONS ──────────────────────────────────
const GUILD_MANAGER = {
    guilds: [],
    createGuild(name, founder, game) {
        const c = game?.character?.character || {};
        if ((c.credits || 0) < 25000) return { success: false, error: 'Недостаточно кредитов' };
        if (this.guilds.find(g => g.name.toLowerCase() === name.toLowerCase())) return { success: false, error: 'Гильдия с таким именем уже существует' };
        if (this.getPlayerGuild(founder)) return { success: false, error: 'Вы уже состоите в гильдии' };
        c.credits -= 25000;
        const guild = {
            id: 'g_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            name: name,
            level: 1,
            xp: 0,
            xpNext: 1000,
            treasury: 0,
            members: [{ id: founder, rank: 'leader', joinedAt: Date.now(), contributions: 0 }],
            created: Date.now(),
            emblem: Math.floor(Math.random() * 10),
            description: '',
            wars: [],
            alliances: [],
        };
        this.guilds.push(guild);
        return { success: true, guild: guild };
    },
    getPlayerGuild(playerId) {
        return this.guilds.find(g => g.members.some(m => m.id === playerId));
    },
    addMember(guildId, playerId) {
        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return false;
        if (guild.members.find(m => m.id === playerId)) return false;
        guild.members.push({ id: playerId, rank: 'member', joinedAt: Date.now(), contributions: 0 });
        return true;
    },
    removeMember(guildId, playerId) {
        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return false;
        guild.members = guild.members.filter(m => m.id !== playerId);
        return true;
    },
    promote(guildId, playerId) {
        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return false;
        const member = guild.members.find(m => m.id === playerId);
        if (!member) return false;
        if (member.rank === 'member') member.rank = 'officer';
        else if (member.rank === 'officer') member.rank = 'leader';
        return true;
    },
    addXp(guildId, amount) {
        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return;
        guild.xp += amount;
        while (guild.xp >= guild.xpNext) {
            guild.xp -= guild.xpNext;
            guild.level++;
            guild.xpNext = Math.floor(guild.xpNext * 1.5);
        }
    },
    contribute(guildId, playerId, amount) {
        const guild = this.guilds.find(g => g.id === guildId);
        if (!guild) return false;
        const member = guild.members.find(m => m.id === playerId);
        if (!member) return false;
        member.contributions += amount;
        guild.treasury += amount;
        this.addXp(guildId, Math.floor(amount * 0.1));
        return true;
    },
    declareWar(guildId, targetGuildId) {
        const guild = this.guilds.find(g => g.id === guildId);
        const target = this.guilds.find(g => g.id === targetGuildId);
        if (!guild || !target) return false;
        if (guild.wars.some(w => w.target === targetGuildId)) return false;
        guild.wars.push({ target: targetGuildId, declaredAt: Date.now(), battles: 0, score: 0, enemyScore: 0 });
        target.wars.push({ target: guildId, declaredAt: Date.now(), battles: 0, score: 0, enemyScore: 0 });
        return true;
    },
    getAllGuilds() { return this.guilds; },
    getGuildRanking() {
        return [...this.guilds].sort((a, b) => b.level - a.level || b.xp - a.xp);
    },
};

        return true;
    },
    uninstall(slot) {
        this.slots[slot] = null;
    },
    getTotalStats() {
        const stats = { hp: 0, atk: 0, def: 0, spd: 0, hack: 0, crit: 0, regen: 0 };
        Object.values(this.slots).forEach(id => {
            if (!id) return;
            const imp = this.implants.find(i => i.id === id);
            if (imp) {
                Object.entries(imp.stats).forEach(([k, v]) => { if (stats[k] !== undefined) stats[k] += v; });
            }
        });
        return stats;
    },
    getInstalledImplants() {
        return Object.entries(this.slots).filter(([k, v]) => v !== null).map(([slot, id]) => {
            return this.implants.find(i => i.id === id);
        }).filter(Boolean);
    },
};

    },
    levelThresholds: [0, 500, 2000, 5000, 10000, 20000, 50000, 100000],
    perksByLevel: {
        1: { name: 'Новичок', desc: 'Базовый доступ' },
        2: { name: 'Свой', desc: 'Скидка 5%' },
        3: { name: 'Уважаемый', desc: 'Скидка 10%, особые задания' },
        4: { name: 'Элита', desc: 'Скидка 15%, редкие предметы' },

        7: { name: 'Миф', desc: 'Скидка 40%, уникальные предметы' },
        8: { name: 'Бог', desc: 'Скидка 50%, всё доступно' },
    },
    addRep(factionId, amount, game) {
        const rep = this.reps[factionId];
        if (!rep) return;
        const oldLevel = rep.level;
        rep.value += amount;
        rep.level = this.getLevel(rep.value);
        if (rep.level > oldLevel && game) {
            game.showNotification('Репутация с ' + rep.name + ' повышена! Ур.' + rep.level, '#ff0');
            const perk = this.perksByLevel[rep.level];
            if (perk) rep.perks.push(perk.name);
        }
    },
    getLevel(value) {
        let level = 1;
        for (let i = 0; i < this.levelThresholds.length; i++) {
            if (value >= this.levelThresholds[i]) level = i + 1;
            else break;
        }
        return Math.min(level, this.levelThresholds.length);
    },
    getDiscount(factionId) {
        const rep = this.reps[factionId];
        if (!rep) return 0;
        return Math.min(0.5, (rep.level - 1) * 0.05);
    },
    getProgress(factionId) {
        const rep = this.reps[factionId];
        if (!rep) return 0;
        const currentLvl = rep.level;
        const currentThreshold = this.levelThresholds[currentLvl - 1] || 0;
        const nextThreshold = this.levelThresholds[currentLvl] || currentThreshold + 50000;
        return (rep.value - currentThreshold) / (nextThreshold - currentThreshold);
    },
};

const MARKET_TRADER = {
    orders: { buy: [], sell: [] },
    maxOrders: 20,
    createBuyOrder(itemId, price, qty, playerId) {
        if (this.orders.buy.length >= this.maxOrders) return false;
        this.orders.buy.push({ id: 'bo_' + Date.now().toString(36), itemId, price, qty, playerId, createdAt: Date.now(), filled: 0 });
        return true;
    },
    createSellOrder(itemId, price, qty, playerId) {
        if (this.orders.sell.length >= this.maxOrders) return false;
        this.orders.sell.push({ id: 'so_' + Date.now().toString(36), itemId, price, qty, playerId, createdAt: Date.now(), filled: 0 });
        return true;
    },
    matchOrders() {
        const matched = [];
        this.orders.buy.forEach(buy => {
            if (buy.filled >= buy.qty) return;
            this.orders.sell.forEach(sell => {
                if (sell.filled >= sell.qty) return;
                if (buy.itemId !== sell.itemId) return;
                if (buy.price >= sell.price) {
                    const tradeQty = Math.min(buy.qty - buy.filled, sell.qty - sell.filled);
                    buy.filled += tradeQty;
                    sell.filled += tradeQty;
                    matched.push({ buyId: buy.id, sellId: sell.id, itemId: buy.itemId, qty: tradeQty, price: sell.price });
                }
            });
        });
        this.orders.buy = this.orders.buy.filter(o => o.filled < o.qty);
        this.orders.sell = this.orders.sell.filter(o => o.filled < o.qty);
        return matched;
    },
    getBuyOrders(itemId) { return this.orders.buy.filter(o => o.itemId === itemId); },
    getSellOrders(itemId) { return this.orders.sell.filter(o => o.itemId === itemId); },
    getBestPrice(itemId, type) {
        const orders = type === 'buy' ? this.getBuyOrders(itemId) : this.getSellOrders(itemId);
        if (orders.length === 0) return 0;
        return type === 'buy' ? Math.max(...orders.map(o => o.price)) : Math.min(...orders.map(o => o.price));
    },
};

    ],
    activeRace: null,
    startRace(trackId, playerMount) {
        const track = this.tracks.find(t => t.id === trackId);
        if (!track) return false;
        const mountSpeed = playerMount ? playerMount.speedBonus || 10 : 5;
        this.activeRace = {
            track: track,
            playerPos: 0,
            opponentPos: 0,
            playerSpeed: mountSpeed * (0.8 + Math.random() * 0.4),
            opponentSpeed: (5 + Math.random() * 10) * (0.8 + Math.random() * 0.4),
            lap: 1,
            time: 0,
            finished: false,
            hazards: [],
        };
        return true;
    },
    update(dt) {
        if (!this.activeRace || this.activeRace.finished) return;
        const race = this.activeRace;
        const f = dt / 16;
        race.playerPos += race.playerSpeed * 0.5 * f;
        race.opponentPos += race.opponentSpeed * 0.5 * f;
        race.time += dt;
        if (race.playerPos >= race.track.length) {
            race.lap++;
            race.playerPos = 0;
            if (race.lap > race.track.laps) race.finished = true;
        }
        if (race.opponentPos >= race.track.length) {
            race.opponentPos = 0;
        }
        if (Math.random() < 0.01 * f) {
            race.hazards.push({ pos: race.playerPos + 50 + Math.random() * 200, type: race.track.hazards[Math.floor(Math.random() * race.track.hazards.length)], active: true });
        }
        race.hazards = race.hazards.filter(h => h.pos > race.playerPos - 100);
    },
    getResult() {
        if (!this.activeRace) return null;
        return {
            won: this.activeRace.finished,
            time: this.activeRace.time,
            reward: this.activeRace.finished ? this.activeRace.track.reward : null,
        };
    },
};

// ─── ENCRYPTION / CODE-BREAKING MINIGAME ──────────────────────────────
const CODE_BREAKER = {
    active: false,
    code: [],
    attempts: [],
    maxAttempts: 6,
    codeLength: 4,
    symbols: ['0', '1', '#', '@', '$', '%', '&', '*', 'A', 'B', 'C', 'D', 'E', 'F'],
    difficulty: 1,
    start(difficulty) {
        this.difficulty = difficulty || 1;
        this.codeLength = 3 + difficulty;
        this.maxAttempts = 5 + difficulty;
        this.code = [];
        this.attempts = [];
        this.active = true;
        const pool = this.symbols.slice(0, 6 + difficulty * 2);
        for (let i = 0; i < this.codeLength; i++) {
            this.code.push(pool[Math.floor(Math.random() * pool.length)]);
        }
    },
    submitGuess(guess) {
        if (!this.active || this.attempts.length >= this.maxAttempts) return null;
        const result = { exact: 0, partial: 0 };
        const codeCopy = [...this.code];
        const guessCopy = [...guess];
        for (let i = 0; i < this.codeLength; i++) {
            if (guessCopy[i] === codeCopy[i]) { result.exact++; codeCopy[i] = null; guessCopy[i] = null; }
        }
        for (let i = 0; i < this.codeLength; i++) {
            if (guessCopy[i] === null) continue;
            const idx = codeCopy.indexOf(guessCopy[i]);
            if (idx !== -1) { result.partial++; codeCopy[idx] = null; }
        }
        this.attempts.push({ guess, result });
        if (result.exact === this.codeLength) { this.active = false; return 'win'; }
        if (this.attempts.length >= this.maxAttempts) { this.active = false; return 'lose'; }
        return 'continue';
    },
};

        if (this.opacity > 0) {
            ctx.fillStyle = 'rgba(0,0,0,' + this.opacity + ')';
            for (let y = 0; y < h; y += this.scanSpacing) {
                ctx.fillRect(0, y, w, 1);
            }
        }
        if (this.vignette) {
            const grad = ctx.createRadialGradient(w / 2, h / 2, h * 0.3, w / 2, h / 2, h * 0.8);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,' + this.vignetteStrength + ')');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
        }
        if (this.chromatic) {
            const o = this.chromaticOffset;
            ctx.fillStyle = 'rgba(255,0,0,0.015)';
            ctx.fillRect(o, 0, w, h);
            ctx.fillStyle = 'rgba(0,0,255,0.015)';
            ctx.fillRect(-o, 0, w, h);
        }
    },
};

// ─── SCREEN TRANSITION MANAGER ─────────────────────────────────────────
const TRANSITION = {
    active: false,
    type: 'fade',
    progress: 0,
    duration: 300,
    callback: null,
    direction: 'in',
    start(screen, cb) {
        this.active = true;
        this.progress = 0;
        this.direction = 'in';
        this.callback = () => { game.screen = screen; if (cb) cb(); };
    },
    update(dt) {
        if (!this.active) return;
        this.progress += dt / this.duration;
        if (this.progress >= 0.5 && this.callback) {
            this.callback();
            this.callback = null;
            this.direction = 'out';
        }
        if (this.progress >= 1) { this.active = false; this.progress = 0; }
    },
    draw(ctx) {
        if (!this.active) return;
        const p = this.direction === 'in' ? this.progress * 2 : (this.progress - 0.5) * 2;
        const alpha = this.direction === 'in' ? Math.min(1, p) : Math.max(0, 1 - p);
        ctx.fillStyle = 'rgba(0,0,0,' + alpha * 0.7 + ')';
        ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
    },
};

// ─── ENHANCED UI TOOLTIP SYSTEM ───────────────────────────────────────
const TOOLTIP = {
    text: '',
    x: 0, y: 0,
    visible: false,
    timer: 0,
    show(text, x, y) { this.text = text; this.x = x; this.y = y; this.visible = true; this.timer = 0; },
    hide() { this.visible = false; },
    update(dt) { if (this.visible) this.timer += dt; if (this.timer > 5000) this.hide(); },
    draw(ctx) {
        if (!this.visible || !this.text) return;
        const lines = this.text.split('\n');
        const maxW = lines.reduce((m, l) => Math.max(m, ctx.measureText ? ctx.measureText(l).width + 20 : l.length * 7 + 20), 0);
        const h = lines.length * 16 + 10;
        let tx = Math.min(this.x + 15, CFG.WIDTH - maxW - 10);
        let ty = Math.min(this.y + 20, CFG.HEIGHT - h - 10);
        ctx.save();
        ctx.shadowColor = 'rgba(0,255,255,0.3)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = 'rgba(0,10,20,0.92)';
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        const r = 4;
        ctx.moveTo(tx + r, ty); ctx.lineTo(tx + maxW - r, ty);
        ctx.quadraticCurveTo(tx + maxW, ty, tx + maxW, ty + r);
        ctx.lineTo(tx + maxW, ty + h - r);
        ctx.quadraticCurveTo(tx + maxW, ty + h, tx + maxW - r, ty + h);
        ctx.lineTo(tx + r, ty + h);
        ctx.quadraticCurveTo(tx, ty + h, tx, ty + h - r);
        ctx.lineTo(tx, ty + r);
        ctx.quadraticCurveTo(tx, ty, tx + r, ty);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0ff'; ctx.font = '10px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        lines.forEach((l, i) => ctx.fillText(l, tx + 10, ty + 6 + i * 16));
        ctx.restore();
    },
};

// ─── SCREEN SHAKE ──────────────────────────────────────────────────────
const SHAKE = {
    x: 0, y: 0,
    intensity: 0,
    decay: 0.9,
    trigger(intensity) { this.intensity = Math.max(this.intensity, intensity || 5); },
    update() {
        if (this.intensity < 0.5) { this.x = 0; this.y = 0; return; }
        this.x = (Math.random() - 0.5) * this.intensity * 2;
        this.y = (Math.random() - 0.5) * this.intensity * 2;
        this.intensity *= this.decay;
    },
    apply(ctx) {
        if (this.intensity > 0.5) ctx.translate(this.x, this.y);
    },
};

// ─── ENHANCED FLOATING TEXT ───────────────────────────────────────────
const FLOATING_TEXTS = {
    items: [],
    add(text, x, y, color, size, duration) {

            text, x, y,

// ─── NEBULA BACKGROUND EFFECT ─────────────────────────────────────────
var NEBULA = {
    layers: [],
    count: 3,
    init() {
        for (let i = 0; i < this.count; i++) {
            this.layers.push({
                x: Math.random() * CFG.WIDTH,
                y: Math.random() * CFG.HEIGHT,
                radius: 100 + Math.random() * 200,
                color1: [Math.random() * 255, Math.random() * 255, 255],
                color2: [0, Math.random() * 255, Math.random() * 255],
                alpha: 0.02 + Math.random() * 0.04,
                speed: 0.1 + Math.random() * 0.3,
                pulse: Math.random() * Math.PI * 2,
            });
        }
    },
    update(dt) {
        const f = dt / 16;
        this.layers.forEach(l => {
            l.x += Math.sin(l.pulse) * l.speed * f;
            l.y += Math.cos(l.pulse * 1.3) * l.speed * f * 0.5;
            l.pulse += 0.01 * f;
            if (l.x < -l.radius) l.x = CFG.WIDTH + l.radius;
            if (l.x > CFG.WIDTH + l.radius) l.x = -l.radius;
            if (l.y < -l.radius) l.y = CFG.HEIGHT + l.radius;
            if (l.y > CFG.HEIGHT + l.radius) l.y = -l.radius;
            const breathe = 0.8 + 0.2 * Math.sin(l.pulse * 0.5);
            l.radius *= breathe;
            if (l.radius < 50) l.radius = 50;
            if (l.radius > 400) l.radius = 400;
        });
    },
    draw(ctx) {
        this.layers.forEach(l => {
            const grad = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, l.radius);
            const c1 = `rgba(${l.color1[0]},${l.color1[1]},${l.color1[2]},${l.alpha})`;
            const c2 = `rgba(${l.color2[0]},${l.color2[1]},${l.color2[2]},${l.alpha * 0.3})`;
            grad.addColorStop(0, c1);
            grad.addColorStop(0.5, c2);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        });
    },
};

// ─── STAR FIELD PARALLAX ──────────────────────────────────────────────

// ─── RAIN/SNOW WEATHER SYSTEM ─────────────────────────────────────────
var WEATHER_FX = {
    particles: [],
    type: 'rain',
    intensity: 1,
    maxParticles: 200,
    wind: 0,
    init(type) {
        this.type = type || 'rain';
        this.particles = [];
        for (let i = 0; i < this.maxParticles; i++) {
            this.particles.push(this.createParticle());
        }
    },
    createParticle() {
        return {
            x: Math.random() * CFG.WIDTH,
            y: Math.random() * CFG.HEIGHT,
            speed: this.type === 'rain' ? 4 + Math.random() * 6 : 0.5 + Math.random() * 2,
            size: this.type === 'rain' ? 1 + Math.random() * 2 : 1 + Math.random() * 3,
            alpha: this.type === 'rain' ? 0.2 + Math.random() * 0.3 : 0.3 + Math.random() * 0.5,
            sway: Math.random() * Math.PI * 2,
            swaySpeed: 0.02 + Math.random() * 0.03,
            drift: (Math.random() - 0.5) * 0.5,
        };
    },
    update(dt) {
        const f = dt / 16;
        this.particles.forEach(p => {
            p.y += p.speed * f * this.intensity;
            p.x += (this.wind + p.drift) * f;
            p.sway += p.swaySpeed * f;
            p.x += Math.sin(p.sway) * 0.3 * f;
            if (p.y > CFG.HEIGHT) { p.y = -5; p.x = Math.random() * CFG.WIDTH; }
            if (p.x < -5) p.x = CFG.WIDTH + 5;
            if (p.x > CFG.WIDTH + 5) p.x = -5;
        });
    },
    draw(ctx) {
        this.particles.forEach(p => {
            if (this.type === 'rain') {
                ctx.strokeStyle = `rgba(150,200,255,${p.alpha})`;
                ctx.lineWidth = p.size;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - this.wind * 2, p.y + p.speed * 2);
                ctx.stroke();
            } else {
                ctx.fillStyle = `rgba(220,230,255,${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
        });
    },
    setType(type) {
        this.type = type;
        this.particles = [];
        for (let i = 0; i < this.maxParticles; i++) {
            this.particles.push(this.createParticle());
        }
    },
};

// ─── ENERGY SHIELD EFFECT ─────────────────────────────────────────────
const ENERGY_SHIELD = {
    active: false,
    radius: 60,
    x: 0,
    y: 0,
    health: 100,
    maxHealth: 100,
    color: '#0ff',
    pulse: 0,
    particles: [],
    activate(x, y, color) {
        this.active = true;
        this.x = x;
        this.y = y;
        this.health = this.maxHealth;
        this.color = color || '#0ff';
        this.particles = [];
        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = this.radius * (0.8 + Math.random() * 0.2);
            this.particles.push({
                angle: angle,
                dist: dist,
                speed: 0.5 + Math.random() * 1.5,
                size: 1 + Math.random() * 2,
                alpha: 0.3 + Math.random() * 0.5,
                offset: Math.random() * Math.PI * 2,
            });
        }
    },
    deactivate() { this.active = false; },
    hit(damage) {
        this.health -= damage;
        if (this.health <= 0) { this.health = 0; this.deactivate(); }
        return this.health <= 0;
    },
    update(dt) {
        if (!this.active) return;
        this.pulse += 0.05 * (dt / 16);
        this.particles.forEach(p => {
            p.angle += p.speed * 0.01 * (dt / 16);
            p.dist += Math.sin(this.pulse + p.offset) * 0.2;
            p.dist = Math.max(this.radius * 0.5, Math.min(this.radius * 1.2, p.dist));
        });
    },
    draw(ctx) {
        if (!this.active) return;
        const healthRatio = this.health / this.maxHealth;
        const pulseAlpha = 0.3 + 0.2 * Math.sin(this.pulse * 2);
        ctx.save();
        ctx.globalAlpha = pulseAlpha * healthRatio;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.fillStyle = this.color.replace(')', ',0.05)').replace('rgb', 'rgba');
        ctx.fillStyle = `rgba(0,255,255,${0.03 * healthRatio})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        this.particles.forEach(p => {
            const px = this.x + Math.cos(p.angle) * p.dist;
            const py = this.y + Math.sin(p.angle) * p.dist;
            ctx.fillStyle = this.color;
            ctx.globalAlpha = p.alpha * healthRatio * (0.5 + 0.5 * Math.sin(this.pulse + p.offset));
            ctx.beginPath();
            ctx.arc(px, py, p.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.restore();
    },
};

// ─── ORIGINAL LOOP WRAPPER ────────────────────────────────────────────
const _origLoop = Game.prototype.loop;
Game.prototype.loop = function() {
    const now = performance.now();
    const dt = Math.min(33, now - (this._lastTime || now));
    this._lastTime = now;
    this._fps = this._fps || 0;
    this._fpsCount = this._fpsCount || 0;
    this._fpsTime = this._fpsTime || 0;
    this._fpsCount++;
    this._fpsTime += dt;
    if (this._fpsTime >= 1000) { this._fps = this._fpsCount; this._fpsCount = 0; this._fpsTime = 0; }
    GLITCH.update(dt);
    TRANSITION.update(dt);
    SHAKE.update();
    FLOATING_TEXTS.update(dt);
    AMBIENT.update(dt);
    TOOLTIP.update(dt);
    SAVE_INDICATOR.update(dt);
    if (_origLoop) _origLoop.call(this);
    const ctx = this.ctx;
    ctx.save();
    SHAKE.apply(ctx);
    if (this._showFps) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(CFG.WIDTH - 70, 0, 70, 18);
        ctx.fillStyle = '#0f0'; ctx.font = '10px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
        ctx.fillText(this._fps + ' FPS', CFG.WIDTH - 5, 3);
    }
    AMBIENT.draw(ctx);
    FLOATING_TEXTS.draw(ctx);
    CRT.draw(ctx);
    GLITCH.apply(ctx);
    TRANSITION.draw(ctx);
    SAVE_INDICATOR.draw(ctx);
    TOOLTIP.draw(ctx);
    ctx.restore();
};

    if (!canvas) return;
    function resize() {
        const maxW = window.innerWidth - 20;
        const maxH = window.innerHeight - 20;
        const scale = Math.min(1, Math.min(maxW / CFG.WIDTH, maxH / CFG.HEIGHT));
        canvas.style.width = Math.floor(CFG.WIDTH * scale) + 'px';
        canvas.style.height = Math.floor(CFG.HEIGHT * scale) + 'px';
        canvas.style.imageRendering = 'pixelated';
    }
    window.addEventListener('resize', resize);
    resize();
})();

// ─── CANVAS UI COMPONENTS: PROGRESS BAR WITH ANIMATION ───────────────
function createAnimatedBar(x, y, w, h, val, max, opts) {
    const o = Object.assign({ fg: '#0ff', bg: '#1a1a2a', border: '#0ff', radius: 3, animSpeed: 0.05, label: '', showLabel: true }, opts);
    let displayVal = 0;
    return {
        x, y, w, h, val, max, o, displayVal,
        setValue(v) { this.val = Math.min(v, this.max); },
        update() {
            const diff = (this.val / this.max) - this.displayVal;
            if (Math.abs(diff) > 0.001) this.displayVal += diff * this.o.animSpeed;
            else this.displayVal = this.val / this.max;
        },
        draw(ctx) {
            const ratio = this.displayVal;
            ctx.save();
            if (this.o.bg) { ctx.fillStyle = this.o.bg; this.roundRect(ctx, this.x, this.y, this.w, this.h, this.o.radius, true, false); }
            if (this.o.fg && ratio > 0) {
                const fillW = Math.max(2, this.w * ratio);
                ctx.fillStyle = this.o.fg;
                ctx.shadowColor = this.o.fg;
                ctx.shadowBlur = 5;
                this.roundRect(ctx, this.x, this.y, fillW, this.h, this.o.radius, true, false);
                ctx.shadowBlur = 0;
            }
            if (this.o.border) { ctx.strokeStyle = this.o.border; ctx.lineWidth = 1; this.roundRect(ctx, this.x, this.y, this.w, this.h, this.o.radius, false, true); }
            if (this.o.showLabel && this.o.label) {
                ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.o.label + ' ' + Math.floor(ratio * 100) + '%', this.x + this.w / 2, this.y + this.h / 2);
            }
            ctx.restore();
        },
        roundRect(ctx, x, y, w, h, r, fill, stroke) {
            ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath(); if (fill) ctx.fill(); if (stroke) ctx.stroke();
        },
    };
}

// ─── CANVAS UI COMPONENTS: MODAL DIALOG SYSTEM ──────────────────────
const MODAL_SYSTEM = {
    stack: [],
    push(title, body, opts) {
        const o = Object.assign({ width: 300, height: 200, closable: true, buttons: [] }, opts);
        const modal = {
            title: title,
            body: body,
            opts: o,
            x: (CFG.WIDTH - o.width) / 2,
            y: (CFG.HEIGHT - o.height) / 2,
            w: o.width,
            h: o.height,
            animY: -50,
            animDone: false,
            close() {
                MODAL_SYSTEM.stack = MODAL_SYSTEM.stack.filter(m => m !== modal);
            },
        };
        setTimeout(() => { modal.animY = 0; modal.animDone = true; }, 50);
        this.stack.push(modal);
        return modal;
    },
    pop() { this.stack.pop(); },
    clear() { this.stack = []; },
    update() {
        this.stack.forEach(m => {
            if (!m.animDone) m.animY = lerp(m.animY, 0, 0.1);
            if (Math.abs(m.animY) < 0.5) { m.animY = 0; m.animDone = true; }
        });
    },
    draw(ctx) {
        if (this.stack.length === 0) return;
        const modal = this.stack[this.stack.length - 1];
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
        const mx = modal.x, my = modal.y + modal.animY;
        ctx.fillStyle = '#0a0a1a'; ctx.strokeStyle = '#0ff';
        ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
        roundRect(ctx, mx, my, modal.w, modal.h, 8, true, true);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0ff'; ctx.font = CFG.FONTS.md; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText(modal.title, mx + modal.w / 2, my + 15);
        ctx.fillStyle = '#c0c0e0'; ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        if (typeof modal.body === 'string') {
            const lines = modal.body.split('\n');
            lines.forEach((line, i) => ctx.fillText(line, mx + modal.w / 2, my + 50 + i * 18));
        }
        modal.opts.buttons.forEach((btn, i) => {
            const bx = mx + 20 + i * ((modal.w - 40) / modal.opts.buttons.length);
            const by = my + modal.h - 40;
            const bw = (modal.w - 40) / modal.opts.buttons.length - 10;
            ctx.fillStyle = btn.bg || '#0a0a2a'; ctx.strokeStyle = btn.color || '#0ff';
            roundRect(ctx, bx, by, bw, 30, 4, true, true);
            ctx.fillStyle = btn.color || '#0ff'; ctx.font = '8px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(btn.text || '', bx + bw / 2, by + 15);
        });
        if (modal.opts.closable) {
            ctx.fillStyle = '#f00'; ctx.font = '12px monospace'; ctx.textAlign = 'right'; ctx.textBaseline = 'top';
            ctx.fillText('✕', mx + modal.w - 10, my + 10);
        }
        ctx.restore();
    },
    handleClick(mx, my) {
        if (this.stack.length === 0) return false;
        const modal = this.stack[this.stack.length - 1];
        const mdx = mx, mdy = my;
        if (moux < modal.x || mdx > modal.x + modal.w || mdy < modal.y + modal.animY || mdy > modal.y + modal.animY + modal.h) {
            if (modal.opts.closable) { this.pop(); return true; }
            return false;
        }
        if (modal.opts.closable && mdx > modal.x + modal.w - 30 && mdy < modal.y + 30 + modal.animY) {
            this.pop(); return true;
        }
        modal.opts.buttons.forEach((btn, i) => {
            const bx = modal.x + 20 + i * ((modal.w - 40) / modal.opts.buttons.length);
            const by = modal.y + modal.animY + modal.h - 40;
            const bw = (modal.w - 40) / modal.opts.buttons.length - 10;
            if (mdx >= bx && mdx <= bx + bw && mdy >= by && mdy <= by + 30) {
                if (btn.cb) btn.cb();
            }
        });
        return true;
    },
};

// ─── CANVAS UI COMPONENTS: TAB PANEL SYSTEM ──────────────────────────
function createTabPanel(x, y, w, h, tabs, opts) {
    const o = Object.assign({ tabHeight: 30, tabColor: '#0a0a2a', activeColor: '#0a0a3a', borderColor: '#0ff', contentBg: '#0a0a1a' }, opts);
    let activeTab = 0;
    return {
        x, y, w, h, tabs, o, activeTab,
        setActive(idx) { if (idx >= 0 && idx < this.tabs.length) this.activeTab = idx; },
        draw(ctx) {
            const tabH = this.o.tabHeight;
            const tabW = Math.floor(this.w / this.tabs.length);
            this.tabs.forEach((tab, i) => {
                const tx = this.x + i * tabW;
                const isActive = i === this.activeTab;
                ctx.fillStyle = isActive ? this.o.activeColor : this.o.tabColor;
                ctx.strokeStyle = isActive ? this.o.borderColor : '#333';
                roundRect(ctx, tx, this.y, tabW, tabH, 4, true, true);
                ctx.fillStyle = isActive ? '#fff' : '#888';
                ctx.font = '9px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(tab.label || 'Tab ' + (i + 1), tx + tabW / 2, this.y + tabH / 2);
            });
            const cx = this.x, cy = this.y + tabH, cw = this.w, ch = this.h - tabH;
            ctx.fillStyle = this.o.contentBg; ctx.strokeStyle = this.o.borderColor;
            roundRect(ctx, cx, cy, cw, ch, 4, true, true);
            ctx.save();
            ctx.beginPath(); ctx.rect(cx, cy, cw, ch); ctx.clip();
            const active = this.tabs[this.activeTab];
            if (active && active.render) active.render(ctx, cx + 5, cy + 5, cw - 10, ch - 10);
            else {
                ctx.fillStyle = '#666'; ctx.font = '9px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(active ? active.label : 'Empty Tab', cx + cw / 2, cy + ch / 2);
            }
            ctx.restore();
        },
        handleClick(mx, my) {
            const tabH = this.o.tabHeight;
            const tabW = Math.floor(this.w / this.tabs.length);
            if (my >= this.y && my <= this.y + tabH && mx >= this.x && mx <= this.x + this.w) {
                const idx = Math.floor((mx - this.x) / tabW);
                if (idx >= 0 && idx < this.tabs.length) { this.activeTab = idx; return true; }
            }
            return false;
        },
    };
}

// ─── CANVAS UI COMPONENTS: DROPDOWN/SELECT SYSTEM ────────────────────
function createDropdown(x, y, w, h, items, opts) {
    const o = Object.assign({ color: '#0ff', bg: '#0a0a2a', border: '#0ff', font: '9px monospace', itemHeight: 25, maxVisible: 6 }, opts);
    let open = false;
    let selected = 0;
    return {
        x, y, w, h, items, o, open, selected,
        getValue() { return this.items[this.selected]; },
        setIndex(idx) { if (idx >= 0 && idx < this.items.length) { this.selected = idx; this.open = false; } },
        toggle() { this.open = !this.open; },
        close() { this.open = false; },
        draw(ctx) {
            ctx.fillStyle = this.o.bg; ctx.strokeStyle = this.o.border;
            roundRect(ctx, this.x, this.y, this.w, this.h, 4, true, true);
            ctx.fillStyle = this.o.color; ctx.font = this.o.font; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
            ctx.fillText(this.items[this.selected] || 'Select...', this.x + 8, this.y + this.h / 2);
            ctx.fillStyle = '#888'; ctx.font = '8px monospace'; ctx.textAlign = 'right';
            ctx.fillText(this.open ? '▲' : '▼', this.x + this.w - 8, this.y + this.h / 2);
            if (this.open) {
                const itemH = this.o.itemHeight;
                const maxVis = Math.min(this.o.maxVisible, this.items.length);
                const listH = maxVis * itemH + 4;
                const listY = this.y + this.h + 2;
                ctx.fillStyle = '#0d0d1a'; ctx.strokeStyle = this.o.border;
                roundRect(ctx, this.x, listY, this.w, listH, 4, true, true);
                const startIdx = Math.max(0, this.selected - Math.floor(maxVis / 2));
                const endIdx = Math.min(this.items.length, startIdx + maxVis);
                for (let i = startIdx; i < endIdx; i++) {
                    const iy = listY + 2 + (i - startIdx) * itemH;
                    if (i === this.selected) {
                        ctx.fillStyle = 'rgba(0,255,255,0.1)';
                        ctx.fillRect(this.x + 2, iy, this.w - 4, itemH);
                    }
                    ctx.fillStyle = i === this.selected ? '#fff' : '#aaa';
                    ctx.font = this.o.font; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                    ctx.fillText(this.items[i], this.x + 8, iy + itemH / 2);
                }
            }
        },
        handleClick(mx, my) {
            if (mx >= this.x && mx <= this.x + this.w && my >= this.y && my <= this.y + this.h) {
                this.toggle(); return true;
            }
            if (this.open) {
                const itemH = this.o.itemHeight;
                const maxVis = Math.min(this.o.maxVisible, this.items.length);
                const listY = this.y + this.h + 2;
                const listH = maxVis * itemH + 4;
                if (mx >= this.x && mx <= this.x + this.w && my >= listY && my <= listY + listH) {
                    const startIdx = Math.max(0, this.selected - Math.floor(maxVis / 2));
                    const idx = startIdx + Math.floor((my - listY - 2) / itemH);
                    if (idx >= 0 && idx < this.items.length) { this.selected = idx; this.open = false; return true; }
                }
                this.open = false;
            }
            return false;
        },
    };
}

// ─── CANVAS UI COMPONENTS: SLIDER CONTROL ────────────────────────────
function createSlider(x, y, w, h, min, max, val, opts) {
    const o = Object.assign({ color: '#0ff', bg: '#1a1a2a', trackColor: '#0ff', thumbSize: 12, step: 1, showValue: true }, opts);
    let value = clamp(val, min, max);
    let dragging = false;
    return {
        x, y, w, h, min, max, o, value, dragging,
        getValue() { return this.value; },
        setValue(v) { this.value = clamp(v, this.min, this.max); },
        getPercent() { return (this.value - this.min) / (this.max - this.min); },
        draw(ctx) {
            const cy = this.y + this.h / 2;
            ctx.fillStyle = this.o.bg;
            roundRect(ctx, this.x, cy - 3, this.w, 6, 3, true, false);
            const pct = this.getPercent();
            const fillW = Math.max(2, this.w * pct);
            ctx.fillStyle = this.o.trackColor;
            ctx.shadowColor = this.o.trackColor;
            ctx.shadowBlur = 4;
            roundRect(ctx, this.x, cy - 3, fillW, 6, 3, true, false);
            ctx.shadowBlur = 0;
            const tx = this.x + fillW;
            ctx.fillStyle = this.o.color;
            ctx.shadowColor = this.o.color;
            ctx.shadowBlur = 8;
            ctx.beginPath(); ctx.arc(tx, cy, this.o.thumbSize / 2, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            if (this.o.showValue) {
                ctx.fillStyle = '#fff'; ctx.font = '8px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText(Math.round(this.value) + (this.o.suffix || ''), tx, this.y - 4);
            }
        },
        handleClick(mx, my) {
            const cy = this.y + this.h / 2;
            if (my >= this.y && my <= this.y + this.h && mx >= this.x && mx <= this.x + this.w) {
                const pct = (mx - this.x) / this.w;
                this.value = clamp(this.min + pct * (this.max - this.min), this.min, this.max);
                if (this.o.step) this.value = Math.round(this.value / this.o.step) * this.o.step;
                return true;
            }
            return false;
        },
        handleDrag(mx, my) {
            if (!this.dragging) return false;
            const pct = clamp((mx - this.x) / this.w, 0, 1);
            this.value = this.min + pct * (this.max - this.min);
            if (this.o.step) this.value = Math.round(this.value / this.o.step) * this.o.step;
            this.value = clamp(this.value, this.min, this.max);
            return true;
        },
    };
}

// ─── CANVAS UI COMPONENTS: TOGGLE SWITCH ─────────────────────────────
function createToggle(x, y, w, h, initialState, opts) {
    const o = Object.assign({ onColor: '#0f0', offColor: '#333', thumbColor: '#fff', label: '', font: '9px monospace' }, opts);
    let state = !!initialState;
    return {
        x, y, w, h, o, state,
        isOn() { return this.state; },
        setOn(on) { this.state = on; },
        toggle() { this.state = !this.state; return this.state; },
        draw(ctx) {
            const thumbW = this.h - 4;
            const trackW = this.w - thumbW - 4;
            ctx.fillStyle = this.state ? this.o.onColor : this.o.offColor;
            roundRect(ctx, this.x, this.y, this.w, this.h, this.h / 2, true, false);
            ctx.fillStyle = this.o.thumbColor;
            const thumbX = this.state ? this.x + this.w - thumbW - 2 : this.x + 2;
            ctx.shadowColor = this.state ? this.o.onColor : 'transparent';
            ctx.shadowBlur = 5;
            ctx.beginPath(); ctx.arc(thumbX + thumbW / 2, this.y + this.h / 2, thumbW / 2, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            if (this.o.label) {
                ctx.fillStyle = '#aaa'; ctx.font = this.o.font; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
                ctx.fillText(this.o.label, this.x + this.w + 8, this.y + this.h / 2);
            }
        },
        handleClick(mx, my) {
            if (mx >= this.x && mx <= this.x + this.w + (this.o.label ? 100 : 0) && my >= this.y && my <= this.y + this.h) {
                this.toggle(); return true;
            }
            return false;
        },
    };
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath(); if (fill) ctx.fill(); if (stroke) ctx.stroke();
}

// ─── TOUCH / GESTURE SUPPORT ─────────────────────────────────────────
(function() {
    const canvas = document.getElementById('gameCanvas');
    if (!canvas) return;
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        touchStartX = t.clientX;
        touchStartY = t.clientY;
        touchStartTime = Date.now();
    }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
        const rect = canvas.getBoundingClientRect();
        const dx = touchStartX - (e.changedTouches[0]?.clientX || touchStartX);
        const dy = touchStartY - (e.changedTouches[0]?.clientY || touchStartY);
        const dist = Math.sqrt(dx * dx + dy * dy);
        const elapsed = Date.now() - touchStartTime;
        if (dist > 50 && elapsed < 500) {
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 0 && game) game.screen = game.screen === 'main' ? 'map' : 'main';
            } else {
                if (dy > 0 && game) game.screen = game.screen === 'combat' ? 'map' : 'combat';
            }
        }
    }, { passive: true });
    canvas.addEventListener('touchcancel', () => {}, { passive: true });
})();

// ─── BACKGROUND MUSIC GENERATOR ──────────────────────────────────────
const BGM = {
    ctx: null,
    gain: null,
    osc1: null,
    osc2: null,
    lfo: null,
    started: false,
    volume: 0,
    targetVol: 0.04,
    init() {
        try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.gain = this.ctx.createGain();
            this.gain.gain.value = 0;
            this.gain.connect(this.ctx.destination);
        } catch(e) {}
    },
    start() {
        if (this.started || !this.ctx) return;
        this.started = true;
        this.osc1 = this.ctx.createOscillator();
        this.osc2 = this.ctx.createOscillator();
        this.lfo = this.ctx.createOscillator();
        const lfoGain = this.ctx.createGain();
        this.osc1.type = 'sawtooth';
        this.osc1.frequency.value = 55;
        this.osc2.type = 'square';
        this.osc2.frequency.value = 110;
        this.lfo.type = 'sine';
        this.lfo.frequency.value = 0.5;
        lfoGain.gain.value = 20;
        this.lfo.connect(lfoGain);
        lfoGain.connect(this.osc1.frequency);
        lfoGain.connect(this.osc2.frequency);
        this.osc1.connect(this.gain);
        this.osc2.connect(this.gain);
        this.osc1.start();
        this.osc2.start();
        this.lfo.start();
        this.fadeIn();
    },
    fadeIn() {
        if (!this.gain) return;
        const now = this.ctx.currentTime;
        this.gain.gain.linearRampToValueAtTime(this.targetVol, now + 3);
    },
    fadeOut() {
        if (!this.gain) return;
        const now = this.ctx.currentTime;
        this.gain.gain.linearRampToValueAtTime(0, now + 2);
    },
    stop() {
        try {
            if (this.osc1) { this.osc1.stop(); this.osc1 = null; }
            if (this.osc2) { this.osc2.stop(); this.osc2 = null; }
            if (this.lfo) { this.lfo.stop(); this.lfo = null; }
        } catch(e) {}
        this.started = false;
    },
    toggle() {
        if (this.started) { this.fadeOut(); setTimeout(() => this.stop(), 2000); }
        else { this.init(); this.start(); }
    },
};

// ─── MINIMAP SYSTEM ──────────────────────────────────────────────────
const MINIMAP = {
    visible: false,
    scale: 0.15,
    nodes: [],
    playerX: 0.5,
    playerY: 0.5,
    init(nodes) {
        this.nodes = nodes || NETWORK_NODES || [];
    },
    update(zone, progress) {
        const zoneNodes = this.nodes.filter(n => n.zone === zone);
        if (zoneNodes.length > 0) {
            const avgX = zoneNodes.reduce((s, n) => s + n.x, 0) / zoneNodes.length;
            const avgY = zoneNodes.reduce((s, n) => s + n.y, 0) / zoneNodes.length;
            this.playerX = avgX / 1600;
            this.playerY = avgY / 500;
        }
    },
    draw(ctx) {
        if (!this.visible) return;
        const mx = 10, my = CFG.HEIGHT - 170, mw = 100, mh = 100;

        ctx.lineWidth = 1;
        ctx.fillRect(mx, my, mw, mh);
        ctx.strokeRect(mx, my, mw, mh);
        this.nodes.forEach(n => {
            const nx = mx + (n.x / 1600) * mw;
            const ny = my + (n.y / 500) * mh;
            ctx.fillStyle = n.locked ? '#f00' : n.type === 'boss' ? '#ff0' : n.type === 'gateway' ? '#0ff' : '#555';

            ctx.arc(nx, ny, 2 + (n.type === 'boss' ? 2 : 0), 0, Math.PI * 2);

        });
        const px = mx + this.playerX * mw;
        const py = my + this.playerY * mh;
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#0ff';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(0,255,255,0.5)';
        ctx.font = '6px monospace';

    },
};

// ─── SAVE FILE MANAGEMENT ─────────────────────────────────────────────
const SAVE_MANAGER = {
    slots: 3,
    currentSlot: 0,
    getKey(slot) { return 'neon_save_' + (slot ?? this.currentSlot); },
    listSaves() {
        const saves = [];
        for (let i = 0; i < this.slots; i++) {
            const raw = localStorage.getItem(this.getKey(i));
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    saves.push({ slot: i, level: data?.character?.level || 1, credits: data?.character?.credits || 0, name: data?.character?.name || 'NetRunner', time: data?.meta?.savedAt || 0 });
                } catch(e) { saves.push({ slot: i, corrupted: true }); }
            } else { saves.push({ slot: i, empty: true }); }
        }
        return saves;
    },
    save(slot, data) {
        const s = slot ?? this.currentSlot;
        const key = this.getKey(s);
        data = data || game?.character;
        if (!data) return false;
        data.meta = data.meta || {};
        data.meta.savedAt = Date.now();
        data.meta.saveVersion = 3;
        try { localStorage.setItem(key, JSON.stringify(data)); return true; } catch(e) { return false; }
    },
    load(slot) {
        const s = slot ?? this.currentSlot;
        const raw = localStorage.getItem(this.getKey(s));
        if (!raw) return null;
        try {
            const data = JSON.parse(raw);
            return migrateSaveData(data);
        } catch(e) { return null; }
    },
    delete(slot) {
        try { localStorage.removeItem(this.getKey(slot)); return true; } catch(e) { return false; }
    },
    exportSave(slot) {
        const data = this.load(slot);
        if (!data) return null;
        try {
            const str = JSON.stringify(data);
            const blob = new Blob([str], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'neon_save_' + (slot ?? this.currentSlot) + '.json';
            a.click();
            URL.revokeObjectURL(url);
            return true;
        } catch(e) { return false; }
    },
    importSave(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const migrated = migrateSaveData(data);
                    if (migrated) resolve(migrated);
                    else resolve(null);
                } catch(ex) { resolve(null); }
            };
            reader.onerror = () => resolve(null);
            reader.readAsText(file);
        });
    },
};

// ─── DATA EXPORT / SHARE ─────────────────────────────────────────────
const DATA_EXPORT = {
    encode(data) {
        try { return btoa(unescape(encodeURIComponent(JSON.stringify(data)))); } catch(e) { return null; }
    },
    decode(str) {
        try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch(e) { return null; }
    },
    shareBuild(character) {
        if (!character) return;
        const build = {
            name: character.name || 'Build',
            level: character.level || 1,
            skills: character.skills || [],
            equipment: character.equipment || {},
            programs: character.equippedPrograms || [],
        };
        const encoded = this.encode(build);
        const url = window.location.href.split('?')[0] + '?build=' + encoded;
        try {
            if (navigator.clipboard) { navigator.clipboard.writeText(url); return 'Build URL copied!'; }
        } catch(e) {}
        return url;
    },
    loadFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const buildEncoded = params.get('build');
        if (!buildEncoded) return null;
        return this.decode(buildEncoded);
    },
};

};

function getDifficultyPreset(name) { return DIFFICULTY_PRESETS[name] || DIFFICULTY_PRESETS.normal; }

function applyDifficultyToEnemy(enemy, preset) {
    if (!preset) return enemy;
    return {
        ...enemy,
        hp: Math.floor(enemy.hp * preset.enemyHp),
        maxHp: Math.floor((enemy.maxHp || enemy.hp) * preset.enemyHp),
        dmg: Math.floor(enemy.dmg * preset.enemyDmg),
    };
}

function applyDifficultyToRewards(rewards, preset) {
    if (!preset) return rewards;
    return {
        cr: Math.floor((rewards.cr || 0) * preset.creditMult),
        xp: Math.floor((rewards.xp || 0) * preset.xpMult),
        items: rewards.items || [],
    };
}

    heal() { if (!this.enabled || !game?.character?.character) return; game.character.character.hp = game.character.character.maxHp || 9999; game.showNotification('HEALED', '#0f0'); },
    killAll() { if (!this.enabled) return; if (game?.enemy) { game.enemy.hp = 0; game.showNotification('ENEMIES KILLED', '#f00'); } },
    giveItem(itemId) { if (!this.enabled || !game?.character?.character) return; const inv = game.character.character.inventory = game.character.character.inventory || []; inv.push({ id: itemId || 'rare_program', name: 'Cheat Item', qty: 1, rarity: 'legendary' }); game.showNotification('Item added', '#0ff'); },
};

document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && e.key === 'C') { CHEATS.toggle(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'g') { CHEATS.giveCredits(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'x') { CHEATS.giveXp(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'h') { CHEATS.heal(); e.preventDefault(); }
    if (CHEATS.enabled && e.key === 'k') { CHEATS.killAll(); e.preventDefault(); }
});

// ─── WEATHER / AMBIENT EFFECTS ────────────────────────────────────────
const WEATHER = {
    type: 'clear',
    intensity: 0,
    timer: 0,
    cycleTimer: 0,
    cycleInterval: 30000 + Math.random() * 60000,
    types: ['clear', 'storm', 'glitch', 'data_rain', 'static'],
    update(dt) {
        this.cycleTimer += dt;
        if (this.cycleTimer > this.cycleInterval) {
            this.cycleTimer = 0;
            this.cycleInterval = 30000 + Math.random() * 60000;
            this.type = this.types[Math.floor(Math.random() * this.types.length)];
            this.intensity = 0.1 + Math.random() * 0.4;
        }
    },
    draw(ctx) {
        if (this.type === 'clear') return;
        ctx.save();
        if (this.type === 'storm') {
            for (let i = 0; i < 5; i++) {
                const x = Math.random() * CFG.WIDTH;
                const y = Math.random() * CFG.HEIGHT;
                ctx.fillStyle = 'rgba(0,255,255,' + (this.intensity * 0.1) + ')';
                ctx.fillRect(x, y, 1, 10 + Math.random() * 20);
            }
        }
        if (this.type === 'glitch') {
            const w = 20 + Math.random() * 60;
            const h = 1 + Math.random() * 3;
            ctx.fillStyle = 'rgba(255,0,255,' + (this.intensity * 0.15) + ')';
            ctx.fillRect(Math.random() * CFG.WIDTH, Math.random() * CFG.HEIGHT, w, h);
            ctx.fillStyle = 'rgba(0,255,255,' + (this.intensity * 0.1) + ')';
            ctx.fillRect(Math.random() * CFG.WIDTH, Math.random() * CFG.HEIGHT, w * 0.5, h);
        }
        if (this.type === 'data_rain') {
            for (let i = 0; i < 40; i++) {
                const x = Math.random() * CFG.WIDTH;
                const y = Math.random() * CFG.HEIGHT;
                ctx.fillStyle = 'rgba(0,255,0,' + (this.intensity * 0.08) + ')';
                ctx.font = '6px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(Math.random() > 0.5 ? '1' : '0', x, y);
            }
        }
        if (this.type === 'static') {
            for (let i = 0; i < 15; i++) {
                const x = Math.random() * CFG.WIDTH;
                const y = Math.random() * CFG.HEIGHT;
                ctx.fillStyle = 'rgba(255,255,255,' + (this.intensity * 0.06) + ')';
                ctx.fillRect(x, y, 2, 1);
            }
        }
        ctx.restore();
    },
};

// ─── ADVANCED CRAFTING SYSTEM ────────────────────────────────────────
const CRAFTING_SYSTEM = {
    qualityTiers: [
        { name: 'Broken', mult: 0.4, color: '#666', minRoll: 0, maxRoll: 20, xpMult: 0.5 },
        { name: 'Normal', mult: 0.8, color: '#aaa', minRoll: 20, maxRoll: 50, xpMult: 1.0 },
        { name: 'Good', mult: 1.1, color: '#0f0', minRoll: 50, maxRoll: 70, xpMult: 1.5 },
        { name: 'Superior', mult: 1.4, color: '#0ff', minRoll: 70, maxRoll: 85, xpMult: 2.0 },
        { name: 'Excellent', mult: 1.7, color: '#f0f', minRoll: 85, maxRoll: 95, xpMult: 3.0 },
        { name: 'Masterwork', mult: 2.2, color: '#ff0', minRoll: 95, maxRoll: 99.5, xpMult: 5.0 },
        { name: 'Legendary', mult: 3.0, color: '#f80', minRoll: 99.5, maxRoll: 100, xpMult: 10.0 },
    ],
    craftLevel: 0,
    craftXp: 0,
    calculateQuality(craftLevel) {
        const roll = Math.random() * 100;
        const bonus = craftLevel * 0.5;
        const adjusted = roll + bonus;
        for (const tier of this.qualityTiers) {
            if (adjusted >= tier.minRoll && adjusted < tier.maxRoll) return tier;
        }
        return this.qualityTiers[1];
    },
    calculateCraftTime(recipe, craftLevel) {
        const base = recipe.time || 30;
        return Math.max(5, base - craftLevel * 0.5);
    },
    getCraftXp(quality, recipe) {
        return Math.floor((recipe.xp || 10) * quality.xpMult);
    },
    addCraftXp(game, amount) {
        this.craftXp += amount;
        const needed = 100 + this.craftLevel * 50;
        while (this.craftXp >= needed) {
            this.craftXp -= needed;
            this.craftLevel++;
            if (game) game.showNotification('Уровень крафта повышен! Ур.' + this.craftLevel, '#ff0');
        }
    },
};

// ─── PET SYSTEM ──────────────────────────────────────────────────────
const PET_SYSTEM = {
    pets: [],
    activePet: null,
    maxPets: 10,
    hatchEgg(eggId) {
        const template = PET_DATA.find(p => p.id === eggId);
        if (!template) return null;
        const base = template.stats || { hp: 50, atk: 5, def: 3, spd: 4 };
        const pet = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
            templateId: eggId,
            name: template.name,
            icon: template.icon || '🐾',
            rarity: template.rarity || 'common',
            level: 1,
            xp: 0,
            xpNext: 100,
            hp: base.hp,
            maxHp: base.hp,
            atk: base.atk,
            def: base.def,
            spd: base.spd,
            fullness: 100,
            mood: 100,
            evolution: 1,
            abilities: template.abilities ? template.abilities.slice(0, 1) : ['scratch'],
        };
        this.pets.push(pet);
        return pet;
    },
    levelUp(pet) {
        pet.level++;
        pet.atk += 2 + Math.floor(Math.random() * 3);
        pet.def += 1 + Math.floor(Math.random() * 2);
        pet.maxHp += 5 + Math.floor(Math.random() * 5);
        pet.hp = pet.maxHp;
        pet.xp = 0;
        pet.xpNext = Math.floor(pet.xpNext * 1.4);
        if (pet.level % 10 === 0 && PET_DATA.find(p => p.id === pet.templateId)?.evolutions?.length > pet.evolution) {
            pet.evolution++;
            pet.atk += 5;
            pet.def += 3;
            pet.maxHp += 20;
            pet.hp = pet.maxHp;
        }
    },
    feed(pet, foodAmount) {
        pet.fullness = Math.min(100, pet.fullness + foodAmount);
        pet.mood = Math.min(100, pet.mood + Math.floor(foodAmount * 0.2));
    },
    play(pet) {
        pet.mood = Math.min(100, pet.mood + 15);
        pet.xp += 2;
        if (pet.xp >= pet.xpNext) this.levelUp(pet);
    },
    tick(pets) {
        const p = pets || this.pets;
        p.forEach(pet => {
            pet.fullness = Math.max(0, pet.fullness - 0.02);
            if (pet.fullness < 20) pet.mood = Math.max(0, pet.mood - 0.05);
            if (pet.fullness > 80) pet.mood = Math.min(100, pet.mood + 0.01);
        });
    },
    getCombatBonuses(pet) {
        const moodMult = 0.5 + (pet.mood / 100) * 0.5;
        const fullnessMult = 0.5 + (pet.fullness / 100) * 0.5;
        return { atkMult: moodMult, defMult: fullnessMult, spdMult: (moodMult + fullnessMult) / 2 };
    },
};

// ─── MOUNT SYSTEM ─────────────────────────────────────────────────────
const MOUNT_SYSTEM = {
    mounts: [],
    activeMount: null,
    addMount(templateId) {
        const template = MOUNT_DATA.find(m => m.id === templateId);
        if (!template) return null;
        const mount = {
            id: Date.now().toString(36) + Math.random().toString(36).slice(2, 4),
            templateId: templateId,
            name: template.name,
            icon: template.icon || '🚀',
            rarity: template.rarity || 'common',
            speedBonus: template.speedBonus || 5,
            level: 1,
            xp: 0,
            color: template.color || '#0ff',
            abilities: template.abilities || [],
        };
        this.mounts.push(mount);
        return mount;
    },
    setActive(mountId) {
        const m = this.mounts.find(m => m.id === mountId);
        if (m) this.activeMount = m;
    },
    getSpeedBonus() {
        if (!this.activeMount) return 1.0;
        return 1.0 + (this.activeMount.speedBonus / 100) * (1 + (this.activeMount.level - 1) * 0.05);
    },
    levelUp(mount) {
        mount.level++;
        mount.speedBonus += 0.5;
        mount.xp = 0;
    },
};

    },
    increment(key, amount) {
        if (this.stats[key] !== undefined) this.stats[key] += amount || 1;
    },
    setFlag(key, value) {
        if (this.stats[key] !== undefined) this.stats[key] = value;
    },
    checkAchievements(game, unlockedIds) {
        const unlocked = unlockedIds || [];
        const newUnlocks = [];
        ACHIEVEMENTS_DATA.forEach(a => {
            if (!unlocked.includes(a.id) && a.condition && a.condition(this.stats)) {
                newUnlocks.push(a);
                unlocked.push(a.id);
            }
        });
        newUnlocks.forEach(a => {
            if (game) {
                game.showNotification('🏆 ' + a.name + '! +' + a.rewards.cr + 'cr', '#ff0');
                game._achPopup = { text: a.name + ' — ' + a.desc, startTime: game.time };
                if (a.rewards.title && game._currentTitle !== a.rewards.title) game._currentTitle = a.rewards.title;
            }
            if (a.rewards) {
                this.stats.totalCreditsEarned += a.rewards.cr || 0;
            }
        });
        return newUnlocks;
    },
    getProgress(achievementId) {
        const a = ACHIEVEMENTS_DATA.find(a => a.id === achievementId);
        if (!a || !a.condition) return 0;
        return a.condition(this.stats) ? 1 : 0;
    },
};

    return { ...template, level: level || 1, xp: 0, maxXp: 100 + (level || 1) * 50, hp: Math.floor(template.hp * lvlMult), maxHp: Math.floor(template.hp * lvlMult), atk: Math.floor(template.atk * lvlMult), def: Math.floor(template.def * lvlMult), happiness: 100, fed: Date.now() };
}

function feedPet(pet, foodType) {
    const foodValues = { kibble: 10, treat: 25, feast: 50, quantum: 100 };
    const value = foodValues[foodType] || 10;
    pet.happiness = Math.min(100, (pet.happiness || 50) + value);
    pet.fed = Date.now();
    pet.xp = (pet.xp || 0) + value;
    const leveled = pet.xp >= pet.maxXp;
    if (leveled) { pet.xp -= pet.maxXp; pet.level++; pet.maxXp = Math.floor(pet.maxXp * 1.2); pet.maxHp = Math.floor(pet.maxHp * 1.1); pet.hp = pet.maxHp; }
    return { happiness: pet.happiness, leveled, level: pet.level };
}

function getPetBonus(pet) {
    if (!pet) return {};
    const happinessMult = (pet.happiness || 50) / 100;
    return { atk: Math.floor((pet.atk || 0) * 0.3 * happinessMult), def: Math.floor((pet.def || 0) * 0.3 * happinessMult), spd: ((pet.spd || 1) - 1) * 0.2 * happinessMult };
}

];

function getActiveEvents() {
    const now = new Date(); const day = now.getDay();
    return EVENT_CALENDAR_ALT.filter(e => { if (e.startDay <= e.endDay) return day >= e.startDay && day <= e.endDay; else return day >= e.startDay || day <= e.endDay; });
}

function getEventMultiplier(affect) {
    let mult = 1.0;
    getActiveEvents().filter(e => e.affect === affect).forEach(e => { mult *= e.mult; });
    return mult;
}

Game.prototype.drawDottedLine = function(x1, y1, x2, y2, color, spacing) {
    const ctx = this.ctx;
    const dx = x2 - x1, dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const sp = spacing || 5;
    const steps = Math.floor(dist / sp);
    ctx.save();
    ctx.strokeStyle = color || '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < steps; i += 2) {
        const t1 = i / steps, t2 = Math.min(1, (i + 1) / steps);
        ctx.moveTo(x1 + dx * t1, y1 + dy * t1);
        ctx.lineTo(x1 + dx * t2, y1 + dy * t2);
    }
    ctx.stroke();
    ctx.restore();
};

Game.prototype.drawHexGrid = function(cx, cy, radius, rows, cols, color) {
    const ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = color || 'rgba(0,255,255,0.15)';
    ctx.lineWidth = 1;
    const h = radius * Math.sqrt(3);
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = cx + c * radius * 1.5;
            const y = cy + r * h + (c % 2) * h / 2;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = Math.PI / 3 * i - Math.PI / 6;
                const px = x + radius * Math.cos(angle);
                const py = y + radius * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.stroke();
        }
    }
    ctx.restore();
};

Game.prototype.drawRadar = function(cx, cy, radius, contacts, color) {
    const ctx = this.ctx;
    ctx.save();
    ctx.strokeStyle = color || 'rgba(0,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, radius * 0.66, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, radius * 0.33, 0, Math.PI * 2); ctx.stroke();
    ctx.moveTo(cx - radius, cy); ctx.lineTo(cx + radius, cy); ctx.stroke();
    ctx.moveTo(cx, cy - radius); ctx.lineTo(cx, cy + radius); ctx.stroke();
    const angle = (Date.now() / 2000) % (Math.PI * 2);
    ctx.fillStyle = 'rgba(0,255,255,0.1)';
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, radius, angle - 0.3, angle + 0.3); ctx.closePath(); ctx.fill();
    (contacts || []).forEach(c => {
        const a = c.angle || 0;
        const d = c.dist || 0.5;
        ctx.fillStyle = c.color || '#f00';
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * radius * d, cy + Math.sin(a) * radius * d, 3, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
};

// ─── GAME MATH EXTENSIONS ─────────────────────────────────────────────
const GAME_MATH = {
    clamp(v, min, max) { return Math.max(min, Math.min(max, v)); },
    lerp(a, b, t) { return a + (b - a) * t; },
    lerpColor(c1, c2, t) {
        const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
        const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
        const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
        return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
    },
    randomInRange(min, max) { return min + Math.random() * (max - min); },
    randomInt(min, max) { return Math.floor(min + Math.random() * (max - min + 1)); },
    weightedRandom(items, weightKey) {
        const total = items.reduce((s, item) => s + (item[weightKey] || 1), 0);
        let r = Math.random() * total;
        for (const item of items) { r -= item[weightKey] || 1; if (r <= 0) return item; }
        return items[items.length - 1];
    },
    shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
        return a;
    },
    distance(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); },
    angleBetween(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); },
    formatTime(ms) {
        const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
        return (h > 0 ? h + 'h ' : '') + (m % 60) + 'm ' + (s % 60) + 's';
    },
    formatNumber(n) {
        if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
        if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
        if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
        return n.toString();
    },
    easeInOut(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; },
    easeOut(t) { return 1 - Math.pow(1 - t, 3); },
    easeIn(t) { return t * t * t; },
    lerpAngle(a, b, t) {
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return a + diff * t;
    },
};

// ─── EXPORT / IMPORT SAVE DATA ────────────────────────────────────────
const SAVE_IO = {
    exportToClipboard() {
        const data = SAVE_MANAGER.load(0);
        if (!data) return 'No save data';
        try {
            const json = JSON.stringify(data);
            const compressed = btoa(unescape(encodeURIComponent(json)));
            if (navigator.clipboard) { navigator.clipboard.writeText(compressed); return 'Copied to clipboard!'; }
            return compressed;
        } catch(e) { return 'Export failed'; }
    },
    importFromClipboard(text) {
        try {
            const json = decodeURIComponent(escape(atob(text)));
            const data = JSON.parse(json);
            const migrated = migrateSaveData(data);
            if (migrated) { SAVE_MANAGER.save(0, migrated); game.character = migrated; return 'Import successful!'; }
            return 'Invalid data';
        } catch(e) { return 'Import failed'; }
    },
    exportToFile() {
        const data = SAVE_MANAGER.load(0);
        if (!data) return;
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'neon_protocol_save.json'; a.click();
        URL.revokeObjectURL(url);
    },
    importFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                const migrated = migrateSaveData(data);
                if (migrated) { SAVE_MANAGER.save(0, migrated); game.character = migrated; alert('Save imported!'); }
                else { alert('Invalid save file'); }
            } catch(ex) { alert('Error parsing save file'); }
        };
        reader.readAsText(file);
    },
};

function calculateSkillBonus(skills) {
    const bonus = {};
    (skills || []).forEach(s => {
        const eff = SKILL_EFFECTS[s.id];
        if (eff) {
            const key = s.id;
            bonus[key] = (bonus[key] || 0) + eff.base + eff.perLevel * (s.lvl || 0);

function checkAchievements(character) {
    const unlocked = character?.achievements || [];
    const newAchievements = [];
    const stats = character?.stats || {};
    ACHIEVEMENTS_DATA.forEach(a => {
        if (unlocked.includes(a.id)) return;
        if (a.condition(stats)) {
            newAchievements.push(a);
            unlocked.push(a.id);
        }
    });
    if (newAchievements.length > 0) {
        character.achievements = unlocked;
        newAchievements.forEach(a => {
            character.credits = (character.credits || 0) + (a.rewards?.cr || 0);
            character.experience = (character.experience || 0) + (a.rewards?.xp || 0);
            ACHIEVEMENT_HISTORY.add(a);
            ACHIEVEMENT_UNLOCK.show(a);
        });
    }
    return newAchievements;
}
