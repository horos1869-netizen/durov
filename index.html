// в”Ђв”Ђв”Ђ MAP NAVIGATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const MAP_NAV = {
    nodes: [],
    selected: null,
    init(nodes) { this.nodes = nodes || []; },
    select(nodeId) { this.selected = this.nodes.find(n => n.id === nodeId) || null; },
    canNavigate(fromId, toId) {
        const from = this.nodes.find(n => n.id === fromId);
        if (!from) return false;
        return from.connections?.includes(toId) || false;
    },
    getPath(fromId, toId) {
        const visited = new Set();
        const queue = [[fromId]];
        while (queue.length > 0) {
            const path = queue.shift();
            const current = path[path.length - 1];
            if (current === toId) return path;
            if (visited.has(current)) continue;
            visited.add(current);
            const node = this.nodes.find(n => n.id === current);
            if (node?.connections) {
                node.connections.forEach(conn => {
                    if (!visited.has(conn)) queue.push([...path, conn]);
                });
            }
        }
        return null;
    },
    draw(ctx) {
        if (!this.nodes.length) return;
        this.nodes.forEach(node => {
            (node.connections || []).forEach(connId => {
                const target = this.nodes.find(n => n.id === connId);
                if (!target) return;
                ctx.strokeStyle = 'rgba(0,255,255,0.15)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(node.x || 0, node.y || 0);
                ctx.lineTo(target.x || 0, target.y || 0);
                ctx.stroke();
            });
        });
        this.nodes.forEach(node => {
            ctx.fillStyle = node.locked ? '#f00' : node.id === this.selected?.id ? '#ff0' : '#0ff';
            ctx.beginPath();
            ctx.arc(node.x || 0, node.y || 0, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#888';
            ctx.font = '6px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(node.name || node.id, node.x || 0, (node.y || 0) + 8);
        });
        if (this.selected) {
            ctx.fillStyle = 'rgba(0,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(this.selected.x || 0, this.selected.y || 0, 12, 0, Math.PI * 2);
            ctx.fill();
        }
    },
};

// в”Ђв”Ђв”Ђ ANIMATION TIMELINE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
class AnimationTimeline {
    constructor() { this.animations = []; this.time = 0; }
    add(delay, duration, updateFn, completeFn) {
        this.animations.push({ delay, duration, updateFn, completeFn, startTime: this.time + delay, ended: false });
    }
    update(dt) {
        this.time += dt;
        this.animations.forEach(a => {
            if (a.ended) return;
            const elapsed = this.time - a.startTime;
            if (elapsed < 0) return;
            const progress = Math.min(1, elapsed / a.duration);
            a.updateFn(progress);
            if (progress >= 1) { a.ended = true; if (a.completeFn) a.completeFn(); }
        });
        this.animations = this.animations.filter(a => !a.ended);
    }
    clear() { this.animations = []; this.time = 0; }
}

const WEATHER_STATE = {
    current: 'clear',
    intensity: 0,
    transition: 0,
    types: ['clear', 'rain', 'storm', 'glitch', 'data_rain', 'static'],
    set(type) {
        if (this.types.includes(type)) {
            this.current = type;
            this.transition = 0;

    randomize() { this.current = this.types[Math.floor(Math.random() * this.types.length)]; this.intensity = 0.1 + Math.random() * 0.4; },
    update(dt) { this.transition = Math.min(1, this.transition + dt / 2000); },

const MENU_SYSTEM = {
    items: [],
    open: false,
    x: 0, y: 0,
    show(x, y, items) { this.x = x; this.y = y; this.items = items; this.open = true; },
    hide() { this.open = false; },
    toggle(x, y, items) { if (this.open) this.hide(); else this.show(x, y, items); },
    draw(ctx) {
        if (!this.open || !this.items.length) return;
        const w = 150, h = this.items.length * 26 + 10;
        let mx = Math.min(this.x, CFG.WIDTH - w - 5);
        let my = Math.min(this.y, CFG.HEIGHT - h - 5);
        ctx.save();
        ctx.fillStyle = 'rgba(0,10,20,0.95)';
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 1;
        ctx.fillRect(mx, my, w, h);
        ctx.strokeRect(mx, my, w, h);
        this.items.forEach((item, i) => {
            const iy = my + 5 + i * 26;
            ctx.fillStyle = '#fff';
            ctx.font = '9px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(item.label || item, mx + 8, iy + 13);
            if (item.color) {
                ctx.fillStyle = item.color;
                ctx.fillRect(mx + w - 15, iy + 8, 8, 8);
            }
        });
        ctx.restore();
    },
    handleClick(mx, my) {
        if (!this.open) return false;
        const w = 150, h = this.items.length * 26 + 10;
        let cx = Math.min(this.x, CFG.WIDTH - w - 5);
        let cy = Math.min(this.y, CFG.HEIGHT - h - 5);
        if (mx >= cx && mx <= cx + w && my >= cy && my <= cy + h) {
            const idx = Math.floor((my - cy - 5) / 26);
            if (idx >= 0 && idx < this.items.length && this.items[idx].action) {
                this.items[idx].action();
                this.hide();
            }
            return true;
        }
        this.hide();
        return false;
    },
};

function useItem(itemId, character, game) {
    const effects = {
        health_pack: { type: 'heal', value: 50, msg: 'Used Health Pack: +50 HP' },
        energy_drink: { type: 'energy', value: 30, msg: 'Used Energy Drink: +30 Energy' },
        rare_program: { type: 'damage_boost', value: 1.2, duration: 10000, msg: 'Program active: +20% damage' },
        shield_generator: { type: 'shield', value: 30, duration: 8000, msg: 'Shield active: +30 DEF' },
        speed_chip: { type: 'speed_boost', value: 1.5, duration: 8000, msg: 'Speed boost active!' },
        neural_booster: { type: 'stat_boost', value: 1.2, duration: 12000, msg: 'Neural boost active!' },
        data_fragment: { type: 'xp', value: 25, msg: 'Decoded data: +25 XP' },
        matrix_key: { type: 'currency', value: 100, msg: 'Sold Matrix Key: +100cr' },
        upgrade_module: { type: 'enhance', value: 1, msg: 'Module ready for enhancement' },
        premium_crate: { type: 'lootbox', value: 'common', msg: 'Opening crate...' },
    };
    const eff = effects[itemId];
    if (!eff) return { success: false, message: 'Nothing happens' };
    if (eff.type === 'heal' && character) { character.hp = Math.min(character.maxHp || 100, (character.hp || 0) + eff.value); }
    if (eff.type === 'energy' && character) { character.energy = Math.min(character.maxEnergy || 100, (character.energy || 0) + eff.value); }
    if (eff.type === 'xp' && character) { character.experience = (character.experience || 0) + eff.value; }
    if (eff.type === 'currency' && character) { character.credits = (character.credits || 0) + eff.value; }
    if (eff.type === 'lootbox') { const result = openLootBox(eff.value, character?.inventory || []); return { success: true, message: result.message || eff.msg, loot: result.items }; }
    if (eff.type === 'damage_boost' && character) { character._damageBoost = (character._damageBoost || 1) * eff.value; setTimeout(() => { character._damageBoost = 1; }, eff.duration); }
    if (eff.type === 'shield' && character) { character._shield = (character._shield || 0) + eff.value; setTimeout(() => { character._shield = Math.max(0, (character._shield || 0) - eff.value); }, eff.duration); }
    return { success: true, message: eff.msg };
}

// в”Ђв”Ђв”Ђ TOUCH CONTROLS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
(function() {
    const canvas = document.getElementById('gameCanvas');
    if (!canvas) return;
    let touchX = 0, touchY = 0, touching = false;
    let tapTime = 0, tapX = 0, tapY = 0;
    canvas.addEventListener('touchstart', (e) => {
        const t = e.touches[0];
        touchX = t.clientX; touchY = t.clientY;
        tapTime = Date.now(); tapX = touchX; tapY = touchY;
        touching = true;
        if (game?.ui) { game.ui._hoverX = (touchX / window.innerWidth) * CFG.WIDTH; game.ui._hoverY = (touchY / window.innerHeight) * CFG.HEIGHT; }
    }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
        if (!touching || !e.touches[0]) return;
        const dx = e.touches[0].clientX - touchX;
        const dy = e.touches[0].clientY - touchY;
        if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
            if (game?.ui) { game.ui._hoverX = (e.touches[0].clientX / window.innerWidth) * CFG.WIDTH; game.ui._hoverY = (e.touches[0].clientY / window.innerHeight) * CFG.HEIGHT; }
        }
        touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
    }, { passive: true });
    canvas.addEventListener('touchend', (e) => {
        touching = false;
        const elapsed = Date.now() - tapTime;
        if (elapsed < 300 && game) {
            const tapGameX = (tapX / window.innerWidth) * CFG.WIDTH;
            const tapGameY = (tapY / window.innerHeight) * CFG.HEIGHT;
            const rect = canvas.getBoundingClientRect();
            const mx = (tapX - rect.left) * (CFG.WIDTH / rect.width);
            const my = (tapY - rect.top) * (CFG.HEIGHT / rect.height);
            if (game.canvas) {
                const clickEvent = new MouseEvent('click', { clientX: tapX, clientY: tapY, bubbles: true });
                canvas.dispatchEvent(clickEvent);
            }
        }
    }, { passive: true });
    canvas.addEventListener('touchcancel', () => { touching = false; }, { passive: true });
})();

(function() {

    const BACKUP_KEY = 'neon_backups';
    function createBackup() {
        try {
            const data = SAVE_MANAGER.load(0);
            if (!data) return;
            const backups = JSON.parse(localStorage.getItem(BACKUP_KEY) || '[]');

// в”Ђв”Ђв”Ђ GAME PERFORMANCE TWEAKS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
(function() {
    if (window.requestAnimationFrame) {
        const origRAF = window.requestAnimationFrame;
        let lastFrame = 0;
        window.requestAnimationFrame = function(callback) {
            return origRAF.call(window, function(timestamp) {
                const dt = timestamp - lastFrame;
                lastFrame = timestamp;
                if (GAME_SPEED.paused) return;
                const speed = GAME_SPEED.multiplier;
                if (speed !== 1) {
                    callback(timestamp);
                    if (speed > 1 && speed < 10) {
                        const extraCalls = Math.min(3, Math.floor(speed) - 1);
                        for (let i = 0; i < extraCalls; i++) {
                            setTimeout(() => callback(timestamp), i * 16 / speed);
                        }
                    }
                } else {
                    callback(timestamp);
                }
            });
        };
    }
    if (navigator.userAgent.includes('Firefox')) {
        const style = document.createElement('style');
        style.textContent = 'canvas { image-rendering: auto; }';
        document.head.appendChild(style);
    }
})();

const COMBAT_LOG = {
    entries: [],
    maxEntries: 100,
    add(text, color) { this.entries.push({ text, color: color || '#aaa', time: Date.now() }); if (this.entries.length > this.maxEntries) this.entries.shift(); },
    clear() { this.entries = []; },
    getRecent(count) { return this.entries.slice(-(count || 20)); },
    draw(ctx, x, y, maxLines) {
        const recent = this.getRecent(maxLines || 10);
        ctx.save();
        recent.forEach((e, i) => {
            ctx.fillStyle = e.color;
            ctx.font = '7px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(e.text, x || 10, (y || 350) + i * 12);
        });
        ctx.restore();
    },
};

// в”Ђв”Ђв”Ђ SHOP INVENTORY GENERATOR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateShopItems(playerLevel, shopType) {
    const pools = {
        general: { items: ['health_pack', 'energy_drink', 'data_fragment', 'credit_chip'], count: 4 },
        programs: { items: ['code_breaker', 'ice_pick', 'data_sword', 'rare_program', 'illegal_software'], count: 3 },
        crafting: { items: ['neural_booster', 'shield_generator', 'speed_chip', 'upgrade_module'], count: 3 },
        black: { items: ['rare_program', 'hack_toolkit', 'void_essence', 'ai_core'], count: 2 },
        premium: { items: ['legendary_shard', 'prime_matrix', 'premium_crate', 'ancient_code'], count: 2 },
    };
    const pool = pools[shopType] || pools.general;
    const items = [];
    const available = [...pool.items];
    for (let i = 0; i < pool.count && available.length > 0; i++) {
        const idx = Math.floor(Math.random() * available.length);
        const itemId = available.splice(idx, 1)[0];
        const price = 50 + Math.random() * 200 + playerLevel * 10;
        items.push({ id: itemId, name: itemId.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), price: Math.floor(price), stock: Math.floor(3 + Math.random() * 7) });
    }
    return items;
}

// в”Ђв”Ђв”Ђ MISSION GENERATOR в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateMission(playerLevel, difficulty) {
    const zones = ['matrix', 'corpnet', 'darknet', 'deep_web', 'core'];
    const zone = zones[Math.floor(Math.random() * zones.length)];
    const zoneData = getZoneData(zone);
    const diff = difficulty || 'normal';
    const mult = { easy: 0.5, normal: 1.0, hard: 1.5, epic: 2.0, legendary: 3.0 };
    const m = mult[diff] || 1.0;
    return {
        id: 'mis_' + Date.now(),
        name: zoneData?.name + ' Mission',
        zone,
        difficulty: diff,
        enemies: Math.floor((2 + Math.random() * 3) * m),
        rewards: { cr: Math.floor((50 + Math.random() * 100 + playerLevel * 20) * m), xp: Math.floor((25 + Math.random() * 50 + playerLevel * 10) * m) },
        completed: false,
        timeLimit: 300000,
    };
}

// в”Ђв”Ђв”Ђ BATTLE REWARD CALC в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calculateBattleReward(player, enemy, zoneMult) {
    const base = { cr: 15, xp: 8 };
    const levelRatio = Math.max(0.5, Math.min(2.0, (enemy.level || 1) / Math.max(1, (player.level || 1))));
    const cm = zoneMult || 1.0;
    const cr = Math.floor(base.cr * levelRatio * cm * (0.8 + Math.random() * 0.4));
    const xp = Math.floor(base.xp * levelRatio * cm * (0.8 + Math.random() * 0.4));
    const loot = Math.random() < 0.3 ? [{ id: 'data_fragment', name: 'Data Fragment', qty: 1 }] : [];
    return { cr, xp, items: loot };
}

// в”Ђв”Ђв”Ђ PLAYER PROGRESSION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function addExperience(character, amount, game) {
    character.experience = (character.experience || 0) + amount;
    let leveled = false;
    const maxLevel = 100;
    while ((character.experience || 0) >= calcXpForLevel((character.level || 1) + 1) && (character.level || 1) < maxLevel) {
        character.experience -= calcXpForLevel((character.level || 1) + 1);
        character.level = (character.level || 1) + 1;
        character.maxHp = (character.maxHp || 100) + 10;
        character.hp = character.maxHp;
        character.maxEnergy = (character.maxEnergy || 100) + 5;
        character.energy = character.maxEnergy;
        leveled = true;
        if (game) { game.showNotification('Level ' + character.level + '!', '#ff0'); LEVEL_UP_EFFECT.trigger(character.level); }
    }
    return leveled;
}

function addCredits(character, amount, game) {
    character.credits = (character.credits || 0) + amount;
    if (game) game.showNotification('+' + amount + ' credits', '#ff0');
}

function addItemToCharacter(character, item, game) {
    character.inventory = character.inventory || [];
    addItemToInventory(character.inventory, item, true);
    if (game) game.showNotification('+' + (item.name || 'Item'), '#0ff');
}

// в”Ђв”Ђв”Ђ HACKING MINI-GAME в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createHackGame(difficulty) {
    const gridSize = 3 + Math.floor(difficulty / 2);
    const grid = [];
    for (let y = 0; y < gridSize; y++) {
        const row = [];
        for (let x = 0; x < gridSize; x++) {
            row.push(Math.floor(Math.random() * 9) + 1);
        }
        grid.push(row);
    }
    const targetRow = Math.floor(Math.random() * gridSize);
    const targetSum = grid[targetRow].reduce((a, b) => a + b, 0);
    return { grid, targetRow, targetSum, gridSize, attempts: 3 + Math.floor(difficulty / 2), solved: false, failed: false };
}

function solveHackGame(gameState, selectedRow) {
    if (selectedRow === gameState.targetRow) {
        gameState.solved = true;
        return true;
    }
    gameState.attempts--;
    if (gameState.attempts <= 0) gameState.failed = true;
    return false;
}

// в”Ђв”Ђв”Ђ GRID NAVIGATION GAME в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function createGridGame(size) {
    const grid = [];
    for (let y = 0; y < size; y++) {
        const row = [];
        for (let x = 0; x < size; x++) {
            row.push(Math.random() < 0.3 ? 1 : 0);
        }
        grid.push(row);
    }
    const start = { x: 0, y: 0 };
    const end = { x: size - 1, y: size - 1 };
    grid[start.y][start.x] = 0;
    grid[end.y][end.x] = 0;
    return { grid, size, player: { ...start }, end, moves: 0, maxMoves: size * 3, done: false };
}

function moveGridPlayer(gameState, dx, dy) {
    if (gameState.done) return false;
    const nx = gameState.player.x + dx;
    const ny = gameState.player.y + dy;
    if (nx < 0 || nx >= gameState.size || ny < 0 || ny >= gameState.size) return false;
    if (gameState.grid[ny][nx] === 1) return false;
    gameState.player.x = nx;
    gameState.player.y = ny;
    gameState.moves++;
    if (nx === gameState.end.x && ny === gameState.end.y) { gameState.done = true; gameState.won = true; return true; }
    if (gameState.moves >= gameState.maxMoves) { gameState.done = true; gameState.won = false; return false; }
    return true;
}

// в”Ђв”Ђв”Ђ MATCHMAKING в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function findMatch(playerRating, playerLevel, pool) {
    const candidates = (pool || []).filter(p => Math.abs(p.rating - playerRating) < 200 && p.level >= playerLevel - 5 && p.level <= playerLevel + 5);
    if (candidates.length === 0) {
        const fallback = pool?.[Math.floor(Math.random() * (pool?.length || 1))];
        return fallback || null;
    }
    return candidates[Math.floor(Math.random() * candidates.length)];
}

function calculateRatingChange(playerRating, opponentRating, won) {
    const expected = 1 / (1 + Math.pow(10, (opponentRating - playerRating) / 400));
    const k = 32;
    return Math.floor(k * ((won ? 1 : 0) - expected));
}

function generateOpponent(playerLevel, playerRating) {
    const names = ['NetRunner_X', 'Ghost_Pro', 'Data_Viper', 'ICE_Master', 'Shadow_Blade', 'Neon_Striker', 'Void_Chaser', 'Cyber_Wolf', 'Hack_Queen', 'Pixel_Warrior'];
    return {
        name: names[Math.floor(Math.random() * names.length)],
        level: playerLevel - 1 + Math.floor(Math.random() * 3),
        rating: playerRating - 100 + Math.floor(Math.random() * 200),
        hp: 50 + playerLevel * 10,
        maxHp: 50 + playerLevel * 10,
        dmg: 8 + playerLevel * 2,
        def: 3 + Math.floor(playerLevel / 2),
        spd: 1 + Math.random() * 0.2,
        crit: 0.05 + playerLevel * 0.002,
    };
}

// в”Ђв”Ђв”Ђ LOOT GENERATION в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function generateLootForKill(enemy, playerLevel, luck) {
    const loot = [];
    const dropChance = (enemy.loot?.drop_rate || 0.3) * (1 + (luck || 0) * 0.1);
    if (Math.random() < dropChance) {
        const possible = [
            { id: 'data_fragment', name: 'Data Fragment', qty: [1, 3], weight: 40 },
            { id: 'credit_chip', name: 'Credit Chip', qty: [5, 20], weight: 35 },
            { id: 'program_shard', name: 'Program Shard', qty: [1, 2], weight: 15 },
            { id: 'rare_program', name: 'Rare Program', qty: [1, 1], weight: 5 },
            { id: 'upgrade_module', name: 'Upgrade Module', qty: [1, 1], weight: 3 },
            { id: 'legendary_shard', name: 'Legendary Shard', qty: [1, 1], weight: 2 },
        ];
        const totalWeight = possible.reduce((s, i) => s + i.weight, 0);
        let r = Math.random() * totalWeight;
        for (const item of possible) {
            r -= item.weight;
            if (r <= 0) {
                const qty = item.qty[0] + Math.floor(Math.random() * (item.qty[1] - item.qty[0] + 1));
                loot.push({ ...item, qty: Math.floor(qty * (1 + playerLevel * 0.01)) });
                break;
            }
        }
    }
    return loot;
}

// в”Ђв”Ђв”Ђ INVENTORY SORT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function sortInventoryBy(items, key) {
    const sorted = [...items];
    const sortFn = {
        name: (a, b) => (a.name || '').localeCompare(b.name || ''),
        rarity: (a, b) => { const r = { legendary: 5, epic: 4, rare: 3, uncommon: 2, common: 1 }; return (r[b.rarity] || 0) - (r[a.rarity] || 0); },
        type: (a, b) => (a.type || '').localeCompare(b.type || ''),
        value: (a, b) => (b.cost || 0) - (a.cost || 0),
        quantity: (a, b) => (b.qty || 1) - (a.qty || 1),
        level: (a, b) => (b.lvl || 1) - (a.lvl || 1),
    };
    const fn = sortFn[key] || sortFn.name;
    return sorted.sort(fn);
}

function filterInventoryBy(items, filters) {
    return items.filter(item => {
        if (filters.rarity && item.rarity !== filters.rarity) return false;
        if (filters.type && item.type !== filters.type) return false;
        if (filters.search && !(item.name || '').toLowerCase().includes(filters.search.toLowerCase())) return false;
        if (filters.minLevel && (item.lvl || 0) < filters.minLevel) return false;
        if (filters.maxLevel && (item.lvl || 999) > filters.maxLevel) return false;
        return true;
    });
}

// в”Ђв”Ђв”Ђ UI HELPERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const UI_HELPERS = {
    drawPanel(ctx, x, y, w, h, color, borderColor, alpha) {
        ctx.save();
        ctx.globalAlpha = alpha || 0.85;
        ctx.fillStyle = color || '#0d0d1a';
        ctx.fillRect(x, y, w, h);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = borderColor || '#333';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, w, h);
        ctx.restore();
    },
    drawBadge(ctx, x, y, text, color, bg) {
        ctx.save();
        ctx.fillStyle = bg || '#f00';
        ctx.beginPath(); ctx.arc(x, y, 8, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 7px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, x, y);
        ctx.restore();
    },
    drawArrow(ctx, x, y, dir, color, size) {
        ctx.save();
        ctx.fillStyle = color || '#0ff';
        const s = size || 8;
        ctx.beginPath();
        if (dir === 'up') { ctx.moveTo(x, y - s); ctx.lineTo(x - s, y + s); ctx.lineTo(x + s, y + s); }
        else if (dir === 'down') { ctx.moveTo(x, y + s); ctx.lineTo(x - s, y - s); ctx.lineTo(x + s, y - s); }
        else if (dir === 'left') { ctx.moveTo(x - s, y); ctx.lineTo(x + s, y - s); ctx.lineTo(x + s, y + s); }
        else { ctx.moveTo(x + s, y); ctx.lineTo(x - s, y - s); ctx.lineTo(x - s, y + s); }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    },
    drawCross(ctx, x, y, color, size) {
        ctx.save();
        ctx.strokeStyle = color || '#f00';
        ctx.lineWidth = 2;
        const s = size || 6;
        ctx.beginPath(); ctx.moveTo(x - s, y - s); ctx.lineTo(x + s, y + s);
        ctx.moveTo(x + s, y - s); ctx.lineTo(x - s, y + s);
        ctx.stroke();
        ctx.restore();
    },
    drawCheck(ctx, x, y, color, size) {
        ctx.save();
        ctx.strokeStyle = color || '#0f0';
        ctx.lineWidth = 2;
        const s = size || 6;
        ctx.beginPath();
        ctx.moveTo(x - s, y); ctx.lineTo(x - s/2, y + s); ctx.lineTo(x + s, y - s);
        ctx.stroke();
        ctx.restore();
    },
    drawLock(ctx, x, y, color) {
        ctx.save();
        ctx.strokeStyle = color || '#ff0';
        ctx.lineWidth = 2;
        const s = 6;
        ctx.beginPath(); ctx.arc(x, y - s, s, Math.PI, 0); ctx.stroke();
        ctx.fillStyle = color || '#ff0';
        ctx.fillRect(x - s - 2, y - s, s * 2 + 4, s * 2);
        ctx.restore();
    },
    drawStar(ctx, x, y, color, size) {
        ctx.save();
        ctx.fillStyle = color || '#ff0';
        const s = size || 6;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
            const angle = (i * 2 * Math.PI) / 5 - Math.PI / 2;
            const innerAngle = angle + Math.PI / 5;
            if (i === 0) ctx.moveTo(x + Math.cos(angle) * s, y + Math.sin(angle) * s);
            else ctx.lineTo(x + Math.cos(angle) * s, y + Math.sin(angle) * s);
            ctx.lineTo(x + Math.cos(innerAngle) * s * 0.4, y + Math.sin(innerAngle) * s * 0.4);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    },
};

const NOTE_SYSTEM = {
    notes: JSON.parse(localStorage.getItem('neon_notes') || '[]'),
    add(title, text) {
        this.notes.push({ id: 'note_' + Date.now(), title, text, createdAt: Date.now(), pinned: false });
        this.save();
    },
    remove(id) { this.notes = this.notes.filter(n => n.id !== id); this.save(); },
    togglePin(id) { const n = this.notes.find(n => n.id === id); if (n) { n.pinned = !n.pinned; this.save(); } },
    save() { try { localStorage.setItem('neon_notes', JSON.stringify(this.notes)); } catch(e) {} },
    getAll() { return [...this.notes].sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0)); },
};

// в”Ђв”Ђв”Ђ CUSTOM EVENT TRIGGER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const EVENT_TRIGGER = {
    listeners: {},
    on(event, callback) { (this.listeners[event] = this.listeners[event] || []).push(callback); },
    off(event, callback) {
        if (!this.listeners[event]) return;
        this.listeners[event] = this.listeners[event].filter(cb => cb !== callback);
    },
    emit(event, data) {
        (this.listeners[event] || []).forEach(cb => { try { cb(data); } catch(e) { console.warn('Event error:', event, e); } });
    },
    onCombatStart(cb) { this.on('combat:start', cb); },
    onCombatEnd(cb) { this.on('combat:end', cb); },
    onLevelUp(cb) { this.on('player:level_up', cb); },
    onItemFound(cb) { this.on('item:found', cb); },
    onCreditsChange(cb) { this.on('credits:change', cb); },
    onScreenChange(cb) { this.on('screen:change', cb); },
};

function initBattle(game, enemy) {
    if (!game) return;
    game.combat = game.combat || {};
    game.combat.enemy = enemy;
    game.combat.turn = 'player';
    game.combat.turnCount = 0;
    game.combat.log = ['Battle started!'];
    game.screen = 'combat';
    game.showNotification('вљ” Battle with ' + (enemy.name || 'Enemy') + '!', '#f00');
    COMBAT_LOG.add('Battle started vs ' + (enemy.name || 'Enemy'), '#f00');
    EVENT_TRIGGER.emit('combat:start', { enemy });
}

function playerAttack(game) {
    const combat = game.combat;
    if (!combat || combat.turn !== 'player') return;
    const enemy = combat.enemy;
    const player = game.character?.character || {};
    const dmg = Math.max(1, (player.atk || 10) - (enemy.def || 0) * 0.3 + (Math.random() - 0.5) * 5);
    const isCrit = Math.random() < (player.crit || 0.05);
    const finalDmg = isCrit ? Math.floor(dmg * 1.5) : Math.floor(dmg);
    enemy.hp = Math.max(0, (enemy.hp || 0) - finalDmg);
    combat.log.push((isCrit ? 'CRIT! ' : 'Hit for ') + finalDmg + ' damage');
    COMBAT_LOG.add((isCrit ? 'CRIT! ' : 'Hit for ') + finalDmg, isCrit ? '#ff0' : '#fff');
    if (isCrit) { EFFECT_FACTORY.createCritEffect(CFG.WIDTH / 2, 200); SHAKE.trigger(5); }
    else { EFFECT_FACTORY.createDamageNumber(CFG.WIDTH / 2, 200, finalDmg); }
    if (enemy.hp <= 0) {
        combat.turn = 'won';
        const rewards = calculateCombatRewards(enemy, player.level || 1, 1);
        applyCombatRewards(player, rewards, game);
        combat.log.push('Victory! +' + rewards.cr + 'cr +' + rewards.xp + 'xp');
        COMBAT_LOG.add('Victory! +' + rewards.cr + 'cr +' + rewards.xp + 'xp', '#0f0');
        EVENT_TRIGGER.emit('combat:end', { won: true, rewards });
        return;
    }
    combat.turn = 'enemy';
    setTimeout(() => enemyAttack(game), 800);
}

function enemyAttack(game) {
    const combat = game.combat;
    if (!combat || combat.turn !== 'enemy') return;
    const enemy = combat.enemy;
    const player = game.character?.character || {};
    const dmg = Math.max(1, (enemy.dmg || 5) - (player.def || 0) * 0.2 + (Math.random() - 0.5) * 3);
    player.hp = Math.max(0, (player.hp || 0) - dmg);
    combat.log.push('Enemy hits for ' + dmg + ' damage');
    COMBAT_LOG.add('Enemy hits for ' + dmg, '#f80');
    EFFECT_FACTORY.createDamageNumber(CFG.WIDTH / 2, 300, dmg, '#f80');
    if (player.hp <= 0) {
        combat.turn = 'lost';
        combat.log.push('Defeated...');
        COMBAT_LOG.add('Defeated...', '#f00');
        EVENT_TRIGGER.emit('combat:end', { won: false });
        return;
    }
    combat.turn = 'player';
}

function checkAndUnlockAchievement(game, achievementId) {

// в”Ђв”Ђв”Ђ QUICK REWARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function giveReward(character, cr, xp, items) {
    if (!character) return;
    character.credits = (character.credits || 0) + (cr || 0);
    character.experience = (character.experience || 0) + (xp || 0);
    if (items && items.length) {
        character.inventory = character.inventory || [];
        items.forEach(item => {
            const existing = character.inventory.find(i => i.id === item.id);
            if (existing) existing.qty = (existing.qty || 1) + (item.qty || 1);
            else character.inventory.push({ ...item, qty: item.qty || 1 });
        });
    }
    checkLevelUp(character);
}

function checkLevelUp(character) {
    if (!character) return;
    const xpNeeded = (character.level || 1) * 100;
    while ((character.experience || 0) >= xpNeeded) {
        character.experience -= xpNeeded;
        character.level = (character.level || 1) + 1;
        character.maxHp = (character.maxHp || 100) + 10;
        character.hp = character.maxHp;
        character.maxEnergy = (character.maxEnergy || 100) + 5;
        character.energy = character.maxEnergy;
        character.atk = (character.atk || 10) + 2;
        character.def = (character.def || 5) + 1;
    }
}

function formatTimeLeft(ms) {

    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    if (h > 0) return h + 'h ' + (m % 60) + 'm';
    if (m > 0) return m + 'm ' + (s % 60) + 's';
    return s + 's';
}

function formatDate(ts) {
    if (!ts) return 'вЂ”';

}

function isNewDay(ts) {
    if (!ts) return true;
    const last = new Date(ts);
    const now = new Date();
    return last.getDate() !== now.getDate() || last.getMonth() !== now.getMonth() || last.getFullYear() !== now.getFullYear();
}

function isNewWeek(ts) {
    if (!ts) return true;
    const last = new Date(ts);
    const now = new Date();
    const weekDiff = Math.floor((now - last) / (7 * 86400000));
    return weekDiff >= 1;
}

function isNewMonth(ts) {

}

const EASE = {
    linear: t => t,
    easeInQuad: t => t * t,
    easeOutQuad: t => t * (2 - t),
    easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,

    easeOutBounce: t => { if (t < 1 / 2.75) return 7.5625 * t * t; if (t < 2 / 2.75) return 7.5625 * (t -= 1.5 / 2.75) * t + 0.75; if (t < 2.5 / 2.75) return 7.5625 * (t -= 2.25 / 2.75) * t + 0.9375; return 7.5625 * (t -= 2.625 / 2.75) * t + 0.984375; },
    easeInOutElastic: t => t < 0.5 ? 0.5 * Math.pow(2, 10 * (2 * t - 1)) * Math.sin((2 * t - 1.1) * 5) : 0.5 * (2 - Math.pow(2, -10 * (2 * t - 1)) * Math.sin((2 * t - 1.1) * 5)),
};

    t(key, fallback) { return this.get(key, fallback); },
};

// в”Ђв”Ђв”Ђ CONFIG OVERRIDES в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function applyConfigOverrides(overrides) {
    if (!overrides) return;
    Object.keys(overrides).forEach(k => { if (k in CFG) CFG[k] = overrides[k]; });
}

// в”Ђв”Ђв”Ђ TOOLTIP HELPERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function drawTooltip(ctx, text, x, y, w, color) {
    if (!text) return;
    ctx.save();
    const lines = text.split('\n');
    const lineH = 14;
    const pad = 6;
    const tw = w || 200;
    const th = lines.length * lineH + pad * 2;
    let tx = Math.min(x, CFG.WIDTH - tw - 10);
    let ty = Math.min(y, CFG.HEIGHT - th - 10);
    tx = Math.max(5, tx); ty = Math.max(5, ty);
    ctx.fillStyle = 'rgba(10,10,30,0.9)';
    ctx.strokeStyle = color || '#0ff';
    ctx.lineWidth = 1;
    ctx.fillRect(tx, ty, tw, th);
    ctx.strokeRect(tx, ty, tw, th);
    ctx.fillStyle = color || '#0ff';
    ctx.font = '11px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    lines.forEach((line, i) => ctx.fillText(line, tx + pad, ty + pad + i * lineH));
    ctx.restore();
}

// в”Ђв”Ђв”Ђ LIST RENDER HELPER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderItemList(ctx, items, x, y, w, maxVisible, renderItem) {
    const visible = maxVisible || 5;
    const visibleItems = items.slice(0, visible);
    let yy = y;
    visibleItems.forEach((item, i) => {
        if (renderItem) renderItem(ctx, item, x, yy, w);
        yy += 20;
    });
    if (items.length > visible) {
        ctx.fillStyle = '#666';
        ctx.font = '10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('+' + (items.length - visible) + ' more...', x, yy);
        yy += 14;
    }
    return yy - y;
}

// в”Ђв”Ђв”Ђ SCREEN FADE UTILITY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function drawFadeOverlay(ctx, alpha) {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,' + (alpha || 0) + ')';
    ctx.fillRect(0, 0, CFG.WIDTH, CFG.HEIGHT);
    ctx.restore();
}

function drawScanlines(ctx, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha || 0.05;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    for (let y = 0; y < CFG.HEIGHT; y += 3) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CFG.WIDTH, y);
        ctx.stroke();
    }
    ctx.restore();
}
